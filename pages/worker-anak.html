<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CBR Worker — Daftar Anak | MEL NLR</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="stylesheet" href="../css/components.css"/>
<style>
.ld-wrap{display:flex;gap:0;height:calc(100vh - 60px);overflow:hidden}
.ld-list{width:300px;min-width:300px;flex-shrink:0;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;overflow:hidden}
.ld-list-header{padding:12px 14px;border-bottom:1px solid #E5E7EB;flex-shrink:0}
.ld-search{width:100%;padding:7px 10px;border:1px solid #E5E7EB;border-radius:8px;font-size:.75rem;font-family:inherit;background:#F9FAFB;outline:none;transition:.15s}
.ld-search:focus{border-color:#F97316;background:#fff;box-shadow:0 0 0 3px rgba(249,115,22,.1)}
.ld-select{flex:1;padding:5px 8px;border:1px solid #E5E7EB;border-radius:6px;font-size:.7rem;font-family:inherit;background:#F9FAFB;outline:none}
.ld-select:focus{border-color:#F97316}
.ld-items{flex:1;overflow-y:auto}
.ld-items::-webkit-scrollbar{width:4px}
.ld-items::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:2px}

/* Status chips */
.status-chips{display:flex;gap:4px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid #F3F4F6;flex-shrink:0}
.chip{padding:3px 10px;border-radius:999px;font-size:.65rem;font-weight:600;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#6B7280;font-family:inherit;transition:.12s;white-space:nowrap}
.chip:hover{background:#F9FAFB}
.chip.active{border-color:#F97316;background:#FFF7ED;color:#EA6C0A}

.ld-item{padding:10px 14px;border-bottom:1px solid #F9FAFB;cursor:pointer;transition:background .1s;position:relative}
.ld-item:hover{background:#FFF7ED}
.ld-item.active{background:#FFF7ED;border-left:3px solid #F97316;padding-left:11px}
.ld-item-name{font-size:.8rem;font-weight:600;color:#1F2937;margin-bottom:2px;padding-right:36px}
.ld-item-sub{font-size:.67rem;color:#9CA3AF}
.ld-item-score{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:.9rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.ld-item-tag{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}

.ld-detail{flex:1;overflow-y:auto;background:#F8FAFC}
.ld-detail::-webkit-scrollbar{width:5px}
.ld-detail::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:3px}
.ld-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9CA3AF;gap:10px;padding:40px}
.ld-empty svg{width:48px;height:48px;opacity:.3}
.ld-empty p{font-size:.82rem;text-align:center}
.det-wrap{padding:24px}
.det-back{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;color:#6B7280;font-size:.75rem;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s;margin-bottom:14px}
.det-back:hover{background:#F9FAFB;color:#1F2937}
.det-back svg{width:14px;height:14px}
.det-name{font-size:1.15rem;font-weight:800;color:#1F2937;margin-bottom:6px}
.det-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.det-chip{padding:3px 10px;border-radius:999px;font-size:.68rem;font-weight:600;background:#F3F4F6;color:#4B5563}
.det-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.det-kpi-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:12px;text-align:center}
.det-kpi-val{font-size:1.5rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.det-kpi-lbl{font-size:.6rem;color:#9CA3AF;margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.det-section{background:#fff;border:1px solid #E5E7EB;border-radius:10px;margin-bottom:10px}
.det-section-head{padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:.75rem;font-weight:700;color:#1F2937}
.det-section-body{padding:12px 14px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #F9FAFB;font-size:.77rem}
.det-row:last-child{border-bottom:none}
.det-row-label{color:#6B7280}
.det-row-val{font-weight:600;color:#1F2937}
.prog-mini{width:80px;height:4px;border-radius:999px;background:#F3F4F6;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.prog-mini-fill{height:100%;border-radius:999px}

/* View modes */
.view-modes{display:flex;gap:3px}
.vmode{width:26px;height:26px;border:1px solid #E5E7EB;border-radius:5px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9CA3AF;transition:.12s}
.vmode:hover{background:#F9FAFB;color:#6B7280}
.vmode.active{background:#FFF7ED;border-color:#F97316;color:#F97316}
.vmode svg{width:11px;height:11px}

/* List modes */
.mode-sm .ld-item{padding:6px 14px}
.mode-sm .ld-item-name{font-size:.74rem}
.mode-sm .ld-item-sub{display:none}
.mode-card{display:grid;grid-template-columns:1fr 1fr}
.mode-card .ld-item{border-right:1px solid #F9FAFB}
.mode-card .ld-item-score{position:static;transform:none;display:block;margin-top:2px;font-size:.82rem}
</style>
</head><body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-breadcrumb">CBR Worker <span class="sep">›</span><span class="current">Daftar Anak</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>

<div class="ld-wrap">
  <div class="ld-list">
    <div class="ld-list-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:.8rem;font-weight:700;color:#1F2937">Daftar Anak</span>
        <div class="view-modes">
          <button class="vmode active" id="vm-xl" onclick="setView('xl')" title="Normal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="vmode" id="vm-md" onclick="setView('md')" title="Sedang">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <button class="vmode" id="vm-sm" onclick="setView('sm')" title="Kompak">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="4" height="4"/><rect x="10" y="3" width="4" height="4"/><rect x="17" y="3" width="4" height="4"/><rect x="3" y="10" width="4" height="4"/><rect x="10" y="10" width="4" height="4"/><rect x="17" y="10" width="4" height="4"/></svg>
          </button>
          <button class="vmode" id="vm-cd" onclick="setView('cd')" title="Kartu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </button>
        </div>
      </div>
      <input class="ld-search" id="flt-search" type="text" placeholder="🔍  Cari nama anak..."/>
      <div style="display:flex;gap:5px;margin-top:7px">
        <select class="ld-select" id="flt-ragam"><option value="">Semua Ragam</option></select>
        <select class="ld-select" id="flt-cbr"><option value="">Semua CBR</option></select>
      </div>
      <div style="font-size:.68rem;color:#9CA3AF;margin-top:6px" id="ld-count">—</div>
    </div>
    <div class="status-chips" id="status-chips"></div>
    <div class="ld-items" id="ld-items"></div>
  </div>

  <div class="ld-detail" id="ld-detail">
    <div class="ld-empty" id="ld-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <p>Pilih nama anak untuk<br>melihat detail profil</p>
    </div>
    <div class="det-wrap" id="det-wrap" style="display:none"></div>
  </div>
</div>
</div></div>

<script>
const RC={Fisik:'#F97316',Intelektual:'#1D4ED8','Sensorik (penglihatan)':'#059669','Sensorik (pendengaran dan bicara)':'#7C3AED',Ganda:'#1E293B',Lainnya:'#94A3B8'};
const LC={'Parah (dukungan penuh)':'#1E293B','Sedang (dukungan reguler)':'#F97316','Rendah (sedikit dukungan)':'#059669'};
function sc(v){return v<=3?'#1E293B':v<=6?'#FB923C':'#F97316';}

let ALL_ANAK=[], OBS_MAP={}, ACTIVE_FILTER='all', ACTIVE_VIEW='xl';

function setView(v){
  ACTIVE_VIEW=v;
  ['xl','md','sm','cd'].forEach(x=>document.getElementById('vm-'+x).classList.toggle('active',x===v));
  const el=document.getElementById('ld-items');
  el.className='ld-items';
  if(v==='sm') el.classList.add('mode-sm');
  else if(v==='cd') el.classList.add('mode-card');
  renderList();
}

function renderPage(d,scnId){
  if(!d) return;
  ALL_ANAK=d.anak||[];
  OBS_MAP={};
  (d.obs||[]).forEach(o=>{if(o.na)OBS_MAP[o.na.toLowerCase()]=o;});
  const total=ALL_ANAK.length;
  const punyaObs=ALL_ANAK.filter(a=>OBS_MAP[a.nama?.toLowerCase()]).length;
  const belumObs=total-punyaObs;
  const kritis=ALL_ANAK.filter(a=>a.sp!=null&&a.sp<=3).length;
  const chips=[
    {f:'all',l:'Semua',n:total},
    {f:'punya-obs',l:'Punya Obs',n:punyaObs},
    {f:'belum-obs',l:'Belum Obs',n:belumObs},
    {f:'kritis',l:'Kritis',n:kritis},
  ];
  document.getElementById('status-chips').innerHTML=chips.map(c=>`
    <button class="chip${ACTIVE_FILTER===c.f?' active':''}" onclick="setFilter('${c.f}')">${c.l}: ${c.n}</button>
  `).join('');
  const ragams=[...new Set(ALL_ANAK.map(a=>a.ragam).filter(Boolean))].sort();
  const cbrs=[...new Set(ALL_ANAK.map(a=>a.cbr).filter(Boolean))].sort();
  const fR=document.getElementById('flt-ragam'),fC=document.getElementById('flt-cbr');
  ragams.forEach(r=>{const o=document.createElement('option');o.value=o.textContent=r;fR.appendChild(o);});
  cbrs.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;fC.appendChild(o);});
  [fR,fC].forEach(el=>el.addEventListener('change',renderList));
  document.getElementById('flt-search').addEventListener('input',renderList);
  renderList();
}

function setFilter(f){
  ACTIVE_FILTER=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

function renderList(){
  const rg=document.getElementById('flt-ragam').value;
  const cb=document.getElementById('flt-cbr').value;
  const q=(document.getElementById('flt-search').value||'').toLowerCase();
  let list=ALL_ANAK.filter(a=>{
    if(rg&&a.ragam!==rg) return false;
    if(cb&&a.cbr!==cb) return false;
    if(q&&!(a.nama||'').toLowerCase().includes(q)) return false;
    const hasObs=!!OBS_MAP[a.nama?.toLowerCase()];
    if(ACTIVE_FILTER==='punya-obs') return hasObs;
    if(ACTIVE_FILTER==='belum-obs') return !hasObs;
    if(ACTIVE_FILTER==='kritis') return a.sp!=null&&a.sp<=3;
    return true;
  });
  document.getElementById('ld-count').textContent=list.length+' anak';
  document.getElementById('ld-items').innerHTML=list.length
    ? list.map(a=>{
        const hasObs=!!OBS_MAP[a.nama?.toLowerCase()];
        const rColor=RC[a.ragam]||'#94A3B8';
        return `<div class="ld-item" data-nama="${(a.nama||'').replace(/"/g,'&quot;')}">
          <div class="ld-item-name"><span class="ld-item-tag" style="background:${rColor}"></span>${a.nama||'—'}</div>
          <div class="ld-item-sub">${a.cbr||'—'} · ${a.desa||'—'} · ${hasObs?'✓ Obs':'Belum obs'}</div>
          ${a.sp!=null?`<div class="ld-item-score" style="color:${sc(a.sp)}">${a.sp}</div>`:''}
        </div>`;
      }).join('')
    : '<div style="text-align:center;padding:32px;color:#9CA3AF;font-size:.78rem">Tidak ada data</div>';
  document.querySelectorAll('.ld-item').forEach((el,i)=>{
    el.onclick=()=>showDetail(el,list[i]);
  });
}

let _lastEl=null;
function showDetail(el,a){
  if(_lastEl) _lastEl.classList.remove('active');
  el.classList.add('active'); _lastEl=el;
  document.getElementById('ld-empty').style.display='none';
  document.getElementById('det-wrap').style.display='block';
  const obs=OBS_MAP[a.nama?.toLowerCase()];
  const spVal=a.sp, saVal=a.sa;
  document.getElementById('det-wrap').innerHTML=`
    <button class="det-back" onclick="clearDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Kembali
    </button>
    <div class="det-name">${a.nama||'—'}</div>
    <div class="det-meta">
      <span class="det-chip" style="background:${RC[a.ragam]||'#E5E7EB'}18;color:${RC[a.ragam]||'#6B7280'}">${a.ragam||'—'}</span>
      <span class="det-chip" style="color:${LC[a.level]||'#6B7280'}">${(a.level||'—').split('(')[0].trim()}</span>
      ${a.ep?'<span class="det-chip" style="background:#FEF3C7;color:#92400E">⚡ Epilepsi</span>':''}
      ${a.tr?'<span class="det-chip" style="background:#DCFCE7;color:#15803D">✓ Terapi</span>':''}
    </div>
    <div class="det-kpi">
      <div class="det-kpi-card">
        <div class="det-kpi-val" style="color:${spVal!=null?sc(spVal):'#9CA3AF'}">${spVal!=null?spVal:'—'}</div>
        <div class="det-kpi-lbl">Skor Anak</div>
      </div>
      <div class="det-kpi-card">
        <div class="det-kpi-val" style="color:${saVal!=null?sc(saVal):'#9CA3AF'}">${saVal!=null?saVal:'—'}</div>
        <div class="det-kpi-lbl">Skor Pengasuh</div>
      </div>
      <div class="det-kpi-card">
        <div class="det-kpi-val" style="color:${a.hari===999?'#DC2626':a.hari>30?'#F97316':'#059669'}">${a.hari===999?'∞':a.hari}</div>
        <div class="det-kpi-lbl">Hari sejak Obs</div>
      </div>
    </div>
    <div class="det-section">
      <div class="det-section-head">Profil</div>
      <div class="det-section-body">
        <div class="det-row"><span class="det-row-label">Nama Pengasuh</span><span class="det-row-val">${a.np||'—'}</span></div>
        <div class="det-row"><span class="det-row-label">Usia</span><span class="det-row-val">${a.usia||'?'} tahun</span></div>
        <div class="det-row"><span class="det-row-label">Jenis Kelamin</span><span class="det-row-val">${a.gender==='L'?'Laki-laki':'Perempuan'}</span></div>
        <div class="det-row"><span class="det-row-label">Desa</span><span class="det-row-val">${a.desa||'—'}</span></div>
        <div class="det-row"><span class="det-row-label">CBR Worker</span><span class="det-row-val">${a.cbr||'—'}</span></div>
      </div>
    </div>
    ${obs?`<div class="det-section">
      <div class="det-section-head">Observasi Terakhir</div>
      <div class="det-section-body">
        <div class="det-row"><span class="det-row-label">Tanggal</span><span class="det-row-val">${obs.tgl||'—'}</span></div>
        <div class="det-row"><span class="det-row-label">Struktur Tubuh</span><span class="det-row-val" style="max-width:180px;text-align:right;font-size:.7rem">${(obs.st||'—').substring(0,60)}</span></div>
        <div class="det-row"><span class="det-row-label">Kegiatan</span><span class="det-row-val" style="max-width:180px;text-align:right;font-size:.7rem">${(obs.kg||'—').substring(0,60)}</span></div>
      </div>
    </div>`:'<div class="det-section"><div class="det-section-body" style="text-align:center;color:#9CA3AF;padding:16px;font-size:.78rem">Belum ada data observasi</div></div>'}
  `;
}
function clearDetail(){
  document.getElementById('ld-empty').style.display='flex';
  document.getElementById('det-wrap').style.display='none';
  if(_lastEl){_lastEl.classList.remove('active');_lastEl=null;}
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
buildSidebar();
const SESSION=AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({onScnSwitch:async function(scnId){const d=await API.get(scnId);if(window.renderPage)renderPage(d,scnId);}});
  AUTH.initSidebar('worker','w-anak');
  API.get(AUTH.getScnFilter()).then(d=>{if(window.renderPage)renderPage(d,AUTH.getScnFilter());});
}
</script></body></html>
