<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CBR Worker — Aktivitas | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .kpi-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;gap:12px;}
    .kpi-row:last-child{border-bottom:none;}
    .worker-bar{display:flex;align-items:center;gap:10px;}
    .overview-7{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
    .ov-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;}
    .ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
    .ov-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;line-height:1;margin:6px 0;}
    .ov-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
    .ov-sub{font-size:.65rem;color:var(--gray-400);margin-top:4px;}
    .story-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:20px;}
    .story-tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.65rem;font-weight:700;background:var(--teal-50);color:var(--teal-700);margin-bottom:10px;}
    .story-nama{font-size:.95rem;font-weight:800;color:var(--gray-900);margin-bottom:4px;}
    .story-meta{font-size:.7rem;color:var(--gray-400);margin-bottom:10px;}
    .story-narasi{font-size:.8rem;color:var(--gray-700);line-height:1.7;}
    .stake-bar-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;}
    .stake-bar-row:last-child{border-bottom:none;}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">CBR Worker <span class="sep">›</span><span class="current">Aktivitas</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page" id="page-content">

      <div class="page-header"><h1>Aktivitas & Kunjungan</h1><p>Riwayat kunjungan, referral, dan jadwal bulan ini.</p></div>
      <div class="grid-2">
        <div class="card"><div class="card-head"><span class="card-title">Riwayat Kunjungan</span><span class="badge badge-teal" id="badge-total-kunjungan">—</span></div>
        <div class="card-body no-pad"><div class="tbl-wrap"><table><thead><tr><th>Anak</th><th>Tanggal</th><th>Kegiatan</th><th>Outcome</th></tr></thead><tbody id="tbl-kunjungan"></tbody></table></div></div></div>
        <div class="card"><div class="card-head"><span class="card-title">Semua Referral</span></div>
        <div class="card-body no-pad"><div class="tbl-wrap"><table><thead><tr><th>Anak</th><th>Tujuan</th><th>Tgl</th><th>Status</th></tr></thead><tbody id="tbl-ref-all"></tbody></table></div></div></div>
      </div>
      <script>
      function initPage(s, scnId){
        const d = getScnData(scnId||s.scn_id||'manggarai');
        const acts = d.aktivitas;
        document.getElementById('badge-total-kunjungan').textContent = acts.length + ' kegiatan';
        const OCOL = ['','#1a6fd4','#10b8a6','#d97706','#7c3aed','#16a34a','#dc2626','#0284c7'];
        document.getElementById('tbl-kunjungan').innerHTML = acts.map(a=>`
          <tr><td><strong>${a.nama}</strong></td><td class="mono" style="font-size:.7rem">${a.tgl}</td><td style="font-size:.7rem;color:var(--gray-500)">${a.output}</td>
          <td><span class="outcome-tag" style="background:${OCOL[a.outcome]||'#999'}">O${a.outcome}</span></td></tr>`).join('');
        document.getElementById('tbl-ref-all').innerHTML = d.referral.map(r=>`
          <tr><td><strong>${r.nama}</strong></td><td style="font-size:.72rem;color:var(--gray-500)">${r.tujuan}</td><td class="mono" style="font-size:.7rem">${r.tgl}</td>
          <td><span class="badge ${r.status==='Proses'?'badge-amber':'badge-green'}">${r.status}</span></td></tr>`).join('');
      }
      </script>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script>
  // Init: build sidebar dulu, lalu cek auth, lalu render
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: function(scnId) {
        if (window.initPage) initPage(SESSION, scnId);
      }
    });
    AUTH.initSidebar('worker', 'w-aktivitas');
    if (window.initPage) initPage(SESSION, AUTH.getScnFilter());
  }
</script>
</body></html>
