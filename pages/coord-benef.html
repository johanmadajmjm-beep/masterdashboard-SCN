<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CBR Coordinator — Beneficiary | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .kpi-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;gap:12px;}
    .kpi-row:last-child{border-bottom:none;}
    .worker-bar{display:flex;align-items:center;gap:10px;}
    .overview-7{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
    .ov-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;}
    .ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
    .ov-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;line-height:1;margin:6px 0;}
    .ov-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
    .ov-sub{font-size:.65rem;color:var(--gray-400);margin-top:4px;}
    .story-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:20px;}
    .story-tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.65rem;font-weight:700;background:var(--teal-50);color:var(--teal-700);margin-bottom:10px;}
    .story-nama{font-size:.95rem;font-weight:800;color:var(--gray-900);margin-bottom:4px;}
    .story-meta{font-size:.7rem;color:var(--gray-400);margin-bottom:10px;}
    .story-narasi{font-size:.8rem;color:var(--gray-700);line-height:1.7;}
    .stake-bar-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;}
    .stake-bar-row:last-child{border-bottom:none;}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">CBR Coordinator <span class="sep">›</span><span class="current">Beneficiary</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page" id="page-content">

      <div class="page-header"><h1>Data Beneficiary</h1><p>Distribusi anak per ragam disabilitas, gender, dan wilayah.</p></div>
      <div class="stat-grid" id="ragam-stats"></div>
      <div class="grid-2" style="margin-top:4px">
        <div class="card"><div class="card-head"><span class="card-title">Distribusi Ragam Disabilitas</span></div>
        <div class="card-body" id="ragam-bars"></div></div>
        <div class="card"><div class="card-head"><span class="card-title">Distribusi Gender</span></div>
        <div class="card-body" id="gender-bars"></div></div>
      </div>
      <div class="card" style="margin-top:16px"><div class="card-head"><span class="card-title">Semua Beneficiary</span><span class="badge badge-blue" id="total-badge">—</span></div>
      <div class="card-body no-pad"><div class="tbl-wrap"><table><thead><tr><th>Nama</th><th>Gender</th><th>Usia</th><th>Ragam</th><th>Desa</th><th>CBR Worker</th><th>IRP</th></tr></thead><tbody id="tbl-all-benef"></tbody></table></div></div></div>
      <script>
      function initPage(s, scnId){
        const d = getScnData(scnId||s.scn_id||'manggarai');
        const ragamCount = {};
        d.anak.forEach(a=>{ragamCount[a.ragam]=(ragamCount[a.ragam]||0)+1;});
        const ragamColors = {Fisik:'#1a6fd4',Intelektual:'#10b8a6',Wicara:'#d97706',Rungu:'#7c3aed',Netra:'#16a34a',Ganda:'#dc2626'};
        const ragamEntries = Object.entries(ragamCount).sort((a,b)=>b[1]-a[1]);
        document.getElementById('ragam-stats').innerHTML = ragamEntries.slice(0,4).map(([r,n])=>
          `<div class="stat-card" style="--accent:${ragamColors[r]||'#999'}"><div class="s-label">${r}</div><div class="s-value mono">${n}</div><div class="s-sub">anak</div></div>`).join('');
        const max = Math.max(...Object.values(ragamCount));
        document.getElementById('ragam-bars').innerHTML = ragamEntries.map(([r,n])=>`
          <div class="kpi-row"><span>${r}</span><div class="worker-bar" style="flex:1;justify-content:flex-end">
            <div class="prog-wrap" style="width:120px"><div class="prog-fill" style="width:${Math.round(n/max*100)}%;background:${ragamColors[r]||'#999'}"></div></div>
            <span class="mono" style="font-size:.75rem;min-width:24px;text-align:right">${n}</span></div></div>`).join('');
        const L = d.anak.filter(a=>a.gender==='L').length, P = d.anak.filter(a=>a.gender==='P').length, T = d.anak.length;
        document.getElementById('gender-bars').innerHTML = `
          <div class="kpi-row"><span>Laki-laki</span><div class="worker-bar" style="flex:1;justify-content:flex-end">
            <div class="prog-wrap" style="width:120px"><div class="prog-fill" style="width:${getPct(L,T)}%;background:#1a6fd4"></div></div>
            <span class="mono" style="font-size:.75rem;min-width:40px;text-align:right">${L} (${getPct(L,T)}%)</span></div></div>
          <div class="kpi-row"><span>Perempuan</span><div class="worker-bar" style="flex:1;justify-content:flex-end">
            <div class="prog-wrap" style="width:120px"><div class="prog-fill" style="width:${getPct(P,T)}%;background:#e879a0"></div></div>
            <span class="mono" style="font-size:.75rem;min-width:40px;text-align:right">${P} (${getPct(P,T)}%)</span></div></div>`;
        document.getElementById('total-badge').textContent = T + ' anak';
        const workerMap = {};
        d.workers.forEach(w=>workerMap[w.id]=w.nama);
        document.getElementById('tbl-all-benef').innerHTML = d.anak.map(a=>{
          const irpCls = a.irp==='Aktif'?'badge-green':a.irp==='Selesai'?'badge-gray':'badge-amber';
          return `<tr><td><strong>${a.nama}</strong></td><td>${a.gender==='L'?'L':'P'}</td><td class="mono">${a.usia}</td><td><span class="badge badge-blue">${a.ragam}</span></td><td style="font-size:.72rem">${a.desa}</td><td style="font-size:.72rem">${workerMap[a.cbr]||a.cbr}</td><td><span class="badge ${irpCls}">${a.irp}</span></td></tr>`;
        }).join('');
      }
      </script>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: (scnId) => {
        // Re-render halaman dengan SCN baru
        if (window.initPage) initPage(SESSION, scnId);
      }
    });
    AUTH.initSidebar('coord','c-benef');
    // Render awal dengan SCN dari session
    if (window.initPage) initPage(SESSION, AUTH.getScnFilter());
  });
    AUTH.initSidebar('coord','c-benef');
    if (window.initPage) initPage(SESSION);
  }
</script>
</body></html>
