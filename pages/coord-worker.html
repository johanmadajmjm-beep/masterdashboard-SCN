<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CBR Coordinator — Per Worker | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .kpi-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;gap:12px;}
    .kpi-row:last-child{border-bottom:none;}
    .worker-bar{display:flex;align-items:center;gap:10px;}
    .overview-7{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
    .ov-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;}
    .ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
    .ov-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;line-height:1;margin:6px 0;}
    .ov-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
    .ov-sub{font-size:.65rem;color:var(--gray-400);margin-top:4px;}
    .story-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:20px;}
    .story-tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.65rem;font-weight:700;background:var(--teal-50);color:var(--teal-700);margin-bottom:10px;}
    .story-nama{font-size:.95rem;font-weight:800;color:var(--gray-900);margin-bottom:4px;}
    .story-meta{font-size:.7rem;color:var(--gray-400);margin-bottom:10px;}
    .story-narasi{font-size:.8rem;color:var(--gray-700);line-height:1.7;}
    .stake-bar-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;}
    .stake-bar-row:last-child{border-bottom:none;}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">CBR Coordinator <span class="sep">›</span><span class="current">Per CBR Worker</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
        <span id="sync-time" style="font-size:.65rem;color:var(--ink-300);display:none"></span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page" id="page-content">

      <div class="page-header"><h1>Detail Per CBR Worker</h1><p>Drill-down kinerja dan distribusi anak tiap petugas.</p></div>
      <div style="margin-bottom:14px"><select id="sel-worker" style="padding:8px 14px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:.8rem;font-weight:600"></select></div>
      <div class="stat-grid" id="worker-stats"></div>
      <div class="card"><div class="card-head"><span class="card-title" id="worker-title">—</span></div>
      <div class="card-body no-pad"><div class="tbl-wrap"><table><thead><tr><th>Nama Anak</th><th>Ragam</th><th>Desa</th><th>IRP</th><th>Terakhir</th></tr></thead><tbody id="worker-anak"></tbody></table></div></div></div>
      <script>
      function renderPage(d, scnId){
        const d = d;
        const sel = document.getElementById('sel-worker');
        // Saat semua SCN: tampilkan nama SCN di depan nama worker
        sel.innerHTML = d.workers.map(w=>{
          const label = w.scn ? `[${w.scn}] ${w.nama}` : w.nama;
          return `<option value="${w.id}">${label}</option>`;
        }).join('');
        function render(wid){
          const w = d.workers.find(x=>x.id===wid)||d.workers[0];
          const pct = getPct(w.kunjungan_bulan, w.anak);
          document.getElementById('worker-stats').innerHTML = `
            <div class="stat-card" style="--accent:#1a6fd4"><div class="s-label">Jumlah Anak</div><div class="s-value mono">${w.anak}</div></div>
            <div class="stat-card" style="--accent:#10b8a6"><div class="s-label">Kunjungan</div><div class="s-value mono">${w.kunjungan_bulan}</div><div class="s-sub">coverage ${pct}%</div></div>
            <div class="stat-card" style="--accent:#16a34a"><div class="s-label">IRP Aktif</div><div class="s-value mono">${w.irp_aktif}</div></div>
            <div class="stat-card" style="--accent:#dc2626"><div class="s-label">Terlambat</div><div class="s-value mono">${w.late}</div></div>`;
          document.getElementById('worker-title').textContent = 'Daftar Anak — '+w.nama;
          // filter anak: cocokkan cbr id, dan kalau ada scn_id pada worker, cocokkan juga
          const anakList = d.anak.filter(a=>a.cbr===wid && (w.scn_id ? a.scn_id===w.scn_id : true));
          document.getElementById('worker-anak').innerHTML = anakList.length
            ? anakList.map(a=>{
                const irpCls = a.irp==='Aktif'?'badge-green':a.irp==='Selesai'?'badge-gray':'badge-amber';
                return `<tr><td><strong>${a.nama}</strong></td><td><span class="badge badge-blue">${a.ragam}</span></td><td style="font-size:.72rem">${a.desa}</td><td><span class="badge ${irpCls}">IRP ${a.irp}</span></td><td class="mono" style="font-size:.7rem;${a.hari>30?'color:var(--red);font-weight:700':''}">${a.hari}h lalu</td></tr>`;
              }).join('')
            : '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--gray-400)">Data anak untuk worker ini belum tersedia.</td></tr>';
        }
        render(d.workers[0].id);
        sel.addEventListener('change',()=>render(sel.value));
      }
      </script>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (window.renderPage) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('coord', 'c-worker');
    API.get(AUTH.getScnFilter()).then(d => {
      if (window.renderPage) renderPage(d, AUTH.getScnFilter());
    });
  }
</script>
