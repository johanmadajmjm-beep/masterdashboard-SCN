<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CBR Coordinator — Beneficiary | MEL NLR</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="stylesheet" href="../css/components.css"/>
<style>
.page-wrap{display:flex;flex-direction:column;height:calc(100vh - 60px);overflow:hidden}
.page-header{padding:14px 20px;border-bottom:1px solid #E5E7EB;background:#fff;flex-shrink:0}
.page-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.page-title{font-size:.9rem;font-weight:800;color:#1F2937}
.kpi-bar{display:flex;gap:8px;flex-wrap:wrap}
.kpi-card{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:6px 14px;text-align:center;min-width:70px}
.kpi-val{font-size:1.1rem;font-weight:800;color:#F97316;font-family:'JetBrains Mono',monospace;line-height:1}
.kpi-lbl{font-size:.58rem;color:#9CA3AF;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ld-search{padding:6px 10px;border:1px solid #E5E7EB;border-radius:7px;font-size:.74rem;font-family:inherit;background:#F9FAFB;outline:none;transition:.15s;min-width:180px}
.ld-search:focus{border-color:#F97316;background:#fff;box-shadow:0 0 0 3px rgba(249,115,22,.08)}
.ld-select{padding:6px 8px;border:1px solid #E5E7EB;border-radius:7px;font-size:.72rem;font-family:inherit;background:#F9FAFB;outline:none;color:#374151}
.ld-select:focus{border-color:#F97316}
.count-label{font-size:.68rem;color:#9CA3AF;margin-left:4px}
/* TABLE */
.table-wrap{flex:1;overflow:auto}
.table-wrap::-webkit-scrollbar{width:5px;height:5px}
.table-wrap::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:.76rem}
thead{position:sticky;top:0;z-index:10}
thead tr{background:#F9FAFB}
th{padding:10px 14px;text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6B7280;border-bottom:2px solid #E5E7EB;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#F97316}
th .sort-icon{margin-left:4px;opacity:.4;font-size:.6rem}
th.sorted .sort-icon{opacity:1;color:#F97316}
td{padding:9px 14px;border-bottom:1px solid #F3F4F6;color:#1F2937;vertical-align:middle}
tr:hover td{background:#FFF7ED}
.jabatan-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:.63rem;font-weight:700;letter-spacing:.03em}
.badge-anak{background:#FFF7ED;color:#EA6C0A}
.badge-worker{background:#EFF6FF;color:#1D4ED8}
.badge-lainnya{background:#F3F4F6;color:#6B7280}
.gender-chip{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:.65rem;font-weight:700}
.gender-l{background:#DBEAFE;color:#1D4ED8}
.gender-p{background:#FCE7F3;color:#BE185D}
.no-data{text-align:center;padding:48px;color:#9CA3AF;font-size:.8rem}
/* empty state */
.table-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#9CA3AF;gap:8px}
.table-empty svg{width:40px;height:40px;opacity:.25}
</style>
</head><body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <button class="topbar-menu-btn" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-breadcrumb">CBR Coordinator <span class="sep">›</span><span class="current">Beneficiary</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>

<div class="page-wrap">
  <!-- HEADER + FILTER -->
  <div class="page-header">
    <div class="page-header-top">
      <span class="page-title">Daftar Beneficiary</span>
      <div class="kpi-bar" id="kpi-bar"></div>
    </div>
    <div class="filter-bar">
      <input class="ld-search" id="flt-search" type="text" placeholder="🔍  Cari nama..."/>
      <select class="ld-select" id="flt-jabatan">
        <option value="">Semua Jabatan</option>
        <option value="Anak">Anak Disabilitas</option>
        <option value="CBR Worker">CBR Worker</option>
      </select>
      <select class="ld-select" id="flt-gender">
        <option value="">Semua JK</option>
        <option value="L">Laki-laki</option>
        <option value="P">Perempuan</option>
      </select>
      <select class="ld-select" id="flt-provinsi"><option value="">Semua Provinsi</option></select>
      <span class="count-label" id="ld-count">—</span>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="benef-table">
      <thead>
        <tr>
          <th onclick="sortBy('no')" id="th-no">#<span class="sort-icon">↕</span></th>
          <th onclick="sortBy('nama')" id="th-nama">Nama Benef<span class="sort-icon">↕</span></th>
          <th onclick="sortBy('jabatan')" id="th-jabatan">Jabatan Benef<span class="sort-icon">↕</span></th>
          <th onclick="sortBy('provinsi')" id="th-provinsi">Provinsi<span class="sort-icon">↕</span></th>
          <th onclick="sortBy('gender')" id="th-gender">Jenis Kelamin<span class="sort-icon">↕</span></th>
          <th onclick="sortBy('usia')" id="th-usia">Umur<span class="sort-icon">↕</span></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="6" class="no-data">Memuat data...</td></tr>
      </tbody>
    </table>
  </div>
</div>
</div></div>

<script>
let ALL_BENEF = [];
let SORT_KEY = 'jabatan', SORT_ASC = true;

function renderPage(d, scnId) {
  const anak = (d.anak || []).map(a => ({
    nama    : a.nama || '—',
    jabatan : 'Anak',
    provinsi: a.provinsi || a.scn_id || '—',
    gender  : a.gender || '—',
    usia    : a.usia != null ? a.usia : null,
    _cbr    : a.cbr || '',
    _ragam  : a.ragam || '',
  }));

  const workers = (d.workers || []).map(w => ({
    nama    : w.nama || '—',
    jabatan : 'CBR Worker',
    provinsi: w.scn || w.scn_id || d.meta?.scn || '—',
    gender  : '—',
    usia    : null,
    _cbr    : '',
    _ragam  : '',
  }));

  ALL_BENEF = [...anak, ...workers];

  // KPI
  const totalAnak   = anak.length;
  const totalWorker = workers.length;
  const totalLK     = anak.filter(a => a.gender === 'L').length;
  const totalPR     = anak.filter(a => a.gender === 'P').length;
  document.getElementById('kpi-bar').innerHTML = [
    { v: ALL_BENEF.length, l: 'Total Benef',  c: '#F97316' },
    { v: totalAnak,        l: 'Anak',          c: '#EA6C0A' },
    { v: totalWorker,      l: 'CBR Worker',    c: '#1D4ED8' },
    { v: totalLK,          l: 'Laki-laki',     c: '#2563EB' },
    { v: totalPR,          l: 'Perempuan',     c: '#BE185D' },
  ].map(k => `<div class="kpi-card"><div class="kpi-val" style="color:${k.c}">${k.v}</div><div class="kpi-lbl">${k.l}</div></div>`).join('');

  // Provinsi filter
  const provs = [...new Set(ALL_BENEF.map(b => b.provinsi).filter(p => p && p !== '—'))].sort();
  const fP = document.getElementById('flt-provinsi');
  provs.forEach(p => { const o = document.createElement('option'); o.value = o.textContent = p; fP.appendChild(o); });

  // Events
  ['flt-search','flt-jabatan','flt-gender','flt-provinsi'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener(id === 'flt-search' ? 'input' : 'change', renderTable);
  });

  renderTable();
}

function getFiltered() {
  const q  = (document.getElementById('flt-search').value || '').toLowerCase();
  const jb = document.getElementById('flt-jabatan').value;
  const gd = document.getElementById('flt-gender').value;
  const pv = document.getElementById('flt-provinsi').value;
  return ALL_BENEF.filter(b =>
    (!q  || b.nama.toLowerCase().includes(q)) &&
    (!jb || b.jabatan === jb) &&
    (!gd || b.gender === gd) &&
    (!pv || b.provinsi === pv)
  );
}

function sortBy(key) {
  if (SORT_KEY === key) SORT_ASC = !SORT_ASC;
  else { SORT_KEY = key; SORT_ASC = true; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  const th = document.getElementById('th-' + key);
  if (th) th.classList.add('sorted');
  renderTable();
}

function renderTable() {
  let list = getFiltered();
  document.getElementById('ld-count').textContent = list.length + ' benef ditemukan';

  // Sort
  list.sort((a, b) => {
    let va = a[SORT_KEY], vb = b[SORT_KEY];
    if (SORT_KEY === 'no') { va = 0; vb = 0; } // no-op, use index
    if (SORT_KEY === 'usia') {
      va = va ?? -1; vb = vb ?? -1;
      return SORT_ASC ? va - vb : vb - va;
    }
    va = String(va ?? '').toLowerCase();
    vb = String(vb ?? '').toLowerCase();
    return SORT_ASC ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  if (!list.length) {
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="6"><div class="table-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <span>Tidak ada data ditemukan</span>
      </div></td></tr>`;
    return;
  }

  document.getElementById('table-body').innerHTML = list.map((b, i) => {
    const jabBadge = b.jabatan === 'Anak'
      ? `<span class="jabatan-badge badge-anak">Anak Disabilitas</span>`
      : b.jabatan === 'CBR Worker'
      ? `<span class="jabatan-badge badge-worker">CBR Worker</span>`
      : `<span class="jabatan-badge badge-lainnya">${b.jabatan}</span>`;

    const genderChip = b.gender === 'L'
      ? `<span class="gender-chip gender-l" title="Laki-laki">L</span>`
      : b.gender === 'P'
      ? `<span class="gender-chip gender-p" title="Perempuan">P</span>`
      : `<span style="color:#D1D5DB;font-size:.72rem">—</span>`;

    const usia = b.usia != null
      ? `<span style="font-weight:600">${b.usia}</span> <span style="color:#9CA3AF;font-size:.68rem">th</span>`
      : `<span style="color:#D1D5DB">—</span>`;

    const provinsi = b.provinsi && b.provinsi !== '—'
      ? b.provinsi
      : `<span style="color:#D1D5DB">—</span>`;

    return `<tr>
      <td style="color:#9CA3AF;font-size:.68rem;font-weight:600;width:40px">${i + 1}</td>
      <td style="font-weight:600">${b.nama}</td>
      <td>${jabBadge}</td>
      <td style="font-size:.74rem;color:#374151">${provinsi}</td>
      <td>${genderChip}</td>
      <td>${usia}</td>
    </tr>`;
  }).join('');
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
buildSidebar();
const SESSION = AUTH.requireAuth('../index.html');
if (SESSION) {
  AUTH.applySession({ onScnSwitch: async function(scnId) { const d = await API.get(scnId); if (window.renderPage) renderPage(d, scnId); } });
  AUTH.initSidebar('coord', 'c-benef');
  API.get(AUTH.getScnFilter()).then(d => { if (window.renderPage) renderPage(d, AUTH.getScnFilter()); });
}
</script></body></html>
