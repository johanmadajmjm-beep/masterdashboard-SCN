<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<title>CBR Worker — Buku Harian | MEL NLR</title>
<link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
<style>
.diary-card{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:10px;border-left:3px solid #2563eb}
.diary-nama{font-weight:700;font-size:.82rem;color:#111827;margin-bottom:4px}
.diary-meta{font-size:.7rem;color:#9ca3af;margin-bottom:8px}
.diary-entry{background:#f9fafb;border-radius:6px;padding:10px 12px;font-size:.78rem;color:#374151;line-height:1.65;margin-bottom:6px;border-left:2px solid #e5e7eb}
.diary-tgl{font-size:.68rem;font-weight:700;color:#2563eb;margin-bottom:4px}
</style>
</head><body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <button class="topbar-menu-btn" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-breadcrumb">CBR Worker <span class="sep">›</span><span class="current">Buku Harian</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>
<div class="page">
  <div class="page-header"><h1>Buku Harian CBR</h1><p>Catatan perkembangan harian beneficiary oleh CBR Worker.</p></div>
  <div class="stat-grid" id="kpi-diary"></div>
  <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <select id="flt-cbr" style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.75rem"><option value="">Semua CBR Worker</option></select>
    <input id="flt-search" type="text" placeholder="Cari nama anak..." style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.75rem;flex:1"/>
    <span class="badge badge-blue" id="badge-diary" style="align-self:center">—</span>
  </div>
  <div id="diary-list">
    <div style="text-align:center;padding:40px;color:#9ca3af">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;margin:0 auto 12px;display:block;opacity:.4"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <p style="font-size:.82rem;font-weight:600;color:#6b7280;margin-bottom:6px">Data Buku Harian</p>
      <p style="font-size:.75rem">Data diambil dari form <strong>Buku Harian CBR</strong> di KoboToolbox setelah CBR Worker mengisi form tersebut.</p>
    </div>
  </div>
</div></div></div>
<script>
let ALL_DIARY=[], ALL_ANAK_D=[];
function renderPage(d, scnId) {
  ALL_ANAK_D = d.anak||[];
  ALL_DIARY  = d.diary||[];
  const cbrs=[...new Set(ALL_ANAK_D.map(a=>a.cbr).filter(Boolean))].sort();
  const fC=document.getElementById('flt-cbr');
  cbrs.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;fC.appendChild(o);});
  document.getElementById('kpi-diary').innerHTML=[
    {v:ALL_ANAK_D.length, l:'Total Anak',     s:'dalam caseload',   c:'var(--nlr-500,#d4500a)'},
    {v:ALL_DIARY.length,  l:'Entri Diary',    s:'catatan masuk',    c:'#2563eb'},
    {v:[...new Set(ALL_DIARY.map(e=>e.nama_anak||e.na))].length, l:'Anak Terdokumentasi', s:'punya catatan', c:'#16a34a'},
  ].map(k=>`<div class="stat-card" style="--accent:${k.c}"><div class="s-label">${k.l}</div><div class="s-value">${k.v}</div><div class="s-sub">${k.s}</div></div>`).join('');
  renderList();
  [document.getElementById('flt-cbr'),document.getElementById('flt-search')].forEach(el=>el.addEventListener(el.tagName==='SELECT'?'change':'input',renderList));
}
function renderList(){
  const cb=document.getElementById('flt-cbr').value;
  const q=(document.getElementById('flt-search').value||'').toLowerCase();
  const list=ALL_DIARY.length?ALL_DIARY.filter(e=>(!cb||(e.cbr_worker||e.cb)===cb)&&(!q||(e.nama_anak||e.na||'').toLowerCase().includes(q))):ALL_ANAK_D.filter(a=>(!cb||a.cbr===cb)&&(!q||a.nama.toLowerCase().includes(q)));
  document.getElementById('badge-diary').textContent=list.length+' entri';
  if(!ALL_DIARY.length){
    document.getElementById('diary-list').innerHTML=list.map(a=>`<div class="diary-card">
      <div class="diary-nama">${a.nama}</div>
      <div class="diary-meta">${a.cbr||'—'} · ${a.ragam||'—'} · ${a.desa||'—'}</div>
      <div class="diary-entry"><div class="diary-tgl">Belum ada catatan</div><p style="color:#9ca3af;font-size:.75rem">CBR Worker belum mengisi Buku Harian untuk anak ini.</p></div>
    </div>`).join('');
  } else {
    document.getElementById('diary-list').innerHTML=list.map(e=>`<div class="diary-card">
      <div class="diary-nama">${e.nama_anak||e.na||'—'}</div>
      <div class="diary-meta">${e.cbr_worker||e.cb||'—'} · ${e.tanggal_submit||'—'}</div>
      ${e.tgl_diary_1?`<div class="diary-entry"><div class="diary-tgl">${e.tgl_diary_1}</div><p>${e.isi_diary_1||'—'}</p></div>`:''}
      ${e.tgl_diary_2?`<div class="diary-entry"><div class="diary-tgl">${e.tgl_diary_2}</div><p>${e.isi_diary_2||'—'}</p></div>`:''}
    </div>`).join('');
  }
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
buildSidebar();
const SESSION=AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({onScnSwitch:async function(scnId){const d=await API.get(scnId);if(window.renderPage)renderPage(d,scnId);}});
  AUTH.initSidebar('worker','w-diary');
  API.get(AUTH.getScnFilter()).then(d=>{if(window.renderPage)renderPage(d,AUTH.getScnFilter());});
}
</script></body></html>
