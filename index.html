<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL NLR — Login</title>
  <link rel="stylesheet" href="css/login.css"/>
  <script src="js/auth.js"></script>
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">MEL</div>
        <div class="login-logo-text">
          <span class="login-logo-title">NLR Indonesia</span>
          <span class="login-logo-sub">Platform Monitoring & Evaluasi</span>
        </div>
      </div>

      <div id="error-msg" class="login-error" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text"></span>
      </div>

      <div class="login-form">
        <div class="login-field">
          <label class="login-label">Username</label>
          <input id="username" type="text" class="login-input"
            placeholder="Masukkan username" autocomplete="username"
            autocapitalize="none" spellcheck="false"/>
        </div>
        <div class="login-field">
          <label class="login-label">Password</label>
          <div class="login-pw-wrap">
            <input id="password" type="password" class="login-input"
              placeholder="Masukkan password" autocomplete="current-password"/>
            <button type="button" id="toggle-pw" class="login-pw-toggle" aria-label="Tampilkan password">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button id="btn-login" class="login-btn" onclick="doLogin()">
          <span id="login-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </span>
          <span id="spinner" style="display:none">
            <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </span>
          Masuk
        </button>
      </div>

      <div class="login-footer">
        MEL NLR Indonesia · CBR Program
      </div>
    </div>
  </div>

  <script>
    // Kalau sudah login dan session masih valid, langsung redirect
    (function(){
      const s = AUTH.getSession();
      if (s) window.location.href = 'pages/worker-beranda.html';
    })();

    const uEl    = document.getElementById('username');
    const pEl    = document.getElementById('password');
    const btn    = document.getElementById('btn-login');
    const errMsg = document.getElementById('error-msg');
    const errTxt = document.getElementById('error-text');
    const spinner = document.getElementById('spinner');
    const loginIco = document.getElementById('login-icon');

    // Toggle show/hide password
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const isText = pEl.type === 'text';
      pEl.type = isText ? 'password' : 'text';
    });

    // Enter key submit
    [uEl, pEl].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
    });

    function setLoading(state) {
      btn.disabled  = state;
      spinner.style.display   = state ? 'inline' : 'none';
      loginIco.style.display  = state ? 'none'   : 'inline';
    }

    function showError(msg) {
      errTxt.textContent    = msg;
      errMsg.style.display  = 'flex';
    }

    function hideError() {
      errMsg.style.display = 'none';
    }

    // ── LOGIN ASYNC ──────────────────────────────────────────
    async function doLogin() {
      hideError();
      const username = uEl.value.trim();
      const password = pEl.value;

      if (!username || !password) {
        showError('Username dan password wajib diisi.');
        return;
      }

      setLoading(true);

      try {
        // AUTH.login sekarang async — kirim ke GAS 3
        const result = await AUTH.login(username, password);

        if (!result.ok) {
          showError(result.message || 'Login gagal.');
          setLoading(false);
          return;
        }

        // Login berhasil — redirect sesuai role
        const role = result.session.role;
        if (role === 'superadmin') {
          window.location.href = 'pages/mel-beranda.html';
        } else {
          window.location.href = 'pages/worker-beranda.html';
        }

      } catch(e) {
        showError('Terjadi kesalahan. Coba lagi.');
        setLoading(false);
      }
    }
  </script>
</body>
</html>
