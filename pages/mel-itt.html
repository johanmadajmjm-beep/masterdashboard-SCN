  <style>
    /* ── SCN TABS ─────────────────────────────────── */
    .scn-tabs-wrap{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 20px;position:sticky;top:52px;z-index:10;display:flex;align-items:center;gap:0}
    .scn-tab{padding:10px 16px;font-size:.75rem;font-weight:600;color:#6B7280;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:.15s;user-select:none}
    .scn-tab:hover{color:#1F2937;background:#F9FAFB}
    .scn-tab.active{color:#F97316;border-bottom-color:#F97316;font-weight:700}

    /* ── ACCORDION ────────────────────────────────── */
    .itt-block{background:#fff;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;margin-bottom:10px}
    .itt-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#F9FAFB;border-left:4px solid var(--o-color,#999);cursor:pointer;user-select:none;transition:background .15s}
    .itt-header:hover{background:#F3F4F6}
    .itt-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--o-color,#999)}
    .itt-name{font-size:.85rem;font-weight:700;color:#1F2937;margin-top:1px}
    .itt-toggle{width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.06);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0}
    .itt-toggle svg{width:13px;height:13px;color:#6B7280;transition:transform .2s}
    .itt-block.open .itt-toggle svg{transform:rotate(180deg)}
    .itt-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
    .itt-block.open .itt-body{max-height:9999px}
    .acc-controls{display:flex;align-items:center;gap:6px;margin-bottom:12px}
  </style>
</head>

</div>

const LEVEL_STYLE = {

  io:       { bg:'#F9FAFB', border:'#E5E7EB', label:'INT. OUTCOME',  bold:true,  indent:16 },
  'io-ind': { bg:'#FFFFFF', border:'#F3F4F6', label:'INDIKATOR',     bold:false, indent:32 },

// ══════════════════════════════════════════════════════════
// RENDER TABS
// ══════════════════════════════════════════════════════════
function renderTabs(scnFilter) {
  const wrap = document.getElementById('scn-tabs');
  
  // Jika filter spesifik — hanya 1 tab
  const tabs = scnFilter ? SCN_LIST.filter(s => s.id === scnFilter) : SCN_LIST;
  if (tabs.length === 1) ACTIVE_SCN_TAB = tabs[0].id;

  wrap.innerHTML = tabs.map(s => `
    <div class="scn-tab ${ACTIVE_SCN_TAB === s.id ? 'active' : ''}" onclick="switchTab('${s.id}')">
      ${s.label}
    </div>
  `).join('');
}

function switchTab(scnId) {
  ACTIVE_SCN_TAB = scnId;
  // Update tab active state
  document.querySelectorAll('.scn-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === SCN_LIST.find(s=>s.id===scnId)?.label);
  });
  // Re-render ITT untuk SCN ini
  renderITT(scnId);
}

// ══════════════════════════════════════════════════════════
// RENDER ITT PER SCN
// ══════════════════════════════════════════════════════════
function renderITT(scnId) {
  // Data target & capaian per SCN — placeholder, diisi dari GSheet nanti
  // Format: { kode: { target: number|null, capaian: number|null } }
  const capData = {}; // kosong — siap disambungkan ke GSheet

  const container = document.getElementById('itt-container');
  const byO = {};
  ITT.forEach(ind => { if (!byO[ind.o]) byO[ind.o] = []; byO[ind.o].push(ind); });

  container.innerHTML = Object.keys(OUTCOME_META).map(oKey => {
    const meta = OUTCOME_META[oKey];
    const color = O_COLORS[oKey];
    const rows = byO[oKey] || [];
    const inds = rows.filter(r => r.level !== 'io');

    const rowsHtml = rows.map(ind => {
      const st = LEVEL_STYLE[ind.level] || LEVEL_STYLE['io-ind'];
      if (ind.level === 'io') {
        return `<div style="background:${st.bg};border-bottom:1px solid ${st.border};padding:7px 16px 7px ${16+st.indent}px;display:flex;align-items:center;gap:8px">
          <span style="font-size:.57rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:${color};background:${color}18;padding:1px 7px;border-radius:999px;flex-shrink:0">${st.label}</span>
          <span style="font-size:.72rem;font-weight:700;color:#374151">${ind.label}</span>
        </div>`;
      }

      const d = capData[ind.kode] || {};
      const tgtVal = d.target != null ? d.target : ind.target;
      const capVal = d.capaian != null ? d.capaian : ind.capaian;
      const pct = (capVal != null && tgtVal) ? Math.min(Math.round(capVal/tgtVal*100),100) : null;
      const pctColor = pct==null?'#D1D5DB':pct>=80?'#059669':pct>=50?'#2563EB':pct>=25?'#D97706':'#DC2626';

      const tipeTag = ind.tipe ? `<span style="font-size:.54rem;font-weight:700;padding:1px 5px;border-radius:999px;white-space:nowrap;background:${ind.tipe==='Standard LF'?'#DBEAFE':'#FEF3C7'};color:${ind.tipe==='Standard LF'?'#1D4ED8':'#92400E'}">${ind.tipe}</span>` : '';

      const tgtDisp = tgtVal!=null?`<span style="font-size:.78rem;font-weight:700;font-family:monospace;color:#374151">${tgtVal}</span>`:`<span style="font-size:.7rem;color:#D1D5DB">—</span>`;
      const capDisp = capVal!=null?`<span style="font-size:.78rem;font-weight:700;font-family:monospace;color:${pctColor}">${capVal}</span>`:`<span style="font-size:.7rem;color:#D1D5DB">—</span>`;
      const pctDisp = pct!=null?`<span style="font-size:.73rem;font-weight:800;font-family:monospace;color:${pctColor}">${pct}%</span>`:`<span style="font-size:.7rem;color:#D1D5DB">—</span>`;
      const bar = pct!=null?`<div style="width:54px;height:4px;background:#F3F4F6;border-radius:2px;overflow:hidden;flex-shrink:0"><div style="width:${pct}%;height:100%;background:${pctColor};border-radius:2px"></div></div>`:'';

      return `<div style="background:${st.bg};border-bottom:1px solid ${st.border};padding:7px 16px 7px ${16+st.indent}px;display:flex;align-items:center;gap:8px">
        <span style="font-size:.57rem;font-weight:800;color:#9CA3AF;background:#F3F4F6;padding:1px 6px;border-radius:999px;flex-shrink:0;white-space:nowrap">${ind.kode}</span>
        <span style="font-size:.72rem;font-weight:${st.bold?'600':'400'};color:#1F2937;flex:1;line-height:1.4">${ind.label}</span>
        ${tipeTag}
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:170px;justify-content:flex-end">
          <span style="font-size:.58rem;color:#9CA3AF">Target</span>${tgtDisp}
          <span style="font-size:.58rem;color:#9CA3AF">Capaian</span>${capDisp}
          ${bar}${pctDisp}
        </div>
      </div>`;
    }).join('');

    return `<div class="itt-block" id="block-${oKey}-${scnId}">
      <div class="itt-header" style="--o-color:${color}" onclick="toggleBlock('${oKey}','${scnId}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div>
            <div class="itt-label">${meta.label}</div>
            <div class="itt-name">${meta.short}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:.63rem;color:#9CA3AF">${inds.length} indikator</span>
          <button class="itt-toggle" onclick="event.stopPropagation();toggleBlock('${oKey}','${scnId}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
      </div>
      <div class="itt-body">
        <div style="padding:3px 0;border-top:1px solid #F3F4F6">
          <div style="padding:7px 16px;background:#FAFAFA;border-bottom:1px solid #F3F4F6">
            <p style="font-size:.68rem;color:#6B7280;margin:0;line-height:1.5">${meta.desc}</p>
          </div>
          <div style="display:flex;align-items:center;gap:8px;padding:4px 16px;background:#F9FAFB;border-bottom:1px solid #E5E7EB">
            <span style="flex:1;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF">Indikator / Output</span>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:170px;justify-content:flex-end">
              <span style="font-size:.56rem;font-weight:700;text-transform:uppercase;color:#9CA3AF">Target Y1</span>
              <span style="font-size:.56rem;font-weight:700;text-transform:uppercase;color:#9CA3AF">Capaian</span>
              <span style="width:54px;font-size:.56rem;font-weight:700;text-transform:uppercase;color:#9CA3AF;text-align:center">Progress</span>
              <span style="font-size:.56rem;font-weight:700;text-transform:uppercase;color:#9CA3AF">%</span>
            </div>
          </div>
          ${rowsHtml}
        </div>
      </div>
    </div>`;
  }).join('');

  // Default: buka O1
  document.getElementById(`block-O1-${scnId}`)?.classList.add('open');
}

function toggleBlock(oKey, scnId) {
  document.getElementById(`block-${oKey}-${scnId}`)?.classList.toggle('open');
}
function toggleAll(open) {
  document.querySelectorAll('.itt-block').forEach(b => open ? b.classList.add('open') : b.classList.remove('open'));
}

// ══════════════════════════════════════════════════════════

}
