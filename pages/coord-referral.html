<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CBR Coordinator — Referral & IRP | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .kpi-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;gap:12px;}
    .kpi-row:last-child{border-bottom:none;}
    .worker-bar{display:flex;align-items:center;gap:10px;}
    .overview-7{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
    .ov-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;}
    .ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
    .ov-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;line-height:1;margin:6px 0;}
    .ov-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
    .ov-sub{font-size:.65rem;color:var(--gray-400);margin-top:4px;}
    .story-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:20px;}
    .story-tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.65rem;font-weight:700;background:var(--teal-50);color:var(--teal-700);margin-bottom:10px;}
    .story-nama{font-size:.95rem;font-weight:800;color:var(--gray-900);margin-bottom:4px;}
    .story-meta{font-size:.7rem;color:var(--gray-400);margin-bottom:10px;}
    .story-narasi{font-size:.8rem;color:var(--gray-700);line-height:1.7;}
    .stake-bar-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;}
    .stake-bar-row:last-child{border-bottom:none;}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">CBR Coordinator <span class="sep">›</span><span class="current">Referral & IRP</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page" id="page-content">

      <div class="page-header"><h1>Referral & Status IRP</h1><p>Tracking rujukan aktif dan progress Rencana Rehabilitasi Individual.</p></div>
      <div class="stat-grid">
        <div class="stat-card" style="--accent:#d97706"><div class="s-label">Referral Proses</div><div class="s-value mono" id="ref-proses">—</div></div>
        <div class="stat-card" style="--accent:#16a34a"><div class="s-label">Referral Selesai</div><div class="s-value mono" id="ref-selesai">—</div></div>
        <div class="stat-card" style="--accent:#1a6fd4"><div class="s-label">IRP Aktif</div><div class="s-value mono" id="irp-aktif">—</div></div>
        <div class="stat-card" style="--accent:#dc2626"><div class="s-label">IRP Belum Mulai</div><div class="s-value mono" id="irp-belum">—</div></div>
      </div>
      <div class="grid-2">
        <div class="card"><div class="card-head"><span class="card-title">Semua Referral</span></div>
        <div class="card-body no-pad"><div class="tbl-wrap"><table><thead><tr><th>Anak</th><th>Tujuan Rujukan</th><th>CBR Worker</th><th>Tanggal</th><th>Status</th></tr></thead><tbody id="tbl-ref"></tbody></table></div></div></div>
        <div class="card"><div class="card-head"><span class="card-title">Ringkasan Status IRP</span></div>
        <div class="card-body" id="irp-summary"></div></div>
      </div>
      <script>
      function initPage(s, scnId){
        const d = getScnData(scnId||s.scn_id||'manggarai');
        const proses  = d.referral.filter(r=>r.status==='Proses').length;
        const selesai = d.referral.filter(r=>r.status==='Selesai').length;
        const irpAktif = d.anak.filter(a=>a.irp==='Aktif').length;
        const irpBelum = d.anak.filter(a=>a.irp==='Belum').length;
        document.getElementById('ref-proses').textContent  = proses;
        document.getElementById('ref-selesai').textContent = selesai;
        document.getElementById('irp-aktif').textContent   = irpAktif;
        document.getElementById('irp-belum').textContent   = irpBelum;
        const workerMap = {};
        d.workers.forEach(w=>workerMap[w.id]=w.nama);
        document.getElementById('tbl-ref').innerHTML = d.referral.map(r=>`
          <tr><td><strong>${r.nama}</strong></td><td style="font-size:.72rem;color:var(--gray-500)">${r.tujuan}</td>
          <td style="font-size:.72rem">${workerMap[r.cbr]||r.cbr}</td>
          <td class="mono" style="font-size:.7rem">${r.tgl}</td>
          <td><span class="badge ${r.status==='Proses'?'badge-amber':'badge-green'}">${r.status}</span></td></tr>`).join('');
        const total = d.anak.length;
        const irpSelesai = d.anak.filter(a=>a.irp==='Selesai').length;
        [['Aktif',irpAktif,'#1a6fd4'],['Belum Mulai',irpBelum,'#d97706'],['Selesai',irpSelesai,'#16a34a']].forEach(([label,val,col])=>{
          const pct = getPct(val,total);
          document.getElementById('irp-summary').insertAdjacentHTML('beforeend',`
            <div class="kpi-row"><span>${label}</span><div class="worker-bar" style="flex:1;justify-content:flex-end">
              <div class="prog-wrap" style="width:120px"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
              <span class="mono" style="font-size:.75rem;min-width:50px;text-align:right">${val} (${pct}%)</span></div></div>`);
        });
      }
      </script>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: (scnId) => {
        // Re-render halaman dengan SCN baru
        if (window.initPage) initPage(SESSION, scnId);
      }
    });
    AUTH.initSidebar('coord','c-referral');
    // Render awal dengan SCN dari session
    if (window.initPage) initPage(SESSION, AUTH.getScnFilter());
  });
    AUTH.initSidebar('coord','c-referral');
    if (window.initPage) initPage(SESSION);
  }
</script>
</body></html>
