<!DOCTYPE html>
<html lang="id">
<head>
  <style>html,body{background:#F8FAFC}</style><script>if("startViewTransition" in document){addEventListener("pagereveal",e=>{if(e.viewTransition)e.viewTransition.ready.catch(()=>{})})}</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
  <title>MEL — Galeri Foto | MEL NLR</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    /* ── FILTER BAR ── */
    .filter-bar {
      background    : var(--white);
      border        : 1px solid var(--ink-100);
      border-radius : var(--radius-md);
      padding       : 14px 18px;
      display       : flex;
      align-items   : center;
      gap           : 10px;
      flex-wrap     : wrap;
      margin-bottom : 18px;
    }
    .filter-bar select, .filter-bar input {
      padding       : 6px 12px;
      border        : 1px solid var(--ink-100);
      border-radius : var(--radius-sm);
      font-family   : var(--font-body);
      font-size     : .75rem;
      background    : var(--white);
      color         : var(--ink-800);
    }
    .filter-bar select:focus, .filter-bar input:focus {
      outline      : none;
      border-color : var(--nlr-500);
    }

    /* ── GRID FOTO ── */
    .foto-grid {
      display               : grid;
      grid-template-columns : repeat(auto-fill, minmax(200px, 1fr));
      gap                   : 12px;
    }
    .foto-card {
      background    : var(--white);
      border        : 1px solid var(--ink-100);
      border-radius : var(--radius-md);
      overflow      : hidden;
      cursor        : pointer;
      transition    : box-shadow .15s, transform .1s;
    }
    .foto-card:hover {
      box-shadow : var(--shadow-md);
      transform  : translateY(-2px);
    }
    .foto-thumb {
      width      : 100%;
      height     : 160px;
      object-fit : cover;
      display    : block;
      background : var(--ink-100);
    }
    .foto-thumb-placeholder {
      width           : 100%;
      height          : 160px;
      background      : var(--surface);
      display         : flex;
      align-items     : center;
      justify-content : center;
      color           : var(--ink-300);
      font-size       : .75rem;
    }
    .foto-info {
      padding : 10px 12px;
    }
    .foto-nama {
      font-size   : .78rem;
      font-weight : 700;
      color       : var(--ink-900);
      white-space : nowrap;
      overflow    : hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .foto-meta {
      font-size : .68rem;
      color     : var(--ink-400);
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display         : none;
      position        : fixed;
      inset           : 0;
      background      : rgba(0,0,0,.92);
      z-index         : 1000;
      align-items     : center;
      justify-content : center;
      flex-direction  : column;
      padding         : 20px;
    }
    .lightbox.open { display: flex; }

    .lightbox-img {
      max-width  : 90vw;
      max-height : 75vh;
      object-fit : contain;
      border-radius: var(--radius-md);
      box-shadow : 0 20px 60px rgba(0,0,0,.5);
    }
    .lightbox-info {
      margin-top  : 16px;
      text-align  : center;
      color       : white;
    }
    .lightbox-nama {
      font-size   : 1rem;
      font-weight : 700;
      margin-bottom: 4px;
    }
    .lightbox-meta { font-size: .78rem; color: rgba(255,255,255,.6); }

    .lightbox-controls {
      display    : flex;
      gap        : 10px;
      margin-top : 16px;
    }
    .lb-btn {
      padding       : 8px 20px;
      border-radius : var(--radius-sm);
      border        : none;
      font-size     : .78rem;
      font-weight   : 600;
      cursor        : pointer;
      font-family   : var(--font-body);
      transition    : opacity .15s;
    }
    .lb-btn:hover { opacity: .85; }
    .lb-close    { background: rgba(255,255,255,.15); color: white; }
    .lb-download { background: var(--nlr-600); color: white; }
    .lb-prev, .lb-next {
      position  : fixed;
      top       : 50%;
      transform : translateY(-50%);
      background: rgba(255,255,255,.12);
      border    : none;
      color     : white;
      font-size : 1.5rem;
      width     : 48px;
      height    : 48px;
      border-radius: 50%;
      cursor    : pointer;
      display   : flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,.25); }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }

    /* ── EMPTY STATE ── */
    .empty-galeri {
      text-align : center;
      padding    : 60px 20px;
      color      : var(--ink-300);
    }
    .empty-galeri svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: .3; }
    .empty-galeri p { font-size: .85rem; }

    /* ── LOADING ── */
    .loading-galeri {
      text-align : center;
      padding    : 40px;
      color      : var(--ink-400);
      font-size  : .85rem;
    }
    /* 4 view modes */
    #foto-grid[data-view="xl"] { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    #foto-grid[data-view="md"] { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
    #foto-grid[data-view="sm"] { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
    #foto-grid[data-view="lst"] { display:flex; flex-direction:column; gap:8px; }
    #foto-grid[data-view="lst"] .foto-card { display:flex; flex-direction:row; gap:0; }
    #foto-grid[data-view="lst"] .foto-thumb { width:80px; height:60px; flex-shrink:0; }
    #foto-grid[data-view="lst"] .foto-thumb-placeholder { width:80px; height:60px; flex-shrink:0; }
    #foto-grid[data-view="lst"] .foto-info { padding:8px 12px; }
    #foto-grid[data-view="sm"] .foto-thumb { height:110px; }
    #foto-grid[data-view="sm"] .foto-thumb-placeholder { height:110px; }
    #foto-grid[data-view="xl"] .foto-thumb { height:200px; }
    #foto-grid[data-view="xl"] .foto-thumb-placeholder { height:200px; }
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">
          MEL <span class="sep">›</span><span class="current">Galeri Foto</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
        <span id="sync-time" style="font-size:.65rem;color:var(--ink-300);display:none"></span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>

    <div class="page">


      <!-- STAT -->
      <div class="stat-grid" style="margin-bottom:16px">
        <div class="stat-card" style="--accent:var(--nlr-500)">
          <div class="s-label">Total Foto</div>
          <div class="s-value mono" id="stat-total">—</div>
          <div class="s-sub">terdokumentasi</div>
        </div>
        <div class="stat-card" style="--accent:#1a6fd4">
          <div class="s-label">Anak Terfoto</div>
          <div class="s-value mono" id="stat-anak">—</div>
          <div class="s-sub">beneficiary</div>
        </div>
        <div class="stat-card" style="--accent:#10b8a6">
          <div class="s-label">CBR Worker</div>
          <div class="s-value mono" id="stat-worker">—</div>
          <div class="s-sub">mendokumentasikan</div>
        </div>
        <div class="stat-card" style="--accent:#d97706">
          <div class="s-label">Ditampilkan</div>
          <div class="s-value mono" id="stat-tampil">—</div>
          <div class="s-sub">sesuai filter</div>
        </div>
      </div>

      <!-- FILTER -->
      <div class="filter-bar" style="align-items:center">
        <select id="flt-cbr"><option value="">Semua CBR Worker</option></select>
        <select id="flt-bulan">
          <option value="">Semua Bulan</option>
          <option value="01">Januari</option><option value="02">Februari</option>
          <option value="03">Maret</option><option value="04">April</option>
          <option value="05">Mei</option><option value="06">Juni</option>
          <option value="07">Juli</option><option value="08">Agustus</option>
          <option value="09">September</option><option value="10">Oktober</option>
          <option value="11">November</option><option value="12">Desember</option>
        </select>
        <input type="text" id="flt-nama" placeholder="Cari nama anak..." style="min-width:180px"/>
        <button class="btn btn-ghost" onclick="resetFilter()">Reset</button>
        <span id="flt-count" style="font-size:.75rem;color:var(--ink-400);margin-left:auto"></span>
        <!-- 4 View buttons (adopsi BENkobo) -->
        <div style="display:flex;gap:4px;margin-left:8px">
          <button onclick="setView('xl')" id="vbtn-xl" title="Grid Besar" style="width:30px;height:30px;border:1px solid #e5e7eb;border-radius:6px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b7280;padding:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button onclick="setView('md')" id="vbtn-md" title="Grid Medium" style="width:30px;height:30px;border:1px solid #e5e7eb;border-radius:6px;background:#f0f4ff;border-color:#4f46e5;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#4f46e5;padding:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="3" y="3" width="4" height="4"/><rect x="10" y="3" width="4" height="4"/><rect x="17" y="3" width="4" height="4"/><rect x="3" y="10" width="4" height="4"/><rect x="10" y="10" width="4" height="4"/><rect x="17" y="10" width="4" height="4"/><rect x="3" y="17" width="4" height="4"/><rect x="10" y="17" width="4" height="4"/><rect x="17" y="17" width="4" height="4"/></svg>
          </button>
          <button onclick="setView('sm')" id="vbtn-sm" title="Grid Kecil" style="width:30px;height:30px;border:1px solid #e5e7eb;border-radius:6px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b7280;padding:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="3" y1="14" x2="21" y2="14"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <button onclick="setView('lst')" id="vbtn-lst" title="List" style="width:30px;height:30px;border:1px solid #e5e7eb;border-radius:6px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b7280;padding:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- GRID -->
      <div id="foto-grid" data-view="md">
        <div class="loading-galeri">Memuat foto...</div>
      </div>

    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-prev" onclick="event.stopPropagation();navPhoto(-1)">&#8249;</button>
  <img class="lightbox-img" id="lb-img" src="" alt=""/>
  <div class="lightbox-info">
    <div class="lightbox-nama" id="lb-nama">—</div>
    <div class="lightbox-meta" id="lb-meta">—</div>
  </div>
  <div class="lightbox-controls">
    <button class="lb-btn lb-download" id="lb-download" onclick="downloadPhoto()">⬇ Download</button>
    <button class="lb-btn lb-close" onclick="closeLightbox()">✕ Tutup</button>
  </div>
  <button class="lb-next" onclick="event.stopPropagation();navPhoto(1)">&#8250;</button>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
  let ALL_FOTO    = [];
  let FILTERED    = [];
  let CURRENT_IDX = 0;

  // ── FETCH FOTO ─────────────────────────────────────────────
  async function loadFoto(scnId) {
    const url = API.ENDPOINTS[scnId || 'manggarai'];
    if (!url) return [];
    try {
      const token = (typeof AUTH !== 'undefined' && AUTH.getToken) ? AUTH.getToken() || '' : '';
      const resp = await fetch(`${url}?sheet=FotoObs${scnId ? '&scn=' + scnId : ''}&token=${token}`);
      const json = await resp.json();
      return json.data || json || [];
    } catch (e) {
      console.warn('[Galeri] Gagal fetch foto:', e.message);
      return [];
    }
  }

  async function renderPage(d, scnId) {
    // Fetch foto langsung dari Apps Script
    const scns = scnId ? [scnId] : Object.keys(API.ENDPOINTS);
    let allFoto = [];
    for (const sid of scns) {
      const foto = await loadFoto(sid);
      allFoto = allFoto.concat(foto.map(f => ({ ...f, scn_id: sid })));
    }

    ALL_FOTO = allFoto;

    // Stat
    const unikAnak   = new Set(ALL_FOTO.map(f => f.na)).size;
    const unikWorker = new Set(ALL_FOTO.map(f => f.cb)).size;
    document.getElementById('stat-total').textContent  = ALL_FOTO.length;
    document.getElementById('stat-anak').textContent   = unikAnak;
    document.getElementById('stat-worker').textContent = unikWorker;

    // Isi dropdown CBR
    const cbrs = [...new Set(ALL_FOTO.map(f => f.cb).filter(Boolean))].sort();
    const fCbr = document.getElementById('flt-cbr');
    cbrs.forEach(c => {
      const o = document.createElement('option');
      o.value = o.textContent = c;
      fCbr.appendChild(o);
    });

    applyFilter();
  }

  // ── FILTER ─────────────────────────────────────────────────
  function applyFilter() {
    const cbr   = document.getElementById('flt-cbr').value;
    const bulan = document.getElementById('flt-bulan').value;
    const nama  = document.getElementById('flt-nama').value.toLowerCase().trim();

    FILTERED = ALL_FOTO.filter(f => {
      if (cbr   && f.cb !== cbr) return false;
      if (bulan && !(f.tgl || '').includes('-' + bulan + '-')) return false;
      if (nama  && !(f.na || '').toLowerCase().includes(nama)) return false;
      return true;
    });

    document.getElementById('stat-tampil').textContent = FILTERED.length;
    document.getElementById('flt-count').textContent   = FILTERED.length + ' foto';
    renderGrid();
  }

  function resetFilter() {
    document.getElementById('flt-cbr').value   = '';
    document.getElementById('flt-bulan').value = '';
    document.getElementById('flt-nama').value  = '';
    applyFilter();
  }

  // ── RENDER GRID ────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('foto-grid');

    if (!FILTERED.length) {
      grid.innerHTML = `
        <div class="empty-galeri">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>Tidak ada foto yang sesuai filter.</p>
        </div>`;
      return;
    }

    grid.innerHTML = FILTERED.map((f, i) => {
      const thumb   = f.thumb_url || f.drive_url || '';
      const tgl     = f.tgl ? String(f.tgl).substring(0, 10) : '—';
      const imgHtml = thumb
        ? `<img class="foto-thumb" src="${thumb}" alt="${f.na||''}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const placeholder = `<div class="foto-thumb-placeholder" ${thumb ? 'style="display:none"' : ''}>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>`;

      return `<div class="foto-card" onclick="openLightbox(${i})">
        ${imgHtml}${placeholder}
        <div class="foto-info">
          <div class="foto-nama">${f.na || '—'}</div>
          <div class="foto-meta">${f.cb || '—'} · ${tgl}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ── LIGHTBOX ───────────────────────────────────────────────
  function openLightbox(idx) {
    CURRENT_IDX = idx;
    showPhoto();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function showPhoto() {
    const f   = FILTERED[CURRENT_IDX];
    if (!f) return;
    const url = f.drive_url || f.thumb_url || '';
    document.getElementById('lb-img').src    = url;
    document.getElementById('lb-nama').textContent = f.na || '—';
    document.getElementById('lb-meta').textContent =
      `${f.cb || '—'} · ${f.tgl ? String(f.tgl).substring(0,10) : '—'} · ${CURRENT_IDX+1}/${FILTERED.length}`;
    document.getElementById('lb-download').dataset.url  = url;
    document.getElementById('lb-download').dataset.name = f.filename || 'foto.jpg';
  }

  function navPhoto(dir) {
    CURRENT_IDX = (CURRENT_IDX + dir + FILTERED.length) % FILTERED.length;
    showPhoto();
  }

  function downloadPhoto() {
    const btn  = document.getElementById('lb-download');
    const url  = btn.dataset.url;
    const name = btn.dataset.name;
    if (!url) return;
    const a    = document.createElement('a');
    a.href     = url;
    a.download = name;
    a.target   = '_blank';
    a.click();
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  navPhoto(-1);
    if (e.key === 'ArrowRight') navPhoto(1);
    if (e.key === 'Escape')     { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow=''; }
  });

  // ── 4 VIEW MODES ───────────────────────────────────────────
  function setView(v){
    const grid=document.getElementById('foto-grid');
    grid.dataset.view=v;
    ['xl','md','sm','lst'].forEach(x=>{
      const btn=document.getElementById('vbtn-'+x);
      if(btn){
        btn.style.background=x===v?'#f0f4ff':'white';
        btn.style.borderColor=x===v?'#4f46e5':'#e5e7eb';
        btn.style.color=x===v?'#4f46e5':'#6b7280';
      }
    });
  }

  // Filter listeners
  ['flt-cbr','flt-bulan'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilter);
  });
  document.getElementById('flt-nama').addEventListener('input', applyFilter);

  // ── INIT ───────────────────────────────────────────────────
  buildTopNav('galeri', 'g-galeri');
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        document.getElementById('foto-grid').innerHTML = '<div class="loading-galeri">Memuat foto...</div>';
        const d = await API.get(scnId);
        renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('mel', 'm-galeri');
    API.get(AUTH.getScnFilter()).then(d => renderPage(d, AUTH.getScnFilter()));
  }
</script>
</body>
</html>
