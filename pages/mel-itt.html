<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — ITT Tracker | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    /* Accordion outcome */
    .itt-block {
      background    : var(--white);
      border        : 1px solid var(--gray-200);
      border-radius : var(--radius-md);
      overflow      : hidden;
      margin-bottom : 12px;
    }
    .itt-header {
      display        : flex;
      align-items    : center;
      justify-content: space-between;
      padding        : 14px 18px;
      background     : var(--gray-50);
      border-left    : 4px solid var(--o-color, #999);
      cursor         : pointer;
      user-select    : none;
      transition     : background .15s;
    }
    .itt-header:hover { background: var(--gray-100); }
    .itt-header-left { display: flex; align-items: center; gap: 14px; }
    .itt-header-right { display: flex; align-items: center; gap: 10px; }

    .itt-label {
      font-size     : .65rem;
      font-weight   : 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      color         : var(--o-color, #999);
    }
    .itt-name {
      font-size  : .9rem;
      font-weight: 700;
      color      : var(--gray-900);
      margin-top : 2px;
    }
    .itt-avg {
      font-family: var(--font-mono);
      font-size  : 1.1rem;
      font-weight: 700;
      color      : var(--o-color, #999);
    }

    /* Tombol chevron */
    .itt-toggle {
      width           : 28px;
      height          : 28px;
      border-radius   : 50%;
      background      : rgba(0,0,0,.06);
      border          : none;
      display         : flex;
      align-items     : center;
      justify-content : center;
      cursor          : pointer;
      transition      : background .15s, transform .2s;
      flex-shrink     : 0;
    }
    .itt-toggle:hover { background: rgba(0,0,0,.12); }
    .itt-toggle svg { width: 14px; height: 14px; color: var(--gray-600); transition: transform .2s; }
    .itt-block.open .itt-toggle svg { transform: rotate(180deg); }

    /* Body accordion */
    .itt-body {
      max-height : 0;
      overflow   : hidden;
      transition : max-height .3s ease;
    }
    .itt-block.open .itt-body { max-height: 2000px; }

    /* Mini progress bar di header */
    .itt-header-prog {
      width      : 80px;
      flex-shrink: 0;
    }

    /* Tombol expand all / collapse all */
    .acc-controls {
      display    : flex;
      align-items: center;
      gap        : 8px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">ITT Tracker</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
        <span id="sync-time" style="font-size:.65rem;color:var(--ink-300);display:none"></span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <h1>Indicator Tracking Table</h1>
        <p>Capaian per indikator berdasarkan ITT NLR Indonesia — 7 Outcome · Year 1 2026.</p>
      </div>

      <!-- Kontrol expand/collapse -->
      <div class="acc-controls">
        <button class="btn btn-ghost" onclick="toggleAll(true)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          Buka Semua
        </button>
        <button class="btn btn-ghost" onclick="toggleAll(false)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
          Tutup Semua
        </button>
      </div>

      <div id="itt-container"></div>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (window.renderPage) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('mel', 'm-itt');
    API.get(AUTH.getScnFilter()).then(d => {
      if (window.renderPage) renderPage(d, AUTH.getScnFilter());
    });
  }
</script>
