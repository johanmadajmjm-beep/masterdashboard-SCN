<style>
/* ── LAYOUT LIST-DETAIL ── */
.ld-wrap { display:flex; gap:0; height:calc(100vh - 60px); overflow:hidden; }

/* Panel kiri — list */
.ld-list {
  width:100%; min-width:0; flex-shrink:0;
  background:#fff; border-right:1px solid #E5E7EB;
  display:flex; flex-direction:column; overflow:hidden;
  transition:width .2s;
}
.ld-wrap.detail-open .ld-list { width:340px; min-width:340px; }
.ld-list-header {
  padding:14px 16px; border-bottom:1px solid #E5E7EB;
  background:#fff; flex-shrink:0;
}
.ld-list-title { font-size:.82rem; font-weight:700; color:#1F2937; margin-bottom:8px; }
.ld-search {
  width:100%; padding:7px 10px; border:1px solid #E5E7EB;
  border-radius:8px; font-size:.75rem; font-family:inherit;
  color:#1F2937; background:#F9FAFB; outline:none; transition:.15s;
}
.ld-search:focus { border-color:#F97316; background:#fff; box-shadow:0 0 0 3px rgba(249,115,22,.1); }
.ld-filters { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.ld-select {
  flex:1; min-width:100px; padding:5px 8px; border:1px solid #E5E7EB;
  border-radius:6px; font-size:.72rem; font-family:inherit; color:#1F2937;
  background:#F9FAFB; outline:none; cursor:pointer;
}
.ld-select:focus { border-color:#F97316; }
.ld-count { font-size:.68rem; color:#9CA3AF; margin-top:6px; }

/* Domain pills */
.domain-pills { display:flex; gap:4px; flex-wrap:wrap; padding:10px 16px; border-bottom:1px solid #F3F4F6; flex-shrink:0; }
.dpill {
  padding:3px 10px; border-radius:999px; font-size:.65rem; font-weight:600;
  cursor:pointer; border:1px solid #E5E7EB; background:#fff; color:#6B7280;
  font-family:inherit; transition:.12s;
}
.dpill:hover { background:#F9FAFB; }
.dpill.active { border-color:#F97316; background:#FFF7ED; color:#EA6C0A; }

/* List items */
.ld-items { flex:1; overflow-y:auto; }
.ld-items::-webkit-scrollbar { width:4px; }
.ld-items::-webkit-scrollbar-thumb { background:#E5E7EB; border-radius:2px; }
.ld-item {
  padding:12px 16px; border-bottom:1px solid #F9FAFB;
  cursor:pointer; transition:background .1s; position:relative;
}
.ld-item:hover { background:#FFF7ED; }
.ld-item.active { background:#FFF7ED; border-left:3px solid #F97316; padding-left:13px; }
.ld-item-name { font-size:.82rem; font-weight:600; color:#1F2937; margin-bottom:3px; }
.ld-item-sub { font-size:.7rem; color:#9CA3AF; display:flex; gap:8px; flex-wrap:wrap; }
.ld-item-badge { display:flex; gap:4px; margin-top:5px; }
.ld-item-count { font-size:.65rem; font-weight:700; padding:2px 7px; border-radius:999px; }
.ld-item-score {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  font-size:1rem; font-weight:800; font-family:'JetBrains Mono',monospace;
}

/* Panel kanan — detail */
.ld-detail {
  flex:1; overflow-y:auto; background:#F8FAFC; display:none;
}
.ld-wrap.detail-open .ld-detail { display:block; }
.ld-detail::-webkit-scrollbar { width:5px; }
.ld-detail::-webkit-scrollbar-thumb { background:#E5E7EB; border-radius:3px; }

/* Detail content */
.ld-detail-inner { padding:24px; }
.det-back {
  display:inline-flex; align-items:center; gap:6px; padding:6px 12px;
  border:1px solid #E5E7EB; border-radius:8px; background:#fff; color:#6B7280;
  font-size:.75rem; font-weight:500; cursor:pointer; font-family:inherit;
  transition:.15s; margin-bottom:16px;
}
.det-back:hover { background:#F9FAFB; color:#1F2937; border-color:#D1D5DB; }
.det-back svg { width:14px; height:14px; }

.det-header { margin-bottom:20px; }
.det-name { font-size:1.2rem; font-weight:800; color:#1F2937; margin-bottom:6px; }
.det-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.det-chip {
  display:inline-flex; align-items:center; gap:4px; padding:3px 10px;
  border-radius:999px; font-size:.68rem; font-weight:600;
  background:#F3F4F6; color:#4B5563;
}
.det-scores { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.det-score-card {
  background:#fff; border:1px solid #E5E7EB; border-radius:10px;
  padding:12px 16px; text-align:center;
}
.det-score-val { font-size:2rem; font-weight:800; font-family:'JetBrains Mono',monospace; line-height:1; }
.det-score-lbl { font-size:.65rem; color:#9CA3AF; margin-top:4px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
.det-score-bar { height:4px; border-radius:999px; background:#F3F4F6; margin-top:8px; overflow:hidden; }
.det-score-fill { height:100%; border-radius:999px; transition:width .4s; }

/* Domain cards */
.det-domain { background:#fff; border:1px solid #E5E7EB; border-radius:12px; margin-bottom:12px; overflow:hidden; }
.det-domain-head {
  display:flex; align-items:center; gap:8px; padding:12px 16px;
  border-bottom:1px solid #F3F4F6;
}
.det-domain-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.det-domain-label { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
.det-domain-count { margin-left:auto; font-size:.65rem; color:#9CA3AF; }
.det-rekom { padding:10px 16px; }
.det-rekom-item { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid #F9FAFB; }
.det-rekom-item:last-child { border-bottom:none; }
.det-aktor { font-size:.7rem; font-weight:700; color:#F97316; min-width:110px; flex-shrink:0; }
.det-aksi { font-size:.75rem; color:#374151; line-height:1.5; }

/* 4 View mode buttons */
.view-modes { display:flex; gap:4px; }
.vmode {
  width:30px; height:30px; border:1px solid #E5E7EB; border-radius:6px;
  background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:#9CA3AF; transition:.12s;
}
.vmode:hover { background:#F9FAFB; color:#6B7280; }
.vmode.active { background:#FFF7ED; border-color:#F97316; color:#F97316; }
.vmode svg { width:13px; height:13px; }
/* Card grid views */
.card-grid-wrap{display:grid;gap:10px;padding:12px;overflow-y:auto;flex:1}
.grid-xl{grid-template-columns:1fr 1fr}
.grid-md{grid-template-columns:1fr 1fr 1fr}

.item-card.active{border-color:#F97316;background:#FFF7ED}
.item-card-name{font-size:.78rem;font-weight:700;color:#1F2937;margin-bottom:3px}
.item-card-sub{font-size:.64rem;color:#9CA3AF;line-height:1.4}
.grid-sm .item-card-sub{display:none}
.lst-item{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background .1s}
.lst-item:hover{background:#FFF7ED}
.lst-item.active{background:#FFF7ED;border-left:3px solid #F97316;padding-left:11px}
.lst-item-name{font-size:.74rem;font-weight:600;color:#1F2937;flex:1}
.lst-item-right{font-size:.68rem;color:#9CA3AF}

/* Grid views */
.list-view-xl .ld-item { padding:14px 16px; }
.list-view-xl .ld-item-name { font-size:.88rem; }
.list-view-md .ld-item { padding:11px 16px; }

.list-view-sm .ld-item { padding:8px 16px; }

.list-view-sm .ld-item-sub { display:none; }
.list-view-sm .ld-item-badge { display:none; }

.mode-lst .ld-item-name { font-size:.72rem; }
.mode-lst .ld-item-sub { display:none; }
.mode-lst .ld-item-badge { display:none; }
.list-view-card { display:grid; grid-template-columns:1fr 1fr; gap:0; }
.list-view-card .ld-item { border:none; border-bottom:1px solid #F9FAFB; border-right:1px solid #F9FAFB; }
.list-view-card .ld-item-score { position:static; transform:none; font-size:.85rem; margin-top:4px; }

/* ── WHO CBR 5 Kategori blocks ── */
.who-block{background:#fff;border:1px solid #E5E7EB;border-radius:10px;margin-bottom:10px;overflow:hidden}
.who-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #F3F4F6}
.who-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.who-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.who-body{padding:12px 14px}
.who-section-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9CA3AF;margin-bottom:4px;margin-top:10px}
.who-section-lbl:first-child{margin-top:0}
.who-temuan{font-size:.76rem;color:#374151;line-height:1.6;margin-bottom:2px}
.who-rtl{font-size:.75rem;color:#374151;line-height:1.65;background:#F9FAFB;border-left:3px solid;padding:8px 10px;border-radius:0 6px 6px 0;margin-bottom:2px}
/* Pihak chips */
.pihak-wrap{margin-top:6px}
.pihak-kat-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.pihak-kat-lbl{font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0;margin-top:1px;white-space:nowrap}
.pihak-chips{display:flex;flex-wrap:wrap;gap:3px}
.pihak-chip{font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:6px;border:1px solid transparent}
/* who kategori colors */
.who-kesehatan .who-head{background:#FEF2F2}.who-kesehatan .who-label{color:#DC2626}.who-kesehatan .who-rtl{border-color:#DC2626}
.who-pendidikan .who-head{background:#EFF6FF}.who-pendidikan .who-label{color:#1D4ED8}.who-pendidikan .who-rtl{border-color:#1D4ED8}
.who-penghidupan .who-head{background:#FFFBEB}.who-penghidupan .who-label{color:#D97706}.who-penghidupan .who-rtl{border-color:#D97706}
.who-sosial .who-head{background:#F5F3FF}.who-sosial .who-label{color:#7C3AED}.who-sosial .who-rtl{border-color:#7C3AED}
.who-pemberdayaan .who-head{background:#ECFDF5}.who-pemberdayaan .who-label{color:#059669}.who-pemberdayaan .who-rtl{border-color:#059669}
/* domain pills existing — tidak diubah */
</style>

<script>
const RTL_MATRIX = {
  kesehatan: {
    color:'#F97316', label:'Kesehatan',
    rules:[
      {cond:a=>(a.level||'').includes('Parah'),  aktor:'Puskesmas / Dokter', aksi:'Rujuk untuk pemeriksaan menyeluruh dan penanganan medis'},
      {cond:a=>a.ep,                             aktor:'Nakes / Dokter',     aksi:'Konsultasi penanganan epilepsi dan pemberian obat rutin'},
      {cond:a=>!a.ob,                            aktor:'Puskesmas',          aksi:'Fasilitasi akses pengobatan dan pendampingan BPJS'},
      {cond:a=>!a.tr,                            aktor:'Terapis / Klinik',   aksi:'Rujuk ke layanan fisioterapi atau terapi wicara'},
      {cond:a=>a.sp!=null&&a.sp<=4,             aktor:'CBR Worker',         aksi:'Kunjungan intensif dan dukungan psikososial'},
    ]
  },
  pendidikan: {
    color:'#1D4ED8', label:'Pendidikan',
    rules:[
      {cond:a=>a.usia<=17,                                 aktor:'Guru / Sekolah',  aksi:'Fasilitasi akses ke SLB atau sekolah inklusi terdekat'},
      {cond:a=>(a.ragam||'').includes('Intelektual'),       aktor:'Guru SLB',        aksi:'Program pembelajaran khusus sesuai kemampuan kognitif'},
      {cond:a=>(a.ragam||'').includes('Sensorik'),          aktor:'Guru / Orang Tua',aksi:'Penyesuaian metode belajar dan alat bantu komunikasi'},
    ]
  },
  penghidupan: {
    color:'#059669', label:'Penghidupan',
    rules:[
      {cond:a=>a.usia>=18,      aktor:'Dinas Sosial',    aksi:'Rujuk ke program pemberdayaan ekonomi dan pelatihan vokasi'},
      {cond:a=>a.usia>=15&&a.usia<18, aktor:'Orang Tua / CBR', aksi:'Persiapan keterampilan hidup dan kemandirian ekonomi'},
    ]
  },
  sosial: {
    color:'#7C3AED', label:'Sosial',
    rules:[
      {cond:a=>a.sp!=null&&a.sp<=4,           aktor:'Keluarga / CBR', aksi:'Program penguatan kapasitas pengasuh dan dukungan emosional'},
      {cond:a=>a.sa!=null&&a.sa<=4,           aktor:'CBR Worker',     aksi:'Kunjungan rutin dan fasilitasi partisipasi sosial anak'},
      {cond:a=>(a.ragam||'').includes('Ganda'),aktor:'Semua Pihak',   aksi:'Koordinasi lintas sektor untuk penanganan komprehensif'},
    ]
  },
  pemberdayaan: {
    color:'#DC2626', label:'Pemberdayaan',
    rules:[
      {cond:a=>true,       aktor:'DPO / Komunitas', aksi:'Libatkan anak dan keluarga dalam kelompok DPO dan advokasi hak'},
      {cond:a=>a.usia>=12, aktor:'CBR / Komunitas', aksi:'Fasilitasi keterlibatan dalam kegiatan komunitas dan sosial'},
    ]
  },
};

let ALL_RTL=[], OBS_MAP={}, ACTIVE_DOMAIN='all', ACTIVE_VIEW='xl', SELECTED_IDX=-1;

function sc(v){ return v<=3?'#1E293B':v<=6?'#FB923C':'#F97316'; }

function buildRTL(anak){
  return anak.map(a=>{
    const rekom={};
    let totalAksi=0;
    Object.entries(RTL_MATRIX).forEach(([domain,{color,label,rules}])=>{
      const items=rules.filter(r=>r.cond(a)).map(r=>({aktor:r.aktor,aksi:r.aksi}));
      if(items.length){rekom[domain]={color,label,items};totalAksi+=items.length;}
    });
    return {...a,rekom,totalAksi};
  });
}

function setView(v){
  ACTIVE_VIEW=v;
  ['xl','md','sm','lst'].forEach(x=>document.getElementById('vm-'+x).classList.toggle('active',x===v));
  ['view-xl','view-md','view-sm','view-lst'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  const t=document.getElementById('view-'+v);
  if(t) t.style.display=(v==='lst')?'block':'grid';
  renderList();
}

function filterDomain(d,btn){
  ACTIVE_DOMAIN=d;
  document.querySelectorAll('.dpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  SELECTED_IDX=-1;
  showEmpty();
  renderList();
}

function renderPage(d,scnId){
  const anak=d.anak||[], obs=d.obs||[];
  // Perhatian Khusus — dari referral
  const late   = anak.filter(a=>a.hari>30).sort((a,b)=>b.hari-a.hari);
  const kritis = anak.filter(a=>a.sp!=null&&a.sp<=3).sort((a,b)=>a.sp-b.sp);
  // Render section perhatian khusus di topbar KPI
  const totalAksi = 0; // akan diupdate setelah buildRTL
  const kritisCount = kritis.length;
  const lateCount   = late.length;

  // Render alert bar jika ada perhatian khusus
  let alertBar = '';
  if (kritisCount > 0 || lateCount > 0) {
    alertBar = `<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;gap:16px;flex-wrap:wrap;align-items:center">
      <span style="font-size:.72rem;font-weight:700;color:#DC2626">⚠ Perhatian Khusus</span>
      ${kritisCount>0?`<span style="font-size:.72rem;color:#DC2626;font-weight:600">${kritisCount} anak skor kritis (≤3)</span>`:''}
      ${lateCount>0?`<span style="font-size:.72rem;color:#D97706;font-weight:600">${lateCount} anak >30 hari tidak dikunjungi</span>`:''}
      <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
        ${kritis.slice(0,3).map(a=>`<span style="font-size:.65rem;background:#FEE2E2;color:#DC2626;padding:2px 8px;border-radius:999px;font-weight:600">${a.nama} (${a.sp})</span>`).join('')}
        ${late.slice(0,3).map(a=>`<span style="font-size:.65rem;background:#FEF3C7;color:#D97706;padding:2px 8px;border-radius:999px;font-weight:600">${a.nama} (${a.hari}h)</span>`).join('')}
      </div>
    </div>`;
  }
  document.getElementById('alert-khusus').innerHTML = alertBar;
  // Buat map obs per nama anak
  OBS_MAP={};

function renderList(){
  const cb=document.getElementById('flt-cbr').value;
  const lv=document.getElementById('flt-level').value;
  const q=(document.getElementById('flt-search').value||'').toLowerCase();
  const list=ALL_RTL.filter(a=>{
    if(cb&&a.cbr!==cb) return false;
    if(lv&&a.level!==lv) return false;
    if(q&&!(a.nama||'').toLowerCase().includes(q)) return false;
    if(ACTIVE_DOMAIN!=='all'&&!a.rekom[ACTIVE_DOMAIN]) return false;
    return true;
  });
  document.getElementById('ld-count').textContent=list.length+' anak ditemukan';
  const empty='<div style="text-align:center;padding:32px;color:#9CA3AF;font-size:.78rem;grid-column:1/-1">Tidak ada anak ditemukan</div>';
  const cardHTML=list.map((a,i)=>{
    const spVal=a.sp!=null?a.sp:null;
    const domains=ACTIVE_DOMAIN==='all'?Object.keys(a.rekom):Object.keys(a.rekom).filter(k=>k===ACTIVE_DOMAIN);
    const totalD=domains.reduce((s,k)=>s+(a.rekom[k]?.items?.length||0),0);
    const spColor=spVal!=null?(spVal<=3?'#DC2626':spVal<=6?'#F97316':'#16A34A'):'#9CA3AF';
    const domBadges=domains.slice(0,2).map(k=>`<span style="font-size:.55rem;font-weight:700;padding:1px 5px;border-radius:999px;background:${RTL_MATRIX[k].color}18;color:${RTL_MATRIX[k].color}">${RTL_MATRIX[k].label}</span>`).join(' ');
    return `<div class="item-card" data-i="${i}">
      <div class="item-card-name">${a.nama||'—'}</div>
      <div class="item-card-sub">${a.cbr||'—'} · ${(a.level||'—').split('(')[0].trim()}</div>

    </div>`;
  }).join('');
  const lstHTML=list.map((a,i)=>{
    const spVal=a.sp!=null?a.sp:null;
    const spColor=spVal!=null?(spVal<=3?'#DC2626':spVal<=6?'#F97316':'#16A34A'):'#9CA3AF';

      <span class="lst-item-name">${a.nama||'—'}</span>

      ${spVal!=null?`<span style="font-size:.72rem;font-weight:800;font-family:monospace;color:${spColor}">${spVal}</span>`:''}
    </div>`;
  }).join('');
  ['xl','md','sm'].forEach(v=>{document.getElementById('view-'+v).innerHTML=list.length?cardHTML:empty;});
  document.getElementById('view-lst').innerHTML=list.length?lstHTML:'<div style="text-align:center;padding:32px;color:#9CA3AF;font-size:.78rem">Tidak ada anak ditemukan</div>';
  document.querySelectorAll('.item-card,.lst-item').forEach(el=>{
    const i=parseInt(el.dataset.i);
    el.onclick=()=>{document.querySelectorAll('.item-card,.lst-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');showDetail(list[i],el);};
  });
}

function hasKwW(text,kws){if(!text)return false;var t=String(text).toLowerCase();return kws.some(k=>t.includes(k));}
function getAllTeksW(a,obs){
  return [a.nka||'',a.tka||'',a.nkp||'',a.tkp||'',
    obs?obs.st||'':'',obs?obs.kg||'':'',obs?obs.pf||'':'',obs?obs.lg||'':''].join(' ');
}
function buildKatTemuanW(kat,a,obs){
  const rule=RULES_KAT_W[kat];
  const all=getAllTeksW(a,obs);
  const facts=[];
  if(kat==='kesehatan'){
    if(a.ep)facts.push('Epilepsi aktif');
    if(!a.ob)facts.push('Tidak ada pengobatan rutin');
    if(!a.tr&&(a.level||'').includes('Parah'))facts.push('Belum mendapat terapi meski level parah');
  }
  if(!hasKwW(all,rule.kw)&&!facts.length)return null;
  const sources=[a.nka||'',a.tka||'',a.nkp||'',a.tkp||'',
    obs?obs.st||'':'',obs?obs.kg||'':'',obs?obs.pf||'':'',obs?obs.lg||'':''].filter(Boolean);
  sources.forEach(src=>{
    String(src).replace(/\n/g,'.').split(/[.;]/).forEach(s=>{
      s=s.trim();
      if(s.length>10&&hasKwW(s,rule.kw)&&facts.length<4)facts.push(s);
    });
  });
  return facts.length?facts.join('; '):null;
}
function buildKatRTLW(kat,temuan,a){
  const rtl=RULES_KAT_W[kat].rtlMap;
  const t=(temuan||'').toLowerCase();
  if(kat==='kesehatan'){
    if(a.ep)return rtl.epilepsi;
    if(hasKwW(t,['pengobatan','tidak ada obat']))return rtl.tidak_obat;
    if(hasKwW(t,['terapi','fisioterapi']))return rtl.tidak_terapi;
    if(hasKwW(t,['kursi roda','alat bantu','kacamata']))return rtl.alat_bantu;
    if(hasKwW(t,['gizi','nutrisi','susu']))return rtl.gizi;
    return rtl.def;
  }
  if(kat==='pendidikan'){
    if(hasKwW(t,['belum sekolah','tidak sekolah','putus sekolah']))return rtl.belum_sekolah;
    if(hasKwW(t,['gpk','guru pendamping']))return rtl.gpk;
    return rtl.def;
  }
  if(kat==='penghidupan'){
    if(hasKwW(t,['pkh','blt','bantuan','sembako','bpjs','dtks']))return rtl.bantuan;
    if(hasKwW(t,['rumah','dinding','lantai','bambu']))return rtl.rumah;
    return rtl.def;
  }
  if(kat==='sosial'){
    if(hasKwW(t,['stigma','dikucilkan','bully','ejek']))return rtl.stigma;
    if(hasKwW(t,['isolasi','sendirian','tidak keluar']))return rtl.isolasi;
    if(hasKwW(t,['tunggal','janda','duda','merantau','ditinggal']))return rtl.tunggal;
    return rtl.def;
  }
  if(kat==='pemberdayaan'){
    if(hasKwW(t,['toilet','cebok','mandi','makan','mandiri']))return rtl.kemandirian;
    if(hasKwW(t,['percaya diri','minder','malu']))return rtl.percaya_diri;
    if(hasKwW(t,['ktp','akta','dtks','hak']))return rtl.hak;
    return rtl.def;
  }
  return rtl.def||'';
}
function buildKatPihakW(kat,temuan,a,obs){
  const pihak=[...RULES_KAT_W[kat].kw]; // reset — pakai basis pihak dari kat saja
  const base={
    kesehatan:['dokter_puskesmas','perawat_puskesmas','bidan_desa','kader_posyandu','fisioterapis','dinkes'],
    pendidikan:['guru_kelas','wali_kelas','kepala_sekolah','gpk','guru_paud','dindik','ayo_indonesia'],
    penghidupan:['kepala_desa','kasi_kesra','pkk_desa','dinsos','uptd_sosial','pkh_officer','rt_rw','bpd'],
    sosial:['tua_golo','tokoh_adat','pastor','katekis','kelompok_doa','rt_rw','warga_kampung','tetangga','karang_taruna','omk'],
    pemberdayaan:['ibu','ayah','saudara_kandung','cbr_worker_lain','scn','kader_disabilitas','ayo_indonesia']
  };
  const list=[...base[kat]];
  const all=getAllTeksW(a,obs).toLowerCase();
  if(kat==='kesehatan'){
    list.push('ibu','ayah');
    if(hasKwW(all,['epilepsi','kejang']))list.push('dokter_puskesmas','dinkes');
    if(hasKwW(all,['terapi','fisioterapi']))list.push('fisioterapis','cbm_global','ayo_indonesia');
    if(hasKwW(all,['kursi roda','alat bantu','standing table']))list.push('dinsos','uptd_sosial','cbm_global');
    if(hasKwW(all,['gizi','nutrisi','susu']))list.push('kader_posyandu','pkk_desa');
    if(hasKwW(all,['bpjs','kartu']))list.push('kepala_desa','kasi_kesra');
    if((a.level||'').includes('Parah'))list.push('pastor','tua_golo');
  }
  if(kat==='pendidikan'){
    list.push('ibu','ayah','guru_agama');
    if(hasKwW(all,['belum sekolah','tidak sekolah']))list.push('kepala_sekolah','dindik','kasi_kesra','kepala_desa');
    if(hasKwW(all,['slb','sdlb']))list.push('dindik','gpk');
    if(hasKwW(all,['paud','tk']))list.push('guru_paud','pengelola_paud');
  }
  if(kat==='penghidupan'){
    list.push('ibu','ayah','bpd');
    if(hasKwW(all,['pkh','blt','bantuan','dtks']))list.push('pkh_officer','kepala_desa','kasi_kesra','dinsos');
    if(hasKwW(all,['rumah','dinding','lantai','bambu']))list.push('dinsos','uptd_sosial','kepala_desa','karang_taruna');
    if(hasKwW(all,['panen','kebun','tani','ternak']))list.push('pkk_desa','kelompok_tani');
  }
  if(kat==='sosial'){
    list.push('ibu','ayah','tetangga','pkk_desa');
    if(hasKwW(all,['stigma','dikucilkan','bully']))list.push('tua_golo','tokoh_adat','pastor','rt_rw','kepala_desa');
    if(hasKwW(all,['isolasi','sendirian','tidak keluar']))list.push('kelompok_doa','omk','karang_taruna','teman_sebaya');
    if(hasKwW(all,['tunggal','janda','duda','merantau','ditinggal']))list.push('tua_golo','paman_bibi','kakek_nenek_serumah','rt_rw');
    if(hasKwW(all,['gereja','pastor','doa','misa']))list.push('pastor','katekis','kelompok_doa');
    if(hasKwW(all,['adat','tua golo']))list.push('tua_golo','tokoh_adat');
  }
  if(kat==='pemberdayaan'){
    list.push('ibu','ayah','saudara_kandung');
    if(hasKwW(all,['toilet','cebok','mandi','makan','mandiri']))list.push('bidan_desa','cbr_worker_lain');
    if(hasKwW(all,['percaya diri','minder','malu']))list.push('guru_kelas','teman_sebaya','pastor','tua_golo');
    if(hasKwW(all,['ktp','akta','dtks','hak']))list.push('kepala_desa','kasi_kesra','p2tp2a','dinsos');
    if(hasKwW(all,['keterampilan','pelatihan','vokasi']))list.push('ayo_indonesia','cbm_global','lsm_lokal');
    if((a.level||'').includes('Parah'))list.push('fisioterapis','cbm_global','ayo_indonesia');
  }
  list.push('cbr_worker_lain','scn');
  return [...new Set(list)];
}
function analyzeWHO(a, obs){
  const result={};
  ['kesehatan','pendidikan','penghidupan','sosial','pemberdayaan'].forEach(kat=>{
    const temuan=buildKatTemuanW(kat,a,obs);
    if(!temuan)return;
    result[kat]={
      temuan,
      rtl:buildKatRTLW(kat,temuan,a),
      pihak:buildKatPihakW(kat,temuan,a,obs)
    };
  });
  return result;
}

function getAktorKat(key){
  for(const [kat,list] of Object.entries(AKTOR_KAT)){if(list.includes(key))return kat;}
  return 'Lainnya';
}
function renderPihakChips(pihakList){
  if(!pihakList||!pihakList.length)return '';
  const byKat={};
  pihakList.forEach(key=>{
    const kat=getAktorKat(key);
    if(!byKat[kat])byKat[kat]=[];
    byKat[kat].push(key);
  });
  const rows=Object.entries(byKat).map(([kat,keys])=>{
    const col=AKTOR_KAT_COLORS[kat]||{c:'#6B7280',bg:'rgba(107,114,128,.1)'};
    const chips=keys.map(k=>{
      const label=AKTOR_LABEL[k]||k;
      return `<span class="pihak-chip" style="color:${col.c};background:${col.bg};border-color:${col.c}40">${label}</span>`;
    }).join('');
    return `<div class="pihak-kat-row">
      <span class="pihak-kat-lbl" style="color:${col.c};background:${col.bg};border:1px solid ${col.c}40">${AKTOR_KAT_LABEL[kat]||kat}</span>
      <div class="pihak-chips">${chips}</div>
    </div>`;
  }).join('');
  return `<div class="pihak-wrap">
    <div style="font-size:.6rem;color:#9CA3AF;margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Pihak yang perlu dilibatkan</div>
    ${rows}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// SHOW DETAIL — implementasi baru
// ═══════════════════════════════════════════════════════════
let _lastEl=null;
function showDetail(a,el){
  if(_lastEl) _lastEl.classList.remove('active');
  el.classList.add('active');
  _lastEl=el;
  document.querySelector('.ld-wrap').classList.add('detail-open');

  const spVal=a.sp!=null?a.sp:0;
  const saVal=a.sa!=null?a.sa:0;
  const obs=OBS_MAP[a.nama?.toLowerCase()]||null;

  // Analisis WHO CBR 5 kategori
  const hasil=analyzeWHO(a,obs);
  const katKeys=['kesehatan','pendidikan','penghidupan','sosial','pemberdayaan'];
  let whoHtml='';
  katKeys.forEach(kat=>{
    const d=hasil[kat];if(!d)return;
    const cfg=RULES_KAT_W[kat];
    const ph=renderPihakChips(d.pihak);
    whoHtml+=`<div class="who-block ${cfg.cls}">
      <div class="who-head">
        <div class="who-dot" style="background:${cfg.color}"></div>
        <span class="who-label">${cfg.label}</span>
      </div>
      <div class="who-body">
        <div class="who-section-lbl">Bahan Diskusi / Temuan</div>
        <div class="who-temuan">${d.temuan}</div>
        <div class="who-section-lbl">Rekomendasi &amp; Tindak Lanjut</div>
        <div class="who-rtl" style="border-color:${cfg.color}">${d.rtl}</div>
        ${ph?`<div class="who-section-lbl">Pihak yang Perlu Dilibatkan</div>${ph}`:''}
      </div>
    </div>`;
  });

  // Fallback: jika tidak ada hasil WHO, tampilkan domain RTL matrix lama
  const domainEntries=ACTIVE_DOMAIN==='all'?Object.entries(a.rekom):Object.entries(a.rekom).filter(([k])=>k===ACTIVE_DOMAIN);
  if(!whoHtml&&domainEntries.length){
    whoHtml=domainEntries.map(([domain,{color,label,items}])=>`
      <div class="det-domain">
        <div class="det-domain-head">
          <div class="det-domain-dot" style="background:${color}"></div>
          <span class="det-domain-label" style="color:${color}">${label}</span>
          <span class="det-domain-count">${items.length} rekomendasi</span>
        </div>
        <div class="det-rekom">
          ${items.map(item=>`<div class="det-rekom-item">
            <span class="det-aktor">${item.aktor}</span>
            <span class="det-aksi">${item.aksi}</span>
          </div>`).join('')}
        </div>
      </div>`).join('');
  }
  if(!whoHtml){
    whoHtml='<div style="text-align:center;padding:24px;color:#9CA3AF;font-size:.78rem">Belum ada data observasi untuk analisis ini.</div>';
  }

  document.getElementById('ld-detail-inner').innerHTML=`
    <button class="det-back" onclick="clearDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Kembali ke daftar
    </button>
    <div class="det-header">
      <div class="det-name">${a.nama||'—'}</div>
      <div class="det-meta">
        <span class="det-chip">👤 ${a.cbr||'—'}</span>
        <span class="det-chip">🏷 ${a.ragam||'—'}</span>
        <span class="det-chip">📍 ${a.desa||'—'}</span>
        <span class="det-chip">🎂 ${a.usia||'?'} th · ${a.gender||'—'}</span>
        ${a.ep?'<span class="det-chip" style="background:#FEF3C7;color:#92400E">⚡ Epilepsi</span>':''}
        ${a.tr?'<span class="det-chip" style="background:#DCFCE7;color:#15803D">✓ Pernah Terapi</span>':''}
        ${a.ob?'<span class="det-chip" style="background:#EFF6FF;color:#1D4ED8">💊 Pengobatan</span>':''}
      </div>
      <div class="det-scores">
        <div class="det-score-card">
          <div class="det-score-val" style="color:${sc(spVal)}">${a.sp!=null?a.sp:'—'}</div>
          <div class="det-score-lbl">Skor Anak (Cantrill)</div>
          <div class="det-score-bar"><div class="det-score-fill" style="width:${a.sp!=null?a.sp*10:0}%;background:${sc(spVal)}"></div></div>
        </div>
        <div class="det-score-card">
          <div class="det-score-val" style="color:${sc(saVal)}">${a.sa!=null?a.sa:'—'}</div>
          <div class="det-score-lbl">Skor Pengasuh</div>
          <div class="det-score-bar"><div class="det-score-fill" style="width:${a.sa!=null?a.sa*10:0}%;background:${sc(saVal)}"></div></div>
        </div>
      </div>
    </div>
    <div style="font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:#6B7280;margin-bottom:10px;display:flex;align-items:center;gap:6px">
      <span style="width:6px;height:6px;border-radius:50%;background:#F97316;display:inline-block"></span>
      Bahan Diskusi Rencana Anak — 3 Bulan ke Depan
    </div>
    ${whoHtml}
  `;
}

function showEmpty(){
  document.querySelector('.ld-wrap').classList.remove('detail-open');
  document.getElementById('ld-detail-inner').innerHTML='';
  if(_lastEl){ _lastEl.classList.remove('active'); _lastEl=null; }
}

function clearDetail(){ showEmpty(); }
