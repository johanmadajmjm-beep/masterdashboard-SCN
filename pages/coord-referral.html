<!DOCTYPE html>
<html lang="id"><head>
  <style>html,body{background:#F8FAFC}</style><script>if("startViewTransition" in document){addEventListener("pagereveal",e=>{if(e.viewTransition)e.viewTransition.ready.catch(()=>{})})}</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
  <title>CBR Coordinator — Referral & IRP | MEL NLR</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    .kpi-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
    .kpi-box{background:var(--white);border:1px solid var(--ink-100);border-radius:var(--radius-md);padding:14px;border-top:3px solid var(--kc,var(--nlr-500))}
    .kpi-box .kv{font-family:var(--font-mono);font-size:1.6rem;font-weight:700;color:var(--kc);line-height:1}
    .kpi-box .kl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);margin:6px 0 2px}
    .kpi-box .ks{font-size:.68rem;color:var(--ink-300)}
  </style>
</head>
<body>
<div class="app"><div class="main">
  <header class="topbar">
    <div class="topbar-left"><div class="topbar-breadcrumb">CBR Coordinator <span class="sep">›</span><span class="current">Referral & IRP</span></div></div>
    <div class="topbar-right">
      <span class="scn-badge" id="scn-badge">—</span>
      <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
      <span class="topbar-date" id="topbar-date">—</span>
    </div>
  </header>
  <div class="page">


    <div class="kpi-4" id="kpi-ref"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-head"><span class="card-title">Referral Aktif</span><span class="badge badge-amber" id="badge-ref-aktif">—</span></div>
        <div class="card-body no-pad"><div class="tbl-wrap"><table>
          <thead><tr><th>Nama Anak</th><th>CBR Worker</th><th>Tujuan Rujukan</th><th>Tanggal</th><th>Status</th></tr></thead>
          <tbody id="tbl-ref"></tbody>
        </table></div></div>
      </div>

      <div class="card">
        <div class="card-head"><span class="card-title">Prioritas Kunjungan</span><span class="badge badge-red" id="badge-late">—</span></div>
        <div class="card-body no-pad"><div class="tbl-wrap"><table>
          <thead><tr><th>Nama Anak</th><th>CBR Worker</th><th>Ragam</th><th>Hari Tanpa Kunjungan</th></tr></thead>
          <tbody id="tbl-late"></tbody>
        </table></div></div>
      </div>
    </div>

    <!-- IRP summary -->
    <div class="section-divider" style="margin-top:22px">Ringkasan Status IRP</div>
    <div class="grid-2">
      <div class="card">
        <div class="card-head"><span class="card-title">Status IRP per CBR Worker</span></div>
        <div class="card-body" id="irp-worker-sum"></div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Anak dengan Skor Kritis (≤3)</span><span class="badge badge-red" id="badge-kritis">—</span></div>
        <div class="card-body no-pad"><div class="tbl-wrap"><table>
          <thead><tr><th>Nama Anak</th><th>CBR Worker</th><th style="text-align:center">Skor Anak</th><th style="text-align:center">Skor Pengasuh</th><th>Ragam</th></tr></thead>
          <tbody id="tbl-kritis"></tbody>
        </table></div></div>
      </div>
    </div>
  </div>
</div></div>
<script>
const RAGAM_COLOR={Fisik:'#1a6fd4',Intelektual:'#10b8a6','Sensorik (penglihatan)':'#d97706','Sensorik (pendengaran dan bicara)':'#7c3aed',Ganda:'#dc2626',Lainnya:'#6b7280'};
function sc(v){return v<=3?'#dc2626':v<=6?'#d97706':'#16a34a';}

function renderPage(d, scnId) {
  if (!d||!d.anak) return;
  const anak=d.anak, workers=d.workers||[], refs=d.referral||[];
  const late=anak.filter(a=>a.hari>30).sort((a,b)=>b.hari-a.hari);
  const kritis=anak.filter(a=>a.sp!=null&&a.sp<=3).sort((a,b)=>a.sp-b.sp);
  const proses=refs.filter(r=>r.status==='Proses');

  document.getElementById('kpi-ref').innerHTML=[
    {v:refs.length,     l:'Total Referral',       s:'semua status',              c:'var(--nlr-600)'},
    {v:proses.length,   l:'Referral Proses',      s:'menunggu tindak lanjut',    c:'#d97706'},
    {v:late.length,     l:'>30 Hari Tdk Dikunjungi',s:'perlu kunjungan segera',  c:late.length>0?'#dc2626':'#16a34a'},
    {v:kritis.length,   l:'Skor Kritis (≤3)',     s:'butuh perhatian segera',    c:kritis.length>0?'#dc2626':'#16a34a'},
  ].map(k=>`<div class="kpi-box" style="--kc:${k.c}"><div class="kv">${k.v}</div><div class="kl">${k.l}</div><div class="ks">${k.s}</div></div>`).join('');

  document.getElementById('badge-ref-aktif').textContent=proses.length+' proses';
  document.getElementById('badge-late').textContent=late.length+' anak';
  document.getElementById('badge-kritis').textContent=kritis.length+' anak';

  // Tabel referral
  document.getElementById('tbl-ref').innerHTML=refs.length
    ?refs.map(r=>`<tr>
      <td><strong>${r.nama}</strong></td>
      <td style="font-size:.72rem;color:var(--ink-400)">${r.cbr||'—'}</td>
      <td style="font-size:.72rem;color:var(--ink-400)">${r.tujuan}</td>
      <td class="mono" style="font-size:.7rem">${r.tgl}</td>
      <td><span class="badge ${r.status==='Proses'?'badge-amber':'badge-green'}">${r.status}</span></td>
    </tr>`).join('')
    :'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--ink-300)">Tidak ada referral.</td></tr>';

  // Tabel terlambat
  document.getElementById('tbl-late').innerHTML=late.length
    ?late.map(a=>`<tr>
      <td><strong>${a.nama}</strong></td>
      <td style="font-size:.72rem;color:var(--ink-400)">${a.cbr||'—'}</td>
      <td><span style="font-size:.7rem;font-weight:700;color:${RAGAM_COLOR[a.ragam]||'#888'}">${a.ragam||'—'}</span></td>
      <td><span class="mono" style="font-weight:700;color:#dc2626">${a.hari===999?'Belum pernah':a.hari+' hari'}</span></td>
    </tr>`).join('')
    :'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--ink-300)">✓ Semua anak sudah dikunjungi.</td></tr>';

  // IRP per worker
  document.getElementById('irp-worker-sum').innerHTML=workers.map(w=>{
    const myAnak=anak.filter(a=>a.cbr===w.nama);
    const aktif=myAnak.filter(a=>a.irp==='Aktif').length;
    const selesai=myAnak.filter(a=>a.irp==='Selesai').length;
    const belum=myAnak.filter(a=>a.irp==='Belum').length;
    const pct=myAnak.length?Math.round(aktif/myAnak.length*100):0;
    return `<div style="margin-bottom:10px;padding:10px;background:var(--surface);border-radius:var(--radius-sm)">
      <div style="font-size:.78rem;font-weight:700;margin-bottom:6px">${w.nama}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:.68rem">
        <span class="badge badge-green">Aktif: ${aktif}</span>
        <span class="badge badge-amber">Belum: ${belum}</span>
        <span class="badge badge-gray">Selesai: ${selesai}</span>
      </div>
    </div>`;
  }).join('');

  // Kritis
  document.getElementById('tbl-kritis').innerHTML=kritis.length
    ?kritis.map(a=>`<tr>
      <td><strong>${a.nama}</strong></td>
      <td style="font-size:.72rem;color:var(--ink-400)">${a.cbr||'—'}</td>
      <td style="text-align:center"><span class="mono" style="font-weight:700;color:#dc2626">${a.sp}</span></td>
      <td style="text-align:center"><span class="mono" style="font-weight:700;color:${a.sa!=null?sc(a.sa):'var(--ink-200)'}">${a.sa!=null?a.sa:'—'}</span></td>
      <td><span style="font-size:.7rem;font-weight:700;color:${RAGAM_COLOR[a.ragam]||'#888'}">${a.ragam||'—'}</span></td>
    </tr>`).join('')
    :'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--ink-300)">✓ Tidak ada anak dengan skor kritis.</td></tr>';
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
  buildTopNav('coord', 'c-referral');
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (window.renderPage) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('coord', 'c-referral');
    API.get(AUTH.getScnFilter()).then(d => {
      if (window.renderPage) renderPage(d, AUTH.getScnFilter());
    });
  }
</script>
</body></html>
