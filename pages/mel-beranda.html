<!DOCTYPE html>
<html lang="id"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — Beranda | MEL NLR</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .kpi-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
    .kpi-box{background:var(--white);border:1px solid var(--ink-100);border-radius:var(--radius-md);padding:14px;border-top:3px solid var(--kc,var(--nlr-500))}
    .kpi-box .kv{font-family:var(--font-mono);font-size:1.6rem;font-weight:700;color:var(--kc,var(--ink-900));line-height:1}
    .kpi-box .kl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);margin:6px 0 2px}
    .kpi-box .ks{font-size:.68rem;color:var(--ink-300)}
    .overview-7{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
    .ov-card{background:var(--white);border:1px solid var(--ink-100);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;border-top:3px solid var(--oc,#999)}
    .ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .ov-num{font-family:var(--font-mono);font-size:1.4rem;font-weight:700;line-height:1;margin:6px 0;color:var(--oc)}
    .ov-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--oc)}
    .ov-sub{font-size:.65rem;color:var(--ink-300);margin-top:4px}
  </style>
</head>
<body>
<div class="app"><div class="main">
  <header class="topbar">
    <div class="topbar-left"><div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Beranda</span></div></div>
    <div class="topbar-right">
      <span class="scn-badge" id="scn-badge">—</span>
      <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
      <span id="sync-time" style="font-size:.65rem;color:var(--ink-300);display:none"></span>
      <span class="topbar-date" id="topbar-date">—</span>
    </div>
  </header>
  <div class="page">
    <div class="page-header"><h1>Dashboard MEL</h1><p>Ringkasan capaian 7 Outcome program NLR Indonesia.</p></div>

    <!-- KPI program -->
    <div class="kpi-4" id="kpi-mel"></div>

    <!-- 7 Outcome overview -->
    <div class="section-divider">Capaian 7 Outcome — klik untuk ke ITT Tracker</div>
    <div class="overview-7" id="ov7"></div>

    <div class="grid-2">
      <!-- Aktivitas terbaru -->
      <div class="card">
        <div class="card-head"><span class="card-title">Aktivitas Terbaru</span><span class="badge badge-teal" id="badge-akt">—</span></div>
        <div class="card-body no-pad"><div class="tbl-wrap"><table>
          <thead><tr><th>Tanggal</th><th>Kegiatan</th><th>Outcome</th><th style="text-align:center">Peserta</th></tr></thead>
          <tbody id="tbl-akt"></tbody>
        </table></div></div>
      </div>

      <!-- Kondisi beneficiary -->
      <div class="card">
        <div class="card-head"><span class="card-title">Kondisi Beneficiary</span></div>
        <div class="card-body" id="benef-kondisi"></div>
      </div>
    </div>
  </div>
</div></div>
<script>
const OCOL=['','#1a6fd4','#10b8a6','#d97706','#7c3aed','#16a34a','#dc2626','#0284c7'];
function sc(v){return v<=3?'#dc2626':v<=6?'#d97706':'#16a34a';}

function renderPage(d, scnId) {
  if (!d) return;
  const anak=d.anak||[], workers=d.workers||[], akts=d.aktivitas||[];
  const total=anak.length;
  const sp=anak.map(a=>a.sp).filter(v=>v!=null);
  const avSA=sp.length?(sp.reduce((s,v)=>s+v,0)/sp.length).toFixed(1):0;
  const kritis=anak.filter(a=>a.sp!=null&&a.sp<=3).length;
  const parah=anak.filter(a=>(a.level||'').includes('Parah')).length;
  const terlambat=anak.filter(a=>a.hari>30).length;
  const totalWorker=workers.length;
  const totalKunj=workers.reduce((s,w)=>s+w.kunjungan_bulan,0);

  document.getElementById('kpi-mel').innerHTML=[
    {v:total,       l:'Total Beneficiary', s:(d.meta?.scn||'—'),             c:'var(--nlr-600)'},
    {v:avSA||'—',  l:'Avg Skor Anak',     s:'Cantrill Ladder 1–10',          c:avSA?sc(parseFloat(avSA)):'var(--ink-300)'},
    {v:kritis,      l:'Kondisi Kritis',    s:'Skor ≤ 3 perlu perhatian',      c:kritis>0?'#dc2626':'#16a34a'},
    {v:terlambat,   l:'>30 Hari Tdk Obs', s:'perlu kunjungan segera',         c:terlambat>0?'#dc2626':'#16a34a'},
    {v:totalWorker, l:'CBR Worker',        s:totalKunj+' kunjungan bulan ini', c:'#0284c7'},
  ].map(k=>`<div class="kpi-box" style="--kc:${k.c}"><div class="kv">${k.v}</div><div class="kl">${k.l}</div><div class="ks">${k.s}</div></div>`).join('');

  // 7 outcome
  const itt=d.itt?.Y1_Q2||{};
  document.getElementById('ov7').innerHTML=OUTCOMES.map(o=>{
    const validIds=o.indikator_ids.filter(id=>itt[id]&&itt[id].target_y1>0);
    const avg=validIds.length?Math.round(validIds.reduce((s,id)=>s+getPct(itt[id].cap,itt[id].target_y1),0)/validIds.length):0;
    return `<div class="ov-card" style="--oc:${o.warna}" onclick="location.href='mel-itt.html'">
      <div class="ov-lbl">${o.label}</div>
      <div class="ov-num">${avg}%</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${avg}%;background:${o.warna}"></div></div>
      <div class="ov-sub">${o.pendek}</div>
    </div>`;
  }).join('');

  // Aktivitas
  document.getElementById('badge-akt').textContent=akts.length+' kegiatan';
  document.getElementById('tbl-akt').innerHTML=akts.length
    ?akts.slice(0,8).map(a=>`<tr>
      <td class="mono" style="font-size:.7rem">${a.tgl}</td>
      <td style="font-size:.78rem"><strong>${a.nama}</strong></td>
      <td><span class="outcome-tag" style="background:${OCOL[a.outcome]||'#888'}">O${a.outcome}</span></td>
      <td class="mono" style="text-align:center">${a.peserta}</td>
    </tr>`).join('')
    :'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--ink-300)">Belum ada aktivitas.</td></tr>';

  // Kondisi beneficiary
  const lk=anak.filter(a=>a.gender==='L').length;
  const pr=anak.filter(a=>a.gender==='P').length;
  const ep=anak.filter(a=>a.ep).length;
  const tr=anak.filter(a=>a.tr).length;
  const ganda=anak.filter(a=>(a.ragam||'').toLowerCase()==='ganda').length;
  document.getElementById('benef-kondisi').innerHTML=`
    <div style="display:flex;gap:20px;margin-bottom:14px">
      <div style="text-align:center"><div class="mono" style="font-size:1.3rem;font-weight:700;color:#1a6fd4">${lk}</div><div style="font-size:.7rem;color:var(--ink-400)">Laki-laki</div></div>
      <div style="text-align:center"><div class="mono" style="font-size:1.3rem;font-weight:700;color:#e879a0">${pr}</div><div style="font-size:.7rem;color:var(--ink-400)">Perempuan</div></div>
      <div style="text-align:center"><div class="mono" style="font-size:1.3rem;font-weight:700;color:#d97706">${ep}</div><div style="font-size:.7rem;color:var(--ink-400)">Epilepsi</div></div>
      <div style="text-align:center"><div class="mono" style="font-size:1.3rem;font-weight:700;color:#16a34a">${tr}</div><div style="font-size:.7rem;color:var(--ink-400)">Pernah Terapi</div></div>
      <div style="text-align:center"><div class="mono" style="font-size:1.3rem;font-weight:700;color:#dc2626">${parah}</div><div style="font-size:.7rem;color:var(--ink-400)">Level Parah</div></div>
    </div>
    <div style="font-size:.7rem;font-weight:700;color:var(--ink-400);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Skor Cantrill Anak</div>
    ${[['Kritis (1–3)',anak.filter(a=>a.sp!=null&&a.sp<=3).length,'#dc2626'],
       ['Sedang (4–6)',anak.filter(a=>a.sp!=null&&a.sp>=4&&a.sp<=6).length,'#d97706'],
       ['Baik (7–10)',anak.filter(a=>a.sp!=null&&a.sp>=7).length,'#16a34a'],
       ['Belum diisi',anak.filter(a=>a.sp==null).length,'#9ca3af']].map(([l,n,c])=>{
      const pct=total>0?Math.round(n/total*100):0;
      return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.77rem">
        <span style="min-width:100px;color:${c};font-weight:600">${l}</span>
        <div class="prog-wrap" style="flex:1"><div class="prog-fill" style="width:${pct}%;background:${c}"></div></div>
        <span class="mono" style="font-size:.72rem;min-width:50px;text-align:right">${n} (${pct}%)</span>
      </div>`;}).join('')}`;
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (window.renderPage) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('mel', 'm-beranda');
    API.get(AUTH.getScnFilter()).then(d => {
      if (window.renderPage) renderPage(d, AUTH.getScnFilter());
    });
  }
</script>
</body></html>
