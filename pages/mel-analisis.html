// ── HELPERS ──────────────────────────────────────────────────
function avg(arr){ return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0; }
function num(v){ return parseInt(v)||0; }
function pctBg(v){ return v>=80?'#dcfce7':v>=50?'#dbeafe':v>=25?'#fef3c7':'#fee2e2'; }
function pctColor(v){ return v>=80?'#15803d':v>=50?'#1d4ed8':v>=25?'#b45309':'#b91c1c'; }
function scColor(v){ return v>=7?'#16a34a':v>=5?'#F97316':v>=4?'#d97706':'#dc2626'; }

function mkChart(id,type,data,opts){
  const el=document.getElementById(id); if(!el)return null;
  const ex=Chart.getChart(id); if(ex)ex.destroy();
  return new Chart(el.getContext('2d'),{type,data,options:opts});
}
const CD = {
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#1f2937',titleColor:'#f9fafb',bodyColor:'#d1d5db',padding:10,cornerRadius:8}},
  scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'#f3f4f6'},ticks:{font:{size:10}}}}
};

// ── ICF ──────────────────────────────────────────────────────
const THEMES_ICF = {
  struktur:[
    {label:'Mental & Saraf',keywords_pos:['mental baik','kognitif baik','paham instruksi'],keywords_neg:['gangguan mental','cerebral palsy','down syndrome','autisme','keterlambatan','kognitif terganggu']},
    {label:'Gerak & Motorik',keywords_pos:['bisa berjalan','gerak baik','motorik baik'],keywords_neg:['tidak bisa berjalan','lumpuh','kaku','kursi roda','paraplegia','pincang']},
    {label:'Fungsi Indra',keywords_pos:['penglihatan baik','pendengaran baik'],keywords_neg:['gangguan penglihatan','gangguan pendengaran','tuli','tunanetra','tunarungu']},
    {label:'Komunikasi',keywords_pos:['bicara lancar','komunikasi baik'],keywords_neg:['tidak bisa bicara','bicara tidak jelas','bisu']},
    {label:'Kejang & Epilepsi',keywords_pos:['tidak ada kejang','terkontrol'],keywords_neg:['epilepsi','kejang','sering kejang']},
  ],
  kegiatan:[
    {label:'Pendidikan & Belajar',keywords_pos:['bersekolah','sekolah','belajar','slb'],keywords_neg:['tidak sekolah','belum sekolah','putus sekolah']},
    {label:'Mobilitas',keywords_pos:['bergerak mandiri','mobilitas baik'],keywords_neg:['tidak bisa berjalan','kursi roda','merangkak','digendong']},
    {label:'Perawatan Diri',keywords_pos:['mandiri mandi','mengurus diri'],keywords_neg:['bantuan total','disuapi','dimandikan']},
    {label:'Interaksi Sosial',keywords_pos:['bermain bersama','punya teman'],keywords_neg:['tidak punya teman','isolasi sosial']},
    {label:'Partisipasi',keywords_pos:['ikut kegiatan','aktif di komunitas'],keywords_neg:['tidak ikut kegiatan','tidak keluar rumah']},
  ],
  lingkungan:[
    {label:'Dukungan Keluarga',keywords_pos:['keluarga mendukung','keluarga peduli'],keywords_neg:['tidak mendukung','diabaikan','kurang perhatian']},
    {label:'Akses Kesehatan',keywords_pos:['bpjs aktif','puskesmas dekat'],keywords_neg:['tidak punya bpjs','jauh dari puskesmas','akses sulit']},
    {label:'Sikap Masyarakat',keywords_pos:['diterima masyarakat'],keywords_neg:['stigma','dikucilkan','diskriminasi']},
    {label:'Kondisi Ekonomi',keywords_pos:['ekonomi baik','penghasilan cukup'],keywords_neg:['keluarga miskin','tidak mampu','penghasilan rendah']},
    {label:'Bantuan Pemerintah',keywords_pos:['pkh','kip','bantuan sosial'],keywords_neg:['tidak menerima bantuan','belum dapat bantuan']},
  ]
};

function scoreICF(text,theme){
  const t=(text||'').toLowerCase();
  let pos=0,neg=0;
  theme.keywords_pos.forEach(k=>{if(t.includes(k))pos++;});
  theme.keywords_neg.forEach(k=>{if(t.includes(k))neg++;});
  return {pos,neg};
}
function analyzeICF(obs,domainKey,fieldKey){
  const res={};
  THEMES_ICF[domainKey].forEach(th=>{res[th.label]={pos:0,neg:0};});
  obs.forEach(o=>{
    const text=o[fieldKey]||'';
    if(!text)return;
    THEMES_ICF[domainKey].forEach(th=>{
      const s=scoreICF(text,th);
      res[th.label].pos+=s.pos;
      res[th.label].neg+=s.neg;
    });
  });
  return res;
}

function calcITTpct(anak,obs){
  const t=anak.length||1;
  const punyaObs=anak.filter(a=>{const k=a.nama.toLowerCase();return obs.some(o=>o.na&&o.na.toLowerCase()===k);}).length;
  const terapi=anak.filter(a=>a.tr).length;
  const skorBaik=anak.filter(a=>a.sp!=null&&a.sp>=5).length;
  return {
    O1:Math.round(skorBaik/t*100),
    O2:Math.round(punyaObs/t*100),
    O3:Math.round(anak.filter(a=>a.cbr).length/t*100),
    O4:Math.min(100,Math.round(punyaObs/t*120)),
    O5:Math.round(anak.filter(a=>a.ob).length/t*100),
    O6:Math.round(anak.filter(a=>a.usia<=17).length/t*100),
    O7:Math.round(terapi/t*100),
  };
}

  // ── LESSON LEARNT dari DataMonthly ───────────────────────
  const lessons = BEN_MON.filter(r=>r.lesson_learnt).slice(0,5);

// ── RENDER ITT ────────────────────────────────────────────────
function renderITT(scns, allAnak, allObs){
  const tbl=document.getElementById('hm-itt');
  if(!tbl)return;
  let html='<thead><tr><th class="hm-scn-col">SCN</th>';
  OUTCOMES.forEach(o=>{html+=`<th>${OUT_LBL[o]}</th>`;});
  html+='<th>Avg</th></tr></thead><tbody>';
  const rankData=[];
  scns.forEach(id=>{
    const d=KOBO[id];
    const pcts=calcITTpct(d.anak||[],d.obs||[]);
    const avgP=Math.round(Object.values(pcts).reduce((a,b)=>a+b,0)/OUTCOMES.length);
    rankData.push({id,label:SCN_LABEL[SCN_IDS.indexOf(id)]||id,prov:PROV_MAP[id]||'',avg:avgP,pcts});
    html+=`<tr><td class="hm-scn">${SCN_LABEL[SCN_IDS.indexOf(id)]||id}</td>`;
    OUTCOMES.forEach(o=>{
      const v=pcts[o]||0;
      html+=`<td style="background:${pctBg(v)};color:${pctColor(v)}">${v}%</td>`;
    });
    html+=`<td style="background:${pctBg(avgP)};color:${pctColor(avgP)};font-weight:800">${avgP}%</td></tr>`;
  });
  tbl.innerHTML=html+'</tbody>';
  rankData.sort((a,b)=>b.avg-a.avg);
  const rl=document.getElementById('ranking-list');
  if(!rl)return;
  const medals=['🥇','🥈','🥉'];
  rl.innerHTML=rankData.map((s,i)=>`
    <div class="rank-row">
      <div class="rank-badge" style="background:${i<3?'#fef3c7':'#f3f4f6'};color:${i<3?'#92400e':'#94a3b8'}">${medals[i]||i+1}</div>
      <div class="rank-info"><div class="rank-name">${s.label}</div><div class="rank-prov">${s.prov}</div></div>
      <div style="width:70px"><div class="prog-track"><div class="prog-fill" style="width:${s.avg}%;background:${pctColor(s.avg)}"></div></div></div>
      <div class="rank-pct" style="color:${pctColor(s.avg)}">${s.avg}%</div>
    </div>`).join('');
}

// ── RENDER WELLBEING ──────────────────────────────────────────
function renderWellbeing(scns, allAnak){
  const spL=[],spD=[],spC=[],saL=[],saD=[],saC=[];
  scns.forEach(id=>{
    const lbl=SCN_LABEL[SCN_IDS.indexOf(id)]||id;
    const spArr=(KOBO[id].anak||[]).filter(a=>a.sp!=null).map(a=>a.sp);
    const saArr=(KOBO[id].anak||[]).filter(a=>a.sa!=null).map(a=>a.sa);
    if(spArr.length){const v=parseFloat(avg(spArr).toFixed(1));spL.push(lbl);spD.push(v);spC.push(scColor(v)+'cc');}
    if(saArr.length){const v=parseFloat(avg(saArr).toFixed(1));saL.push(lbl);saD.push(v);saC.push(scColor(v)+'cc');}
  });
  mkChart('chart-sp-scn','bar',{labels:spL,datasets:[{data:spD,backgroundColor:spC,borderRadius:6,borderSkipped:false}]},
    {...CD,scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{...CD.scales.y,min:0,max:10,ticks:{callback:v=>v+'/10'}}}});
  mkChart('chart-sa-scn','bar',{labels:saL,datasets:[{data:saD,backgroundColor:saC,borderRadius:6,borderSkipped:false}]},
    {...CD,scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{...CD.scales.y,min:0,max:10,ticks:{callback:v=>v+'/10'}}}});
  // Distribusi
  const kritis=allAnak.filter(a=>a.sp!=null&&a.sp<=3).length;
  const sedang=allAnak.filter(a=>a.sp!=null&&a.sp>=4&&a.sp<=6).length;
  const baik=allAnak.filter(a=>a.sp!=null&&a.sp>=7).length;
  const belum=allAnak.filter(a=>a.sp==null).length;
  mkChart('chart-sp-dist','doughnut',{labels:['Kritis','Sedang','Baik','Belum'],
    datasets:[{data:[kritis,sedang,baik,belum],backgroundColor:['#dc2626','#d97706','#16a34a','#e5e7eb'],borderColor:'#fff',borderWidth:2}]},
    {responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{font:{size:10},padding:8}}}});
  // Usia
  const AGO=['0-5 th','6-12 th','13-17 th','18-24 th','25+ th'];
  const guC={};allAnak.forEach(a=>{const g=a.gu||'?';guC[g]=(guC[g]||0)+1;});
  mkChart('chart-usia','bar',{labels:AGO,datasets:[{data:AGO.map(g=>guC[g]||0),backgroundColor:['#F97316','#FB923C','#FDBA74','#1E293B','#475569'],borderRadius:6,borderSkipped:false}]},CD);
  // Ragam
  const RC={'Fisik':'#F97316','Intelektual':'#1E293B','Sensorik (penglihatan)':'#FB923C','Sensorik (pendengaran dan bicara)':'#FDBA74','Ganda':'#475569','Lainnya':'#94A3B8'};
  const rC={};allAnak.forEach(a=>{const r=a.ragam||'Lainnya';rC[r]=(rC[r]||0)+1;});
  const rK=Object.keys(rC).filter(k=>rC[k]>0);
  mkChart('chart-ragam','bar',{labels:rK.map(k=>k.split(' ')[0]),datasets:[{data:rK.map(k=>rC[k]),backgroundColor:rK.map(k=>RC[k]||'#94A3B8'),borderRadius:6,borderSkipped:false}]},CD);
}

// ── RENDER ICF ────────────────────────────────────────────────
function renderICF(allObs){
  [{key:'struktur',fk:'st',el:'icf-struktur',posL:'Baik',negL:'Terganggu',posC:'#16a34a',negC:'#dc2626'},
   {key:'kegiatan',fk:'kg',el:'icf-kegiatan',posL:'Mampu',negL:'Terbatas',posC:'#2563eb',negC:'#d97706'},
   {key:'lingkungan',fk:'lg',el:'icf-lingkungan',posL:'Dukungan',negL:'Hambatan',posC:'#7c3aed',negC:'#b91c1c'},
  ].forEach(dom=>{
    const res=analyzeICF(allObs,dom.key,dom.fk);
    const el=document.getElementById(dom.el);if(!el)return;
    el.innerHTML=THEMES_ICF[dom.key].map(t=>{
      const r=res[t.label]||{pos:0,neg:0};
      const tot=r.pos+r.neg||1;
      return `<div class="icf-domain-row">
        <div class="icf-domain-label">${t.label}</div>
        <div class="icf-domain-bars">
          <div class="icf-bar-wrap"><div class="icf-bar-label" style="color:${dom.posC}">${dom.posL}</div><div class="icf-bar-track"><div class="icf-bar-fill" style="width:${Math.round(r.pos/tot*100)}%;background:${dom.posC}"></div></div><div class="icf-bar-num" style="color:${dom.posC}">${r.pos}</div></div>
          <div class="icf-bar-wrap"><div class="icf-bar-label" style="color:${dom.negC}">${dom.negL}</div><div class="icf-bar-track"><div class="icf-bar-fill" style="width:${Math.round(r.neg/tot*100)}%;background:${dom.negC}"></div></div><div class="icf-bar-num" style="color:${dom.negC}">${r.neg}</div></div>
        </div></div>`;
    }).join('');
  });
}

// ── RENDER IMPLEMENTASI ───────────────────────────────────────
function renderImplementasi(scns, allAnak, allObs){
  const labels=[],kunj=[],late=[],epD=[],obD=[],trD=[];
  scns.forEach(id=>{
    const anak=KOBO[id].anak||[];
    const works=KOBO[id].workers||[];
    const lbl=SCN_LABEL[SCN_IDS.indexOf(id)]||id;
    const t=anak.length||1;
    labels.push(lbl);
    kunj.push(works.reduce((s,w)=>s+w.kunjungan_bulan,0));
    late.push(works.reduce((s,w)=>s+w.late,0));
    epD.push(Math.round(anak.filter(a=>a.ep).length/t*100));
    obD.push(Math.round(anak.filter(a=>a.ob).length/t*100));
    trD.push(Math.round(anak.filter(a=>a.tr).length/t*100));
  });
  mkChart('chart-coverage','bar',{labels,datasets:[
    {label:'Kunjungan Bulan Ini',data:kunj,backgroundColor:'#F97316cc',borderRadius:4},
    {label:'Belum Dikunjungi >30 hari',data:late,backgroundColor:'#dc2626cc',borderRadius:4},
  ]},{...CD,plugins:{...CD.plugins,legend:{display:true,position:'top',labels:{font:{size:10}}}}});
  mkChart('chart-kondisi','bar',{labels,datasets:[
    {label:'Epilepsi (%)',data:epD,backgroundColor:'#dc2626cc',borderRadius:4},
    {label:'Pengobatan (%)',data:obD,backgroundColor:'#2563ebcc',borderRadius:4},
    {label:'Terapi (%)',data:trD,backgroundColor:'#16a34acc',borderRadius:4},
  ]},{...CD,plugins:{...CD.plugins,legend:{display:true,position:'top',labels:{font:{size:10}}}},
    scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{...CD.scales.y,min:0,max:100,ticks:{callback:v=>v+'%'}}}});
}

const SESSION = AUTH.requireAuth('../index.html');
if(SESSION){
  if(!AUTH.isSuperAdmin()){
    window.location.href='mel-beranda.html';
  } else {
    AUTH.applySession({onScnSwitch:function(scnId){}});
    AUTH.initSidebar('mel','m-analisis');

    // Fetch semua sumber data paralel
    Promise.all([
      API.get('manggarai'),
      API_BEN.get('stakeholder', null),
      API_BEN.get('monthly', null),
    ]).then(([koboData, stkData, monData])=>{
      BEN_STK = stkData||[];
      BEN_MON = monData||[];
      if(koboData){
        KOBO['manggarai'] = koboData;
        renderAll();
      } else {
        document.getElementById('page-content').innerHTML='<div class="an-loading">Tidak ada data tersedia</div>';
      }
    });
  }
}
</script>
</body>
</html>
