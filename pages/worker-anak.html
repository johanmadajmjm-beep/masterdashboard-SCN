<!DOCTYPE html>
<html lang="id"><head><style>html,body{background:#F8FAFC}</style><script>if("startViewTransition" in document){addEventListener("pagereveal",e=>{if(e.viewTransition)e.viewTransition.ready.catch(()=>{})})}</script>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CBR Worker — Profil Anak | MEL NLR</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="stylesheet" href="../css/components.css"/>
<style>
/* ── LAYOUT ─────────────────────────────────── */
.ld-wrap{display:flex;gap:0;height:calc(100vh - 60px);overflow:hidden}

/* LIST PANEL — full width when no detail, narrow when detail open */
.ld-list{
  width:100%;min-width:0;flex-shrink:0;
  background:#fff;border-right:1px solid #E5E7EB;
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .25s ease;
}
.ld-wrap.detail-open .ld-list{width:300px;min-width:300px;}

.ld-list-header{padding:12px 14px;border-bottom:1px solid #E5E7EB;flex-shrink:0}
.ld-search{width:100%;padding:7px 10px;border:1px solid #E5E7EB;border-radius:8px;font-size:.75rem;font-family:inherit;background:#F9FAFB;outline:none;transition:.15s}
.ld-search:focus{border-color:#F97316;background:#fff;box-shadow:0 0 0 3px rgba(249,115,22,.1)}
.ld-select{flex:1;padding:5px 8px;border:1px solid #E5E7EB;border-radius:6px;font-size:.7rem;font-family:inherit;background:#F9FAFB;outline:none}
.ld-select:focus{border-color:#F97316}
.ld-items{flex:1;overflow-y:auto}
.ld-items::-webkit-scrollbar{width:4px}
.ld-items::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:2px}

/* Status chips */
.status-chips{display:flex;gap:4px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid #F3F4F6;flex-shrink:0}
.chip{padding:3px 10px;border-radius:999px;font-size:.65rem;font-weight:600;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#6B7280;font-family:inherit;transition:.12s;white-space:nowrap}
.chip:hover{background:#F9FAFB}
.chip.active{border-color:#F97316;background:#FFF7ED;color:#EA6C0A}

.ld-item{padding:10px 14px;border-bottom:1px solid #F9FAFB;cursor:pointer;transition:background .1s;position:relative}
.ld-item:hover{background:#FFF7ED}
.ld-item.active{background:#FFF7ED;border-left:3px solid #F97316;padding-left:11px}
.ld-item-name{font-size:.8rem;font-weight:600;color:#1F2937;margin-bottom:2px;padding-right:44px}
.ld-item-sub{font-size:.67rem;color:#9CA3AF}
.ld-item-score{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:.9rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.ld-item-tag{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}

/* DETAIL PANEL — hidden until detail-open */
.ld-detail{
  flex:1;overflow-y:auto;background:#F8FAFC;
  display:none;
}
.ld-wrap.detail-open .ld-detail{display:block;}
.ld-detail::-webkit-scrollbar{width:5px}
.ld-detail::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:3px}

/* ── DETAIL CONTENT ─────────────────────────── */
.det-wrap{padding:20px 24px}
.det-back{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;color:#6B7280;font-size:.75rem;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s;margin-bottom:14px}
.det-back:hover{background:#F9FAFB;color:#1F2937}
.det-back svg{width:14px;height:14px}
.det-name{font-size:1.15rem;font-weight:800;color:#1F2937;margin-bottom:6px}
.det-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.det-chip{padding:3px 10px;border-radius:999px;font-size:.68rem;font-weight:600;background:#F3F4F6;color:#4B5563}
.det-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.det-kpi-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:12px;text-align:center}
.det-kpi-val{font-size:1.5rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.det-kpi-lbl{font-size:.6rem;color:#9CA3AF;margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}

/* Section card */
.det-section{background:#fff;border:1px solid #E5E7EB;border-radius:10px;margin-bottom:10px;overflow:hidden}
.det-section-head{
  padding:9px 14px;border-bottom:1px solid #F3F4F6;
  font-size:.72rem;font-weight:700;color:#1F2937;
  display:flex;align-items:center;gap:6px;
}
.det-section-head .sh-icon{
  width:20px;height:20px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.det-section-head .sh-icon svg{width:11px;height:11px;}
.det-section-body{padding:12px 14px}

/* Rows: label left, value right — value wraps fully */
.det-row{
  display:grid;grid-template-columns:130px 1fr;
  gap:8px;align-items:baseline;
  padding:6px 0;border-bottom:1px solid #F9FAFB;font-size:.77rem;
}
.det-row:last-child{border-bottom:none}
.det-row-label{color:#6B7280;font-size:.72rem;flex-shrink:0}
.det-row-val{font-weight:600;color:#1F2937;word-break:break-word;line-height:1.55}

/* ICF block — full-width narrative text */
.icf-block{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #F3F4F6}
.icf-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.icf-label{
  font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  margin-bottom:5px;display:flex;align-items:center;gap:5px;
}
.icf-label .icf-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.icf-text{
  font-size:.76rem;color:#374151;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;
}
.icf-empty{font-size:.74rem;color:#9CA3AF;font-style:italic}

/* View modes */
.view-modes{display:flex;gap:3px}
.vmode{width:26px;height:26px;border:1px solid #E5E7EB;border-radius:5px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9CA3AF;transition:.12s}
.vmode:hover{background:#F9FAFB;color:#6B7280}
.vmode.active{background:#FFF7ED;border-color:#F97316;color:#F97316}
.vmode svg{width:11px;height:11px}
/* Card grid views */
.card-grid{display:grid;gap:10px;padding:12px;overflow-y:auto;flex:1}
.grid-xl{grid-template-columns:1fr 1fr}
.grid-md{grid-template-columns:1fr 1fr 1fr}
.grid-sm{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
.lst-wrap{flex:1;overflow-y:auto}
.item-card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:10px 12px;cursor:pointer;transition:box-shadow .15s;position:relative}
.item-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.item-card.active{border-color:#F97316;background:#FFF7ED}
.item-card-name{font-size:.78rem;font-weight:700;color:#1F2937;margin-bottom:3px}
.item-card-sub{font-size:.64rem;color:#9CA3AF;line-height:1.4}
.item-card-score{font-size:.85rem;font-weight:800;font-family:monospace;margin-top:4px}
.grid-sm .item-card-sub{display:none}
.lst-item{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background .1s}
.lst-item:hover{background:#FFF7ED}
.lst-item.active{background:#FFF7ED;border-left:3px solid #F97316;padding-left:11px}
.lst-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lst-item-name{font-size:.74rem;font-weight:600;color:#1F2937;flex:1}
.lst-item-right{font-size:.72rem;color:#9CA3AF}
.lst-item-score{font-size:.78rem;font-weight:800;font-family:monospace;color:#F97316}
/* Old list modes kept for ld-items default */
/* List modes */
.mode-md .ld-item{padding:8px 14px}
.mode-md .ld-item-name{font-size:.77rem}
.mode-sm .ld-item{padding:6px 14px}
.mode-sm .ld-item-name{font-size:.74rem}
.mode-sm .ld-item-sub{display:none}
.mode-lst .ld-item{padding:5px 14px;border-bottom:1px solid #F9FAFB}
.mode-lst .ld-item-name{font-size:.72rem}
.mode-lst .ld-item-sub{display:none}

</style>
</head><body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-breadcrumb">CBR Worker <span class="sep">›</span><span class="current">Profil Anak</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>

<div class="ld-wrap">
  <div class="ld-list">
    <div class="ld-list-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:.8rem;font-weight:700;color:#1F2937">Daftar Anak</span>
        <div class="view-modes">
          <button class="vmode active" id="vm-xl" onclick="setView('xl')" title="Normal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="vmode" id="vm-md" onclick="setView('md')" title="Sedang">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <button class="vmode" id="vm-sm" onclick="setView('sm')" title="Kompak">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="4" height="4"/><rect x="10" y="3" width="4" height="4"/><rect x="17" y="3" width="4" height="4"/><rect x="3" y="10" width="4" height="4"/><rect x="10" y="10" width="4" height="4"/><rect x="17" y="10" width="4" height="4"/></svg>
          </button>
          <button class="vmode" id="vm-lst" onclick="setView('lst')" title="List Row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="3" height="3"/><line x1="8" y1="6.5" x2="21" y2="6.5"/><rect x="3" y="11" width="3" height="3"/><line x1="8" y1="12.5" x2="21" y2="12.5"/><rect x="3" y="17" width="3" height="3"/><line x1="8" y1="18.5" x2="21" y2="18.5"/></svg>
          </button>
        </div>
      </div>
      <input class="ld-search" id="flt-search" type="text" placeholder="🔍  Cari nama anak..."/>
      <div style="display:flex;gap:5px;margin-top:7px">
        <select class="ld-select" id="flt-ragam"><option value="">Semua Ragam</option></select>
        <select class="ld-select" id="flt-cbr"><option value="">Semua CBR</option></select>
      </div>
      <div style="font-size:.68rem;color:#9CA3AF;margin-top:6px" id="ld-count">—</div>
    </div>
    <div class="status-chips" id="status-chips"></div>
    <div class="card-grid grid-xl" id="view-xl"></div>
    <div class="card-grid grid-md" id="view-md" style="display:none"></div>
    <div class="card-grid grid-sm" id="view-sm" style="display:none"></div>
    <div class="lst-wrap" id="view-lst" style="display:none"></div>
  </div>

  <div class="ld-detail" id="ld-detail">
    <div class="det-wrap" id="det-wrap"></div>
  </div>
</div>
</div></div>

<script>
const RC={
  'Fisik'                              :'#F97316',
  'Intelektual'                        :'#1D4ED8',
  'Sensorik (penglihatan)'             :'#059669',
  'Sensorik (pendengaran dan bicara)'  :'#7C3AED',
  'Sensorik (pendengaran & bicara)'    :'#7C3AED',
  'Ganda'                              :'#DC2626',
  'Lainnya'                            :'#94A3B8',
};
const RAGAM_DESC = {
  'Fisik'                             :'Keterbatasan fungsi gerak/motorik — termasuk cerebral palsy, kelumpuhan, kaki pengkor, spina bifida, polio, dan kondisi muskuloskeletal lainnya.',
  'Intelektual'                       :'Keterbatasan signifikan dalam fungsi intelektual dan perilaku adaptif — termasuk Down Syndrome, autisme, kesulitan belajar, dan disabilitas intelektual lainnya.',
  'Sensorik (penglihatan)'            :'Gangguan fungsi penglihatan — termasuk buta total (low vision berat) hingga gangguan penglihatan parsial yang mempengaruhi aktivitas sehari-hari.',
  'Sensorik (pendengaran dan bicara)' :'Gangguan fungsi pendengaran dan/atau kemampuan bicara — termasuk tuli total, gangguan pendengaran parsial, tuna wicara, dan kombinasi rungu-wicara.',
  'Sensorik (pendengaran & bicara)'   :'Gangguan fungsi pendengaran dan/atau kemampuan bicara — termasuk tuli total, gangguan pendengaran parsial, tuna wicara, dan kombinasi rungu-wicara.',
  'Ganda'                             :'Kombinasi dua atau lebih ragam disabilitas yang membutuhkan dukungan lintas domain — misalnya fisik + intelektual, atau sensorik + fisik.',
  'Lainnya'                           :'Ragam disabilitas lain yang tidak termasuk kategori di atas — termasuk disabilitas psikososial dan kondisi kronis lainnya.',
};
const LC={'Parah (dukungan penuh)':'#1E293B','Sedang (dukungan reguler)':'#F97316','Rendah (sedikit dukungan)':'#059669'};
function sc(v){return v<=3?'#1E293B':v<=6?'#FB923C':'#F97316';}

let ALL_ANAK=[], OBS_MAP={}, ACTIVE_FILTER='all', ACTIVE_VIEW='xl';

function setView(v){
  ACTIVE_VIEW=v;
  ['xl','md','sm','lst'].forEach(x=>document.getElementById('vm-'+x).classList.toggle('active',x===v));
  ['view-xl','view-md','view-sm','view-lst'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display='none';
  });
  const t=document.getElementById('view-'+v);
  if(t) t.style.display=(v==='lst')?'block':'grid';
  renderList();
}

function renderPage(d,scnId){
  if(!d) return;
  ALL_ANAK=d.anak||[];
  OBS_MAP={};
  (d.obs||[]).forEach(o=>{if(o.na)OBS_MAP[o.na.toLowerCase()]=o;});
  const total=ALL_ANAK.length;
  const punyaObs=ALL_ANAK.filter(a=>OBS_MAP[a.nama?.toLowerCase()]).length;
  const belumObs=total-punyaObs;
  const kritis=ALL_ANAK.filter(a=>a.sp!=null&&a.sp<=3).length;
  const chips=[
    {f:'all',l:'Semua',n:total},
    {f:'punya-obs',l:'Punya Obs',n:punyaObs},
    {f:'belum-obs',l:'Belum Obs',n:belumObs},
    {f:'kritis',l:'Kritis',n:kritis},
  ];
  document.getElementById('status-chips').innerHTML=chips.map(c=>`
    <button class="chip${ACTIVE_FILTER===c.f?' active':''}" onclick="setFilter('${c.f}')">${c.l}: ${c.n}</button>
  `).join('');
  const ragams=[...new Set(ALL_ANAK.map(a=>a.ragam).filter(Boolean))].sort();
  const cbrs=[...new Set(ALL_ANAK.map(a=>a.cbr).filter(Boolean))].sort();
  const fR=document.getElementById('flt-ragam'),fC=document.getElementById('flt-cbr');
  ragams.forEach(r=>{const o=document.createElement('option');o.value=o.textContent=r;fR.appendChild(o);});
  cbrs.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;fC.appendChild(o);});
  [fR,fC].forEach(el=>el.addEventListener('change',renderList));
  document.getElementById('flt-search').addEventListener('input',renderList);
  renderList();
}

function setFilter(f){
  ACTIVE_FILTER=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

function renderList(){
  const rg=document.getElementById('flt-ragam').value;
  const cb=document.getElementById('flt-cbr').value;
  const q=(document.getElementById('flt-search').value||'').toLowerCase();
  let list=ALL_ANAK.filter(a=>{
    if(rg&&a.ragam!==rg) return false;
    if(cb&&a.cbr!==cb) return false;
    if(q&&!(a.nama||'').toLowerCase().includes(q)) return false;
    const hasObs=!!OBS_MAP[a.nama?.toLowerCase()];
    if(ACTIVE_FILTER==='punya-obs') return hasObs;
    if(ACTIVE_FILTER==='belum-obs') return !hasObs;
    if(ACTIVE_FILTER==='kritis') return a.sp!=null&&a.sp<=3;
    return true;
  });
  document.getElementById('ld-count').textContent=list.length+' anak';
  const empty='<div style="text-align:center;padding:32px;color:#9CA3AF;font-size:.78rem;grid-column:1/-1">Tidak ada data</div>';
  const cardHTML=list.map((a,i)=>{
    const hasObs=!!OBS_MAP[a.nama?.toLowerCase()];
    const rColor=RC[a.ragam]||'#94A3B8';
    return `<div class="item-card" data-i="${i}">
      <div class="item-card-name"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${rColor};margin-right:5px;vertical-align:middle"></span>${a.nama||'—'}</div>
      <div class="item-card-sub">${a.cbr||'—'} · ${a.desa||'—'}<br>${hasObs?'✓ Obs':'Belum obs'}</div>
      ${a.sp!=null?`<div class="item-card-score" style="color:${sc(a.sp)}">${a.sp}</div>`:''}
    </div>`;
  }).join('');
  const lstHTML=list.map((a,i)=>{
    const hasObs=!!OBS_MAP[a.nama?.toLowerCase()];
    const rColor=RC[a.ragam]||'#94A3B8';
    return `<div class="lst-item" data-i="${i}">
      <div class="lst-item-dot" style="background:${rColor}"></div>
      <span class="lst-item-name">${a.nama||'—'}</span>
      <span class="lst-item-right">${a.cbr||'—'}</span>
      ${a.sp!=null?`<span class="lst-item-score" style="color:${sc(a.sp)}">${a.sp}</span>`:''}
    </div>`;
  }).join('');
  ['xl','md','sm'].forEach(v=>{
    document.getElementById('view-'+v).innerHTML=list.length?cardHTML:empty;
  });
  document.getElementById('view-lst').innerHTML=list.length?lstHTML:'<div style="text-align:center;padding:32px;color:#9CA3AF;font-size:.78rem">Tidak ada data</div>';
  document.querySelectorAll('.item-card,.lst-item').forEach(el=>{
    const i=parseInt(el.dataset.i);
    el.onclick=()=>showDetail(el,list[i]);
  });
}

let _lastEl=null;

function showDetail(el,a){
  if(_lastEl) _lastEl.classList.remove('active');
  // Also clear active from sibling views
  document.querySelectorAll('.item-card,.lst-item').forEach(e=>{if(e!==el)e.classList.remove('active');});
  el.classList.add('active'); _lastEl=el;
  document.querySelector('.ld-wrap').classList.add('detail-open');

  const obs=OBS_MAP[a.nama?.toLowerCase()];
  const spVal=a.sp, saVal=a.sa;

  // ICF field helper — full text, no truncation
  function icfBlock(label, color, iconSvg, val){
    const empty = !val || val.trim()==='' || val==='-' || val==='—';
    return `
      <div class="icf-block">
        <div class="icf-label" style="color:${color}">
          <span class="icf-dot" style="background:${color}"></span>
          ${label}
        </div>
        ${empty
          ? '<div class="icf-empty">Belum ada data</div>'
          : `<div class="icf-text">${val.trim()}</div>`
        }
      </div>`;
  }

  function row(label, val){
    const v = (val==null||val===''||val==='-')?'—':val;
    return `<div class="det-row"><span class="det-row-label">${label}</span><span class="det-row-val">${v}</span></div>`;
  }

  function shead(iconSvg, iconBg, iconColor, label){
    return `<div class="det-section-head">
      <div class="sh-icon" style="background:${iconBg};color:${iconColor}">${iconSvg}</div>
      ${label}
    </div>`;
  }

  const icoUser   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg>`;
  const icoObs    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const icoICF    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`;
  const icoFaktor = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;

  document.getElementById('det-wrap').innerHTML=`
    <button class="det-back" onclick="clearDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Kembali ke daftar
    </button>

    <div class="det-name">${a.nama||'—'}</div>
    <div class="det-meta">
      <span class="det-chip" style="background:${RC[a.ragam]||'#E5E7EB'}18;color:${RC[a.ragam]||'#6B7280'}">${a.ragam||'—'}</span>
      <span class="det-chip" style="color:${LC[a.level]||'#6B7280'}">${(a.level||'—').split('(')[0].trim()}</span>
      ${a.ep==='Ya'?'<span class="det-chip" style="background:#FEF3C7;color:#92400E">⚡ Epilepsi</span>':''}
      ${a.tr==='Ya'?'<span class="det-chip" style="background:#DCFCE7;color:#15803D">✓ Pernah Terapi</span>':''}
      ${a.ob==='Ya'?'<span class="det-chip" style="background:#EFF6FF;color:#1D4ED8">💊 Pengobatan Aktif</span>':''}
    </div>

    <div class="det-kpi">
      <div class="det-kpi-card">
        <div class="det-kpi-val" style="color:${spVal!=null?sc(spVal):'#9CA3AF'}">${spVal!=null?spVal:'—'}</div>
        <div class="det-kpi-lbl">Skor Anak</div>
      </div>
      <div class="det-kpi-card">
        <div class="det-kpi-val" style="color:${saVal!=null?sc(saVal):'#9CA3AF'}">${saVal!=null?saVal:'—'}</div>
        <div class="det-kpi-lbl">Skor Pengasuh</div>
      </div>
      <div class="det-kpi-card">
        <div class="det-kpi-val" style="color:${a.hari===999?'#DC2626':a.hari>30?'#F97316':'#059669'}">${a.hari===999?'∞':a.hari}</div>
        <div class="det-kpi-lbl">Hari sejak Obs</div>
      </div>
    </div>

    <!-- PROFIL ANAK -->
    <div class="det-section">
      ${shead(icoUser,'rgba(249,115,22,.1)','#F97316','Profil Anak')}
      <div class="det-section-body">
        ${row('Jenis Kelamin', a.gender==='L'?'Laki-laki':a.gender==='P'?'Perempuan':'—')}
        ${row('Tanggal Lahir', (()=>{ const tl=a.tl; if(!tl) return '—'; const d=new Date(tl); return isNaN(d)?tl:d.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}); })())}
        ${row('Usia', a.usia ? a.usia+' tahun' : a.gu||'—')}
        ${row('Kelompok Usia', a.gu||'—')}
        ${row('Kampung/Dusun', a.kampung||'—')}
        ${row('Desa', a.desa||'—')}
        ${(()=>{ const rg=a.ragam||'—'; const desc=RAGAM_DESC?.[rg]; const color=RC[rg]||'#94A3B8'; return `<div class="det-row" style="flex-direction:column;align-items:flex-start;gap:4px"><span style="font-size:.7rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em">Ragam Disabilitas</span><div style="margin-top:2px"><span style="display:inline-block;background:${color}18;color:${color};font-weight:700;font-size:.75rem;padding:3px 10px;border-radius:6px;border:1px solid ${color}30">${rg}</span>${desc?`<p style="margin:6px 0 0;font-size:.72rem;color:#6b7280;line-height:1.6">${desc}</p>`:''}</div></div>`; })()}
        ${a.rgd ? `<div class="det-row" style="flex-direction:column;align-items:flex-start;gap:4px"><span style="font-size:.7rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em">Detail Ragam</span><p style="margin:4px 0 0;font-size:.78rem;color:#1e293b;line-height:1.6">${a.rgd}</p></div>` : ''}
        ${row('Level Disabilitas', a.level||'—')}
        ${row('Epilepsi', a.ep ? 'Ya' : 'Tidak')}
        ${row('Pengobatan 1 Tahun Terakhir', a.ob ? 'Ya' : 'Tidak')}
        ${a.obf ? row('Fasilitas Kesehatan', a.obf) : ''}
        ${a.obl ? row('Layanan Pengobatan', a.obl) : ''}
        ${row('Pernah Mendapat Terapi', a.tr ? 'Ya' : 'Tidak')}
        ${a.trj ? row('Jenis Terapi', a.trj) : ''}
        ${a.trs ? row('Pelaksana Terapi', a.trs) : ''}
        ${a.wk  ? row('Waktu Kunjungan CBR', a.wk) : ''}
      </div>
    </div>

    <!-- PROFIL PENGASUH -->
    <div class="det-section">
      ${shead(icoUser,'rgba(99,102,241,.1)','#6366F1','Profil Pengasuh')}
      <div class="det-section-body">
        ${row('Status Pengasuh', a.stp||'—')}
        ${a.stpl ? row('Keterangan Pengasuh', a.stpl) : ''}
        ${row('CBR Worker', a.cbr||'—')}
        ${row('Faktor Membantu Pengasuh', a.nkp||'—')}
        ${row('Faktor Menyulitkan Pengasuh', a.tkp||'—')}
      </div>
    </div>

    <!-- FAKTOR ANAK -->
    <div class="det-section">
      ${shead(icoFaktor,'rgba(16,185,129,.1)','#10B981','Faktor Kesejahteraan Anak')}
      <div class="det-section-body">
        ${row('Faktor Membantu Anak', a.nka||'—')}
        ${row('Faktor Menyulitkan Anak', a.tka||'—')}
      </div>
    </div>

    <!-- ICF -->
    ${obs ? `
    <div class="det-section">
      ${shead(icoObs,'rgba(249,115,22,.1)','#F97316','Observasi Terakhir — '+( obs.tgl||'—'))}
      <div class="det-section-body">
        ${row('Tanggal Kunjungan', obs.tgl||'—')}
        ${row('CBR Worker', obs.cb||'—')}
      </div>
    </div>
    <div class="det-section">
      ${shead(icoICF,'rgba(30,41,59,.08)','#1E293B','4 Komponen ICF')}
      <div class="det-section-body">
        ${icfBlock('Fungsi & Struktur Tubuh','#1D4ED8','',obs.st||'')}
        ${icfBlock('Aktivitas & Partisipasi (Kegiatan)','#059669','',obs.kg||'')}
        ${icfBlock('Faktor Personal','#7C3AED','',obs.pf||'')}
        ${icfBlock('Faktor Lingkungan','#D97706','',obs.lg||'')}
      </div>
    </div>`
    : `<div class="det-section">
        ${shead(icoObs,'#F3F4F6','#9CA3AF','Observasi')}
        <div class="det-section-body" style="text-align:center;color:#9CA3AF;padding:20px 14px;font-size:.78rem">
          Belum ada data observasi untuk anak ini
        </div>
      </div>`
    }
  `;
}

function clearDetail(){
  document.querySelector('.ld-wrap').classList.remove('detail-open');
  document.getElementById('det-wrap').innerHTML='';
  if(_lastEl){_lastEl.classList.remove('active');_lastEl=null;}
}
</script>

<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>

buildSidebar();
const SESSION=AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({onScnSwitch:async function(scnId){const d=await API.get(scnId);if(window.renderPage)renderPage(d,scnId);}});
  AUTH.initSidebar('worker','w-anak');
  API.get(AUTH.getScnFilter()).then(d=>{if(window.renderPage)renderPage(d,AUTH.getScnFilter());});
}
