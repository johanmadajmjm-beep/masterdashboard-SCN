<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — Monthly Monitoring | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    .mm-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
    .mm-kpi-box{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:14px 16px;border-left:3px solid var(--kc,#F97316)}
    .mm-kpi-val{font-size:1.45rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--kc,#F97316);line-height:1}
    .mm-kpi-lbl{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin-top:4px}
    .mm-kpi-sub{font-size:.62rem;color:var(--gray-400);margin-top:2px}
    .mm-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .mm-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
    @media(max-width:900px){.mm-grid-2,.mm-grid-3{grid-template-columns:1fr}}
    .mm-card{background:#fff;border:1px solid var(--gray-200);border-radius:12px;overflow:hidden;margin-bottom:16px}
    .mm-card-head{padding:12px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
    .mm-card-title{font-size:.84rem;font-weight:700;color:var(--gray-900)}
    .mm-card-sub{font-size:.68rem;color:var(--gray-400)}
    .mm-card-body{padding:14px 16px}
    /* SCN Tabs */
    .scn-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .scn-tab{padding:5px 14px;border-radius:999px;border:1px solid var(--gray-200);font-size:.72rem;font-weight:600;cursor:pointer;background:#fff;color:var(--gray-600);transition:all .15s}
    .scn-tab.active{background:#F97316;color:#fff;border-color:#F97316}
    /* Table */
    .mm-table{width:100%;border-collapse:collapse;font-size:.77rem}
    .mm-table th{padding:8px 12px;text-align:left;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);border-bottom:2px solid var(--gray-100);white-space:nowrap}
    .mm-table td{padding:9px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
    .mm-table tr:last-child td{border-bottom:none}
    .mm-table tr:hover td{background:#fafbfd}
    .mm-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.64rem;font-weight:700}
    .mm-pill-scn{background:#eff6ff;color:#1d4ed8}
    .mm-pill-out{background:#fff7ed;color:#c2410c}
    /* Narasi */
    .narasi-item{border:1px solid var(--gray-200);border-radius:10px;padding:14px 16px;margin-bottom:10px}
    .narasi-title{font-size:.8rem;font-weight:700;color:var(--gray-900);margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .narasi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .narasi-field{font-size:.72rem}
    .narasi-label{font-weight:700;color:var(--gray-500);margin-bottom:3px;font-size:.64rem;text-transform:uppercase;letter-spacing:.04em}
    .narasi-val{color:var(--gray-800);line-height:1.6}
    /* Peserta breakdown */
    .peserta-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-100)}
    .peserta-row:last-child{border-bottom:none}
    .peserta-lbl{font-size:.72rem;font-weight:600;width:140px;flex-shrink:0;color:var(--gray-700)}
    .peserta-bar-wrap{flex:1;height:7px;background:var(--gray-100);border-radius:4px;overflow:hidden}
    .peserta-bar-fill{height:100%;border-radius:4px;background:#F97316}
    .peserta-val{font-size:.72rem;font-weight:700;font-family:monospace;width:36px;text-align:right}
    /* SCN compare */
    .scn-compare-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)}
    .scn-compare-row:last-child{border-bottom:none}
    .scn-compare-name{font-size:.75rem;font-weight:700;width:100px;flex-shrink:0}
    .scn-compare-bar{flex:1;height:7px;background:var(--gray-100);border-radius:4px;overflow:hidden}
    .scn-compare-fill{height:100%;border-radius:4px;background:#F97316}
    .scn-compare-val{font-size:.72rem;font-weight:700;font-family:monospace;width:36px;text-align:right;color:#F97316}
    /* Loading */
    .mm-loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--gray-400);font-size:.82rem;gap:10px}
    .spin{width:20px;height:20px;border:2px solid var(--gray-200);border-top-color:#F97316;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:40px;color:var(--gray-400);font-size:.82rem}
    .tbl-wrap{overflow-x:auto}
    .sec-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin:20px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--gray-100)}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Monthly Monitoring</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge" style="display:none">—</span>
        <span id="data-source-badge" style="display:none;font-size:.7rem;padding:3px 10px;border-radius:999px;font-weight:600"></span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <h1>Monthly Monitoring</h1>
        <p>Pemantauan kegiatan program CBR per SCN — peserta, outcome, capaian, dan narasi lapangan.</p>
      </div>
      <div id="page-content">
        <div class="mm-loading"><div class="spin"></div> Memuat data monitoring...</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
const GAS_BEN   = 'https://script.google.com/macros/s/AKfycbzY4CfLPnW-Q9lTyvfkbkEgmPeVdNVLeVm7zLBxHAX4xquocm06BoKvt-y8sZMatGBA/exec';
const SCN_LABEL = {manggarai:'Manggarai',banyuwangi:'Banyuwangi',jember:'Jember',situbondo:'Situbondo',kupang:'Kupang',tts:'TTS',palu:'Palu',sigi:'Sigi'};
const OUTCOME_COLOR = {'O1':'#F97316','O2':'#1E293B','O3':'#2563eb','O4':'#16a34a','O5':'#7c3aed','O6':'#0ea5e9','O7':'#d97706'};

let ALL_DATA = [];

// ── FETCH ─────────────────────────────────────────────────────
async function fetchMonthly(scnId) {
  const url = scnId
    ? `${GAS_BEN}?sheet=monthly&scn=${scnId}`
    : `${GAS_BEN}?sheet=monthly`;
  try {
    const resp = await fetch(url);
    const json = await resp.json();
    return json.data || [];
  } catch(e) {
    console.warn('[Monthly] Fetch error:', e.message);
    return [];
  }
}

function num(v) { return parseInt(v)||0; }
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

// ── RENDER ────────────────────────────────────────────────────
async function renderPage(d, scnId) {
  document.getElementById('page-content').innerHTML = '<div class="mm-loading"><div class="spin"></div> Memuat data monitoring...</div>';

  ALL_DATA = await fetchMonthly(scnId || null);

  if (!ALL_DATA.length) {
    document.getElementById('page-content').innerHTML = '<div class="empty-state">Belum ada data monitoring. Upload data melalui MEL SCN Tools terlebih dahulu.</div>';
    return;
  }

  buildUI(scnId);
}

function buildUI(activeScn) {
  const data = ALL_DATA;
  const scns = [...new Set(data.map(r => r.scn).filter(Boolean))];

  // KPI
  const totalKeg  = data.length;
  const totalL    = data.reduce((s,r) => s+num(r.laki), 0);
  const totalP    = data.reduce((s,r) => s+num(r.perempuan), 0);
  const totalPes  = totalL + totalP;
  const totalU25  = data.reduce((s,r) => s+num(r.u25), 0);
  const totalU26  = data.reduce((s,r) => s+num(r.u26), 0);
  const totalDisab= data.reduce((s,r) => s+num(r.disab), 0);

  // Peserta per kategori
  const pesKat = {
    'CBR Worker'   : data.reduce((s,r) => s+num(r.cbr), 0),
    'Guru'         : data.reduce((s,r) => s+num(r.guru), 0),
    'Pengasuh/Ortu': data.reduce((s,r) => s+num(r.pengasuh), 0),
    'Nakes'        : data.reduce((s,r) => s+num(r.nakes), 0),
    'Staff Mitra'  : data.reduce((s,r) => s+num(r.staff), 0),
    'Pemerintah'   : data.reduce((s,r) => s+num(r.pemerintah), 0),
    'Lainnya'      : data.reduce((s,r) => s+num(r.lainnya), 0),
  };
  const maxPes = Math.max(...Object.values(pesKat), 1);

  // SCN peserta
  const scnPes = {};
  data.forEach(r => {
    const s = r.scn||'?';
    scnPes[s] = (scnPes[s]||0) + num(r.total);
  });
  const maxScnPes = Math.max(...Object.values(scnPes), 1);

  document.getElementById('page-content').innerHTML = `
    ${scns.length > 1 ? buildSCNTabs(scns, scnPes) : ''}

    <div class="mm-kpi">
      ${kpi(totalKeg, 'Total Kegiatan', scns.length+' SCN', '#F97316')}
      ${kpi(totalPes.toLocaleString(), 'Total Peserta', totalL+'L / '+totalP+'P', '#1E293B')}
      ${kpi(totalU25+' / '+totalU26, 'Usia ≤25 / ≥26', 'disagregasi usia peserta', '#2563eb')}
      ${kpi(totalDisab, 'Peserta Disabilitas', Math.round(totalDisab/Math.max(totalPes,1)*100)+'% dari total', '#7c3aed')}
    </div>

    <div class="mm-grid-2">
      <div class="mm-card" style="margin-bottom:0">
        <div class="mm-card-head"><span class="mm-card-title">Peserta per Kategori</span></div>
        <div class="mm-card-body">
          ${Object.entries(pesKat).map(([k,v]) => `
          <div class="peserta-row">
            <span class="peserta-lbl">${k}</span>
            <div class="peserta-bar-wrap"><div class="peserta-bar-fill" style="width:${Math.round(v/maxPes*100)}%"></div></div>
            <span class="peserta-val">${v}</span>
          </div>`).join('')}
        </div>
      </div>
      ${scns.length > 1 ? `
      <div class="mm-card" style="margin-bottom:0">
        <div class="mm-card-head"><span class="mm-card-title">Total Peserta per SCN</span></div>
        <div class="mm-card-body">
          ${Object.entries(scnPes).sort((a,b)=>b[1]-a[1]).map(([s,v]) => `
          <div class="scn-compare-row">
            <span class="scn-compare-name">${SCN_LABEL[s]||s}</span>
            <div class="scn-compare-bar"><div class="scn-compare-fill" style="width:${Math.round(v/maxScnPes*100)}%"></div></div>
            <span class="scn-compare-val">${v}</span>
          </div>`).join('')}
        </div>
      </div>` : `
      <div class="mm-card" style="margin-bottom:0">
        <div class="mm-card-head"><span class="mm-card-title">Distribusi Outcome</span></div>
        <div class="mm-card-body" style="height:200px;position:relative">
          <canvas id="chart-outcome"></canvas>
        </div>
      </div>`}
    </div>

    <div class="sec-title">Daftar Kegiatan</div>
    <div class="mm-card">
      <div class="mm-card-head">
        <span class="mm-card-title">Semua Kegiatan</span>
        <span class="mm-card-sub" id="keg-count">${totalKeg} kegiatan</span>
      </div>
      <div class="mm-card-body" style="padding:0">
        <div class="tbl-wrap">
          <table class="mm-table">
            <thead><tr>
              ${scns.length > 1 ? '<th>SCN</th>' : ''}
              <th>Nama Kegiatan</th><th>Tanggal</th><th>Lokasi</th>
              <th>Outcome</th><th style="text-align:center">L</th><th style="text-align:center">P</th>
              <th style="text-align:center">Total</th><th>Pelaksana</th>
            </tr></thead>
            <tbody id="keg-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="sec-title">Narasi & Pembelajaran</div>
    <div id="narasi-list"></div>
  `;

  // Chart outcome jika 1 SCN
  if (scns.length === 1) {
    const outCount = {};
    data.forEach(r => { const o = r.outcome||'?'; outCount[o] = (outCount[o]||0) + 1; });
    const el = document.getElementById('chart-outcome');
    if (el) {
      const ex = Chart.getChart('chart-outcome'); if(ex) ex.destroy();
      new Chart(el.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(outCount),
          datasets: [{ data: Object.values(outCount),
            backgroundColor: Object.keys(outCount).map(k => OUTCOME_COLOR[k]||'#94a3b8'),
            borderColor: '#fff', borderWidth: 2 }]
        },
        options: { responsive:true, maintainAspectRatio:false, cutout:'60%',
          plugins: { legend: { position:'right', labels:{ font:{size:10}, padding:8 } } } }
      });
    }
  }

  // SCN tab click
  document.querySelectorAll('.scn-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.scn-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const fs = tab.dataset.scn;
      const filtered = fs === 'all' ? data : data.filter(r => r.scn === fs);
      renderKegTable(filtered, scns.length > 1);
      renderNarasi(filtered);
    });
  });

  renderKegTable(data, scns.length > 1);
  renderNarasi(data);
}

function buildSCNTabs(scns, scnPes) {
  const total = Object.values(scnPes).reduce((a,b)=>a+b,0);
  return ['<div class="scn-tabs">',
    `<button class="scn-tab active" data-scn="all">Semua (${ALL_DATA.length} keg)</button>`,
    ...scns.map(s => `<button class="scn-tab" data-scn="${s}">${SCN_LABEL[s]||s}</button>`),
    '</div>'].join('');
}

function renderKegTable(rows, showScn) {
  document.getElementById('keg-count').textContent = rows.length + ' kegiatan';
  document.getElementById('keg-body').innerHTML = rows.map(r => `
    <tr>
      ${showScn ? `<td><span class="mm-pill mm-pill-scn">${SCN_LABEL[r.scn]||r.scn||'—'}</span></td>` : ''}
      <td style="font-weight:600;max-width:200px">${r.nama_kegiatan||'—'}</td>
      <td style="white-space:nowrap;color:var(--gray-500)">${r.tanggal||'—'}</td>
      <td style="color:var(--gray-600)">${r.lokasi||'—'}</td>
      <td><span class="mm-pill mm-pill-out" style="background:${OUTCOME_COLOR[r.outcome]||'#f1f5f9'}22;color:${OUTCOME_COLOR[r.outcome]||'#64748b'}">${r.outcome||'—'}</span></td>
      <td style="text-align:center;font-weight:700;color:#1d4ed8">${num(r.laki)}</td>
      <td style="text-align:center;font-weight:700;color:#db2777">${num(r.perempuan)}</td>
      <td style="text-align:center;font-weight:800">${num(r.total)}</td>
      <td style="color:var(--gray-600);font-size:.72rem">${r.pelaksana||'—'}</td>
    </tr>`).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--gray-400);padding:20px">Tidak ada data</td></tr>';
}

function renderNarasi(rows) {
  const el = document.getElementById('narasi-list');
  if (!el) return;
  const withNarasi = rows.filter(r => r.tangible_output||r.follow_up||r.evaluasi||r.lesson_learnt||r.capaian);
  if (!withNarasi.length) {
    el.innerHTML = '<div class="empty-state" style="padding:20px">Belum ada narasi kegiatan.</div>';
    return;
  }
  el.innerHTML = withNarasi.map(r => `
    <div class="narasi-item">
      <div class="narasi-title">
        <span style="color:#F97316">▸</span>
        <span>${r.nama_kegiatan||'Kegiatan'}</span>
        ${r.scn ? `<span class="mm-pill mm-pill-scn" style="margin-left:auto">${SCN_LABEL[r.scn]||r.scn}</span>` : ''}
        ${r.tanggal ? `<span style="font-size:.68rem;color:var(--gray-400);font-weight:400">${r.tanggal}</span>` : ''}
      </div>
      <div class="narasi-grid">
        ${narasiField('Tangible Output', r.tangible_output)}
        ${narasiField('Rencana Tindak Lanjut', r.follow_up)}
        ${narasiField('Evaluasi', r.evaluasi)}
        ${narasiField('Lesson Learnt', r.lesson_learnt)}
        ${r.capaian ? narasiField('Capaian/Temuan', r.capaian) : ''}
      </div>
    </div>`).join('');
}

function narasiField(lbl, val) {
  if (!val) return '';
  return `<div class="narasi-field"><div class="narasi-label">${lbl}</div><div class="narasi-val">${val}</div></div>`;
}

function kpi(val, lbl, sub, color='#F97316') {
  return `<div class="mm-kpi-box" style="--kc:${color}"><div class="mm-kpi-val">${val}</div><div class="mm-kpi-lbl">${lbl}</div><div class="mm-kpi-sub">${sub}</div></div>`;
}

// ── INIT ─────────────────────────────────────────────────────
buildSidebar();
const SESSION = AUTH.requireAuth('../index.html');
if (SESSION) {
  AUTH.applySession({
    onScnSwitch: function(scnId) { renderPage(null, scnId); }
  });
  AUTH.initSidebar('mel', 'm-monthly');
  renderPage(null, AUTH.getScnFilter());
}
</script>
</body>
</html>
