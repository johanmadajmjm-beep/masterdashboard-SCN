<!DOCTYPE html>
<html lang="id"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CBR Coordinator — Per CBR Worker | MEL NLR</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .kpi-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .kpi-box{background:var(--white);border:1px solid var(--ink-100);border-radius:var(--radius-md);padding:14px;border-top:3px solid var(--kc,var(--nlr-500))}
    .kpi-box .kv{font-family:var(--font-mono);font-size:1.6rem;font-weight:700;color:var(--kc,var(--ink-900));line-height:1}
    .kpi-box .kl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-400);margin:6px 0 2px}
    .kpi-box .ks{font-size:.68rem;color:var(--ink-300)}
    @media(max-width:700px){.kpi-4{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="app"><div class="main">
  <header class="topbar">
    <div class="topbar-left"><div class="topbar-breadcrumb">CBR Coordinator <span class="sep">›</span><span class="current">Per CBR Worker</span></div></div>
    <div class="topbar-right">
      <span class="scn-badge" id="scn-badge">—</span>
      <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
      <span class="topbar-date" id="topbar-date">—</span>
    </div>
  </header>
  <div class="page">
    <div class="page-header"><h1>Detail Per CBR Worker</h1><p>Pilih CBR Worker untuk melihat data anak dan observasi ICF.</p></div>

    <div style="margin-bottom:14px">
      <select id="sel-worker" style="padding:9px 16px;border:1.5px solid var(--ink-100);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:.82rem;font-weight:600;min-width:260px"></select>
    </div>

    <!-- KPI worker -->
    <div class="kpi-4" id="worker-kpi"></div>

    <div class="grid-2">
      <!-- Daftar anak worker ini -->
      <div class="card">
        <div class="card-head">
          <span class="card-title" id="worker-title">—</span>
          <span class="badge badge-nlr" id="badge-anak-worker">—</span>
        </div>
        <div class="card-body no-pad"><div class="tbl-wrap"><table>
          <thead><tr><th>Nama Anak</th><th>Ragam</th><th>Level</th><th style="text-align:center">Skor</th><th>Terakhir Obs</th></tr></thead>
          <tbody id="tbl-anak-worker"></tbody>
        </table></div></div>
      </div>

      <!-- Observasi ICF worker ini -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">Temuan ICF</span>
          <span class="badge badge-blue" id="badge-obs-worker">—</span>
        </div>
        <div class="card-body" id="icf-worker"></div>
      </div>
    </div>
  </div>
</div></div>
<script>
const RAGAM_COLOR={Fisik:'#1a6fd4',Intelektual:'#10b8a6','Sensorik (penglihatan)':'#d97706','Sensorik (pendengaran dan bicara)':'#7c3aed',Ganda:'#dc2626',Lainnya:'#6b7280'};
const LEVEL_COLOR={'Parah (dukungan penuh)':'#dc2626','Sedang (dukungan reguler)':'#d97706','Rendah (sedikit dukungan)':'#16a34a'};
function sc(v){return v<=3?'#dc2626':v<=6?'#d97706':'#16a34a';}

let GDATA={};

function renderPage(d, scnId) {
  if (!d||!d.anak) return;
  GDATA=d;
  const sel=document.getElementById('sel-worker');
  sel.innerHTML='';
  d.workers.forEach(w=>{
    const label=w.scn?`[${w.scn.replace('SCN ','')}] ${w.nama}`:w.nama;
    const o=document.createElement('option');
    o.value=w.nama; o.textContent=label;
    sel.appendChild(o);
  });
  renderWorker(d.workers[0]?.nama);
  sel.addEventListener('change',()=>renderWorker(sel.value));
}

function renderWorker(wNama){
  if(!wNama||!GDATA.anak) return;
  const d=GDATA;
  const w=d.workers.find(x=>x.nama===wNama)||d.workers[0];
  const obsMap={};
  (d.obs||[]).forEach(o=>{if(o.na) obsMap[o.na.toLowerCase()]=o;});
  const myAnak=d.anak.filter(a=>a.cbr===wNama);
  const myObs=(d.obs||[]).filter(o=>o.cb===wNama);
  const mySp=myAnak.map(a=>a.sp).filter(v=>v!=null);
  const myAvg=mySp.length?(mySp.reduce((s,v)=>s+v,0)/mySp.length).toFixed(1):'—';
  const myKritis=myAnak.filter(a=>a.sp!=null&&a.sp<=3).length;

  document.getElementById('worker-title').textContent='Anak — '+wNama;
  document.getElementById('badge-anak-worker').textContent=myAnak.length+' anak';
  document.getElementById('badge-obs-worker').textContent=myObs.length+' observasi';

  // KPI
  const pct=w.anak>0?Math.min(Math.round(w.kunjungan_bulan/w.anak*100),100):0;
  document.getElementById('worker-kpi').innerHTML=[
    {v:myAnak.length,     l:'Total Anak',        s:'dalam caseload',           c:'var(--nlr-600)'},
    {v:w.kunjungan_bulan, l:'Kunjungan Bulan Ini',s:pct+'% coverage',           c:pct>=80?'#16a34a':pct>=50?'#1a6fd4':'#d97706'},
    {v:myAvg,             l:'Avg Skor Anak',      s:'Cantrill Ladder 1–10',     c:myAvg!=='—'?sc(parseFloat(myAvg)):'var(--ink-300)'},
    {v:w.late,            l:'Terlambat >30 Hari', s:'perlu tindak lanjut',      c:w.late>0?'#dc2626':'#16a34a'},
  ].map(k=>`<div class="kpi-box" style="--kc:${k.c}"><div class="kv">${k.v}</div><div class="kl">${k.l}</div><div class="ks">${k.s}</div></div>`).join('');

  // Tabel anak
  document.getElementById('tbl-anak-worker').innerHTML=myAnak.length
    ?myAnak.map(a=>{
      const hasObs=!!obsMap[a.nama?.toLowerCase()];
      const spCol=a.sp!=null?sc(a.sp):'var(--ink-200)';
      const hariStr=a.hari===999?'<span style="color:#dc2626;font-size:.7rem">Belum pernah</span>'
        :a.hari>30?`<span style="color:#dc2626;font-weight:700;font-size:.7rem">${a.hari}h lalu</span>`
        :`<span style="color:var(--ink-400);font-size:.7rem">${a.hari}h lalu</span>`;
      return `<tr>
        <td><strong>${a.nama}</strong></td>
        <td><span style="font-size:.7rem;font-weight:600;color:${RAGAM_COLOR[a.ragam]||'#888'}">${a.ragam||'—'}</span></td>
        <td><span style="font-size:.68rem;color:${LEVEL_COLOR[a.level]||'var(--ink-400)'}">${(a.level||'—').split('(')[0].trim()}</span></td>
        <td style="text-align:center"><span class="mono" style="font-weight:700;color:${spCol}">${a.sp!=null?a.sp:'—'}</span></td>
        <td>${hariStr}</td>
      </tr>`;
    }).join('')
    :'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--ink-300)">Tidak ada anak.</td></tr>';

  // ICF domain
  const domains=[
    {key:'st',label:'Struktur Tubuh',color:'#1a6fd4'},
    {key:'kg',label:'Kegiatan & Partisipasi',color:'#10b8a6'},
    {key:'pf',label:'Faktor Personal',color:'#7c3aed'},
    {key:'lg',label:'Lingkungan',color:'#d97706'},
  ];
  const posKata=['baik','mampu','aktif','bisa','normal','fasilitator'];
  const negKata=['terganggu','terbatas','hambatan','tidak bisa','sulit'];
  document.getElementById('icf-worker').innerHTML=myObs.length
    ?domains.map(dom=>{
      const vals=myObs.map(o=>o[dom.key]).filter(v=>v&&v.length>2);
      const pos=vals.filter(v=>posKata.some(k=>v.toLowerCase().includes(k))).length;
      const neg=vals.filter(v=>negKata.some(k=>v.toLowerCase().includes(k))).length;
      const pct2=vals.length?Math.round(pos/vals.length*100):0;
      return `<div style="margin-bottom:12px;padding:10px;background:var(--surface);border-radius:var(--radius-sm);border-left:3px solid ${dom.color}">
        <div style="font-size:.7rem;font-weight:700;color:${dom.color};margin-bottom:6px">${dom.label}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div class="prog-wrap" style="flex:1"><div class="prog-fill" style="width:${pct2}%;background:${dom.color}"></div></div>
          <span class="mono" style="font-size:.72rem;color:${dom.color}">${pct2}%</span>
        </div>
        <div style="font-size:.67rem;color:var(--ink-400)">${vals.length} obs · ${pos} positif · ${neg} perlu perhatian</div>
      </div>`;
    }).join('')
    :'<div style="color:var(--ink-300);font-size:.78rem;text-align:center;padding:20px">Belum ada observasi untuk worker ini.</div>';
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (window.renderPage) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('coord', 'c-worker');
    API.get(AUTH.getScnFilter()).then(d => {
      if (window.renderPage) renderPage(d, AUTH.getScnFilter());
    });
  }
</script>
</body></html>
