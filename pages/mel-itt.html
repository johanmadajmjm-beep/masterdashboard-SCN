  <title>MEL — ITT Tracker | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    /* Accordion outcome */
    .itt-block {
      background    : var(--white);
      border        : 1px solid var(--gray-200);
      border-radius : var(--radius-md);
      overflow      : hidden;
      margin-bottom : 12px;
    }
    .itt-header {
      display        : flex;
      align-items    : center;
      justify-content: space-between;
      padding        : 14px 18px;
      background     : var(--gray-50);
      border-left    : 4px solid var(--o-color, #999);
      cursor         : pointer;
      user-select    : none;
      transition     : background .15s;
    }
    .itt-header:hover { background: var(--gray-100); }
    .itt-header-left { display: flex; align-items: center; gap: 14px; }
    .itt-header-right { display: flex; align-items: center; gap: 10px; }

    .itt-label {
      font-size     : .65rem;
      font-weight   : 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      color         : var(--o-color, #999);
    }
    .itt-name {
      font-size  : .9rem;
      font-weight: 700;
      color      : var(--gray-900);
      margin-top : 2px;
    }
    .itt-avg {
      font-family: var(--font-mono);
      font-size  : 1.1rem;
      font-weight: 700;
      color      : var(--o-color, #999);
    }

    /* Tombol chevron */
    .itt-toggle {
      width           : 28px;
      height          : 28px;
      border-radius   : 50%;
      background      : rgba(0,0,0,.06);
      border          : none;
      display         : flex;
      align-items     : center;
      justify-content : center;
      cursor          : pointer;
      transition      : background .15s, transform .2s;
      flex-shrink     : 0;
    }
    .itt-toggle:hover { background: rgba(0,0,0,.12); }
    .itt-toggle svg { width: 14px; height: 14px; color: var(--gray-600); transition: transform .2s; }
    .itt-block.open .itt-toggle svg { transform: rotate(180deg); }

    /* Body accordion */
    .itt-body {
      max-height : 0;
      overflow   : hidden;
      transition : max-height .3s ease;
    }
    .itt-block.open .itt-body { max-height: 2000px; }

    /* Mini progress bar di header */
    .itt-header-prog {
      width      : 80px;
      flex-shrink: 0;
    }

    /* Tombol expand all / collapse all */
    .acc-controls {
      display    : flex;
      align-items: center;
      gap        : 8px;
      margin-bottom: 14px;
    }
  </style>
</head>

// ── LEVEL STYLE ───────────────────────────────────────────
const LEVEL_STYLE = {
  outcome:  { bg:'#EFF6FF', border:'#BFDBFE', label:'OUTCOME',       bold:true,  indent:0  },
  io:       { bg:'#F9FAFB', border:'#E5E7EB', label:'INT. OUTCOME',  bold:true,  indent:16 },
  'io-ind': { bg:'#FFFFFF', border:'#F3F4F6', label:'INDIKATOR',     bold:false, indent:32 },
  output:   { bg:'#FAFAFA', border:'#F3F4F6', label:'OUTPUT',        bold:false, indent:48 },
};

// ── RENDER ────────────────────────────────────────────────
function renderPage(d, scnId) {
  // Load target/capaian dari GSheet jika tersedia
  const capData = (d && d.itt) ? d.itt : {};

  const container = document.getElementById('itt-container');

  // Group by outcome
  const byO = {};
  ITT.forEach(ind => {
    if (!byO[ind.o]) byO[ind.o] = [];
    byO[ind.o].push(ind);
  });

  container.innerHTML = Object.keys(OUTCOME_META).map(oKey => {
    const meta = OUTCOME_META[oKey];
    const color = O_COLORS[oKey];
    const rows = byO[oKey] || [];

    // Count indikator (exclude io header rows)
    const inds = rows.filter(r => r.level !== 'io');
    const withTarget = inds.filter(r => r.target != null);
    const countStr = withTarget.length > 0
      ? `${withTarget.length} indikator dengan target`
      : `${inds.length} indikator`;

    const rowsHtml = rows.map(ind => {
      const st = LEVEL_STYLE[ind.level] || LEVEL_STYLE['io-ind'];
      const isHeader = ind.level === 'io';

      // Untuk header IO: tampilkan label section, tidak ada kolom angka
      if (isHeader) {
        return `<div style="
          background:${st.bg};
          border-bottom:1px solid ${st.border};
          padding:8px 16px 8px ${16 + st.indent}px;
          display:flex;align-items:center;gap:8px;
        ">
          <span style="font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
            color:${color};background:${color}18;padding:1px 7px;border-radius:999px;flex-shrink:0">${st.label}</span>
          <span style="font-size:.74rem;font-weight:700;color:#374151">${ind.label}</span>
        </div>`;
      }

      // Indikator / Output row
      const capVal = ind.capaian;
      const tgtVal = ind.target;
      const pct = (capVal != null && tgtVal) ? Math.min(Math.round(capVal/tgtVal*100),100) : null;
      const pctColor = pct == null ? '#D1D5DB' : pct>=80?'#059669':pct>=50?'#2563EB':pct>=25?'#D97706':'#DC2626';

      const tipeTag = ind.tipe ? `<span style="font-size:.55rem;font-weight:700;padding:1px 6px;border-radius:999px;
        background:${ind.tipe==='Standard LF'?'#DBEAFE':'#FEF3C7'};
        color:${ind.tipe==='Standard LF'?'#1D4ED8':'#92400E'};flex-shrink:0">${ind.tipe}</span>` : '';

      const targetDisplay = tgtVal != null ? `<span style="font-size:.8rem;font-weight:700;font-family:monospace;color:#374151">${tgtVal}</span>` 
        : `<span style="font-size:.72rem;color:#D1D5DB">—</span>`;
      const capDisplay = capVal != null ? `<span style="font-size:.8rem;font-weight:700;font-family:monospace;color:${pctColor}">${capVal}</span>` 
        : `<span style="font-size:.72rem;color:#D1D5DB">—</span>`;
      const pctDisplay = pct != null ? `<span style="font-size:.75rem;font-weight:800;font-family:monospace;color:${pctColor}">${pct}%</span>`
        : `<span style="font-size:.72rem;color:#D1D5DB">—</span>`;

      const progressBar = pct != null ? `<div style="width:60px;height:4px;background:#F3F4F6;border-radius:2px;overflow:hidden;flex-shrink:0">
          <div style="width:${pct}%;height:100%;background:${pctColor};border-radius:2px"></div>
        </div>` : '';

      return `<div style="
        background:${st.bg};
        border-bottom:1px solid ${st.border};
        padding:8px 16px 8px ${16 + st.indent}px;
        display:flex;align-items:center;gap:10px;
      ">
        <span style="font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
          color:#6B7280;background:#F3F4F6;padding:1px 6px;border-radius:999px;flex-shrink:0;white-space:nowrap">${ind.kode}</span>
        <span style="font-size:.74rem;font-weight:${st.bold?'600':'400'};color:#1F2937;flex:1;line-height:1.4">${ind.label}</span>
        ${tipeTag}
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:180px;justify-content:flex-end">
          <span style="font-size:.6rem;color:#9CA3AF;white-space:nowrap">Target</span>
          ${targetDisplay}
          <span style="font-size:.6rem;color:#9CA3AF;white-space:nowrap">Capaian</span>
          ${capDisplay}
          ${progressBar}
          ${pctDisplay}
        </div>
      </div>`;
    }).join('');

    return `<div class="itt-block" id="block-${oKey}">
      <div class="itt-header" style="--o-color:${color}" onclick="toggleBlock('${oKey}')">
        <div class="itt-header-left">
          <div>
            <div class="itt-label">${meta.label}</div>
            <div class="itt-name">${meta.short}</div>
          </div>
        </div>
        <div class="itt-header-right">
          <span style="font-size:.65rem;color:#9CA3AF">${countStr}</span>
          <button class="itt-toggle" onclick="event.stopPropagation();toggleBlock('${oKey}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
      </div>
      <div class="itt-body">
        <div style="padding:4px 0;border-top:1px solid #F3F4F6">
          <div style="padding:8px 16px;background:#FAFAFA;border-bottom:1px solid #F3F4F6">
            <p style="font-size:.7rem;color:#6B7280;margin:0;line-height:1.5">${meta.desc}</p>
          </div>
          <!-- Column header -->
          <div style="display:flex;align-items:center;gap:10px;padding:5px 16px;background:#F9FAFB;border-bottom:1px solid #E5E7EB">
            <span style="flex:1;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF">Indikator / Output</span>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:180px;justify-content:flex-end">
              <span style="font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF;white-space:nowrap">Target Y1</span>
              <span style="font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF;white-space:nowrap">Capaian</span>
              <span style="width:60px;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF;text-align:center">Progress</span>
              <span style="font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF">%</span>
            </div>
          </div>
          ${rowsHtml}
        </div>
      </div>
    </div>`;
  }).join('');

  // Expand O1 by default
  document.getElementById('block-O1')?.classList.add('open');
}

function toggleBlock(oKey) {
  document.getElementById('block-'+oKey)?.classList.toggle('open');
}
function toggleAll(open) {
  document.querySelectorAll('.itt-block').forEach(b => {
    open ? b.classList.add('open') : b.classList.remove('open');
  });
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  renderPage({}, null);
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  if (typeof initSidebar === 'function') initSidebar();
  if (typeof initAuth === 'function') initAuth(renderPage);
});
