/* ── LAYOUT ── */
.ph-wrap{display:flex;gap:0;height:calc(100vh - 60px - 84px);overflow:hidden}

/* ── LIST PANEL ── */
.ld-list{width:100%;min-width:0;flex-shrink:0;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.ph-wrap.detail-open .ld-list{width:300px;min-width:300px}
.ld-list-header{padding:12px 14px;border-bottom:1px solid #30363d;flex-shrink:0}
.ld-search{width:100%;padding:7px 10px;border:1px solid #30363d;border-radius:8px;font-size:.75rem;font-family:inherit;background:#1c2128;outline:none;transition:.15s}

.ld-select{padding:5px 8px;border:1px solid #30363d;border-radius:6px;font-size:.72rem;font-family:inherit;background:#1c2128;outline:none;width:100%}
.ld-select:focus{border-color:#F97316}
.ld-items{flex:1;overflow-y:auto}
.ld-items::-webkit-scrollbar{width:4px}
.ld-items::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}

/* ── GROUP HEADER di list ── */
.ld-group-header{padding:6px 14px 4px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;background:#1c2128;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:2}

/* ── LIST ITEM ── */
.ld-item{padding:9px 14px;border-bottom:1px solid #1c2128;cursor:pointer;transition:background .1s;border-left:3px solid transparent;display:flex;align-items:center;gap:9px}
.ld-item:hover{background:rgba(249,115,22,.12)}
.ld-item.active{background:rgba(249,115,22,.12);border-left-color:#F97316}
.ld-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ld-item-body{flex:1;min-width:0}
.ld-item-name{font-size:.78rem;font-weight:600;color:#e6edf3;margin-bottom:1px}
.ld-item-sub{font-size:.63rem;color:#7d8590}
.ld-item-badge{font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:999px;background:#21262d;color:#8b949e;flex-shrink:0}

/* ── DETAIL PANEL ── */
.ld-detail{flex:1;overflow-y:auto;background:#0d1117;display:none}
.ld-detail::-webkit-scrollbar{width:5px}
.ld-detail::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.ph-wrap.detail-open .ld-detail{display:block}
.det-inner{padding:18px}

.det-back{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#8b949e;font-size:.75rem;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s;margin-bottom:14px}
.det-back:hover{background:#1c2128;color:#e6edf3}
.det-back svg{width:14px;height:14px}

.det-pihak-hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.det-pihak-avatar{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.det-pihak-name{font-size:1.05rem;font-weight:800;color:#e6edf3;margin-bottom:4px}
.det-pihak-kat{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:999px;display:inline-block;margin-bottom:8px}
.det-pihak-desc{font-size:.76rem;color:#8b949e;line-height:1.6}

/* stat strip */
.det-stat-strip{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.det-stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 14px;text-align:center;flex:1;min-width:80px}
.det-stat-val{font-size:1.2rem;font-weight:800;color:#F97316;font-family:'JetBrains Mono',monospace;line-height:1}
.det-stat-lbl{font-size:.58rem;color:#7d8590;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* section */
.det-section{background:#161b22;border:1px solid #30363d;border-radius:10px;margin-bottom:10px;overflow:hidden}
.det-section-head{padding:9px 13px;border-bottom:1px solid #21262d;font-size:.72rem;font-weight:700;color:#e6edf3;display:flex;align-items:center;gap:6px}
.det-section-body{padding:10px 13px}

.peran-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #1c2128;align-items:flex-start}
.peran-item:last-child{border-bottom:none}
.peran-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.peran-domain{font-size:.65rem;font-weight:700;color:#7d8590;min-width:90px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.peran-aksi{font-size:.75rem;color:#c9d1d9;line-height:1.55}

/* anak list dalam detail */
.anak-chip-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:10px 13px}
.anak-chip{font-size:.68rem;font-weight:600;padding:3px 10px;border-radius:999px;background:rgba(249,115,22,.12);color:#F97316;border:1px solid rgba(249,115,22,.3);cursor:default}
.anak-chip.no-data{background:#21262d;color:#7d8590;border-color:#30363d}

/* empty */
.ph-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#7d8590;gap:10px;padding:40px}
.ph-empty svg{width:44px;height:44px;opacity:.25}
.ph-empty p{font-size:.8rem;text-align:center}
/* Card grid views */
.card-grid-wrap{display:grid;gap:10px;padding:12px;overflow-y:auto;flex:1}
.grid-xl{grid-template-columns:1fr 1fr}
.grid-md{grid-template-columns:1fr 1fr 1fr}
.grid-sm{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
.lst-wrap-ph{flex:1;overflow-y:auto}
.item-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 12px;cursor:pointer;transition:box-shadow .15s}
.item-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.item-card.active{border-color:#F97316;background:rgba(249,115,22,.12)}
.item-card-name{font-size:.78rem;font-weight:700;color:#e6edf3;margin-bottom:3px}
.item-card-sub{font-size:.64rem;color:#7d8590;line-height:1.4}
.grid-sm .item-card-sub{display:none}
.lst-item-ph{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid #21262d;cursor:pointer;transition:background .1s}

.lst-item-ph-name{font-size:.74rem;font-weight:600;color:#e6edf3;flex:1}
.lst-item-ph-right{font-size:.68rem;color:#7d8590}

.view-modes{display:flex;gap:3px}
.vmode{width:26px;height:26px;border:1px solid #30363d;border-radius:5px;background:#161b22;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#7d8590;transition:.12s}

.vmode.active{background:rgba(249,115,22,.12);border-color:#F97316;color:#F97316}

.mode-md .ld-item{padding:7px 14px}

.mode-sm .ld-item{padding:5px 14px}

.mode-lst .ld-item{padding:4px 14px}
.mode-lst .ld-item-name{font-size:.7rem}
.mode-lst .ld-item-sub{display:none}
.mode-lst .ld-item-badge{display:none}

function hasKw(text,kws){if(!text)return false;const t=String(text).toLowerCase();return kws.some(k=>t.includes(k));}
function getAllTeks(a,obs){return [a.nka||'',a.tka||'',a.nkp||'',a.tkp||'',obs?obs.st||'':'',obs?obs.kg||'':'',obs?obs.pf||'':'',obs?obs.lg||'':''].join(' ');}

// ── State ──
let ALL_ANAK=[], ALL_OBS=[], OBS_MAP={};
// Map: aktorKey → [{namaAnak, cbr}]
let AKTOR_ANAK_MAP={};

// ── Build map: siapa saja anak yang melibatkan tiap pihak ──
function buildAktorAnakMap(){
  AKTOR_ANAK_MAP={};
  ALL_ANAK.forEach(a=>{
    const obs=OBS_MAP[a.nama?.toLowerCase()]||null;
    const all=getAllTeks(a,obs).toLowerCase();
    // Kumpulkan semua pihak yang relevan untuk anak ini
    const pihakSet=new Set();
    // Dari semua domain
    Object.entries(RULES_KAT_W).forEach(([kat,cfg])=>{
      if(hasKw(all,cfg.kw)||
        (kat==='kesehatan'&&(a.ep||!a.ob||(!a.tr&&(a.level||'').includes('Parah'))))){
        cfg.pihak.forEach(p=>pihakSet.add(p));
        // Tambahan kontekstual
        if(kat==='kesehatan'){
          if(a.ep){pihakSet.add('dokter_puskesmas');pihakSet.add('dinkes');}
          if(hasKw(all,['terapi','fisioterapi'])){pihakSet.add('fisioterapis');pihakSet.add('cbm_global');pihakSet.add('ayo_indonesia');}
          if(hasKw(all,['kursi roda','alat bantu'])){pihakSet.add('dinsos');pihakSet.add('uptd_sosial');pihakSet.add('cbm_global');}
          if((a.level||'').includes('Parah')){pihakSet.add('pastor');pihakSet.add('tua_golo');}
        }
        if(kat==='pendidikan'){
          if(hasKw(all,['belum sekolah','tidak sekolah'])){pihakSet.add('kepala_sekolah');pihakSet.add('dindik');pihakSet.add('kepala_desa');}
        }
        if(kat==='sosial'){
          if(hasKw(all,['stigma','dikucilkan','bully'])){pihakSet.add('tua_golo');pihakSet.add('tokoh_adat');pihakSet.add('pastor');}
          if(hasKw(all,['gereja','pastor','doa','misa'])){pihakSet.add('pastor');pihakSet.add('katekis');pihakSet.add('kelompok_doa');}
          if(hasKw(all,['adat','tua golo'])){pihakSet.add('tua_golo');pihakSet.add('tokoh_adat');}
        }
        if(kat==='pemberdayaan'){
          if(hasKw(all,['ktp','akta','dtks','hak'])){pihakSet.add('kepala_desa');pihakSet.add('kasi_kesra');pihakSet.add('p2tp2a');}
          if((a.level||'').includes('Parah')){pihakSet.add('fisioterapis');pihakSet.add('cbm_global');}
        }
      }
    });
    // Selalu tambahkan CBR Worker dan SCN
    pihakSet.add('cbr_worker_lain');pihakSet.add('scn');
    // Keluarga selalu terlibat
    pihakSet.add('ibu');pihakSet.add('ayah');

    pihakSet.forEach(key=>{
      if(!AKTOR_ANAK_MAP[key])AKTOR_ANAK_MAP[key]=[];
      AKTOR_ANAK_MAP[key].push({nama:a.nama,cbr:a.cbr});
    });
  });
}

function renderPage(d,scnId){
  ALL_ANAK=d.anak||[];
  ALL_OBS=d.obs||[];
  OBS_MAP={};
  ALL_OBS.forEach(o=>{if(o.na)OBS_MAP[o.na.toLowerCase()]=o;});
  buildAktorAnakMap();

  // Populate filter kategori
  const fK=document.getElementById('flt-kat');
  Object.entries(KAT_LABEL).forEach(([k,l])=>{
    const o=document.createElement('option');o.value=k;o.textContent=l;fK.appendChild(o);
  });
  fK.addEventListener('change',renderList);
  document.getElementById('flt-search').addEventListener('input',renderList);
  renderList();
}

  const empty='<div style="text-align:center;padding:32px;color:#7d8590;font-size:.78rem;grid-column:1/-1">Tidak ada data</div>';
  // Build card & list from AKTOR_DATA filtered list
  const filteredList = AKTOR_DATA.filter(a=>{
    const q2=(document.getElementById('flt-search').value||'').toLowerCase();

  const cardHTML=filteredList.map((a,i)=>{
    const cfg=KATEGORI_CFG[a.kat]||{color:'#7d8590',bg:'#21262d'};
    return `<div class="item-card" data-key="${a.key}">

    </div>`;
  }).join('');
  const lstHTML2=filteredList.map(a=>{
    const cfg=KATEGORI_CFG[a.kat]||{color:'#7d8590'};
    return `<div class="lst-item-ph" data-key="${a.key}">
      <div style="width:7px;height:7px;border-radius:50%;background:${cfg.color};flex-shrink:0"></div>

      <span class="lst-item-ph-right">${KAT_LABEL[a.kat]||a.kat}</span>
    </div>`;
  }).join('');
  ['xl','md','sm'].forEach(v=>{document.getElementById('view-'+v).innerHTML=filteredList.length?cardHTML:empty;});
  document.getElementById('view-lst').innerHTML=filteredList.length?lstHTML2:'<div style="text-align:center;padding:32px;color:#7d8590;font-size:.78rem">Tidak ada data</div>';
