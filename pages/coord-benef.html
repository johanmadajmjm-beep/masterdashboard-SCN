<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CBR Coordinator — Beneficiary | MEL NLR</title>
<link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
<style>
.view-btns{display:flex;gap:4px}
.vbtn{width:32px;height:32px;border:1px solid #e5e7eb;border-radius:6px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b7280;transition:all .15s}
.vbtn:hover{background:#f9fafb;color:#374151}
.vbtn.active{background:#f0f4ff;border-color:#4f46e5;color:#4f46e5}
.vbtn svg{width:14px;height:14px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.anak-card{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:14px;border-left:3px solid var(--rc,#888)}
.anak-card .an{font-weight:700;font-size:.82rem;color:#111827;margin-bottom:4px}
.anak-card .am{font-size:.7rem;color:#9ca3af;margin-bottom:8px}
.anak-card .as{display:flex;gap:8px}
.anak-card .sc{text-align:center}<br>
.anak-card .sc .sv{font-size:1.2rem;font-weight:800}
.anak-card .sc .sl{font-size:.6rem;color:#9ca3af}
.kpi-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.kpi-box{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:14px;border-top:3px solid var(--kc,#d4500a)}
.kpi-v{font-size:1.6rem;font-weight:800;color:var(--kc,#d4500a);line-height:1}
.kpi-l{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin:5px 0 2px}
.kpi-s{font-size:.68rem;color:#9ca3af}
</style>
</head><body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <button class="topbar-menu-btn" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-breadcrumb">CBR Coordinator <span class="sep">›</span><span class="current">Beneficiary</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>
<div class="page">
  <div class="page-header"><h1>Data Beneficiary</h1><p>Profil lengkap seluruh anak dampingan — filter, cari, dan ubah tampilan.</p></div>

  <div class="kpi-4" id="kpi-benef"></div>

  <div class="card">
    <div class="card-head">
      <span class="card-title">Semua Beneficiary</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <select id="flt-ragam" style="padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem"><option value="">Semua Ragam</option></select>
        <select id="flt-level" style="padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem"><option value="">Semua Level</option></select>
        <select id="flt-cbr"   style="padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem"><option value="">Semua CBR Worker</option></select>
        <select id="flt-skor"  style="padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem">
          <option value="10">Semua Skor</option><option value="3">Kritis ≤3</option><option value="5">≤5</option>
        </select>
        <input id="flt-search" type="text" placeholder="Cari nama..." style="padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem;width:140px"/>
      </div>
      <!-- 4 View buttons (bug 6) -->
      <div class="view-btns">
        <button class="vbtn" id="vbtn-lg" onclick="setView('lg')" title="Grid Besar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="vbtn" id="vbtn-sm" onclick="setView('sm')" title="Grid Kecil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="4" height="4"/><rect x="10" y="3" width="4" height="4"/><rect x="17" y="3" width="4" height="4"/><rect x="3" y="10" width="4" height="4"/><rect x="10" y="10" width="4" height="4"/><rect x="17" y="10" width="4" height="4"/><rect x="3" y="17" width="4" height="4"/><rect x="10" y="17" width="4" height="4"/><rect x="17" y="17" width="4" height="4"/></svg>
        </button>
        <button class="vbtn active" id="vbtn-tbl" onclick="setView('tbl')" title="Tabel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
        </button>
      </div>
      <span class="badge badge-blue" id="badge-benef">—</span>
    </div>

    <!-- Tabel view (default) -->
    <div id="view-tbl" class="card-body no-pad"><div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Nama Anak</th><th>Pengasuh</th><th>Usia</th><th>JK</th>
          <th>Ragam</th><th>Level</th><th>Desa</th><th>CBR Worker</th>
          <th style="text-align:center">Skor Anak</th><th style="text-align:center">Skor Pengasuh</th>
          <th style="text-align:center">Epilepsi</th><th style="text-align:center">Terapi</th>
        </tr></thead>
        <tbody id="tbl-benef"></tbody>
      </table>
    </div></div>

    <!-- Grid besar view -->
    <div id="view-lg" class="card-body" style="display:none">
      <div class="card-grid" id="grid-lg"></div>
    </div>

    <!-- Grid kecil view -->
    <div id="view-sm" class="card-body" style="display:none">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px" id="grid-sm"></div>
    </div>
  </div>
</div></div></div>
<script>
const RC={'Fisik':'#dc2626','Intelektual':'#2563eb','Sensorik (penglihatan)':'#16a34a','Sensorik (pendengaran dan bicara)':'#d97706','Ganda':'#7c3aed','Lainnya':'#6b7280'};
const LC={'Parah (dukungan penuh)':'#dc2626','Sedang (dukungan reguler)':'#d97706','Rendah (sedikit dukungan)':'#16a34a'};
function sc(v){return v<=3?'#dc2626':v<=6?'#d97706':'#16a34a';}
function avg(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
let ALL=[],CURVIEW='tbl';

function setView(v){
  CURVIEW=v;
  ['lg','sm','tbl'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?'block':'none';
    document.getElementById('vbtn-'+x).classList.toggle('active',x===v);
  });
  renderList();
}

function renderPage(d,scnId){
  if(!d||!d.anak)return;
  ALL=d.anak;
  const total=ALL.length;
  const lk=ALL.filter(a=>a.gender==='L').length,pr=ALL.filter(a=>a.gender==='P').length;
  const parah=ALL.filter(a=>(a.level||'').includes('Parah')).length;
  const kritis=ALL.filter(a=>a.sp!=null&&a.sp<=3).length;
  const sp=ALL.map(a=>a.sp).filter(v=>v!=null);
  const avSP=sp.length?avg(sp).toFixed(1):'—';

  document.getElementById('kpi-benef').innerHTML=[
    {v:total,  l:'Total Beneficiary',s:lk+' L · '+pr+' P',     c:'#d4500a'},
    {v:avSP,   l:'Avg Skor Anak',   s:'Cantrill Ladder 1–10',   c:avSP!=='—'?sc(parseFloat(avSP)):'#9ca3af'},
    {v:kritis, l:'Kondisi Kritis',  s:'Skor ≤ 3',               c:'#dc2626'},
    {v:parah,  l:'Level Parah',     s:'Dukungan penuh',          c:'#dc2626'},
  ].map(k=>`<div class="kpi-box" style="--kc:${k.c}"><div class="kpi-v">${k.v}</div><div class="kpi-l">${k.l}</div><div class="kpi-s">${k.s}</div></div>`).join('');

  const ragams=[...new Set(ALL.map(a=>a.ragam).filter(Boolean))].sort();
  const levels=[...new Set(ALL.map(a=>a.level).filter(Boolean))].sort();
  const cbrs  =[...new Set(ALL.map(a=>a.cbr).filter(Boolean))].sort();
  const fR=document.getElementById('flt-ragam'),fL=document.getElementById('flt-level'),fC=document.getElementById('flt-cbr');
  ragams.forEach(r=>{const o=document.createElement('option');o.value=o.textContent=r;fR.appendChild(o);});
  levels.forEach(l=>{const o=document.createElement('option');o.value=o.textContent=l;fL.appendChild(o);});
  cbrs.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;fC.appendChild(o);});
  ['flt-ragam','flt-level','flt-cbr','flt-skor'].forEach(id=>document.getElementById(id).addEventListener('change',renderList));
  document.getElementById('flt-search').addEventListener('input',renderList);
  renderList();
}

function renderList(){
  const rg=document.getElementById('flt-ragam').value;
  const lv=document.getElementById('flt-level').value;
  const cb=document.getElementById('flt-cbr').value;
  const sk=parseFloat(document.getElementById('flt-skor').value||10);
  const q=(document.getElementById('flt-search').value||'').toLowerCase();
  const list=ALL.filter(a=>(!rg||a.ragam===rg)&&(!lv||a.level===lv)&&(!cb||a.cbr===cb)&&(a.sp==null||a.sp<=sk)&&(!q||(a.nama||'').toLowerCase().includes(q)));
  document.getElementById('badge-benef').textContent=list.length+' anak';

  if(CURVIEW==='tbl'){
    document.getElementById('tbl-benef').innerHTML=list.map((a,i)=>{
      const spCol=a.sp!=null?sc(a.sp):'#9ca3af';
      const saCol=a.sa!=null?sc(a.sa):'#9ca3af';
      return `<tr>
        <td style="color:#9ca3af">${i+1}</td>
        <td><strong>${a.nama||'—'}</strong></td>
        <td style="font-size:.72rem;color:#6b7280">${a.np||'—'}</td>
        <td class="mono" style="font-size:.72rem">${a.usia||'?'}</td>
        <td style="font-size:.72rem">${a.gender||'—'}</td>
        <td><span style="font-size:.7rem;font-weight:700;color:${RC[a.ragam]||'#888'}">${a.ragam||'—'}</span></td>
        <td style="font-size:.68rem;color:${LC[a.level]||'#9ca3af'}">${(a.level||'—').split('(')[0].trim()}</td>
        <td style="font-size:.72rem">${a.desa||'—'}</td>
        <td style="font-size:.72rem;color:#6b7280">${a.cbr||'—'}</td>
        <td style="text-align:center"><span class="mono" style="font-weight:800;color:${spCol}">${a.sp!=null?a.sp:'—'}</span></td>
        <td style="text-align:center"><span class="mono" style="font-weight:700;color:${saCol}">${a.sa!=null?a.sa:'—'}</span></td>
        <td style="text-align:center">${a.ep?'<span class="badge badge-amber">Ya</span>':'<span style="color:#e5e7eb">—</span>'}</td>
        <td style="text-align:center">${a.tr?'<span class="badge badge-green">Ya</span>':'<span style="color:#e5e7eb">—</span>'}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="13" style="text-align:center;padding:24px;color:#9ca3af">Tidak ada data.</td></tr>';
  }
  else if(CURVIEW==='lg'){
    document.getElementById('grid-lg').innerHTML=list.map(a=>`
      <div class="anak-card" style="--rc:${RC[a.ragam]||'#888'}">
        <div class="an">${a.nama||'—'}</div>
        <div class="am">${a.cbr||'—'} · ${a.desa||'—'}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          <span class="badge" style="background:${RC[a.ragam]||'#eee'}20;color:${RC[a.ragam]||'#888'};font-size:.62rem">${a.ragam||'—'}</span>
          <span class="badge" style="background:${LC[a.level]||'#eee'}20;color:${LC[a.level]||'#9ca3af'};font-size:.62rem">${(a.level||'—').split('(')[0].trim()}</span>
        </div>
        <div class="as">
          <div class="sc"><div class="sv" style="color:${a.sp!=null?sc(a.sp):'#9ca3af'}">${a.sp!=null?a.sp:'—'}</div><div class="sl">Skor Anak</div></div>
          <div class="sc" style="margin-left:10px"><div class="sv" style="color:${a.sa!=null?sc(a.sa):'#9ca3af'}">${a.sa!=null?a.sa:'—'}</div><div class="sl">Pengasuh</div></div>
        </div>
      </div>`).join('') || '<div style="color:#9ca3af;padding:20px;text-align:center">Tidak ada data.</div>';
  }
  else if(CURVIEW==='sm'){
    document.getElementById('grid-sm').innerHTML=list.map(a=>`
      <div style="background:white;border:1px solid #e5e7eb;border-radius:8px;padding:10px;border-left:3px solid ${RC[a.ragam]||'#888'}">
        <div style="font-weight:700;font-size:.72rem;color:#111827;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.nama||'—'}</div>
        <div style="font-size:.65rem;color:#9ca3af;margin-bottom:4px">${(a.ragam||'—').split(' ')[0]}</div>
        <div style="font-size:.9rem;font-weight:800;color:${a.sp!=null?sc(a.sp):'#9ca3af'}">${a.sp!=null?a.sp:'—'}</div>
      </div>`).join('') || '<div style="color:#9ca3af;padding:20px;text-align:center">Tidak ada data.</div>';
  }
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
buildSidebar();
const SESSION=AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({onScnSwitch:async function(scnId){const d=await API.get(scnId);if(window.renderPage)renderPage(d,scnId);}});
  AUTH.initSidebar('coord','c-benef');
  API.get(AUTH.getScnFilter()).then(d=>{if(window.renderPage)renderPage(d,AUTH.getScnFilter());});
}
</script></body></html>
