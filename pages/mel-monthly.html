<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — Monthly Monitoring | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    /* ── KPI CARDS ── */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
    @media(max-width:900px){.kpi-row{grid-template-columns:1fr 1fr}}
    .kpi-card{background:#fff;border:1px solid #e9eef6;border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:16px}
    .kpi-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.4rem}
    .kpi-info{}
    .kpi-val{font-size:1.7rem;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
    .kpi-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-top:5px}
    .kpi-sub{font-size:.7rem;color:#94a3b8;margin-top:2px}

    /* ── CHARTS ROW ── */
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
    @media(max-width:900px){.charts-row{grid-template-columns:1fr}}
    .mm-card{background:#fff;border:1px solid #e9eef6;border-radius:14px;overflow:hidden}
    .mm-card-head{padding:14px 20px 12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
    .mm-card-title{font-size:.88rem;font-weight:700;color:#0f172a}
    .mm-card-body{padding:16px 20px}

    /* ── TABLE SECTION ── */
    .section-row{display:grid;grid-template-columns:1fr 420px;gap:16px;margin-bottom:16px}
    @media(max-width:1100px){.section-row{grid-template-columns:1fr}}
    .sec-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:12px}
    .tbl-wrap{overflow-x:auto}
    .mm-table{width:100%;border-collapse:collapse;font-size:.78rem}
    .mm-table th{padding:9px 14px;text-align:left;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;background:#f8fafc;border-bottom:1px solid #e9eef6;white-space:nowrap}
    .mm-table td{padding:11px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    .mm-table tr:last-child td{border-bottom:none}
    .mm-table tr:hover td{background:#fafbfd}
    .keg-name-cell{display:flex;align-items:flex-start;gap:10px}
    .scn-dot{width:32px;height:32px;border-radius:8px;background:#F97316;color:#fff;font-size:.62rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.02em}
    .keg-name-text{font-weight:600;color:#0f172a;line-height:1.4;font-size:.78rem}
    .mm-outcome-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.64rem;font-weight:700}
    .num-l{color:#1d4ed8;font-weight:700}
    .num-p{color:#db2777;font-weight:700}
    .num-t{font-weight:800}
    .more-btn{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:1.1rem;padding:2px 6px;border-radius:4px}
    .more-btn:hover{background:#f1f5f9;color:#475569}

    /* ── NARASI ── */
    .narasi-outer{display:flex;flex-direction:column;gap:12px}
    .narasi-item{border:1px solid #e9eef6;border-radius:12px;overflow:hidden}
    .narasi-header{padding:12px 16px;background:#fafbfd;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid #e9eef6}
    .narasi-toggle{color:#F97316;font-size:.9rem;transition:transform .2s}
    .narasi-toggle.open{transform:rotate(0deg)}
    .narasi-toggle.closed{transform:rotate(-90deg)}
    .narasi-title-text{font-size:.8rem;font-weight:700;color:#0f172a;flex:1;line-height:1.4}
    .narasi-scn-badge{padding:2px 8px;background:#eff6ff;color:#1d4ed8;border-radius:6px;font-size:.62rem;font-weight:700;flex-shrink:0}
    .narasi-date{font-size:.67rem;color:#94a3b8;flex-shrink:0}
    .narasi-body{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .narasi-field{display:flex;gap:10px}
    .narasi-field-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem}
    .narasi-field-content{}
    .narasi-field-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:3px}
    .narasi-field-val{font-size:.74rem;color:#334155;line-height:1.65}

    /* ── TOPBAR EXTRAS ── */
    .topbar-filter-scn{padding:6px 14px;border:1px solid #e9eef6;border-radius:8px;font-size:.78rem;font-family:var(--font-body);background:#fff;color:#0f172a;cursor:pointer;min-width:160px}
    .btn-export{display:flex;align-items:center;gap:6px;padding:7px 16px;background:#fff;border:1px solid #e9eef6;border-radius:8px;font-size:.76rem;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap}
    .btn-export:hover{background:#f8fafc}

    /* ── MISC ── */
    .mm-loading{display:flex;align-items:center;justify-content:center;height:200px;color:#94a3b8;font-size:.82rem;gap:10px}
    .spin{width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#F97316;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:48px;color:#94a3b8;font-size:.82rem}
    .chart-canvas-wrap{position:relative;height:240px}
    .bar-chart-wrap{position:relative;height:260px}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Monthly Monitoring</span></div>
      </div>
      <div class="topbar-right" style="gap:8px">
        <select class="topbar-filter-scn" id="scn-filter-select" onchange="onSCNFilterChange(this.value)">
          <option value="">Semua SCN</option>
          <option value="manggarai">SCN Manggarai</option>
          <option value="banyuwangi">SCN Banyuwangi</option>
          <option value="jember">SCN Jember</option>
          <option value="situbondo">SCN Situbondo</option>
          <option value="kupang">SCN Kupang</option>
          <option value="tts">SCN TTS</option>
          <option value="palu">SCN Palu</option>
          <option value="sigi">SCN Sigi</option>
        </select>
        <button class="btn-export" onclick="exportLaporan()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Ekspor Laporan
        </button>
        <span class="scn-badge" id="scn-badge" style="display:none">—</span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <h1>Monthly Monitoring</h1>
        <p>Pemantauan kegiatan program CBR per SCN — peserta, outcome, capaian, dan narasi lapangan.</p>
      </div>
      <div id="page-content">
        <div class="mm-loading"><div class="spin"></div> Memuat data monitoring...</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
const GAS_BEN   = 'https://script.google.com/macros/s/AKfycbzY4CfLPnW-Q9lTyvfkbkEgmPeVdNVLeVm7zLBxHAX4xquocm06BoKvt-y8sZMatGBA/exec';
const SCN_LABEL = {manggarai:'MGR',banyuwangi:'BWI',jember:'JBR',situbondo:'STB',kupang:'KPG',tts:'TTS',palu:'PLU',sigi:'SGI'};
const SCN_FULL  = {manggarai:'SCN Manggarai',banyuwangi:'SCN Banyuwangi',jember:'SCN Jember',situbondo:'SCN Situbondo',kupang:'SCN Kupang',tts:'SCN TTS',palu:'SCN Palu',sigi:'SCN Sigi'};
const SCN_COLOR = {manggarai:'#F97316',banyuwangi:'#1d4ed8',jember:'#16a34a',situbondo:'#7c3aed',kupang:'#0ea5e9',tts:'#d97706',palu:'#db2777',sigi:'#475569'};
const OUT_COLOR = {'O1':'#F97316','O2':'#1E293B','O3':'#2563eb','O4':'#16a34a','O5':'#7c3aed','O6':'#0ea5e9','O7':'#d97706'};
const NARASI_ICON = {tangible:'📋',rtl:'🎯',evaluasi:'📊',lesson:'💡'};

let ALL_DATA     = [];
let FILTERED     = [];
let ACTIVE_SCN   = null;
let chartPeserta = null;
let chartOutcome = null;

// ── HELPERS ──────────────────────────────────────────────────
function num(v){ return parseInt(v)||0; }

function fmtTgl(v){
  if(!v) return '—';
  const s = String(v);
  // ISO datetime → format pendek
  if(s.includes('T')){
    const d = new Date(s);
    if(!isNaN(d)) return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  }
  // DD/MM/YYYY
  if(s.match(/^\d{2}\/\d{2}\/\d{4}$/)) return s;
  // YYYY-MM-DD
  if(s.match(/^\d{4}-\d{2}-\d{2}$/)){
    const [y,m,d] = s.split('-');
    const names = ['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
    return `${d} ${names[parseInt(m)]} ${y}`;
  }
  return s;
}

function destroyChart(c){ if(c){ try{ c.destroy(); }catch(e){} } return null; }

// ── FETCH ────────────────────────────────────────────────────
async function fetchMonthly(scnId){
  const url = scnId
    ? `${GAS_BEN}?sheet=monthly&scn=${scnId}`
    : `${GAS_BEN}?sheet=monthly`;
  try{
    const r = await fetch(url);
    const j = await r.json();
    return j.data||[];
  }catch(e){ console.warn('[Monthly]',e.message); return []; }
}

// ── FILTER CHANGE ─────────────────────────────────────────────
async function onSCNFilterChange(scnId){
  ACTIVE_SCN = scnId||null;
  document.getElementById('page-content').innerHTML = '<div class="mm-loading"><div class="spin"></div> Memuat data...</div>';
  ALL_DATA = await fetchMonthly(ACTIVE_SCN);
  FILTERED = ALL_DATA;
  if(!ALL_DATA.length){
    document.getElementById('page-content').innerHTML = '<div class="empty-state">Belum ada data monitoring untuk SCN ini.<br>Upload data melalui MEL SCN Tools terlebih dahulu.</div>';
    return;
  }
  buildUI();
}

// ── RENDER ───────────────────────────────────────────────────
async function renderPage(d, scnId){
  ACTIVE_SCN = scnId||null;
  // Sinkronkan dropdown dengan filter sidebar
  const sel = document.getElementById('scn-filter-select');
  if(sel) sel.value = ACTIVE_SCN||'';
  document.getElementById('page-content').innerHTML = '<div class="mm-loading"><div class="spin"></div> Memuat data monitoring...</div>';
  ALL_DATA = await fetchMonthly(ACTIVE_SCN);
  FILTERED = ALL_DATA;
  if(!ALL_DATA.length){
    document.getElementById('page-content').innerHTML = '<div class="empty-state">Belum ada data monitoring.<br>Upload data melalui MEL SCN Tools terlebih dahulu.</div>';
    return;
  }
  buildUI();
}

function buildUI(){
  const data = FILTERED;
  const scns = [...new Set(data.map(r=>r.scn).filter(Boolean))];
  const multiSCN = scns.length > 1;

  // Aggregasi
  const totalKeg  = data.length;
  const totalL    = data.reduce((s,r)=>s+num(r.laki),0);
  const totalP    = data.reduce((s,r)=>s+num(r.perempuan),0);
  const totalPes  = totalL+totalP;
  const totalU25  = data.reduce((s,r)=>s+num(r.u25),0);
  const totalU26  = data.reduce((s,r)=>s+num(r.u26),0);
  const totalDisab= data.reduce((s,r)=>s+num(r.disab),0);

  const pesKat = [
    {lbl:'CBR Worker',   val:data.reduce((s,r)=>s+num(r.cbr),0),       color:'#F97316'},
    {lbl:'Guru',         val:data.reduce((s,r)=>s+num(r.guru),0),       color:'#1d4ed8'},
    {lbl:'Pengasuh/Ortu',val:data.reduce((s,r)=>s+num(r.pengasuh),0),   color:'#16a34a'},
    {lbl:'Nakes',        val:data.reduce((s,r)=>s+num(r.nakes),0),      color:'#7c3aed'},
    {lbl:'Staff Mitra',  val:data.reduce((s,r)=>s+num(r.staff),0),      color:'#0ea5e9'},
    {lbl:'Pemerintah',   val:data.reduce((s,r)=>s+num(r.pemerintah),0), color:'#d97706'},
    {lbl:'Lainnya',      val:data.reduce((s,r)=>s+num(r.lainnya),0),    color:'#94a3b8'},
  ];

  const outCount = {};
  data.forEach(r=>{ const o=r.outcome||'Lainnya'; outCount[o]=(outCount[o]||0)+1; });

  // Injeksi HTML
  document.getElementById('page-content').innerHTML = `
    <!-- KPI -->
    <div class="kpi-row">
      ${kpiCard('📋','#fff7ed','#F97316',totalKeg,'Total Kegiatan',scns.length+' SCN aktif')}
      ${kpiCard('👥','#eff6ff','#1d4ed8',totalPes,'Total Peserta',totalL+'L / '+totalP+'P')}
      ${kpiCard('👤','#dbeafe','#2563eb',totalU25+' / '+totalU26,'Usia ≤25 / ≥26','disagregasi usia peserta')}
      ${kpiCard('♿','#f5f3ff','#7c3aed',totalDisab,'Peserta Disabilitas',Math.round(totalDisab/Math.max(totalPes,1)*100)+'% dari total')}
    </div>

    <!-- CHARTS -->
    <div class="charts-row">
      <div class="mm-card">
        <div class="mm-card-head"><span class="mm-card-title">Peserta per Kategori</span></div>
        <div class="mm-card-body"><div class="bar-chart-wrap"><canvas id="chart-peserta"></canvas></div></div>
      </div>
      <div class="mm-card">
        <div class="mm-card-head"><span class="mm-card-title">Distribusi Outcome</span></div>
        <div class="mm-card-body"><div class="chart-canvas-wrap"><canvas id="chart-outcome"></canvas></div></div>
      </div>
    </div>

    <!-- TABLE + NARASI -->
    <div class="section-row">
      <!-- TABEL -->
      <div>
        <div class="sec-label">Daftar Kegiatan</div>
        <div class="mm-card">
          <div class="mm-card-head">
            <span class="mm-card-title">Semua Kegiatan</span>
            <span style="font-size:.72rem;color:#94a3b8" id="keg-count">${totalKeg} kegiatan</span>
          </div>
          <div style="padding:0">
            <div class="tbl-wrap">
              <table class="mm-table">
                <thead><tr>
                  <th>Nama Kegiatan</th><th>Tanggal</th><th>Lokasi</th>
                  <th>Outcome</th><th style="text-align:center">L</th>
                  <th style="text-align:center">P</th><th style="text-align:center">Total</th>
                  <th>Pelaksana</th><th></th>
                </tr></thead>
                <tbody id="keg-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- NARASI -->
      <div>
        <div class="sec-label">Narasi & Pembelajaran</div>
        <div class="narasi-outer" id="narasi-list"></div>
      </div>
    </div>
  `;

  // Render charts
  renderChartPeserta(pesKat);
  renderChartOutcome(outCount);

  // Render tabel & narasi
  renderTable(data, multiSCN);
  renderNarasi(data);
}

function kpiCard(icon, bg, color, val, lbl, sub){
  return `<div class="kpi-card">
    <div class="kpi-icon" style="background:${bg};color:${color}">${icon}</div>
    <div class="kpi-info">
      <div class="kpi-val" style="color:${color}">${val}</div>
      <div class="kpi-lbl">${lbl}</div>
      <div class="kpi-sub">${sub}</div>
    </div>
  </div>`;
}

function renderChartPeserta(pesKat){
  const el = document.getElementById('chart-peserta');
  if(!el) return;
  chartPeserta = destroyChart(chartPeserta);
  chartPeserta = new Chart(el.getContext('2d'),{
    type:'bar',
    data:{
      labels: pesKat.map(k=>k.lbl),
      datasets:[{
        label:'Peserta',
        data: pesKat.map(k=>k.val),
        backgroundColor: pesKat.map(k=>k.color+'cc'),
        borderRadius:6, borderSkipped:false
      }]
    },
    options:{
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw} orang`}} },
      scales:{
        x:{grid:{color:'#f1f5f9'},ticks:{font:{size:10}}},
        y:{grid:{display:false},ticks:{font:{size:11}}}
      }
    }
  });
}

function renderChartOutcome(outCount){
  const el = document.getElementById('chart-outcome');
  if(!el) return;
  chartOutcome = destroyChart(chartOutcome);
  const keys = Object.keys(outCount);
  const vals = Object.values(outCount);
  const total = vals.reduce((a,b)=>a+b,0);
  chartOutcome = new Chart(el.getContext('2d'),{
    type:'doughnut',
    data:{
      labels: keys.map(k=>{
        const pct = Math.round(outCount[k]/total*100);
        return `${k} (${pct}%)`;
      }),
      datasets:[{
        data: vals,
        backgroundColor: keys.map(k=>OUT_COLOR[k]||'#94a3b8'),
        borderColor:'#fff', borderWidth:3
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'62%',
      plugins:{
        legend:{ position:'right', labels:{ font:{size:11}, padding:12, usePointStyle:true } },
        tooltip:{ callbacks:{ label:c=>` ${c.label}: ${c.raw} kegiatan` } }
      }
    }
  });
}

function renderTable(rows, showScn){
  document.getElementById('keg-count').textContent = rows.length+' kegiatan';
  document.getElementById('keg-body').innerHTML = rows.map((r,i)=>{
    const scn    = r.scn||'';
    const color  = SCN_COLOR[scn]||'#F97316';
    const badge  = SCN_LABEL[scn]||scn.toUpperCase().slice(0,3);
    const outC   = OUT_COLOR[r.outcome]||'#64748b';
    return `<tr>
      <td>
        <div class="keg-name-cell">
          <div class="scn-dot" style="background:${color}">${badge}</div>
          <span class="keg-name-text">${r.nama_kegiatan||'—'}</span>
        </div>
      </td>
      <td style="white-space:nowrap;color:#64748b;font-size:.74rem">${fmtTgl(r.tanggal)}</td>
      <td style="color:#64748b;font-size:.74rem;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.lokasi||'—'}</td>
      <td><span class="mm-outcome-pill" style="background:${outC}18;color:${outC}">${r.outcome||'—'}</span></td>
      <td style="text-align:center" class="num-l">${num(r.laki)}</td>
      <td style="text-align:center" class="num-p">${num(r.perempuan)}</td>
      <td style="text-align:center" class="num-t">${num(r.total)}</td>
      <td style="color:#64748b;font-size:.72rem">${r.pelaksana||'—'}</td>
      <td><button class="more-btn" onclick="showDetail(${i})">⋮</button></td>
    </tr>`;
  }).join('')||'<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:24px">Tidak ada data</td></tr>';
}

function renderNarasi(rows){
  const el = document.getElementById('narasi-list');
  if(!el) return;
  const withNarasi = rows.filter(r=>r.tangible_output||r.follow_up||r.evaluasi||r.lesson_learnt);
  if(!withNarasi.length){
    el.innerHTML = '<div style="color:#94a3b8;font-size:.78rem;padding:12px 0">Belum ada narasi kegiatan.</div>';
    return;
  }
  el.innerHTML = withNarasi.map((r,i)=>{
    const scn   = r.scn||'';
    const color = SCN_COLOR[scn]||'#F97316';
    const fields = [
      r.tangible_output ? {icon:'📋',bg:'#fff7ed',lbl:'Tangible Output',val:r.tangible_output} : null,
      r.follow_up       ? {icon:'🎯',bg:'#eff6ff',lbl:'Rencana Tindak Lanjut',val:r.follow_up} : null,
      r.evaluasi        ? {icon:'📊',bg:'#f0fdf4',lbl:'Evaluasi',val:r.evaluasi} : null,
      r.lesson_learnt   ? {icon:'💡',bg:'#fefce8',lbl:'Lesson Learnt',val:r.lesson_learnt} : null,
    ].filter(Boolean);
    return `
    <div class="narasi-item">
      <div class="narasi-header" onclick="toggleNarasi(${i})">
        <span class="narasi-toggle open" id="ntoggle-${i}">▾</span>
        <span class="narasi-title-text">${r.nama_kegiatan||'Kegiatan'}</span>
        ${scn ? `<span class="narasi-scn-badge" style="background:${color}18;color:${color}">${SCN_LABEL[scn]||scn}</span>` : ''}
        <span class="narasi-date">${fmtTgl(r.tanggal)}</span>
      </div>
      <div class="narasi-body" id="nbody-${i}">
        ${fields.map(f=>`
        <div class="narasi-field">
          <div class="narasi-field-icon" style="background:${f.bg}">${f.icon}</div>
          <div class="narasi-field-content">
            <div class="narasi-field-label">${f.lbl}</div>
            <div class="narasi-field-val">${f.val}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleNarasi(i){
  const body   = document.getElementById('nbody-'+i);
  const toggle = document.getElementById('ntoggle-'+i);
  if(!body||!toggle) return;
  const open = body.style.display!=='none';
  body.style.display   = open ? 'none' : 'grid';
  toggle.textContent   = open ? '▸' : '▾';
  toggle.className     = 'narasi-toggle '+(open?'closed':'open');
}

function showDetail(i){
  const r = FILTERED[i];
  if(!r) return;
  alert([
    'DETAIL KEGIATAN',
    '─────────────────────────',
    'Nama: '+r.nama_kegiatan,
    'Tanggal: '+fmtTgl(r.tanggal),
    'Lokasi: '+(r.lokasi||'—'),
    'Outcome: '+(r.outcome||'—'),
    'Pelaksana: '+(r.pelaksana||'—'),
    '',
    'PESERTA',
    'Laki-laki: '+num(r.laki)+' | Perempuan: '+num(r.perempuan)+' | Total: '+num(r.total),
    'Usia ≤25: '+num(r.u25)+' | Usia ≥26: '+num(r.u26),
    'Disabilitas: '+num(r.disab)+' | Non: '+num(r.non_disab),
    '',
    'INSTITUSI',
    'Guru: '+num(r.guru)+' | Pengasuh: '+num(r.pengasuh)+' | CBR: '+num(r.cbr),
    'Nakes: '+num(r.nakes)+' | Staff: '+num(r.staff)+' | Pemerintah: '+num(r.pemerintah),
    'Lainnya: '+num(r.lainnya)+' | Total Institusi: '+num(r.total_inst),
  ].join('\n'));
}

function exportLaporan(){
  const rows = FILTERED;
  if(!rows.length){ alert('Tidak ada data untuk diekspor.'); return; }
  const headers = ['SCN','Nama Kegiatan','Tanggal','Lokasi','Outcome','Pelaksana','Laki','Perempuan','Total','≤25','≥26','Disabilitas','Tangible Output','RTL','Evaluasi','Lesson Learnt'];
  const csv = [headers.join(','),
    ...rows.map(r=>[
      r.scn, '"'+(r.nama_kegiatan||'').replace(/"/g,'""')+'"',
      fmtTgl(r.tanggal), '"'+(r.lokasi||'')+'"', r.outcome, '"'+(r.pelaksana||'')+'"',
      num(r.laki), num(r.perempuan), num(r.total), num(r.u25), num(r.u26), num(r.disab),
      '"'+(r.tangible_output||'').replace(/"/g,'""')+'"',
      '"'+(r.follow_up||'').replace(/"/g,'""')+'"',
      '"'+(r.evaluasi||'').replace(/"/g,'""')+'"',
      '"'+(r.lesson_learnt||'').replace(/"/g,'""')+'"',
    ].join(','))
  ].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'monthly-monitoring-'+(ACTIVE_SCN||'all')+'-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
