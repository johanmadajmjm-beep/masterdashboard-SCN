<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — Data Stakeholder | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    .sk-grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
    .sk-kpi{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:14px 16px}
    .sk-kpi-val{font-size:1.5rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:#F97316;line-height:1}
    .sk-kpi-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin-top:4px}
    .sk-kpi-sub{font-size:.63rem;color:var(--gray-400);margin-top:2px}
    .sk-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .sk-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
    @media(max-width:900px){.sk-grid-2,.sk-grid-3{grid-template-columns:1fr}}
    .sk-card{background:#fff;border:1px solid var(--gray-200);border-radius:12px;overflow:hidden}
    .sk-card-head{padding:12px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
    .sk-card-title{font-size:.84rem;font-weight:700;color:var(--gray-900)}
    .sk-card-sub{font-size:.68rem;color:var(--gray-400)}
    .sk-card-body{padding:14px 16px}
    /* SCN tabs */
    .scn-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .scn-tab{padding:5px 14px;border-radius:999px;border:1px solid var(--gray-200);font-size:.72rem;font-weight:600;cursor:pointer;background:#fff;color:var(--gray-600);transition:all .15s}
    .scn-tab.active{background:#F97316;color:#fff;border-color:#F97316}
    /* Tabel */
    .sk-table{width:100%;border-collapse:collapse;font-size:.77rem}
    .sk-table th{padding:8px 12px;text-align:left;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);border-bottom:2px solid var(--gray-100);white-space:nowrap}
    .sk-table td{padding:9px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
    .sk-table tr:last-child td{border-bottom:none}
    .sk-table tr:hover td{background:#fafbfd}
    .sk-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.64rem;font-weight:700}
    .sk-pill-kat{background:#fff7ed;color:#c2410c}
    .sk-pill-scn{background:#eff6ff;color:#1d4ed8}
    /* Bar gender */
    .gender-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;margin-top:4px}
    .gender-l{background:#1d4ed8}
    .gender-p{background:#db2777}
    /* Loading */
    .sk-loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--gray-400);font-size:.82rem;gap:10px}
    .spin{width:20px;height:20px;border:2px solid var(--gray-200);border-top-color:#F97316;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:40px;color:var(--gray-400);font-size:.82rem}
    .tbl-wrap{overflow-x:auto}
    /* KPI per SCN chart */
    .scn-compare-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)}
    .scn-compare-row:last-child{border-bottom:none}
    .scn-compare-name{font-size:.75rem;font-weight:700;width:120px;flex-shrink:0}
    .scn-compare-bar{flex:1;height:7px;background:var(--gray-100);border-radius:4px;overflow:hidden}
    .scn-compare-fill{height:100%;border-radius:4px;background:#F97316;transition:width .4s}
    .scn-compare-val{font-size:.72rem;font-weight:700;font-family:'JetBrains Mono',monospace;width:36px;text-align:right;color:#F97316}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Data Stakeholder</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge" style="display:none">—</span>
        <span id="data-source-badge" style="display:none;font-size:.7rem;padding:3px 10px;border-radius:999px;font-weight:600"></span>
        <span id="sync-time" style="display:none;font-size:.7rem;color:var(--gray-400)"></span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <h1>Data Stakeholder</h1>
        <p>Keterlibatan stakeholder program CBR per SCN — kategori, gender, instansi, dan kegiatan.</p>
      </div>
      <div id="page-content">
        <div class="sk-loading"><div class="spin"></div> Memuat data stakeholder...</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
const GAS_BEN = 'https://script.google.com/macros/s/AKfycbzY4CfLPnW-Q9lTyvfkbkEgmPeVdNVLeVm7zLBxHAX4xquocm06BoKvt-y8sZMatGBA/exec';
const SCN_LIST = ['manggarai','banyuwangi','jember','situbondo','kupang','tts','palu','sigi'];
const SCN_LABEL = {manggarai:'Manggarai',banyuwangi:'Banyuwangi',jember:'Jember',situbondo:'Situbondo',kupang:'Kupang',tts:'TTS',palu:'Palu',sigi:'Sigi'};
const KAT_COLOR = {'Anak dan Remaja Disabilitas':'#F97316','CBR Worker':'#1E293B','Pengasuh Orang Tua':'#2563eb','Nakes':'#16a34a','Guru':'#7c3aed','Staff Mitra':'#0ea5e9','Pemangku Kepentingan':'#d97706','Anak dan Remaja Non Disabilitas':'#fb923c'};

let ALL_DATA = [];
let ACTIVE_SCN = null;

// ── FETCH DATA ────────────────────────────────────────────────
async function fetchStakeholder(scnId) {
  const url = scnId
    ? `${GAS_BEN}?sheet=stakeholder&scn=${scnId}`
    : `${GAS_BEN}?sheet=stakeholder`;
  try {
    const resp = await fetch(url);
    const json = await resp.json();
    return json.data || [];
  } catch(e) {
    console.warn('[Stakeholder] Fetch error:', e.message);
    return [];
  }
}

// ── RENDER ────────────────────────────────────────────────────
async function renderPage(d, scnId) {
  ACTIVE_SCN = scnId || null;
  document.getElementById('page-content').innerHTML = '<div class="sk-loading"><div class="spin"></div> Memuat data stakeholder...</div>';

  ALL_DATA = await fetchStakeholder(scnId);

  if (!ALL_DATA.length) {
    document.getElementById('page-content').innerHTML = '<div class="empty-state">Belum ada data stakeholder. Upload data melalui MEL SCN Tools terlebih dahulu.</div>';
    return;
  }

  const scns = scnId ? [scnId] : [...new Set(ALL_DATA.map(r => r.scn).filter(Boolean))];
  buildUI(scns);
}

function buildUI(scns) {
  const data = ALL_DATA;
  const total = data.length;
  const laki  = data.filter(r => (r.jenis_kelamin||'').toLowerCase().includes('laki')).length;
  const perp  = data.filter(r => (r.jenis_kelamin||'').toLowerCase().includes('perempuan')).length;
  const kegSet = new Set(data.map(r => r.nama_kegiatan).filter(Boolean));
  const insSet = new Set(data.map(r => r.instansi).filter(Boolean));

  // Kategori counts
  const katCount = {};
  data.forEach(r => { const k = r.kategori||'Lainnya'; katCount[k] = (katCount[k]||0) + 1; });
  const katSorted = Object.entries(katCount).sort((a,b) => b[1]-a[1]);

  // SCN counts
  const scnCount = {};
  data.forEach(r => { const s = r.scn||'?'; scnCount[s] = (scnCount[s]||0) + 1; });

  document.getElementById('page-content').innerHTML = `
    ${scns.length > 1 ? buildSCNTabs(scns, scnCount) : ''}
    <div class="sk-grid-4">
      ${kpi(total, 'Total Stakeholder', scns.length+' SCN aktif')}
      ${kpi(laki+'L / '+perp+'P', 'Gender', Math.round(laki/total*100)+'% Laki-laki')}
      ${kpi(kegSet.size, 'Kegiatan', 'jenis kegiatan unik')}
      ${kpi(insSet.size, 'Instansi', 'lembaga terlibat')}
    </div>
    <div class="sk-grid-2">
      <div class="sk-card">
        <div class="sk-card-head"><span class="sk-card-title">Distribusi per Kategori</span></div>
        <div class="sk-card-body" id="kat-bars"></div>
      </div>
      <div class="sk-card">
        <div class="sk-card-head"><span class="sk-card-title">Gender per Kategori</span></div>
        <div class="sk-card-body" id="gender-bars"></div>
      </div>
    </div>
    ${scns.length > 1 ? `
    <div class="sk-card" style="margin-bottom:16px">
      <div class="sk-card-head"><span class="sk-card-title">Perbandingan Stakeholder per SCN</span><span class="sk-card-sub">Total keterlibatan</span></div>
      <div class="sk-card-body" id="scn-compare"></div>
    </div>` : ''}
    <div class="sk-card">
      <div class="sk-card-head">
        <span class="sk-card-title">Daftar Stakeholder</span>
        <span class="sk-card-sub" id="tbl-count">${total} orang</span>
      </div>
      <div class="sk-card-body" style="padding:0">
        <div class="tbl-wrap">
          <table class="sk-table">
            <thead><tr>
              ${scns.length > 1 ? '<th>SCN</th>' : ''}
              <th>Nama</th><th>Kategori</th><th>Instansi</th><th>Posisi</th>
              <th style="text-align:center">Usia</th><th style="text-align:center">J/K</th>
              <th>Kegiatan</th><th style="text-align:center">∑ Keg</th>
            </tr></thead>
            <tbody id="tbl-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  // Kat bars
  const maxKat = katSorted[0]?.[1]||1;
  document.getElementById('kat-bars').innerHTML = katSorted.map(([k,v]) => `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
      <span style="font-size:.72rem;font-weight:600;width:180px;flex-shrink:0;color:${KAT_COLOR[k]||'#64748b'}">${k}</span>
      <div style="flex:1;height:7px;background:var(--gray-100);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${Math.round(v/maxKat*100)}%;background:${KAT_COLOR[k]||'#64748b'};border-radius:4px"></div>
      </div>
      <span style="font-size:.72rem;font-weight:700;font-family:monospace;width:32px;text-align:right">${v}</span>
    </div>`).join('');

  // Gender per kategori
  document.getElementById('gender-bars').innerHTML = katSorted.map(([k]) => {
    const rows = data.filter(r => (r.kategori||'Lainnya') === k);
    const l = rows.filter(r => (r.jenis_kelamin||'').toLowerCase().includes('laki')).length;
    const p = rows.filter(r => (r.jenis_kelamin||'').toLowerCase().includes('perempuan')).length;
    const t = rows.length || 1;
    return `
    <div style="padding:7px 0;border-bottom:1px solid var(--gray-100)">
      <div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:3px">
        <span style="font-weight:600;color:${KAT_COLOR[k]||'#64748b'}">${k}</span>
        <span style="color:var(--gray-400)">${l}L / ${p}P</span>
      </div>
      <div class="gender-bar">
        <div class="gender-l" style="width:${Math.round(l/t*100)}%"></div>
        <div class="gender-p" style="width:${Math.round(p/t*100)}%"></div>
      </div>
    </div>`;
  }).join('');

  // SCN compare
  if (scns.length > 1 && document.getElementById('scn-compare')) {
    const maxScn = Math.max(...Object.values(scnCount), 1);
    document.getElementById('scn-compare').innerHTML = Object.entries(scnCount)
      .sort((a,b) => b[1]-a[1])
      .map(([s,v]) => `
      <div class="scn-compare-row">
        <span class="scn-compare-name">${SCN_LABEL[s]||s}</span>
        <div class="scn-compare-bar"><div class="scn-compare-fill" style="width:${Math.round(v/maxScn*100)}%"></div></div>
        <span class="scn-compare-val">${v}</span>
      </div>`).join('');
  }

  // SCN tabs click
  document.querySelectorAll('.scn-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.scn-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const filterScn = tab.dataset.scn;
      const filtered = filterScn === 'all' ? data : data.filter(r => r.scn === filterScn);
      renderTable(filtered, scns.length > 1);
    });
  });

  // Tabel
  renderTable(data, scns.length > 1);
}

function buildSCNTabs(scns, scnCount) {
  const tabs = ['<div class="scn-tabs">',
    `<button class="scn-tab active" data-scn="all">Semua (${Object.values(scnCount).reduce((a,b)=>a+b,0)})</button>`,
    ...scns.filter(s => scnCount[s]).map(s =>
      `<button class="scn-tab" data-scn="${s}">${SCN_LABEL[s]||s} (${scnCount[s]||0})</button>`
    ),
    '</div>'].join('');
  return tabs;
}

function renderTable(rows, showScn) {
  document.getElementById('tbl-count').textContent = rows.length + ' orang';
  document.getElementById('tbl-body').innerHTML = rows.map(r => `
    <tr>
      ${showScn ? `<td><span class="sk-pill sk-pill-scn">${SCN_LABEL[r.scn]||r.scn||'—'}</span></td>` : ''}
      <td style="font-weight:600">${r.nama||'—'}</td>
      <td><span class="sk-pill sk-pill-kat" style="background:${KAT_COLOR[r.kategori]||'#f1f5f9'}22;color:${KAT_COLOR[r.kategori]||'#64748b'}">${r.kategori||'—'}</span></td>
      <td style="color:var(--gray-600)">${r.instansi||'—'}</td>
      <td style="color:var(--gray-600)">${r.posisi||'—'}</td>
      <td style="text-align:center">${r.usia||'—'}</td>
      <td style="text-align:center">${r.jenis_kelamin||'—'}</td>
      <td style="font-size:.7rem;color:var(--gray-500);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${r.nama_kegiatan||''}">${r.nama_kegiatan||'—'}</td>
      <td style="text-align:center;font-weight:700">${r.jumlah_kegiatan||0}</td>
    </tr>`).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--gray-400);padding:20px">Tidak ada data</td></tr>';
}

function kpi(val, lbl, sub) {
  return `<div class="sk-kpi"><div class="sk-kpi-val">${val}</div><div class="sk-kpi-lbl">${lbl}</div><div class="sk-kpi-sub">${sub}</div></div>`;
}

// ── INIT ─────────────────────────────────────────────────────
buildSidebar();
const SESSION = AUTH.requireAuth('../index.html');
if (SESSION) {
  AUTH.applySession({
    onScnSwitch: function(scnId) { renderPage(null, scnId); }
  });
  AUTH.initSidebar('mel', 'm-stake');
  renderPage(null, AUTH.getScnFilter());
}
</script>
</body>
</html>
