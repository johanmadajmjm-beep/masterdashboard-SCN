<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<title>CBR Worker — Aktivitas | MEL NLR</title>
<link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
<style>
.form-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.form-chip{padding:5px 12px;border-radius:999px;font-size:.7rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.form-chip.active{border-color:var(--nlr-600,#d4500a);background:rgba(212,80,10,.08);color:#d4500a}
.form-chip.inactive{background:#f3f4f6;color:#6b7280}
</style>
</head><body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <button class="topbar-menu-btn" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-breadcrumb">CBR Worker <span class="sep">›</span><span class="current">Aktivitas</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>
<div class="page">
  <div class="page-header"><h1>Aktivitas & Kunjungan</h1><p>Riwayat semua aktivitas CBR Worker — 6 form KoboToolbox.</p></div>
  <div class="stat-grid" id="kpi-akt"></div>
  <!-- Filter form -->
  <div class="form-chips" id="form-chips">
    <div class="form-chip active" data-form="all" onclick="filterForm('all',this)">Semua Aktivitas</div>
    <div class="form-chip inactive" data-form="obs" onclick="filterForm('obs',this)">Observasi ICF</div>
    <div class="form-chip inactive" data-form="plan" onclick="filterForm('plan',this)">Perencanaan</div>
    <div class="form-chip inactive" data-form="diary" onclick="filterForm('diary',this)">Buku Harian</div>
    <div class="form-chip inactive" data-form="evalmen" onclick="filterForm('evalmen',this)">Eval. Menengah</div>
    <div class="form-chip inactive" data-form="evalakh" onclick="filterForm('evalakh',this)">Eval. Akhir</div>
  </div>
  <!-- Filter tambahan -->
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <select id="flt-cbr" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem"><option value="">Semua CBR Worker</option></select>
    <select id="flt-bulan" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem">
      <option value="">Semua Bulan</option>
      <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
      <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
      <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
      <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
    </select>
    <input id="flt-search" type="text" placeholder="Cari nama anak..." style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem;flex:1"/>
    <span class="badge badge-blue" id="badge-akt">—</span>
  </div>
  <div class="card"><div class="card-body no-pad"><div class="tbl-wrap">
    <table>
      <thead><tr><th>Tanggal</th><th>Nama Anak</th><th>Jenis Aktivitas</th><th>CBR Worker</th><th>Keterangan</th></tr></thead>
      <tbody id="tbl-akt"></tbody>
    </table>
  </div></div></div>
</div></div></div>
<script>
let ALL_AKT=[], ACTIVE_FORM='all';
const FORM_LABELS={obs:'Observasi ICF',plan:'Perencanaan',diary:'Buku Harian',evalmen:'Evaluasi Menengah',evalakh:'Evaluasi Akhir'};
const FORM_COLORS={obs:'#2563eb',plan:'#d4500a',diary:'#16a34a',evalmen:'#7c3aed',evalakh:'#0891b2',all:'#6b7280'};

function renderPage(d,scnId){
  const obs=d.obs||[], plan=d.perencanaan||[], diary=d.diary||[], evalmen=d.evalMenengah||[], evalakh=d.evalAkhir||[];
  // Build unified list
  ALL_AKT=[
    ...obs.map(o=>({tgl:o.tgl||'—',na:o.na||'—',cb:o.cb||'—',form:'obs',ket:'Observasi domain ICF: Struktur, Kegiatan, Personal, Lingkungan'})),
    ...plan.map(p=>({tgl:p.tanggal_rencana||p.tanggal_submit||'—',na:p.nama_anak||p.na||'—',cb:p.cbr_worker||p.cb||'—',form:'plan',ket:'Penyusunan rencana intervensi (IRP)'})),
    ...diary.map(e=>({tgl:e.tgl_diary_1||e.tanggal_submit||'—',na:e.nama_anak||e.na||'—',cb:e.cbr_worker||e.cb||'—',form:'diary',ket:'Pencatatan buku harian'})),
    ...evalmen.map(e=>({tgl:e.tanggal_eval||e.tanggal_submit||'—',na:e.nama_anak||e.na||'—',cb:e.cbr_worker||e.cb||'—',form:'evalmen',ket:'Evaluasi menengah program'})),
    ...evalakh.map(e=>({tgl:e.tanggal_eval||e.tanggal_submit||'—',na:e.nama_anak||e.na||'—',cb:e.cbr_worker||e.cb||'—',form:'evalakh',ket:'Evaluasi akhir — pencapaian tujuan'})),
  ].sort((a,b)=>b.tgl.localeCompare(a.tgl));

  // Kalau semua kosong, gunakan obs dari API
  if(!ALL_AKT.length && obs.length){
    ALL_AKT=obs.map(o=>({tgl:o.tgl||'—',na:o.na||'—',cb:o.cb||'—',form:'obs',ket:'Observasi ICF'}));
  }

  const cbrs=[...new Set((d.anak||[]).map(a=>a.cbr).filter(Boolean))].sort();
  const fC=document.getElementById('flt-cbr');
  cbrs.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;fC.appendChild(o);});

  document.getElementById('kpi-akt').innerHTML=[
    {v:ALL_AKT.length,     l:'Total Aktivitas', s:'semua form KoboToolbox',    c:'var(--nlr-500,#d4500a)'},
    {v:obs.length,         l:'Observasi',       s:'kunjungan ICF',             c:'#2563eb'},
    {v:plan.length,        l:'Perencanaan',     s:'IRP disusun',               c:'#d4500a'},
    {v:diary.length+evalmen.length+evalakh.length, l:'Diary & Evaluasi', s:'catatan & penilaian', c:'#16a34a'},
  ].map(k=>`<div class="stat-card" style="--accent:${k.c}"><div class="s-label">${k.l}</div><div class="s-value">${k.v}</div><div class="s-sub">${k.s}</div></div>`).join('');

  ['flt-cbr','flt-bulan'].forEach(id=>document.getElementById(id).addEventListener('change',renderList));
  document.getElementById('flt-search').addEventListener('input',renderList);
  renderList();
}

function filterForm(form,btn){
  ACTIVE_FORM=form;
  document.querySelectorAll('.form-chip').forEach(c=>c.className='form-chip inactive');
  btn.className='form-chip active';
  renderList();
}

function renderList(){
  const cb=document.getElementById('flt-cbr').value;
  const bulan=document.getElementById('flt-bulan').value;
  const q=(document.getElementById('flt-search').value||'').toLowerCase();
  const list=ALL_AKT.filter(a=>
    (ACTIVE_FORM==='all'||a.form===ACTIVE_FORM)&&
    (!cb||a.cb===cb)&&
    (!bulan||a.tgl.includes('-'+bulan+'-'))&&
    (!q||(a.na||'').toLowerCase().includes(q))
  );
  document.getElementById('badge-akt').textContent=list.length+' aktivitas';
  document.getElementById('tbl-akt').innerHTML=list.length
    ?list.map(a=>`<tr>
      <td class="mono" style="font-size:.7rem">${a.tgl}</td>
      <td><strong>${a.na}</strong></td>
      <td><span class="badge" style="background:${FORM_COLORS[a.form]||'#888'}20;color:${FORM_COLORS[a.form]||'#888'};border:1px solid ${FORM_COLORS[a.form]||'#ddd'}40">${FORM_LABELS[a.form]||a.form}</span></td>
      <td style="font-size:.72rem;color:#6b7280">${a.cb}</td>
      <td style="font-size:.72rem;color:#6b7280">${a.ket}</td>
    </tr>`).join('')
    :'<tr><td colspan="5" style="text-align:center;padding:24px;color:#9ca3af">Tidak ada aktivitas sesuai filter.</td></tr>';
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
buildSidebar();
const SESSION=AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({onScnSwitch:async function(scnId){const d=await API.get(scnId);if(window.renderPage)renderPage(d,scnId);}});
  AUTH.initSidebar('worker','w-activity');
  API.get(AUTH.getScnFilter()).then(d=>{if(window.renderPage)renderPage(d,AUTH.getScnFilter());});
}
</script></body></html>
