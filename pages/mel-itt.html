<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — ITT Tracker | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    /* Accordion outcome */
    .itt-block {
      background    : var(--white);
      border        : 1px solid var(--gray-200);
      border-radius : var(--radius-md);
      overflow      : hidden;
      margin-bottom : 12px;
    }
    .itt-header {
      display        : flex;
      align-items    : center;
      justify-content: space-between;
      padding        : 14px 18px;
      background     : var(--gray-50);
      border-left    : 4px solid var(--o-color, #999);
      cursor         : pointer;
      user-select    : none;
      transition     : background .15s;
    }
    .itt-header:hover { background: var(--gray-100); }
    .itt-header-left { display: flex; align-items: center; gap: 14px; }
    .itt-header-right { display: flex; align-items: center; gap: 10px; }

    .itt-label {
      font-size     : .65rem;
      font-weight   : 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      color         : var(--o-color, #999);
    }
    .itt-name {
      font-size  : .9rem;
      font-weight: 700;
      color      : var(--gray-900);
      margin-top : 2px;
    }
    .itt-avg {
      font-family: var(--font-mono);
      font-size  : 1.1rem;
      font-weight: 700;
      color      : var(--o-color, #999);
    }

    /* Tombol chevron */
    .itt-toggle {
      width           : 28px;
      height          : 28px;
      border-radius   : 50%;
      background      : rgba(0,0,0,.06);
      border          : none;
      display         : flex;
      align-items     : center;
      justify-content : center;
      cursor          : pointer;
      transition      : background .15s, transform .2s;
      flex-shrink     : 0;
    }
    .itt-toggle:hover { background: rgba(0,0,0,.12); }
    .itt-toggle svg { width: 14px; height: 14px; color: var(--gray-600); transition: transform .2s; }
    .itt-block.open .itt-toggle svg { transform: rotate(180deg); }

    /* Body accordion */
    .itt-body {
      max-height : 0;
      overflow   : hidden;
      transition : max-height .3s ease;
    }
    .itt-block.open .itt-body { max-height: 2000px; }

    /* Mini progress bar di header */
    .itt-header-prog {
      width      : 80px;
      flex-shrink: 0;
    }

    /* Tombol expand all / collapse all */
    .acc-controls {
      display    : flex;
      align-items: center;
      gap        : 8px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">ITT Tracker</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <h1>Indicator Tracking Table</h1>
        <p>Capaian per indikator berdasarkan ITT NLR Indonesia — 7 Outcome · Year 1 2026.</p>
      </div>

      <!-- Kontrol expand/collapse -->
      <div class="acc-controls">
        <button class="btn btn-ghost" onclick="toggleAll(true)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          Buka Semua
        </button>
        <button class="btn btn-ghost" onclick="toggleAll(false)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
          Tutup Semua
        </button>
      </div>

      <div id="itt-container"></div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script>
  // Toggle satu block
  function toggleBlock(id) {
    const block = document.getElementById('itt-block-' + id);
    if (block) block.classList.toggle('open');
  }

  // Buka/tutup semua
  function toggleAll(open) {
    document.querySelectorAll('.itt-block').forEach(b => {
      open ? b.classList.add('open') : b.classList.remove('open');
    });
  }

  function initPage(s, scnId) {
    const d   = getScnData(scnId || s.scn_id || 'manggarai');
    const itt = d.itt.Y1_Q2;

    document.getElementById('itt-container').innerHTML = OUTCOMES.map((o, idx) => {
      const validIds = o.indikator_ids.filter(id => itt[id] && itt[id].target_y1 > 0);
      const avgPct   = validIds.length
        ? Math.round(validIds.reduce((sum, id) => sum + getPct(itt[id].cap, itt[id].target_y1), 0) / validIds.length)
        : 0;
      const avgCol   = getPctColor(avgPct);

      const rows = o.indikator_ids.map(id => {
        const item = itt[id];
        if (!item) return '';
        const cap   = item.cap, tgt = item.target_y1, total = item.target_total;
        const pct   = getPct(cap, tgt);
        const col   = getPctColor(pct);
        const sel   = cap - tgt;
        const selStr = tgt > 0
          ? (sel >= 0 ? `<span style="color:var(--green)">+${sel}</span>` : `<span style="color:var(--red)">${sel}</span>`)
          : '—';

        return `<tr>
          <td style="max-width:280px"><div style="font-size:.72rem;color:var(--gray-700);line-height:1.4">${ITT_LABELS[id] || id}</div></td>
          <td class="mono" style="text-align:center">${total || '—'}</td>
          <td class="mono" style="text-align:center">${tgt || '—'}</td>
          <td class="mono" style="text-align:center;font-weight:700;color:${col}">${cap}</td>
          <td style="min-width:130px">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="prog-wrap" style="flex:1"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
              <span class="mono" style="font-size:.7rem;color:${col};min-width:30px">${pct}%</span>
            </div>
          </td>
          <td style="text-align:center" class="mono">${selStr}</td>
          <td>${getStatusBadge(pct)}</td>
        </tr>`;
      }).join('');

      // Default: Outcome 1 terbuka, sisanya tertutup
      const isOpen = idx === 0 ? 'open' : '';

      return `
        <div class="itt-block ${isOpen}" id="itt-block-${o.id}" style="--o-color:${o.warna}">
          <div class="itt-header" onclick="toggleBlock('${o.id}')">
            <div class="itt-header-left">
              <div>
                <div class="itt-label">${o.label}</div>
                <div class="itt-name">${o.pendek}</div>
              </div>
              <div class="itt-header-prog">
                <div class="prog-wrap">
                  <div class="prog-fill" style="width:${avgPct}%;background:${o.warna}"></div>
                </div>
              </div>
            </div>
            <div class="itt-header-right">
              <span class="itt-avg">${avgPct}%</span>
              ${getStatusBadge(avgPct)}
              <button class="itt-toggle" onclick="event.stopPropagation();toggleBlock('${o.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="itt-body">
            <div class="tbl-wrap">
              <table>
                <thead>
                  <tr>
                    <th style="min-width:260px">Indikator</th>
                    <th style="text-align:center">Target<br>Total</th>
                    <th style="text-align:center">Target<br>Y1</th>
                    <th style="text-align:center">Capaian</th>
                    <th style="min-width:130px">Progress</th>
                    <th style="text-align:center">Selisih</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: function(scnId) {
        if (window.initPage) initPage(SESSION, scnId);
      }
    });
    AUTH.initSidebar('mel', 'm-itt');
    if (window.initPage) initPage(SESSION, AUTH.getScnFilter());
  }
</script>
</body></html>
