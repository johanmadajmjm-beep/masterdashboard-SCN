<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CBR Worker — Daftar Anak | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .kpi-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;gap:12px;}
    .kpi-row:last-child{border-bottom:none;}
    .worker-bar{display:flex;align-items:center;gap:10px;}
    .overview-7{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
    .ov-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;}
    .ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
    .ov-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;line-height:1;margin:6px 0;}
    .ov-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
    .ov-sub{font-size:.65rem;color:var(--gray-400);margin-top:4px;}
    .story-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:20px;}
    .story-tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.65rem;font-weight:700;background:var(--teal-50);color:var(--teal-700);margin-bottom:10px;}
    .story-nama{font-size:.95rem;font-weight:800;color:var(--gray-900);margin-bottom:4px;}
    .story-meta{font-size:.7rem;color:var(--gray-400);margin-bottom:10px;}
    .story-narasi{font-size:.8rem;color:var(--gray-700);line-height:1.7;}
    .stake-bar-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;}
    .stake-bar-row:last-child{border-bottom:none;}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">CBR Worker <span class="sep">›</span><span class="current">Daftar Anak</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
        <span id="sync-time" style="font-size:.65rem;color:var(--ink-300);display:none"></span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page" id="page-content">

      <div class="page-header"><h1>Daftar Anak Dampingan</h1><p>Semua anak dalam caseload saya beserta status IRP dan kunjungan.</p></div>
      <div class="card" style="margin-bottom:16px"><div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap">
        <select id="filter-irp" style="padding:6px 10px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-size:.75rem;font-family:var(--font-body)"><option value="">Semua IRP</option><option>Aktif</option><option>Belum</option><option>Selesai</option></select>
        <select id="filter-ragam" style="padding:6px 10px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-size:.75rem;font-family:var(--font-body)"><option value="">Semua Ragam</option><option>Fisik</option><option>Intelektual</option><option>Wicara</option><option>Rungu</option><option>Netra</option><option>Ganda</option></select>
        <span id="filter-count" style="align-self:center;font-size:.75rem;color:var(--gray-500)"></span>
      </div></div>
      <div class="card"><div class="card-body no-pad"><div class="tbl-wrap"><table>
        <thead><tr><th>Nama Anak</th><th>Gender</th><th>Usia</th><th>Ragam Disabilitas</th><th>Desa</th><th>Status IRP</th><th>Terakhir Dikunjungi</th></tr></thead>
        <tbody id="tbl-anak-full"></tbody>
      </table></div></div></div>
      <script>
      function renderPage(d, scnId) {
        const d = d;
        // Tampilkan semua anak dari SCN aktif (koordinator view)
        let anak = d.anak;
        function render(list) {
          document.getElementById('filter-count').textContent = list.length + ' anak';
          document.getElementById('tbl-anak-full').innerHTML = list.map(a=>{
            const irpCls = a.irp==='Aktif'?'badge-green':a.irp==='Selesai'?'badge-gray':'badge-amber';
            const hariStyle = a.hari>30?'color:var(--red);font-weight:700':'color:var(--gray-600)';
            const scnCol = a.scn ? `<td style="font-size:.7rem;color:var(--gray-400)">${a.scn}</td>` : '';
            return `<tr><td><strong>${a.nama}</strong></td>${scnCol}<td>${a.gender==='L'?'Laki-laki':'Perempuan'}</td><td class="mono">${a.usia} th</td><td><span class="badge badge-blue">${a.ragam}</span></td><td style="font-size:.72rem">${a.desa}</td><td><span class="badge ${irpCls}">IRP ${a.irp}</span></td><td class="mono" style="${hariStyle}">${a.hari} hari lalu</td></tr>`;
          }).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--gray-400);padding:24px">Tidak ada data.</td></tr>';
        }
        render(anak);
        function applyFilter(){
          const irp = document.getElementById('filter-irp').value;
          const ragam = document.getElementById('filter-ragam').value;
          render(anak.filter(a=>(!irp||a.irp===irp)&&(!ragam||a.ragam===ragam)));
        }
        document.getElementById('filter-irp').addEventListener('change',applyFilter);
        document.getElementById('filter-ragam').addEventListener('change',applyFilter);
      }
      </script>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (window.renderPage) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('worker', 'w-anak');
    API.get(AUTH.getScnFilter()).then(d => {
      if (window.renderPage) renderPage(d, AUTH.getScnFilter());
    });
  }
</script>
