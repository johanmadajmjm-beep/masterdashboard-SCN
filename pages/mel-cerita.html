<!DOCTYPE html>
<html lang="id"><head>
  <style>html,body{background:#F8FAFC}</style><script>if("startViewTransition" in document){addEventListener("pagereveal",e=>{if(e.viewTransition)e.viewTransition.ready.catch(()=>{})})}</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
  <title>MEL — Cerita Perubahan | MEL NLR</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    .story-card{background:var(--white);border:1px solid var(--ink-100);border-radius:var(--radius-md);padding:20px}
    .story-tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.65rem;font-weight:700;background:var(--nlr-50);color:var(--nlr-700);border:1px solid var(--nlr-200);margin-bottom:10px}
    .story-nama{font-size:.95rem;font-weight:800;color:var(--ink-900);margin-bottom:4px}
    .story-meta{font-size:.7rem;color:var(--ink-300);margin-bottom:10px}
    .story-narasi{font-size:.8rem;color:var(--ink-600);line-height:1.7}
    .cerita-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
  </style>
</head>
<body>
<div class="app"><div class="main">
  <header class="topbar">
    <div class="topbar-left"><div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Cerita Perubahan</span></div></div>
    <div class="topbar-right">
      <span class="scn-badge" id="scn-badge">—</span>
      <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
      <span class="topbar-date" id="topbar-date">—</span>
    </div>
  </header>
  <div class="page">

    <div class="stat-grid">
      <div class="stat-card" style="--accent:var(--nlr-500)"><div class="s-label">Total Cerita</div><div class="s-value mono" id="c-total">—</div><div class="s-sub">terdokumentasi</div></div>
      <div class="stat-card" style="--accent:#1a6fd4"><div class="s-label">Individu/Anak</div><div class="s-value mono" id="c-ind">—</div></div>
      <div class="stat-card" style="--accent:#10b8a6"><div class="s-label">Keluarga</div><div class="s-value mono" id="c-kel">—</div></div>
      <div class="stat-card" style="--accent:#d97706"><div class="s-label">Komunitas/DPO</div><div class="s-value mono" id="c-kom">—</div></div>
    </div>
    <div class="cerita-grid" id="cerita-grid"></div>
  </div>
</div></div>
<script>
function renderPage(d, scnId) {
  if (!d) return;
  const c=d.cerita||[];
  document.getElementById('c-total').textContent=c.length;
  document.getElementById('c-ind').textContent=c.filter(x=>x.tag==='Perkembangan Anak').length;
  document.getElementById('c-kel').textContent=c.filter(x=>x.tag==='Keluarga & Komunitas').length;
  document.getElementById('c-kom').textContent=c.filter(x=>x.tag==='DPO & Komunitas').length;
  document.getElementById('cerita-grid').innerHTML=c.length
    ?c.map(x=>`<div class="story-card">
      <div class="story-tag">${x.tag}</div>
      <div class="story-nama">${x.nama}</div>
      <div class="story-meta">📍 ${x.lokasi||'—'} &nbsp;·&nbsp; 👤 ${x.worker||'—'} &nbsp;·&nbsp; 🗓 ${x.tanggal||'—'}${x.scn?' &nbsp;·&nbsp; 🏢 '+x.scn:''}</div>
      <div class="story-narasi">${x.narasi}</div>
    </div>`).join('')
    :'<div style="text-align:center;padding:40px;color:var(--ink-300)">Belum ada cerita perubahan terdokumentasi.</div>';
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (window.renderPage) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('mel', 'm-story');
    API.get(AUTH.getScnFilter()).then(d => {
      if (window.renderPage) renderPage(d, AUTH.getScnFilter());
    });
  }
</script>
</body></html>
