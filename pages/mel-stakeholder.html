<!DOCTYPE html>
<html lang="id"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — Stakeholder | MEL NLR</title>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<div class="app"><div class="main">
  <header class="topbar">
    <div class="topbar-left"><div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Stakeholder</span></div></div>
    <div class="topbar-right">
      <span class="scn-badge" id="scn-badge">—</span>
      <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
      <span class="topbar-date" id="topbar-date">—</span>
    </div>
  </header>
  <div class="page">
    <div class="page-header"><h1>Jaringan Stakeholder</h1><p>Keterlibatan stakeholder per kategori dan disagregasi gender.</p></div>
    <div class="stat-grid" id="stake-stats"></div>
    <div class="grid-2" style="margin-top:4px">
      <div class="card"><div class="card-head"><span class="card-title">Distribusi per Kategori</span><span class="badge badge-nlr" id="stake-total">—</span></div><div class="card-body" id="stake-bars"></div></div>
      <div class="card"><div class="card-head"><span class="card-title">Distribusi Gender Stakeholder</span></div><div class="card-body" id="stake-gender"></div></div>
    </div>
  </div>
</div></div>
<script>
function renderPage(d, scnId) {
  if (!d||!d.stakeholder) return;
  const stake=d.stakeholder;
  const cats=Object.entries(stake).sort((a,b)=>b[1].total-a[1].total);
  const total=cats.reduce((s,[,v])=>s+v.total,0);
  document.getElementById('stake-total').textContent=total+' orang';
  const topCols=['#1a6fd4','#10b8a6','#d97706','#7c3aed','#dc2626','#16a34a'];
  document.getElementById('stake-stats').innerHTML=cats.slice(0,4).map(([cat,v],i)=>
    `<div class="stat-card" style="--accent:${topCols[i]}">
      <div class="s-label">${cat}</div>
      <div class="s-value mono">${v.total}</div>
      <div class="s-sub">${total>0?Math.round(v.total/total*100):0}% dari total</div>
    </div>`).join('');
  const maxVal=cats[0]?.[1]?.total||1;
  document.getElementById('stake-bars').innerHTML=cats.map(([cat,v],i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--ink-100);font-size:.78rem">
      <span style="min-width:120px;font-weight:600;color:${topCols[i]||'#888'}">${cat}</span>
      <div class="prog-wrap" style="flex:1"><div class="prog-fill" style="width:${Math.round(v.total/maxVal*100)}%;background:${topCols[i]||'#888'}"></div></div>
      <span class="mono" style="font-size:.75rem;min-width:28px;text-align:right">${v.total}</span>
    </div>`).join('');
  const totalL=cats.reduce((s,[,v])=>s+v.L,0), totalP=cats.reduce((s,[,v])=>s+v.P,0);
  document.getElementById('stake-gender').innerHTML=`
    <div style="display:flex;gap:20px;margin-bottom:16px">
      <div style="text-align:center"><div class="mono" style="font-size:1.5rem;font-weight:700;color:#1a6fd4">${totalL}</div><div style="font-size:.7rem;color:var(--ink-400)">Laki-laki</div></div>
      <div style="text-align:center"><div class="mono" style="font-size:1.5rem;font-weight:700;color:#e879a0">${totalP}</div><div style="font-size:.7rem;color:var(--ink-400)">Perempuan</div></div>
    </div>
    ${cats.map(([cat,v],i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--ink-100);font-size:.77rem">
      <span style="min-width:110px;color:${topCols[i]||'#888'}">${cat}</span>
      <span class="badge badge-blue" style="min-width:36px;text-align:center">${v.L}L</span>
      <span class="badge badge-purple" style="min-width:36px;text-align:center">${v.P}P</span>
    </div>`).join('')}`;
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (window.renderPage) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('mel', 'm-stake');
    API.get(AUTH.getScnFilter()).then(d => {
      if (window.renderPage) renderPage(d, AUTH.getScnFilter());
    });
  }
</script>
</body></html>
