<!DOCTYPE html>
<html lang="id">
<head>
  <style>html,body{background:#F8FAFC}</style>
  <script>if("startViewTransition" in document){addEventListener("pagereveal",e=>{if(e.viewTransition)e.viewTransition.ready.catch(()=>{})})}</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Coordinator — Jejaring Rujukan | MEL NLR</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    .page{padding:16px 20px}
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
    .kpi-box{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;border-left:3px solid var(--kc,#F97316)}
    .kpi-v{font-size:1.6rem;font-weight:800;color:var(--kc,#F97316);line-height:1}
    .kpi-l{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin:5px 0 2px}
    .kpi-s{font-size:.68rem;color:#9ca3af}
    .section-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid #f1f5f9;display:flex;align-items:center;gap:8px}
    .aktor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:18px}
    .aktor-card{background:#fff;border:1px solid #e9eef6;border-radius:10px;padding:12px 14px;border-left:3px solid var(--ac,#F97316)}
    .aktor-name{font-size:.78rem;font-weight:700;color:#0f172a;margin-bottom:4px}
    .aktor-count{font-size:1.2rem;font-weight:800;color:var(--ac,#F97316);line-height:1}
    .aktor-sub{font-size:.62rem;color:#94a3b8;margin-top:2px}
    .prog-bar{height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden;margin-top:6px}
    .prog-fill{height:100%;border-radius:2px;background:var(--ac,#F97316)}
    .tbl{width:100%;border-collapse:collapse;font-size:.72rem}
    .tbl th{padding:8px 12px;text-align:left;font-size:.6rem;font-weight:700;text-transform:uppercase;color:#94a3b8;background:#f8fafc;border-bottom:1px solid #e9eef6;white-space:nowrap}
    .tbl td{padding:8px 12px;border-bottom:1px solid #f8fafc;vertical-align:top}
    .tbl tr:hover td{background:#fafbfd}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:.6rem;font-weight:700}
    .badge-green{background:#dcfce7;color:#15803d}
    .badge-blue{background:#dbeafe;color:#1d4ed8}
    .badge-gray{background:#f1f5f9;color:#64748b}
    .empty{background:#f8fafc;border:1px dashed #e2e8f0;border-radius:10px;padding:24px;text-align:center;color:#94a3b8;font-size:.76rem}
    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .filter-chip{padding:4px 12px;border-radius:999px;font-size:.66rem;font-weight:600;border:1px solid #e5e7eb;background:#fff;cursor:pointer;color:#64748b;transition:all .15s}
    .filter-chip.active{background:#F97316;color:#fff;border-color:#F97316}
  </style>
</head>
<body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <button class="topbar-menu-btn" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-breadcrumb">Coordinator <span class="sep">›</span><span class="current">Jejaring Rujukan</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>

<div class="page" id="page-content">
  <div style="display:flex;align-items:center;justify-content:center;height:300px;color:#94a3b8;font-size:.82rem">Memuat data jejaring...</div>
</div>
</div></div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>

// Kategori aktor dari DataRencana
const AKTOR_DEF = [
  // Keluarga
  { key:'ayah',              label:'Ayah',               cat:'Keluarga',      color:'#F97316' },
  { key:'ibu',               label:'Ibu',                cat:'Keluarga',      color:'#F97316' },
  { key:'saudara_kandung',   label:'Saudara Kandung',    cat:'Keluarga',      color:'#F97316' },
  { key:'kakek_nenek_serumah',label:'Kakek/Nenek',       cat:'Keluarga',      color:'#F97316' },
  // Komunitas
  { key:'tetangga',          label:'Tetangga',           cat:'Komunitas',     color:'#2563eb' },
  { key:'teman_sebaya',      label:'Teman Sebaya',       cat:'Komunitas',     color:'#2563eb' },
  { key:'warga_kampung',     label:'Warga Kampung',      cat:'Komunitas',     color:'#2563eb' },
  { key:'tua_golo',          label:'Tua Golo',           cat:'Komunitas',     color:'#2563eb' },
  { key:'tokoh_adat',        label:'Tokoh Adat',         cat:'Komunitas',     color:'#2563eb' },
  // Agama
  { key:'pastor',            label:'Pastor',             cat:'Tokoh Agama',   color:'#7c3aed' },
  { key:'katekis',           label:'Katekis',            cat:'Tokoh Agama',   color:'#7c3aed' },
  { key:'kelompok_doa',      label:'Kelompok Doa',       cat:'Tokoh Agama',   color:'#7c3aed' },
  // Pendidikan
  { key:'guru_kelas',        label:'Guru Kelas',         cat:'Pendidikan',    color:'#16a34a' },
  { key:'kepala_sekolah',    label:'Kepala Sekolah',     cat:'Pendidikan',    color:'#16a34a' },
  { key:'guru_paud',         label:'Guru PAUD',          cat:'Pendidikan',    color:'#16a34a' },
  // Kesehatan
  { key:'bidan_desa',        label:'Bidan Desa',         cat:'Kesehatan',     color:'#0891b2' },
  { key:'perawat_puskesmas', label:'Perawat Puskesmas',  cat:'Kesehatan',     color:'#0891b2' },
  { key:'dokter_puskesmas',  label:'Dokter Puskesmas',   cat:'Kesehatan',     color:'#0891b2' },
  { key:'kader_posyandu',    label:'Kader Posyandu',     cat:'Kesehatan',     color:'#0891b2' },
  { key:'fisioterapis',      label:'Fisioterapis',       cat:'Kesehatan',     color:'#0891b2' },
  // Pemerintah
  { key:'kepala_desa',       label:'Kepala Desa',        cat:'Pemerintah',    color:'#d97706' },
  { key:'rt_rw',             label:'RT/RW',              cat:'Pemerintah',    color:'#d97706' },
  { key:'dinsos',            label:'Dinas Sosial',       cat:'Pemerintah',    color:'#d97706' },
  { key:'dinkes',            label:'Dinas Kesehatan',    cat:'Pemerintah',    color:'#d97706' },
  { key:'dindik',            label:'Dinas Pendidikan',   cat:'Pemerintah',    color:'#d97706' },
  // Program
  { key:'scn',               label:'SCN',                cat:'Program CBR',   color:'#dc2626' },
  { key:'cbr_worker_lain',   label:'CBR Worker Lain',    cat:'Program CBR',   color:'#dc2626' },
  { key:'kader_disabilitas', label:'Kader Disabilitas',  cat:'Program CBR',   color:'#dc2626' },
];

const CATS = ['Semua',...new Set(AKTOR_DEF.map(a=>a.cat))];
let ACTIVE_CAT = 'Semua';
let ALL_PLAN = [];
let ALL_ANAK = [];

function renderPage(d) {
  if (!d) return;
  ALL_PLAN = d.perencanaan || [];
  ALL_ANAK = d.anak || [];

  if (!ALL_PLAN.length) {
    document.getElementById('page-content').innerHTML = `
      <div class="empty" style="margin-top:40px">
        <div style="font-size:1.6rem;margin-bottom:8px">🤝</div>
        <div style="font-weight:700;margin-bottom:4px">Belum ada data perencanaan</div>
        <div>Data jejaring diambil dari form Perencanaan IRP di KoboToolbox</div>
      </div>`;
    return;
  }
  renderAll();
}

function renderAll() {
  const plan = ALL_PLAN;

  // Hitung frekuensi per aktor
  const counts = {};
  AKTOR_DEF.forEach(a => { counts[a.key] = 0; });

  plan.forEach(r => {
    AKTOR_DEF.forEach(a => {
      ['_t1','_t2','_t3'].forEach(suf => {
        const v = r['rencana_'+a.key+suf];
        if (v && v !== '0' && v !== '') counts[a.key]++;
      });
    });
  });

  const maxCount = Math.max(...Object.values(counts), 1);
  const totalPlan = plan.length;

  // Filter per kategori
  const filtered = ACTIVE_CAT === 'Semua'
    ? AKTOR_DEF
    : AKTOR_DEF.filter(a => a.cat === ACTIVE_CAT);

  const top5 = [...AKTOR_DEF].sort((a,b)=>counts[b.key]-counts[a.key]).slice(0,5);
  const totalAktorTerlibat = AKTOR_DEF.filter(a=>counts[a.key]>0).length;
  const totalKeterlibatan  = Object.values(counts).reduce((s,v)=>s+v,0);

  // Per anak: berapa aktor yang dilibatkan
  const aktorPerAnak = plan.map(r => {
    const nama = r.nama_anak || r.na || '—';
    const total = AKTOR_DEF.reduce((s,a) => {
      const t = ['_t1','_t2','_t3'].some(suf => {
        const v = r['rencana_'+a.key+suf];
        return v && v!=='0' && v!=='';
      });
      return s + (t?1:0);
    }, 0);
    return { nama, cbr: r.cbr_worker || r.cb || '—', total };
  }).sort((a,b)=>b.total-a.total);

  document.getElementById('page-content').innerHTML = `
    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi-box" style="--kc:#F97316">
        <div class="kpi-v">${totalAktorTerlibat}</div>
        <div class="kpi-l">Jenis Aktor Terlibat</div>
        <div class="kpi-s">dari ${AKTOR_DEF.length} aktor yang diidentifikasi</div>
      </div>
      <div class="kpi-box" style="--kc:#2563eb">
        <div class="kpi-v">${totalKeterlibatan}</div>
        <div class="kpi-l">Total Keterlibatan</div>
        <div class="kpi-s">akumulasi dari ${totalPlan} perencanaan</div>
      </div>
      <div class="kpi-box" style="--kc:#16a34a">
        <div class="kpi-v">${(totalKeterlibatan/Math.max(totalPlan,1)).toFixed(1)}</div>
        <div class="kpi-l">Rata-rata Aktor per IRP</div>
        <div class="kpi-s">diversity jejaring per anak</div>
      </div>
      <div class="kpi-box" style="--kc:#7c3aed">
        <div class="kpi-v">${top5[0]?.label||'—'}</div>
        <div class="kpi-l">Aktor Paling Aktif</div>
        <div class="kpi-s">${counts[top5[0]?.key||'']||0} kali terlibat</div>
      </div>
    </div>

    <!-- FILTER KATEGORI -->
    <div class="section-title">🤝 Keterlibatan Aktor per Kategori</div>
    <div class="filter-bar">
      ${CATS.map(c=>`<button class="filter-chip ${c===ACTIVE_CAT?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
    </div>

    <!-- AKTOR GRID -->
    <div class="aktor-grid">
      ${filtered.map(a => {
        const n = counts[a.key];
        const pct = Math.round(n/maxCount*100);
        return n > 0 ? `
          <div class="aktor-card" style="--ac:${a.color}">
            <div class="aktor-name">${a.label}</div>
            <div style="display:flex;align-items:baseline;gap:6px">
              <div class="aktor-count">${n}</div>
              <span style="font-size:.62rem;color:#94a3b8">IRP</span>
            </div>
            <div class="aktor-sub">${a.cat} · ${Math.round(n/totalPlan*100)}% dari total</div>
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          </div>` : '';
      }).filter(Boolean).join('') || '<div class="empty">Tidak ada aktor di kategori ini</div>'}
    </div>

    <!-- TABEL PER ANAK -->
    <div class="section-title">👶 Kedalaman Jejaring per Anak <span style="font-weight:400;color:#94a3b8">(dari DataRencana)</span></div>
    <div style="background:#fff;border:1px solid #e9eef6;border-radius:10px;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>#</th><th>Nama Anak</th><th>CBR Worker</th>
            <th>Jumlah Aktor Dilibatkan</th><th>Status Jejaring</th>
          </tr></thead>
          <tbody>
            ${aktorPerAnak.map((r,i) => {
              const status = r.total>=10
                ? '<span class="badge badge-green">Luas</span>'
                : r.total>=5
                ? '<span class="badge badge-blue">Sedang</span>'
                : '<span class="badge badge-gray">Terbatas</span>';
              return `<tr>
                <td style="color:#94a3b8">${i+1}</td>
                <td style="font-weight:600">${r.nama}</td>
                <td style="color:#64748b;font-size:.68rem">${r.cbr}</td>
                <td style="text-align:center">
                  <span style="font-weight:700;color:${r.total>=10?'#16a34a':r.total>=5?'#2563eb':'#94a3b8'}">${r.total}</span>
                  <div style="width:60px;height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden;margin:3px auto 0">
                    <div style="height:100%;width:${Math.min(Math.round(r.total/AKTOR_DEF.length*100),100)}%;background:${r.total>=10?'#16a34a':r.total>=5?'#2563eb':'#94a3b8'};border-radius:2px"></div>
                  </div>
                </td>
                <td>${status}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- INSIGHT -->
    <div style="background:#fff9f5;border:1px solid #fed7aa;border-left:4px solid #F97316;border-radius:10px;padding:14px 16px;margin-top:18px">
      <div style="font-size:.7rem;font-weight:800;color:#F97316;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">💡 Insight Jejaring</div>
      <ul style="margin:0;padding-left:16px">
        ${top5.filter(a=>counts[a.key]>0).map(a=>`
          <li style="font-size:.73rem;color:#334155;padding:3px 0;line-height:1.5">
            <b>${a.label}</b> (${a.cat}) dilibatkan di <b>${counts[a.key]}</b> IRP — ${Math.round(counts[a.key]/totalPlan*100)}% dari total
          </li>`).join('')}
        ${aktorPerAnak.filter(a=>a.total<3).length > 0
          ? `<li style="font-size:.73rem;color:#dc2626;padding:3px 0;line-height:1.5"><b>${aktorPerAnak.filter(a=>a.total<3).length} anak</b> memiliki jejaring sangat terbatas (&lt;3 aktor) — perlu diperluas</li>`
          : ''}
      </ul>
    </div>
  `;
}

function setFilter(cat) {
  ACTIVE_CAT = cat;
  renderAll();
}

buildSidebar();
const SESSION = AUTH.requireAuth('../index.html');
if (SESSION) {
  AUTH.applySession({
    onScnSwitch: async function(scnId) {
      const d = await API.get(scnId);
      if (d) renderPage(d);
    }
  });
  AUTH.initSidebar('coord', 'c-jejaring');
  API.get(AUTH.getScnFilter()).then(d => renderPage(d));
}
</script>
</body>
</html>
