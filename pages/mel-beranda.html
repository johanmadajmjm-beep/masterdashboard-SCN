<!DOCTYPE html>
<html lang="id">
<head>
  <style>html,body{background:#0d1117}</style><script>if("startViewTransition" in document){addEventListener("pagereveal",e=>{if(e.viewTransition)e.viewTransition.ready.catch(()=>{})})}</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — Beranda | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    .page { background: #0d1117 !important; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji" !important; }
    .topbar { background: #0d1117 !important; border-bottom-color: #30363d !important; }
    .topbar-breadcrumb { color: #7d8590 !important; }
    .topbar-breadcrumb .current { color: #f0f6fc !important; }
    .topbar-menu-btn { color: #c9d1d9 !important; }
    .scn-badge { background:#161b22 !important; border-color:#30363d !important; color:#c9d1d9 !important; }
    .topbar-date { color:#7d8590 !important; }

    .page tbody tr:nth-child(even) td { background: #161b22 !important; }
    .page tbody tr:hover td { background: #1c2128 !important; }

    /* ── KPI ROW ── */
    .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    @media(max-width:700px){.kpi-row{grid-template-columns:1fr 1fr}}
    .kpi-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px 18px;border-top:3px solid var(--kc,#F97316);position:relative}
    .kpi-val{font-size:1.6rem;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace;color:var(--kc,#F97316)}
    .kpi-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7d8590;margin-top:5px}
    .kpi-sub{font-size:.67rem;color:#7d8590;margin-top:2px}
    /* tooltip L/P */
    .kpi-tip{position:relative;display:inline-block;margin-left:6px;cursor:default}
    .kpi-tip-icon{font-size:.6rem;background:#21262d;border:1px solid #30363d;border-radius:99px;padding:1px 6px;color:#8b949e;font-weight:700;user-select:none}
    .kpi-tip-box{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:.7rem;border-radius:8px;padding:7px 12px;white-space:nowrap;z-index:99;line-height:1.7;font-weight:400}
    .kpi-tip-box::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#1e293b}
    .kpi-tip:hover .kpi-tip-box{display:block}

    /* ── SECTION LABEL ── */
    .sec-lbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#7d8590;margin-bottom:10px}

    /* ── OUTCOME + CHARTS ROW ── */
    .oc-charts-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:20px;align-items:start}
    @media(max-width:1000px){.oc-charts-row{grid-template-columns:1fr 1fr}}
    @media(max-width:700px){.oc-charts-row{grid-template-columns:1fr}}
    .chart-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px 16px}
    .chart-card-title{font-size:.75rem;font-weight:700;color:#f0f6fc;margin-bottom:12px}
    .chart-wrap{position:relative;height:200px}
    .chart-wrap-tall{position:relative;height:240px}

    /* ── SHORTCUT ── */
    .shortcut-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    @media(max-width:700px){.shortcut-row{grid-template-columns:1fr 1fr}}
    .sc-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none;transition:box-shadow .15s,transform .12s}
    .sc-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
    .sc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .sc-icon svg{width:20px;height:20px}
    .sc-lbl{font-size:.8rem;font-weight:700;color:#f0f6fc}
    .sc-sub{font-size:.66rem;color:#7d8590;margin-top:2px}

    /* ── MAIN GRID ── */
    .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    @media(max-width:900px){.main-grid{grid-template-columns:1fr}}

    /* ── CARD ── */
    .mb-card{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden}
    .mb-card-head{padding:12px 16px;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between}
    .mb-card-title{font-size:.84rem;font-weight:700;color:#f0f6fc}
    .mb-card-sub{font-size:.67rem;color:#7d8590}
    .mb-card-body{padding:14px 16px}

    /* ── TABLE ── */
    .mb-table{width:100%;border-collapse:collapse;font-size:.77rem}
    .mb-table th{padding:8px 12px;text-align:left;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7d8590;background:#0d1117;border-bottom:1px solid #30363d;white-space:nowrap}
    .mb-table td{padding:9px 12px;border-bottom:1px solid #21262d;vertical-align:middle}
    .mb-table tr:last-child td{border-bottom:none}
    .mb-table tr:hover td{background:#1c2128}
    .out-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.64rem;font-weight:700;color:#fff}
    .tbl-wrap{overflow-x:auto}

    /* ── KONDISI ANAK ── */
    .score-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.76rem}
    .score-lbl{min-width:100px;font-weight:600}
    .score-bar{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
    .score-fill{height:100%;border-radius:3px}
    .score-pct{font-size:.71rem;font-weight:700;min-width:42px;text-align:right;font-family:'JetBrains Mono',monospace}

    /* ── LOADING ── */
    .mb-loading{display:flex;align-items:center;justify-content:center;height:200px;color:#7d8590;font-size:.82rem;gap:10px}
    .spin{width:20px;height:20px;border:2px solid #30363d;border-top-color:#F97316;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Beranda</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge" style="display:none">—</span>
        <span id="data-source-badge" style="display:none;font-size:.7rem;padding:3px 10px;border-radius:999px;font-weight:600"></span>
        <span id="sync-time" style="display:none;font-size:.7rem;color:#7d8590"></span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page">
      <div id="page-content">
        <div class="mb-loading"><div class="spin"></div> Memuat data...</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script src="../js/api-ben.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const OUT_CONF = [
  {id:'O1',label:'Inklusi Anak',    warna:'#F97316'},
  {id:'O2',label:'Pengasuh',        warna:'#E8C468'},
  {id:'O3',label:'CBR Worker',      warna:'#2563eb'},
  {id:'O4',label:'Pihak Terlibat',  warna:'#16a34a'},
  {id:'O5',label:'Kesehatan',       warna:'#7c3aed'},
  {id:'O6',label:'Pendidikan',      warna:'#d97706'},
  {id:'O7',label:'Penghidupan',     warna:'#0ea5e9'},
];

let BEN_MON = [];
let BEN_STK = [];
let KOBO_D  = null;
let _charts = [];

function num(v){ return parseInt(v)||0; }
function pctColor(v){ return v>=80?'#16a34a':v>=50?'#2563eb':v>=25?'#d97706':'#dc2626'; }
function calcITTpct(){ return {O1:0,O2:0,O3:0,O4:0,O5:0,O6:0,O7:0}; }

function destroyCharts(){
  _charts.forEach(c=>{try{c.destroy();}catch(e){}});
  _charts=[];
}

function tipLP(l, p){
  const t = l + p || 1;
  return `<span class="kpi-tip">
    <span class="kpi-tip-icon">L/P</span>
    <div class="kpi-tip-box">Laki-laki: <strong>${l}</strong> (${Math.round(l/t*100)}%)<br>Perempuan: <strong>${p}</strong> (${Math.round(p/t*100)}%)</div>
  </span>`;
}

function renderPage(d, scnId){
  if(!d) return;
  KOBO_D = d;
  buildUI();
}

function buildUI(){
  destroyCharts();
  const d      = KOBO_D;
  const anak   = d.anak||[];
  const workers= d.workers||[];
  const total  = anak.length;

  // KPI data
  const lkAnak = anak.filter(a=>a.gender==='L').length;
  const prAnak = anak.filter(a=>a.gender==='P').length;

  const stkL   = BEN_STK.filter(r=>(r.jenis_kelamin||'').toLowerCase().includes('laki')).length;
  const stkP   = BEN_STK.filter(r=>(r.jenis_kelamin||'').toLowerCase().includes('perempuan')).length;
  const totalStk = BEN_STK.length;
  const instSet  = new Set(BEN_STK.map(r=>(r.instansi||'').trim()).filter(Boolean));
  const totalIns = instSet.size;

  // Ragam
  const ragamMap = {};
  anak.forEach(a=>{ const k=a.ragam||'Lainnya'; ragamMap[k]=(ragamMap[k]||0)+1; });
  const ragamLabels = Object.keys(ragamMap);
  const ragamData   = ragamLabels.map(k=>ragamMap[k]);
  // Level
  const levelOrder = ['Parah (dukungan penuh)','Sedang (dukungan reguler)','Rendah (sedikit dukungan)'];
  const levelShort  = ['Parah','Sedang','Rendah'];
  const levelData   = levelOrder.map(l=>anak.filter(a=>(a.level||'').includes(l.split(' ')[0])).length);

  // Outcome pct
  const pcts = calcITTpct();

  // Cantrill
  const tanpaObs = anak.filter(a=>{const k=a.nama.toLowerCase();return!(d.obs||[]).some(o=>o.na&&o.na.toLowerCase()===k);}).length;
  const coverage = total>0?Math.round((total-tanpaObs)/total*100):0;

  // Aktivitas terbaru
  const aktTerbaru = [...BEN_MON].sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||'')).slice(0,6);

  // ── INSIGHT RAIL: alert + intisari, dihitung dari data di halaman ini ──
  const dominRagamKey = ragamLabels.length ? ragamLabels.reduce((a,b)=>ragamMap[a]>=ragamMap[b]?a:b) : null;
  const dominLevelIdx = levelData.length ? levelData.indexOf(Math.max(...levelData)) : -1;
  const dominLevel = dominLevelIdx>=0 ? levelShort[dominLevelIdx] : null;
  const parahCount = levelData[0]||0;

  const alerts = [];
  if (tanpaObs>0) alerts.push({icon:'⚠', main:`${tanpaObs} anak belum punya data observasi`, sub:`Coverage baru ${coverage}% dari ${total} anak`});
  if (parahCount>0) alerts.push({icon:'●', main:`${parahCount} anak level disabilitas Parah`, sub:'Butuh dukungan penuh & pemantauan rutin'});
  if (totalIns===0) alerts.push({icon:'●', main:'Belum ada instansi terlibat tercatat', sub:'Cek data via BEN Uploader / Data Stakeholder'});

  const intisariText = total>0
    ? `Total ${total} anak dampingan dengan ${totalStk} individu stakeholder dari ${totalIns||0} instansi. `
      + (dominRagamKey ? `Ragam disabilitas terbanyak adalah ${dominRagamKey} (${ragamMap[dominRagamKey]} anak). ` : '')
      + (dominLevel ? `Mayoritas berada pada level ${dominLevel.toLowerCase()}. ` : '')
      + `Coverage observasi saat ini ${coverage}%.`
    : 'Belum ada data anak dampingan untuk periode ini.';

  document.getElementById('page-content').innerHTML = `
    <div class="page-with-rail">
    <div class="page-with-rail-main">
    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi-card" style="--kc:#F97316">
        <div class="kpi-val">${total}${tipLLP(lkAnak,prAnak)}</div>
        <div class="kpi-lbl">Total Beneficiary</div>
        <div class="kpi-sub">${d.meta?.scn||'—'}</div>
      </div>
      <div class="kpi-card" style="--kc:#2563eb">
        <div class="kpi-val">${totalStk}${totalStk>0?tipLLP(stkL,stkP):''}</div>
        <div class="kpi-lbl">Total Individu Stakeholder</div>
        <div class="kpi-sub">dari BEN Uploader</div>
      </div>
      <div class="kpi-card" style="--kc:#16a34a">
        <div class="kpi-val">${totalIns||'—'}</div>
        <div class="kpi-lbl">Total Instansi Terlibat</div>
        <div class="kpi-sub">${BEN_MON.length} kegiatan tercatat</div>
      </div>
    </div>

    <!-- SHORTCUT -->
    <div class="shortcut-row">
      ${sc('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>','#fff7ed','#F97316','ITT Tracker','Capaian indikator','mel-itt.html')}
      ${sc('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>','#eff6ff','#2563eb','Data Stakeholder','Jaringan & keterlibatan','mel-stakeholder.html')}
      ${sc('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M9 16l2 2 4-4"/></svg>','#21262d','#CBD5E1','Monthly Monitoring','Kegiatan & peserta','mel-monthly.html')}
      ${sc('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>','#f0fdf4','#16a34a','Analisis & Trend','Insight mendalam','mel-analisis.html')}
    </div>

    <!-- OUTCOME + GRAFIK DISABILITAS -->
    <div class="sec-lbl">Capaian 7 Outcome & Distribusi Disabilitas</div>
    <div class="oc-charts-row">
      <div class="chart-card">
        <div class="chart-card-title">Capaian 7 Outcome <span style="font-weight:400;color:#7d8590;font-size:.68rem">— klik untuk ke ITT Tracker</span></div>
        <div class="chart-wrap-tall"><canvas id="ch-outcome"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Ragam Disabilitas</div>
        <div class="chart-wrap"><canvas id="ch-ragam"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Level Disabilitas</div>
        <div class="chart-wrap"><canvas id="ch-level"></canvas></div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <!-- Aktivitas Terbaru -->
      <div class="mb-card">
        <div class="mb-card-head">
          <span class="mb-card-title">Aktivitas Terbaru</span>
          <span class="mb-card-sub">${BEN_MON.length} kegiatan tercatat</span>
        </div>
        <div style="padding:0">
          <div class="tbl-wrap">
            <table class="mb-table">
              <thead><tr>
                <th>Nama Kegiatan</th><th>Tanggal</th><th>Outcome</th>
                <th style="text-align:center">L</th><th style="text-align:center">P</th>
                <th style="text-align:center">Total</th>
              </tr></thead>
              <tbody>
                ${aktTerbaru.length ? aktTerbaru.map(r=>{
                  const outC = {'O1':'#F97316','O2':'#E8C468','O3':'#2563eb','O4':'#16a34a','O5':'#7c3aed','O6':'#d97706','O7':'#0ea5e9'}[r.outcome]||'#7d8590';
                  return `<tr>
                    <td style="font-weight:600;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#f0f6fc">${r.nama_kegiatan||'—'}</td>
                    <td style="white-space:nowrap;color:#8b949e;font-size:.73rem">${fmtTgl(r.tanggal)}</td>
                    <td><span class="out-pill" style="background:${outC}">${r.outcome||'—'}</span></td>
                    <td style="text-align:center;color:#1d4ed8;font-weight:700">${num(r.laki)}</td>
                    <td style="text-align:center;color:#db2777;font-weight:700">${num(r.perempuan)}</td>
                    <td style="text-align:center;font-weight:800;color:#f0f6fc">${num(r.total)}</td>
                  </tr>`;
                }).join('') : '<tr><td colspan="6" style="text-align:center;color:#7d8590;padding:20px">Belum ada data aktivitas.<br><small>Upload via MEL SCN Tools</small></td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Kondisi Anak -->
      <div class="mb-card">
        <div class="mb-card-head">
          <span class="mb-card-title">Kondisi Anak</span>
          <span class="mb-card-sub">${total} total beneficiary</span>
        </div>
        <div class="mb-card-body">
          <div style="font-size:.67rem;font-weight:700;color:#7d8590;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Distribusi Skor Cantrill</div>
          ${[['Kritis (1–3)',anak.filter(a=>a.sp!=null&&a.sp<=3).length,'#dc2626'],
             ['Sedang (4–6)',anak.filter(a=>a.sp!=null&&a.sp>=4&&a.sp<=6).length,'#d97706'],
             ['Baik (7–10)', anak.filter(a=>a.sp!=null&&a.sp>=7).length,'#16a34a'],
             ['Belum diisi', anak.filter(a=>a.sp==null).length,'#7d8590']].map(([l,n,c])=>{
            const pct=total>0?Math.round(n/total*100):0;
            return `<div class="score-row">
              <span class="score-lbl" style="color:${c}">${l}</span>
              <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${c}"></div></div>
              <span class="score-pct" style="color:${c}">${pct}%</span>
            </div>`;}).join('')}
          <div style="font-size:.67rem;font-weight:700;color:#7d8590;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px">Coverage Observasi</div>
          <div class="score-row">
            <span class="score-lbl" style="color:#2563eb">Sudah observasi</span>
            <div class="score-bar"><div class="score-fill" style="width:${coverage}%;background:#2563eb"></div></div>
            <span class="score-pct" style="color:#2563eb">${coverage}%</span>
          </div>
          <div class="score-row">
            <span class="score-lbl" style="color:#7d8590">Belum observasi</span>
            <div class="score-bar"><div class="score-fill" style="width:${100-coverage}%;background:#6e7681"></div></div>
            <span class="score-pct" style="color:#7d8590">${100-coverage}%</span>
          </div>
          <div style="font-size:.67rem;font-weight:700;color:#7d8590;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px">CBR Worker</div>
          <div style="font-size:.82rem;color:#f0f6fc;font-weight:700">${workers.length} <span style="font-weight:400;color:#8b949e">pekerja aktif</span></div>
        </div>
      </div>
    </div>
    </div>

    <aside class="insight-rail">
      ${alerts.length ? `<div>
        <div class="insight-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Perlu Perhatian</div>
        <div class="insight-card-body">${alerts.map(a=>`<div style="margin-bottom:10px"><strong style="color:#f0f6fc;display:block;font-size:.72rem">${a.main}</strong><span style="font-size:.68rem;color:#7d8590">${a.sub}</span></div>`).join('')}</div>
      </div>` : ''}
      <div>
        <div class="insight-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Intisari MEL</div>
        <div class="insight-card-body">${intisariText}</div>
      </div>
    </aside>
    </div>
  `;

  // ── SHARED: datalabel plugin (manual afterDraw) ──
  const datalabelPlugin = {
    id:'datalabel',
    afterDatasetsDraw(chart){
      const {ctx,data,scales:{x,y}}=chart;
      ctx.save();
      ctx.font='700 10px JetBrains Mono, monospace';
      ctx.fillStyle='#c9d1d9';
      ctx.textAlign='center';
      ctx.textBaseline='bottom';
      data.datasets.forEach((ds,di)=>{
        chart.getDatasetMeta(di).data.forEach((bar,i)=>{
          const val=ds.data[i];
          if(val==null||val===0) return;
          const suffix=chart.config.options._labelSuffix||'';
          ctx.fillText(val+suffix, bar.x, bar.y-3);
        });
      });
      ctx.restore();
    }
  };

  // ── CHART: Outcome ──
  const ctxOC = document.getElementById('ch-outcome');
  if(ctxOC){
    const ocPcts = OUT_CONF.map(o=>pcts[o.id]||0);
    const ocChart = new Chart(ctxOC, {
      type:'bar',
      plugins:[datalabelPlugin],
      data:{
        labels: OUT_CONF.map(o=>o.label),
        datasets:[{
          data: ocPcts,
          backgroundColor: '#F97316CC',
          borderColor:      '#F97316',
          borderWidth:1.5,
          borderRadius:6,
        }]
      },
      options:{
        _labelSuffix:'%',
        responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:18}},
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+'%'}}},
        scales:{
          y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'#21262d'}},
          x:{ticks:{font:{size:10}},grid:{display:false}}
        },
        onClick(e,el){if(el.length)window.location.href='mel-itt.html';}
      }
    });
    _charts.push(ocChart);
  }

  // ── CHART: Ragam ──
  const ctxRg = document.getElementById('ch-ragam');
  if(ctxRg){
    const rgChart = new Chart(ctxRg, {
      type:'bar',
      plugins:[datalabelPlugin],
      data:{
        labels: ragamLabels.map(l=>l.length>12?l.slice(0,12)+'…':l),
        datasets:[{
          data: ragamData,
          backgroundColor: '#E8C468CC',
          borderColor:      '#E8C468',
          borderWidth:1.5,
          borderRadius:6,
        }]
      },
      options:{
        _labelSuffix:'',
        responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:18}},
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+' anak'}}},
        scales:{
          y:{beginAtZero:true,ticks:{font:{size:10},stepSize:1},grid:{color:'#21262d'}},
          x:{ticks:{font:{size:9}},grid:{display:false}}
        }
      }
    });
    _charts.push(rgChart);
  }

  // ── CHART: Level ──
  const ctxLv = document.getElementById('ch-level');
  if(ctxLv){
    const lvChart = new Chart(ctxLv, {
      type:'bar',
      plugins:[datalabelPlugin],
      data:{
        labels: levelShort,
        datasets:[{
          data: levelData,
          backgroundColor: '#F97316CC',
          borderColor:      '#F97316',
          borderWidth:1.5,
          borderRadius:6,
        }]
      },
      options:{
        _labelSuffix:'',
        responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:18}},
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+' anak'}}},
        scales:{
          y:{beginAtZero:true,ticks:{font:{size:10},stepSize:1},grid:{color:'#21262d'}},
          x:{ticks:{font:{size:11}},grid:{display:false}}
        }
      }
    });
    _charts.push(lvChart);
  }

  // Fix: setelah navigasi via View Transition, Chart.js kadang membaca
  // lebar container sebelum layout benar-benar selesai (masih transisi),
  // jadi chart tampil sempit sampai di-refresh manual. Paksa resize
  // setelah layout settle.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      _charts.forEach(c => { try { c.resize(); } catch(e) {} });
    });
  });
}

function tipLLP(l,p){
  const t=l+p||1;
  return `<span class="kpi-tip">
    <span class="kpi-tip-icon">L/P</span>
    <div class="kpi-tip-box">Laki-laki: <strong>${l}</strong> (${Math.round(l/t*100)}%)<br>Perempuan: <strong>${p}</strong> (${Math.round(p/t*100)}%)</div>
  </span>`;
}
function sc(icon,bg,color,lbl,sub,href){
  return `<a class="sc-card" href="${href}">
    <div class="sc-icon" style="background:${bg};color:${color}">${icon}</div>
    <div><div class="sc-lbl">${lbl}</div><div class="sc-sub">${sub}</div></div>
  </a>`;
}
function fmtTgl(v){
  if(!v)return '—';
  const s=String(v);
  if(s.includes('T')){const d=new Date(s);if(!isNaN(d))return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});}
  if(s.match(/^\d{2}\/\d{2}\/\d{4}$/))return s;
  if(s.match(/^\d{4}-\d{2}-\d{2}$/)){const[y,m,d]=s.split('-');return `${d} ${['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'][+m]} ${y}`;}
  return s;
}

    API_BEN.get('monthly', AUTH.getScnFilter()),
