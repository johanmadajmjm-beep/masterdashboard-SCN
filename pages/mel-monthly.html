<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — Monthly Monitoring | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── KPI ── */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
    @media(max-width:900px){.kpi-row{grid-template-columns:1fr 1fr}}
    .kpi-card{background:#fff;border:1px solid #e9eef6;border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:14px}
    .kpi-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.3rem}
    .kpi-val{font-size:1.6rem;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
    .kpi-lbl{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-top:5px}
    .kpi-sub{font-size:.68rem;color:#94a3b8;margin-top:2px}

    /* ── CHARTS ROW ── */
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
    @media(max-width:900px){.charts-row{grid-template-columns:1fr}}
    .mm-card{background:#fff;border:1px solid #e9eef6;border-radius:14px;overflow:hidden}
    .mm-card-head{padding:13px 18px 11px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
    .mm-card-title{font-size:.86rem;font-weight:700;color:#0f172a}
    .mm-card-body{padding:16px 18px}

    /* ── MASTER-DETAIL LAYOUT (worker-anak pattern) ── */
    .sec-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:10px}

    .ld-wrap{display:flex;flex:1;overflow:hidden;background:#fff;border:1px solid #e9eef6;border-radius:14px}
    .ld-list{width:100%;min-width:0;flex-shrink:0;border-right:1px solid #e9eef6;display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease}
    .ld-wrap.detail-open .ld-list{width:320px;min-width:320px}
    .ld-items{flex:1;overflow-y:auto}
    .ld-items::-webkit-scrollbar{width:4px}
    .ld-items::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
    .ld-detail{flex:1;overflow-y:auto;background:#f8fafc;display:none}
    .ld-wrap.detail-open .ld-detail{display:block}
    .ld-detail::-webkit-scrollbar{width:5px}
    .ld-detail::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px}

    /* ── KEGIATAN LIST ── */
    .keg-list-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .12s;border-left:3px solid transparent}
    .keg-list-item:last-child{border-bottom:none}
    .keg-list-item:hover{background:#fff7ed}
    .keg-list-item.active{background:#fff7ed;border-left:3px solid #F97316}
    .scn-dot{width:30px;height:30px;border-radius:8px;color:#fff;font-size:.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .keg-list-name{font-size:.76rem;font-weight:600;color:#0f172a;line-height:1.4;margin-bottom:3px}
    .keg-list-meta{font-size:.66rem;color:#94a3b8}

    /* ── DETAIL PANEL ── */
    .detail-header{padding:16px 20px;background:#fff7ed;border-bottom:1px solid #fed7aa}
    .detail-title{font-size:.9rem;font-weight:700;color:#0f172a;margin-bottom:6px;line-height:1.4}
    .detail-body{padding:18px 20px}
    .det-back{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid #e9eef6;border-radius:8px;background:#fff;color:#64748b;font-size:.73rem;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s;margin-bottom:14px}
    .det-back:hover{background:#f1f5f9;color:#0f172a}

    /* Stats row di detail */
    .detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
    .detail-stat{background:#f8fafc;border-radius:10px;padding:10px 12px;text-align:center}
    .detail-stat-val{font-size:1.2rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:#0f172a}
    .detail-stat-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-top:3px}

    /* Narasi fields */
    .narasi-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .narasi-field{border:1px solid #e9eef6;border-radius:10px;overflow:hidden}
    .narasi-field-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f8fafc;border-bottom:1px solid #e9eef6}
    .narasi-field-icon{font-size:.9rem}
    .narasi-field-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#475569}
    .narasi-field-body{padding:12px 14px;font-size:.76rem;color:#334155;line-height:1.7;min-height:80px}
    .narasi-empty{font-size:.75rem;color:#cbd5e1;font-style:italic}

    /* Peserta breakdown di detail */
    .peserta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
    .peserta-item{background:#f8fafc;border-radius:8px;padding:8px 10px;text-align:center}
    .peserta-item-val{font-size:1rem;font-weight:800;color:#F97316}
    .peserta-item-lbl{font-size:.6rem;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-top:2px}

    /* ── TOPBAR EXTRAS ── */
    .topbar-filter-scn{padding:6px 12px;border:1px solid #e9eef6;border-radius:8px;font-size:.76rem;font-family:var(--font-body);background:#fff;color:#0f172a;cursor:pointer;min-width:140px}
    .btn-export{display:flex;align-items:center;gap:6px;padding:6px 14px;background:#fff;border:1px solid #e9eef6;border-radius:8px;font-size:.74rem;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap}
    .btn-export:hover{background:#f8fafc}

    /* ── MISC ── */
    .mm-loading{display:flex;align-items:center;justify-content:center;height:200px;color:#94a3b8;font-size:.82rem;gap:10px}
    .spin{width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#F97316;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:48px;color:#94a3b8;font-size:.82rem}
    .bar-chart-wrap{position:relative;height:250px}
    .donut-chart-wrap{position:relative;height:250px}
    .tbl-wrap{overflow-x:auto}
    .outcome-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.64rem;font-weight:700}
    .detail-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#cbd5e1;font-size:.8rem;gap:8px}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Monthly Monitoring</span></div>
      </div>
      <div class="topbar-right" style="gap:8px">
        <select class="topbar-filter-scn" id="scn-filter-select" onchange="onSCNFilterChange(this.value)">
          <option value="">Semua SCN</option>
          <option value="manggarai">SCN Manggarai</option>
          <option value="banyuwangi">SCN Banyuwangi</option>
          <option value="jember">SCN Jember</option>
          <option value="situbondo">SCN Situbondo</option>
          <option value="kupang">SCN Kupang</option>
          <option value="tts">SCN TTS</option>
          <option value="palu">SCN Palu</option>
          <option value="sigi">SCN Sigi</option>
        </select>
        <button class="btn-export" onclick="exportLaporan()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Ekspor Laporan
        </button>
        <span class="scn-badge" id="scn-badge" style="display:none">—</span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page">

      <div id="page-content">
        <div class="mm-loading"><div class="spin"></div> Memuat data monitoring...</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script src="../js/api-ben.js"></script>
<script>
const SCN_LBL  = {manggarai:'MGR',banyuwangi:'BWI',jember:'JBR',situbondo:'STB',kupang:'KPG',tts:'TTS',palu:'PLU',sigi:'SGI'};
const SCN_FULL = {manggarai:'SCN Manggarai',banyuwangi:'SCN Banyuwangi',jember:'SCN Jember',situbondo:'SCN Situbondo',kupang:'SCN Kupang',tts:'SCN TTS',palu:'SCN Palu',sigi:'SCN Sigi'};
const OUT_LBL  = {'O1':'Outcome 1','O2':'Outcome 2','O3':'Outcome 3','O4':'Outcome 4','O5':'Outcome 5','O6':'Outcome 6','O7':'Outcome 7'};

let ALL_DATA    = [];
let ACTIVE_SCN  = null;
let ACTIVE_IDX  = 0;
let chartPes    = null;
let chartOut    = null;

// ── HELPERS ──────────────────────────────────────────────────
function num(v){ return parseInt(v)||0; }

function fmtTgl(v){
  if(!v) return '—';
  const s = String(v);
  if(s.includes('T')){
    const d = new Date(s);
    if(!isNaN(d)) return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  }
  if(s.match(/^\d{2}\/\d{2}\/\d{4}$/)) return s;
  if(s.match(/^\d{4}-\d{2}-\d{2}$/)){
    const [y,m,d]=s.split('-');
    const mn=['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
    return `${d} ${mn[+m]} ${y}`;
  }
  return s;
}

function destroyChart(c){ if(c){try{c.destroy();}catch(e){}} return null; }

// Oranye monokromatik — makin banyak makin gelap (dari terang ke gelap)
function monoOrange(n){
  const stops=['#FDBA74','#FB923C','#F97316','#EA6C00','#C05500','#9A4400','#7C3600'];
  return Array.from({length:n},(_,i)=>stops[Math.min(i,stops.length-1)]);
}

// ── FETCH ─────────────────────────────────────────────────────
async function fetchMonthly(scnId){
  return await API_BEN.get('monthly', scnId||null);
}

// ── FILTER CHANGE ─────────────────────────────────────────────
async function onSCNFilterChange(scnId){
  ACTIVE_SCN = scnId||null;
  document.getElementById('page-content').innerHTML='<div class="mm-loading"><div class="spin"></div> Memuat data...</div>';
  ALL_DATA = await fetchMonthly(ACTIVE_SCN);
  ACTIVE_IDX = 0;
  if(!ALL_DATA.length){
    document.getElementById('page-content').innerHTML='<div class="empty-state">Belum ada data monitoring untuk SCN ini.<br>Upload data melalui MEL SCN Tools terlebih dahulu.</div>';
    return;
  }
  buildUI();
}

// ── RENDER PAGE ───────────────────────────────────────────────
async function renderPage(d, scnId){
  ACTIVE_SCN = scnId||null;
  const sel = document.getElementById('scn-filter-select');
  if(sel) sel.value = ACTIVE_SCN||'';
  document.getElementById('page-content').innerHTML='<div class="mm-loading"><div class="spin"></div> Memuat data monitoring...</div>';
  ALL_DATA = await fetchMonthly(ACTIVE_SCN);
  ACTIVE_IDX = 0;
  if(!ALL_DATA.length){
    document.getElementById('page-content').innerHTML='<div class="empty-state">Belum ada data monitoring.<br>Upload data melalui MEL SCN Tools terlebih dahulu.</div>';
    return;
  }
  buildUI();
}

// ── BUILD UI ──────────────────────────────────────────────────
function buildUI(){
  const data = ALL_DATA;
  const totalKeg  = data.length;
  const totalL    = data.reduce((s,r)=>s+num(r.laki),0);
  const totalP    = data.reduce((s,r)=>s+num(r.perempuan),0);
  const totalPes  = totalL+totalP;
  const totalU25  = data.reduce((s,r)=>s+num(r.u25),0);
  const totalU26  = data.reduce((s,r)=>s+num(r.u26),0);
  const totalDisab= data.reduce((s,r)=>s+num(r.disab),0);

  const pesKat = [
    {lbl:'CBR Worker',    val:data.reduce((s,r)=>s+num(r.cbr),0)},
    {lbl:'Guru',          val:data.reduce((s,r)=>s+num(r.guru),0)},
    {lbl:'Pengasuh/Ortu', val:data.reduce((s,r)=>s+num(r.pengasuh),0)},
    {lbl:'Nakes',         val:data.reduce((s,r)=>s+num(r.nakes),0)},
    {lbl:'Staff Mitra',   val:data.reduce((s,r)=>s+num(r.staff),0)},
    {lbl:'Pemerintah',    val:data.reduce((s,r)=>s+num(r.pemerintah),0)},
    {lbl:'Lainnya',       val:data.reduce((s,r)=>s+num(r.lainnya),0)},
  ];

  const outCount = {};
  data.forEach(r=>{ const o=r.outcome||'Lainnya'; outCount[o]=(outCount[o]||0)+1; });

  document.getElementById('page-content').innerHTML = `
    <div class="kpi-row">
      ${kpiCard('📋','#fff7ed','#F97316',totalKeg,'Total Kegiatan',data.length>0?[...new Set(data.map(r=>r.scn).filter(Boolean))].length+' SCN aktif':'')}
      ${kpiCard('👥','#f1f5f9','#1E293B',totalPes,'Total Peserta',totalL+'L / '+totalP+'P')}
      ${kpiCard('👤','#fff7ed','#EA6C00',totalU25+' / '+totalU26,'Usia ≤25 / ≥26','disagregasi usia peserta')}
      ${kpiCard('♿','#f1f5f9','#475569',totalDisab,'Peserta Disabilitas',Math.round(totalDisab/Math.max(totalPes,1)*100)+'% dari total')}
    </div>

    <div class="charts-row">
      <div class="mm-card">
        <div class="mm-card-head"><span class="mm-card-title">Peserta per Kategori</span></div>
        <div class="mm-card-body"><div class="bar-chart-wrap"><canvas id="chart-peserta"></canvas></div></div>
      </div>
      <div class="mm-card">
        <div class="mm-card-head"><span class="mm-card-title">Distribusi Outcome</span></div>
        <div class="mm-card-body"><div class="donut-chart-wrap"><canvas id="chart-outcome"></canvas></div></div>
      </div>
    </div>

    <div class="sec-label">Daftar Kegiatan <span style="font-weight:400;color:#cbd5e1">${totalKeg} kegiatan</span></div>
    <div class="ld-wrap" id="ld-wrap" style="min-height:480px">
      <!-- KIRI: list kegiatan -->
      <div class="ld-list">
        <div class="ld-items" id="keg-list"></div>
      </div>
      <!-- KANAN: detail panel -->
      <div class="ld-detail" id="detail-panel"></div>
    </div>
  `;

  renderChartPeserta(pesKat);
  renderChartOutcome(outCount);
  renderKegList(data);
  // Default: list full width, detail terbuka saat klik
}

// ── CHARTS ───────────────────────────────────────────────────
function renderChartPeserta(pesKat){
  const el = document.getElementById('chart-peserta');
  if(!el) return;
  chartPes = destroyChart(chartPes);
  const sorted = [...pesKat].sort((a,b)=>b.val-a.val);
  const colors = monoOrange(sorted.length);
  chartPes = new Chart(el.getContext('2d'),{
    type:'bar',
    data:{
      labels: sorted.map(k=>k.lbl),
      datasets:[{
        label:'Peserta',
        data: sorted.map(k=>k.val),
        backgroundColor: colors,
        borderRadius:5, borderSkipped:false
      }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw} orang`}} },
      scales:{
        x:{grid:{color:'#f1f5f9'},ticks:{font:{size:10}},beginAtZero:true},
        y:{grid:{display:false},ticks:{font:{size:11}}}
      }
    }
  });
}

function renderChartOutcome(outCount){
  const el = document.getElementById('chart-outcome');
  if(!el) return;
  chartOut = destroyChart(chartOut);
  const keys = Object.keys(outCount);
  const vals = Object.values(outCount);
  const total = vals.reduce((a,b)=>a+b,0);
  // Monokromatik: oranye → hitam
  const palette = ['#F97316','#1E293B','#EA6C00','#475569','#C05500','#94A3B8','#7C3600'];
  chartOut = new Chart(el.getContext('2d'),{
    type:'doughnut',
    data:{
      labels: keys.map(k=>`${OUT_LBL[k]||k} (${Math.round(outCount[k]/total*100)}%)`),
      datasets:[{
        data: vals,
        backgroundColor: keys.map((_,i)=>palette[i%palette.length]),
        borderColor:'#fff', borderWidth:3
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'60%',
      plugins:{
        legend:{ position:'right', labels:{ font:{size:10}, padding:10, usePointStyle:true } },
        tooltip:{ callbacks:{ label:c=>` ${c.raw} kegiatan` } }
      }
    }
  });
}

// ── KEG LIST ─────────────────────────────────────────────────
function renderKegList(data){
  document.getElementById('keg-list').innerHTML = data.map((r,i)=>{
    const scn   = r.scn||'';
    // warna dot per SCN: oranye untuk manggarai, hitam untuk lainnya
    const dotBg = scn==='manggarai'?'#F97316':scn?'#1E293B':'#94a3b8';
    const badge = SCN_LBL[scn]||scn.toUpperCase().slice(0,3)||'—';
    return `
    <div class="keg-list-item" id="keg-item-${i}" onclick="selectKeg(${i})">
      <div class="scn-dot" style="background:${dotBg}">${badge}</div>
      <div>
        <div class="keg-list-name">${r.nama_kegiatan||'(tanpa judul)'}</div>
        <div class="keg-list-meta">${fmtTgl(r.tanggal)} · ${r.lokasi||'—'}</div>
      </div>
    </div>`;
  }).join('');
}

// ── SELECT KEG ───────────────────────────────────────────────
function selectKeg(i){
  // Update active state
  document.querySelectorAll('.keg-list-item').forEach(el=>el.classList.remove('active'));
  const item = document.getElementById('keg-item-'+i);
  if(item) item.classList.add('active');
  ACTIVE_IDX = i;
  renderDetail(i);
}

// ── DETAIL PANEL ─────────────────────────────────────────────
function renderDetail(i){
  const r = ALL_DATA[i];
  if(!r){ closeDetail(); return; }
  // Buka panel
  document.getElementById('ld-wrap').classList.add('detail-open');

  const scn    = r.scn||'';
  const dotBg  = scn==='manggarai'?'#F97316':scn?'#1E293B':'#94a3b8';
  const badge  = SCN_LBL[scn]||scn.toUpperCase().slice(0,3)||'—';
  const outC   = r.outcome==='O1'?'#F97316':r.outcome?'#1E293B':'#94a3b8';

  const narasiFields = [
    {icon:'📋', bg:'#fff7ed', lbl:'Tangible Output',        val:r.tangible_output},
    {icon:'🎯', bg:'#f1f5f9', lbl:'Rencana Tindak Lanjut',  val:r.follow_up},
    {icon:'📊', bg:'#f8fafc', lbl:'Evaluasi',               val:r.evaluasi},
    {icon:'💡', bg:'#fffbeb', lbl:'Lesson Learnt',           val:r.lesson_learnt},
    {icon:'✅', bg:'#f0fdf4', lbl:'Capaian / Temuan',        val:r.capaian},
  ].filter(f=>f.val);

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-header">
      <button class="det-back" onclick="closeDetail()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Kembali
      </button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="scn-dot" style="background:${dotBg};width:28px;height:28px;font-size:.58rem">${badge}</div>
        <span class="outcome-pill" style="background:${outC}18;color:${outC}">${r.outcome||'—'}</span>
        <span style="font-size:.7rem;color:#92400e">${fmtTgl(r.tanggal)}</span>
        <span style="font-size:.7rem;color:#92400e;margin-left:auto">📍 ${r.lokasi||'—'}</span>
      </div>
      <div class="detail-title">${r.nama_kegiatan||'—'}</div>
      <div style="font-size:.72rem;color:#92400e;margin-top:4px">Pelaksana: ${r.pelaksana||'—'}</div>
    </div>
    <div class="detail-body">
      <!-- Statistik peserta -->
      <div style="font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:8px">Statistik Peserta</div>
      <div class="detail-stats" style="margin-bottom:18px">
        <div class="detail-stat"><div class="detail-stat-val" style="color:#1d4ed8">${num(r.laki)}</div><div class="detail-stat-lbl">Laki-laki</div></div>
        <div class="detail-stat"><div class="detail-stat-val" style="color:#db2777">${num(r.perempuan)}</div><div class="detail-stat-lbl">Perempuan</div></div>
        <div class="detail-stat"><div class="detail-stat-val" style="color:#F97316">${num(r.total)}</div><div class="detail-stat-lbl">Total</div></div>
        <div class="detail-stat"><div class="detail-stat-val" style="color:#7c3aed">${num(r.disab)}</div><div class="detail-stat-lbl">Disabilitas</div></div>
      </div>
      <div class="peserta-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
        <div class="peserta-item"><div class="peserta-item-val">${num(r.u25)}</div><div class="peserta-item-lbl">Usia ≤25</div></div>
        <div class="peserta-item"><div class="peserta-item-val">${num(r.u26)}</div><div class="peserta-item-lbl">Usia ≥26</div></div>
        <div class="peserta-item"><div class="peserta-item-val">${num(r.oypmk)}</div><div class="peserta-item-lbl">OYPMK</div></div>
        <div class="peserta-item"><div class="peserta-item-val">${num(r.total_inst)}</div><div class="peserta-item-lbl">Institusi</div></div>
      </div>
      <div class="peserta-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
        <div class="peserta-item"><div class="peserta-item-val">${num(r.guru)}</div><div class="peserta-item-lbl">Guru</div></div>
        <div class="peserta-item"><div class="peserta-item-val">${num(r.pengasuh)}</div><div class="peserta-item-lbl">Pengasuh</div></div>
        <div class="peserta-item"><div class="peserta-item-val">${num(r.nakes)}</div><div class="peserta-item-lbl">Nakes</div></div>
        <div class="peserta-item"><div class="peserta-item-val">${num(r.pemerintah)}</div><div class="peserta-item-lbl">Pemerintah</div></div>
      </div>

      <!-- Narasi -->
      ${narasiFields.length ? `
      <div style="font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:10px">Narasi & Pembelajaran</div>
      <div class="narasi-grid">
        ${narasiFields.map(f=>`
        <div class="narasi-field">
          <div class="narasi-field-head" style="background:${f.bg}">
            <span class="narasi-field-icon">${f.icon}</span>
            <span class="narasi-field-label">${f.lbl}</span>
          </div>
          <div class="narasi-field-body">${f.val}</div>
        </div>`).join('')}
      </div>` : '<div class="narasi-empty">Belum ada narasi untuk kegiatan ini.</div>'}
    </div>
  `;
}

// ── CLOSE DETAIL ─────────────────────────────────────────────
function closeDetail(){
  document.getElementById('ld-wrap').classList.remove('detail-open');
  document.querySelectorAll('.keg-list-item').forEach(el=>el.classList.remove('active'));
  ACTIVE_IDX = -1;
}

// ── EXPORT ───────────────────────────────────────────────────
function exportLaporan(){
  const rows = ALL_DATA;
  if(!rows.length){ alert('Tidak ada data.'); return; }
  const hdr = ['SCN','Nama Kegiatan','Tanggal','Lokasi','Outcome','Pelaksana','L','P','Total','≤25','≥26','Disab','Guru','Pengasuh','Nakes','Pemerintah','Tangible Output','RTL','Evaluasi','Lesson Learnt','Capaian'];
  const csv = [hdr.join(','), ...rows.map(r=>[
    r.scn,'"'+(r.nama_kegiatan||'').replace(/"/g,'""')+'"',fmtTgl(r.tanggal),
    '"'+(r.lokasi||'')+'"',r.outcome,'"'+(r.pelaksana||'')+'"',
    num(r.laki),num(r.perempuan),num(r.total),num(r.u25),num(r.u26),num(r.disab),
    num(r.guru),num(r.pengasuh),num(r.nakes),num(r.pemerintah),
    '"'+(r.tangible_output||'').replace(/"/g,'""')+'"',
    '"'+(r.follow_up||'').replace(/"/g,'""')+'"',
    '"'+(r.evaluasi||'').replace(/"/g,'""')+'"',
    '"'+(r.lesson_learnt||'').replace(/"/g,'""')+'"',
    '"'+(r.capaian||'').replace(/"/g,'""')+'"',
  ].join(','))].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'monthly-'+(ACTIVE_SCN||'all')+'-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function kpiCard(icon,bg,color,val,lbl,sub){
  return `<div class="kpi-card">
    <div class="kpi-icon" style="background:${bg};color:${color}">${icon}</div>
    <div><div class="kpi-val" style="color:${color}">${val}</div><div class="kpi-lbl">${lbl}</div><div class="kpi-sub">${sub}</div></div>
  </div>`;
}

buildSidebar();
const SESSION = AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({
    onScnSwitch: function(scnId){
      const sel = document.getElementById('scn-filter-select');
      if(sel) sel.value = scnId||'';
      renderPage(null, scnId);
    }
  });
  AUTH.initSidebar('mel','m-monthly');
  // Daftarkan callback untuk background refresh otomatis
  window.renderPageBEN = function(sheet, data){
    if(sheet === 'monthly'){ ALL_DATA = data; ACTIVE_IDX = 0; buildUI(); }
  };
  renderPage(null, AUTH.getScnFilter());
}
</script>
