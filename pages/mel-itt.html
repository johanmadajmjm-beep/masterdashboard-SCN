<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — ITT Tracker | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .kpi-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;gap:12px;}
    .kpi-row:last-child{border-bottom:none;}
    .worker-bar{display:flex;align-items:center;gap:10px;}
    .overview-7{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
    .ov-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;}
    .ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
    .ov-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;line-height:1;margin:6px 0;}
    .ov-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
    .ov-sub{font-size:.65rem;color:var(--gray-400);margin-top:4px;}
    .story-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:20px;}
    .story-tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.65rem;font-weight:700;background:var(--teal-50);color:var(--teal-700);margin-bottom:10px;}
    .story-nama{font-size:.95rem;font-weight:800;color:var(--gray-900);margin-bottom:4px;}
    .story-meta{font-size:.7rem;color:var(--gray-400);margin-bottom:10px;}
    .story-narasi{font-size:.8rem;color:var(--gray-700);line-height:1.7;}
    .stake-bar-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);font-size:.78rem;}
    .stake-bar-row:last-child{border-bottom:none;}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">ITT Tracker</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge">—</span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page" id="page-content">

      <div class="page-header"><h1>Indicator Tracking Table</h1><p>Capaian per indikator berdasarkan ITT NLR Indonesia — 7 Outcome · Year 1 2026.</p></div>
      <div id="itt-container"></div>
      <script>
      function initPage(s){
        const d = getScnData(s.scn_id||'manggarai');
        const itt = d.itt.Y1_Q2;
        document.getElementById('itt-container').innerHTML = OUTCOMES.map(o=>{
          const rows = o.indikator_ids.map(id=>{
            const item = itt[id]; if(!item) return '';
            const cap = item.cap, tgt = item.target_y1, total = item.target_total;
            const pct = getPct(cap,tgt), col = getPctColor(pct);
            const sel = cap-tgt;
            const selStr = tgt>0?(sel>=0?`<span style="color:var(--green)">+${sel}</span>`:`<span style="color:var(--red)">${sel}</span>`):'—';
            return `<tr>
              <td style="max-width:280px"><div style="font-size:.72rem;color:var(--gray-700);line-height:1.4">${ITT_LABELS[id]||id}</div></td>
              <td class="mono" style="text-align:center">${total||'—'}</td>
              <td class="mono" style="text-align:center">${tgt||'—'}</td>
              <td class="mono" style="text-align:center;font-weight:700;color:${col}">${cap}</td>
              <td style="min-width:130px"><div style="display:flex;align-items:center;gap:8px">
                <div class="prog-wrap" style="flex:1"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
                <span class="mono" style="font-size:.7rem;color:${col};min-width:30px">${pct}%</span>
              </div></td>
              <td style="text-align:center" class="mono">${selStr}</td>
              <td>${getStatusBadge(pct)}</td>
            </tr>`;
          }).join('');
          const avgPct = Math.round(o.indikator_ids.filter(id=>itt[id]&&itt[id].target_y1>0).reduce((s,id)=>s+getPct(itt[id].cap,itt[id].target_y1),0)/Math.max(o.indikator_ids.filter(id=>itt[id]&&itt[id].target_y1>0).length,1));
          return `<div style="background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);overflow:hidden;margin-bottom:16px">
            <div style="padding:14px 18px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);border-left:4px solid ${o.warna};display:flex;align-items:center;justify-content:space-between">
              <div><span style="font-size:.65rem;font-weight:800;color:${o.warna};text-transform:uppercase;letter-spacing:.06em">${o.label}</span>
              <div style="font-size:.9rem;font-weight:700;color:var(--gray-900);margin-top:2px">${o.pendek}</div></div>
              <div style="display:flex;align-items:center;gap:10px">
                <span class="mono" style="font-size:1.1rem;font-weight:700;color:${o.warna}">${avgPct}%</span>
                ${getStatusBadge(avgPct)}
              </div>
            </div>
            <div class="tbl-wrap"><table>
              <thead><tr><th style="min-width:260px">Indikator</th><th style="text-align:center">Target<br>Total</th><th style="text-align:center">Target<br>Y1</th><th style="text-align:center">Capaian</th><th style="min-width:130px">Progress</th><th style="text-align:center">Selisih</th><th>Status</th></tr></thead>
              <tbody>${rows}</tbody>
            </table></div>
          </div>`;
        }).join('');
      }
      </script>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script>
  buildSidebar();
  const SESSION = AUTH.requireAuth('../index.html');
  if (SESSION) {
    AUTH.applySession({ onScnSwitch: (id) => { if(window.onScnSwitch) onScnSwitch(id); } });
    AUTH.initSidebar('mel','m-itt');
    if (window.initPage) initPage(SESSION);
  }
</script>
</body></html>
