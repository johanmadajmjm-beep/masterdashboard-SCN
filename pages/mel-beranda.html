<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MEL — Beranda | MEL NLR Indonesia</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    /* ── KPI ROW ── */
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
    .kpi-card{background:#fff;border:1px solid #e9eef6;border-radius:12px;padding:16px 18px;border-top:3px solid var(--kc,#F97316)}
    .kpi-val{font-size:1.6rem;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace;color:var(--kc,#F97316)}
    .kpi-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-top:5px}
    .kpi-sub{font-size:.67rem;color:#94a3b8;margin-top:2px}

    /* ── ALERT ── */
    .alert-strip{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .alert-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;font-size:.78rem}
    .alert-row.red{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
    .alert-row.amber{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
    .alert-row.green{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
    .alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .alert-dot.red{background:#ef4444}
    .alert-dot.amber{background:#f59e0b}
    .alert-dot.green{background:#22c55e}

    /* ── OUTCOME CARDS ── */
    .outcome-row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:20px}
    @media(max-width:1100px){.outcome-row{grid-template-columns:repeat(4,1fr)}}
    @media(max-width:700px){.outcome-row{grid-template-columns:repeat(2,1fr)}}
    .oc-card{background:#fff;border:1px solid #e9eef6;border-radius:12px;padding:14px 12px;cursor:pointer;transition:box-shadow .15s,transform .12s;text-decoration:none;display:block;border-top:3px solid var(--oc,#F97316)}
    .oc-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
    .oc-pct{font-size:1.5rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--oc);line-height:1;margin:6px 0}
    .oc-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--oc)}
    .oc-sub{font-size:.64rem;color:#94a3b8;margin-top:4px}
    .prog-track{height:5px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-top:8px}
    .prog-fill{height:100%;border-radius:3px;background:var(--oc,#F97316)}

    /* ── MAIN GRID ── */
    .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    @media(max-width:900px){.main-grid{grid-template-columns:1fr}}

    /* ── SHORTCUT ── */
    .shortcut-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    @media(max-width:700px){.shortcut-row{grid-template-columns:1fr 1fr}}
    .sc-card{background:#fff;border:1px solid #e9eef6;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none;transition:box-shadow .15s,transform .12s}
    .sc-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
    .sc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .sc-lbl{font-size:.8rem;font-weight:700;color:#0f172a}
    .sc-sub{font-size:.66rem;color:#94a3b8;margin-top:2px}

    /* ── CARD ── */
    .mb-card{background:#fff;border:1px solid #e9eef6;border-radius:12px;overflow:hidden}
    .mb-card-head{padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
    .mb-card-title{font-size:.84rem;font-weight:700;color:#0f172a}
    .mb-card-sub{font-size:.67rem;color:#94a3b8}
    .mb-card-body{padding:14px 16px}

    /* ── TABLE ── */
    .mb-table{width:100%;border-collapse:collapse;font-size:.77rem}
    .mb-table th{padding:8px 12px;text-align:left;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;background:#f8fafc;border-bottom:1px solid #e9eef6;white-space:nowrap}
    .mb-table td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    .mb-table tr:last-child td{border-bottom:none}
    .mb-table tr:hover td{background:#fafbfd}
    .out-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.64rem;font-weight:700;color:#fff}
    .tbl-wrap{overflow-x:auto}

    /* ── BENEF KONDISI ── */
    .kondisi-row{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
    .kondisi-stat{text-align:center;flex:1;min-width:60px}
    .kondisi-val{font-size:1.2rem;font-weight:800;font-family:'JetBrains Mono',monospace}
    .kondisi-lbl{font-size:.63rem;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-top:3px}
    .score-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.76rem}
    .score-lbl{min-width:100px;font-weight:600}
    .score-bar{flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden}
    .score-fill{height:100%;border-radius:3px}
    .score-num{font-size:.71rem;font-weight:700;min-width:60px;text-align:right;font-family:'JetBrains Mono',monospace}

    /* ── LOADING ── */
    .mb-loading{display:flex;align-items:center;justify-content:center;height:200px;color:#94a3b8;font-size:.82rem;gap:10px}
    .spin{width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#F97316;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">MEL <span class="sep">›</span><span class="current">Beranda</span></div>
      </div>
      <div class="topbar-right">
        <span class="scn-badge" id="scn-badge" style="display:none">—</span>
        <span id="data-source-badge" style="display:none;font-size:.7rem;padding:3px 10px;border-radius:999px;font-weight:600"></span>
        <span id="sync-time" style="display:none;font-size:.7rem;color:#94a3b8"></span>
        <span class="topbar-date" id="topbar-date">—</span>
      </div>
    </header>
    <div class="page">

      <div id="page-content">
        <div class="mb-loading"><div class="spin"></div> Memuat data...</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script src="../js/api-ben.js"></script>
<script>
const OUT_CONF = [
  {id:'O1',label:'Inklusi Anak',  pendek:'Wellbeing anak',        warna:'#F97316'},
  {id:'O2',label:'Pengasuh',      pendek:'Kapasitas pengasuh',    warna:'#1E293B'},
  {id:'O3',label:'CBR Worker',    pendek:'Kinerja pekerja',       warna:'#2563eb'},
  {id:'O4',label:'Pihak Terlibat',pendek:'Jaringan stakeholder',  warna:'#16a34a'},
  {id:'O5',label:'Kesehatan',     pendek:'Akses layanan',         warna:'#7c3aed'},
  {id:'O6',label:'Pendidikan',    pendek:'Akses pendidikan',      warna:'#d97706'},
  {id:'O7',label:'Penghidupan',   pendek:'Kemandirian ekonomi',   warna:'#0ea5e9'},
];

let BEN_MON = [];
let KOBO_D  = null;

function num(v){ return parseInt(v)||0; }

// % capaian outcome dihitung di mel-itt.html berdasarkan data real INDIKATOR + CAPAIAN
// Di beranda semua outcome default 0% sampai data ITT tersedia
function calcITTpct(){ return {O1:0,O2:0,O3:0,O4:0,O5:0,O6:0,O7:0}; }

function pctColor(v){ return v>=80?'#16a34a':v>=50?'#2563eb':v>=25?'#d97706':'#dc2626'; }

function renderPage(d, scnId){
  if(!d) return;
  KOBO_D = d;
  buildUI();
}

function buildUI(){
  const d      = KOBO_D;
  const anak   = d.anak||[];
  const obs    = d.obs||[];
  const workers= d.workers||[];
  const total  = anak.length;

  const spArr  = anak.filter(a=>a.sp!=null).map(a=>a.sp);
  const avgSp  = spArr.length?(spArr.reduce((s,v)=>s+v,0)/spArr.length).toFixed(1):null;
  const kritis = anak.filter(a=>a.sp!=null&&a.sp<=3).length;
  const telat  = anak.filter(a=>a.hari>30).length;
  const tanpaObs = anak.filter(a=>{const k=a.nama.toLowerCase();return!obs.some(o=>o.na&&o.na.toLowerCase()===k);}).length;
  const coverage = total>0?Math.round((total-tanpaObs)/total*100):0;
  const totalStk = 0; // akan diupdate saat BEN_MON loaded
  const totalKeg = new Set(BEN_MON.map(r=>r.nama_kegiatan).filter(Boolean)).size;

  // ITT
  const pcts = calcITTpct();

  // Alerts
  const alerts=[];
  if(kritis>0) alerts.push(`<div class="alert-row red"><div class="alert-dot red"></div><strong>${kritis} anak kondisi kritis</strong> — skor Cantrill ≤ 3, perlu intervensi segera</div>`);
  if(telat>0)  alerts.push(`<div class="alert-row amber"><div class="alert-dot amber"></div><strong>${telat} anak belum dikunjungi >30 hari</strong> — ${total?Math.round(telat/total*100):0}% dari total beneficiary</div>`);
  if(tanpaObs>0) alerts.push(`<div class="alert-row amber"><div class="alert-dot amber"></div><strong>${tanpaObs} anak belum diobservasi</strong> — coverage ${coverage}%</div>`);
  if(!alerts.length) alerts.push(`<div class="alert-row green"><div class="alert-dot green"></div>Semua indikator dalam kondisi baik</div>`);

  // Aktivitas terbaru dari DataMonthly
  const aktTerbaru = [...BEN_MON]
    .sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||''))
    .slice(0,6);

  // Kondisi benef
  const lk   = anak.filter(a=>a.gender==='L').length;
  const pr   = anak.filter(a=>a.gender==='P').length;
  const ep   = anak.filter(a=>a.ep).length;
  const tr   = anak.filter(a=>a.tr).length;
  const parah= anak.filter(a=>(a.level||'').includes('Parah')).length;

  const base = '../pages/';
  document.getElementById('page-content').innerHTML = `
    <!-- ALERT -->
    <div class="alert-strip">${alerts.join('')}</div>

    <!-- SHORTCUT NAVIGASI -->
    <div class="shortcut-row">
      ${sc('📈','#fff7ed','#F97316','ITT Tracker','Capaian indikator','mel-itt.html')}
      ${sc('🤝','#eff6ff','#2563eb','Data Stakeholder','Jaringan & keterlibatan','mel-stakeholder.html')}
      ${sc('📋','#f1f5f9','#475569','Monthly Monitoring','Kegiatan & peserta','mel-monthly.html')}
      ${sc('🔍','#f0fdf4','#16a34a','Analisis & Trend','Insight mendalam','mel-analisis.html')}
    </div>

    <!-- KPI -->
    <div class="kpi-row">
      ${kpi(total,'Total Beneficiary',d.meta?.scn||'—','#F97316')}
      ${kpi(avgSp!=null?avgSp+'/10':'—','Avg Skor Anak','Cantrill Ladder',avgSp!=null?(avgSp>=7?'#16a34a':avgSp>=5?'#F97316':'#dc2626'):'#94a3b8')}
      ${kpi(kritis,'Kondisi Kritis','skor ≤ 3',kritis>0?'#dc2626':'#16a34a')}
      ${kpi(coverage+'%','Coverage Observasi',total-tanpaObs+' sudah diobservasi','#2563eb')}
      ${kpi(workers.length,'CBR Worker',workers.reduce((s,w)=>s+w.kunjungan_bulan,0)+' kunjungan bulan ini','#1E293B')}
      ${kpi(totalKeg||'—','Kegiatan',BEN_MON.length?BEN_MON.reduce((s,r)=>s+num(r.total),0)+' total peserta':'dari BEN Uploader','#7c3aed')}
    </div>

    <!-- 7 OUTCOME -->
    <div style="font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:10px">
      Capaian 7 Outcome — klik untuk ke ITT Tracker
    </div>
    <div class="outcome-row">
      ${OUT_CONF.map(o=>{
        const v=pcts[o.id]||0;
        const pc=pctColor(v);
        return `<a class="oc-card" href="mel-itt.html" style="--oc:${pc}">
          <div class="oc-lbl">${o.label}</div>
          <div class="oc-pct">${v}%</div>
          <div class="prog-track"><div class="prog-fill" style="background:${pc};width:${v}%"></div></div>
          <div class="oc-sub">${o.pendek}</div>
        </a>`;
      }).join('')}
    </div>

    <!-- MAIN GRID: Aktivitas + Kondisi Benef -->
    <div class="main-grid">
      <!-- Aktivitas Terbaru -->
      <div class="mb-card">
        <div class="mb-card-head">
          <span class="mb-card-title">Aktivitas Terbaru</span>
          <span class="mb-card-sub">${BEN_MON.length} kegiatan tercatat</span>
        </div>
        <div style="padding:0">
          <div class="tbl-wrap">
            <table class="mb-table">
              <thead><tr>
                <th>Nama Kegiatan</th><th>Tanggal</th><th>Outcome</th>
                <th style="text-align:center">L</th><th style="text-align:center">P</th>
                <th style="text-align:center">Total</th>
              </tr></thead>
              <tbody>
                ${aktTerbaru.length ? aktTerbaru.map(r=>{
                  const outC = {'O1':'#F97316','O2':'#1E293B','O3':'#2563eb','O4':'#16a34a','O5':'#7c3aed','O6':'#d97706','O7':'#0ea5e9'}[r.outcome]||'#94a3b8';
                  return `<tr>
                    <td style="font-weight:600;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.nama_kegiatan||'—'}</td>
                    <td style="white-space:nowrap;color:#64748b;font-size:.73rem">${fmtTgl(r.tanggal)}</td>
                    <td><span class="out-pill" style="background:${outC}">${r.outcome||'—'}</span></td>
                    <td style="text-align:center;color:#1d4ed8;font-weight:700">${num(r.laki)}</td>
                    <td style="text-align:center;color:#db2777;font-weight:700">${num(r.perempuan)}</td>
                    <td style="text-align:center;font-weight:800">${num(r.total)}</td>
                  </tr>`;
                }).join('') : '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px">Belum ada data aktivitas.<br><small>Upload via MEL SCN Tools</small></td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Kondisi Beneficiary -->
      <div class="mb-card">
        <div class="mb-card-head"><span class="mb-card-title">Kondisi Beneficiary</span><span class="mb-card-sub">${total} total</span></div>
        <div class="mb-card-body">
          <div class="kondisi-row">
            ${[['Laki-laki',lk,'#1d4ed8'],['Perempuan',pr,'#db2777'],['Epilepsi',ep,'#d97706'],['Pernah Terapi',tr,'#16a34a'],['Level Parah',parah,'#dc2626']].map(([l,v,c])=>`
            <div class="kondisi-stat">
              <div class="kondisi-val" style="color:${c}">${v}</div>
              <div class="kondisi-lbl">${l}</div>
            </div>`).join('')}
          </div>
          <div style="font-size:.67rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;margin-top:4px">Distribusi Skor Cantrill Anak</div>
          ${[['Kritis (1–3)',anak.filter(a=>a.sp!=null&&a.sp<=3).length,'#dc2626'],
             ['Sedang (4–6)',anak.filter(a=>a.sp!=null&&a.sp>=4&&a.sp<=6).length,'#d97706'],
             ['Baik (7–10)', anak.filter(a=>a.sp!=null&&a.sp>=7).length,'#16a34a'],
             ['Belum diisi', anak.filter(a=>a.sp==null).length,'#94a3b8']].map(([l,n,c])=>{
            const pct=total>0?Math.round(n/total*100):0;
            return `<div class="score-row">
              <span class="score-lbl" style="color:${c}">${l}</span>
              <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${c}"></div></div>
              <span class="score-num" style="color:${c}">${n} (${pct}%)</span>
            </div>`;}).join('')}
        </div>
      </div>
    </div>
  `;
}

function sc(icon,bg,color,lbl,sub,href){
  return `<a class="sc-card" href="${href}">
    <div class="sc-icon" style="background:${bg};color:${color}">${icon}</div>
    <div><div class="sc-lbl">${lbl}</div><div class="sc-sub">${sub}</div></div>
  </a>`;
}
function kpi(val,lbl,sub,color){
  return `<div class="kpi-card" style="--kc:${color}">
    <div class="kpi-val">${val}</div>
    <div class="kpi-lbl">${lbl}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}
function fmtTgl(v){
  if(!v)return '—';
  const s=String(v);
  if(s.includes('T')){const d=new Date(s);if(!isNaN(d))return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});}
  if(s.match(/^\d{2}\/\d{2}\/\d{4}$/))return s;
  if(s.match(/^\d{4}-\d{2}-\d{2}$/)){const[y,m,d]=s.split('-');return `${d} ${['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'][+m]} ${y}`;}
  return s;
}

// ── INIT ─────────────────────────────────────────────────────
buildSidebar();
const SESSION = AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({
    onScnSwitch: async function(scnId){
      const d = await API.get(scnId);
      if(d){ KOBO_D=d; buildUI(); }
    }
  });
  AUTH.initSidebar('mel','m-beranda');

  // Fetch paralel: KoboToolbox + DataMonthly BEN Uploader
  Promise.all([
    API.get(AUTH.getScnFilter()),
    API_BEN.get('monthly', AUTH.getScnFilter()),
  ]).then(([koboData, monData])=>{
    BEN_MON = monData||[];
    if(koboData){
      KOBO_D = koboData;
      buildUI();
    } else {
      document.getElementById('page-content').innerHTML='<div class="mb-loading">Tidak ada data tersedia</div>';
    }
  });
}
</script>
</body>
</html>
