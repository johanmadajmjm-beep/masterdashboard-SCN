<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<title>Peta — Sebaran Beneficiary | MEL NLR</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" integrity="sha512-hoalWLoI8r4UszCkZ5kL8vayOGVae1oxXe/2A4AO6J9+580uKHDO3JdHb7NzwwzK5xr/Fs0W40kiNHxM9vyTtQ==" crossorigin="anonymous"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin="anonymous"></script>
<link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
<style>
#leaflet-map{width:100%;height:calc(100vh - 185px);border-radius:10px;z-index:1;position:relative}
.leaflet-popup-content-wrapper{background:#1f2937!important;border:1px solid #374151!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,.4)!important;color:#f9fafb!important}
.leaflet-popup-tip{background:#1f2937!important}
.leaflet-control-zoom a{background:#1f2937!important;color:#f9fafb!important;border-color:#374151!important}
.mp{font-size:.75rem;line-height:1.65;min-width:220px}
.mp-name{font-weight:800;font-size:.85rem;color:#60a5fa;margin-bottom:6px}
.mp-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:3px;font-size:.72rem}
.mp-lbl{color:#9ca3af}
.mp-scores{display:flex;gap:16px;margin-top:8px;padding:8px;background:rgba(255,255,255,.05);border-radius:6px}
.mp-score-item .sc-l{font-size:.6rem;color:#9ca3af;text-transform:uppercase}
.mp-score-item .sc-v{font-size:1.2rem;font-weight:800}
.map-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.map-filters select{padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem;background:white}
.map-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:.72rem;color:#6b7280}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.map-stat{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:8px 14px;font-size:.75rem;color:#374151}
.map-stat strong{color:#111827;font-size:.9rem}
.det-panel{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-top:12px;display:none}
.det-panel.open{display:block}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.det-field label{font-size:.62rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.det-field p{font-size:.78rem;color:#374151;line-height:1.5}
</style>
</head><body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <button class="topbar-menu-btn" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-breadcrumb">Peta <span class="sep">›</span><span class="current">Sebaran Beneficiary</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>
<div class="page" style="overflow:hidden;display:flex;flex-direction:column;padding:14px 20px;gap:8px">

  <div class="map-filters">
    <select id="mp-ragam" onchange="updateMap()"><option value="">Semua Ragam</option><option>Fisik</option><option>Intelektual</option><option value="Sensorik (penglihatan)">S. Penglihatan</option><option value="Sensorik (pendengaran dan bicara)">S. Pendengaran</option><option>Ganda</option></select>
    <select id="mp-level" onchange="updateMap()"><option value="">Semua Level</option><option value="Parah (dukungan penuh)">Parah</option><option value="Sedang (dukungan reguler)">Sedang</option><option value="Rendah (sedikit dukungan)">Rendah</option></select>
    <select id="mp-cbr" onchange="updateMap()"><option value="">Semua CBR Worker</option></select>
    <div class="map-stat">GPS: <strong id="mp-count">—</strong> titik</div>
    <button onclick="resetView()" style="padding:5px 12px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.72rem;cursor:pointer;background:white">Reset View</button>
  </div>
  <div class="card" style="padding:14px">
    <div id="leaflet-map"></div>
    <div class="map-legend">
      <span><span class="legend-dot" style="background:#dc2626"></span>Fisik</span>
      <span><span class="legend-dot" style="background:#2563eb"></span>Intelektual</span>
      <span><span class="legend-dot" style="background:#16a34a"></span>S. Penglihatan</span>
      <span><span class="legend-dot" style="background:#d97706"></span>S. Pendengaran</span>
      <span><span class="legend-dot" style="background:#7c3aed"></span>Ganda</span>
      <span style="margin-left:auto"><span class="legend-dot" style="background:rgba(0,0,0,.2);width:14px;height:14px"></span>Besar = Level Parah</span>
    </div>
  </div>
  <div class="det-panel" id="det-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <strong id="det-title" style="font-size:.85rem">Detail Anak</strong>
      <button onclick="document.getElementById('det-panel').classList.remove('open')" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:.75rem">✕ Tutup</button>
    </div>
    <div class="det-grid" id="det-grid"></div>
  </div>
</div></div></div>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
const RC={'Fisik':'#dc2626','Intelektual':'#2563eb','Sensorik (penglihatan)':'#16a34a','Sensorik (pendengaran dan bicara)':'#d97706','Ganda':'#7c3aed','Lainnya':'#6b7280'};
const LC={'Parah (dukungan penuh)':'#dc2626','Sedang (dukungan reguler)':'#d97706','Rendah (sedikit dukungan)':'#16a34a'};
function sc(v){return v<=3?'#dc2626':v<=6?'#d97706':'#16a34a';}

let MAP=null, MARKERS=null, ALL_ANAK=[], FIT_DONE=false;

function initMap(){
  if(MAP)return;
  MAP=L.map('leaflet-map',{center:[-8.57,120.45],zoom:9,preferCanvas:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(MAP);
  MARKERS=L.layerGroup().addTo(MAP);
}

function updateMap(doFit=false){
  if(!MAP)return;
  const rF=document.getElementById('mp-ragam').value;
  const lF=document.getElementById('mp-level').value;
  const cF=document.getElementById('mp-cbr').value;
  const hasGPS=a=>a.lat&&a.lon&&!isNaN(a.lat)&&!isNaN(a.lon)&&!(a.lat===0&&a.lon===0);
  const pts=ALL_ANAK.filter(a=>hasGPS(a)&&(!rF||a.ragam===rF)&&(!lF||a.level===lF)&&(!cF||a.cbr===cF));
  document.getElementById('mp-count').textContent=pts.length;
  MARKERS.clearLayers();
  const lls=[];
  pts.forEach(a=>{
    const col=RC[a.ragam]||'#6b7280';
    const rad=(a.level||'').includes('Parah')?9:(a.level||'').includes('Sedang')?7:5;
    const m=L.circleMarker([a.lat,a.lon],{radius:rad,fillColor:col,color:'rgba(255,255,255,.3)',weight:1,opacity:1,fillOpacity:.85});
    const sp=a.sp||0, sa=a.sa||0;
    m.bindPopup(`<div class="mp">
      <div class="mp-name">${a.nama||'—'}</div>
      <div class="mp-row"><span class="mp-lbl">Ragam</span><span style="color:${col};font-weight:700">${a.ragam||'—'}</span></div>
      <div class="mp-row"><span class="mp-lbl">Level</span><span style="color:${LC[a.level]||'#9ca3af'}">${(a.level||'—').split('(')[0]}</span></div>
      <div class="mp-row"><span class="mp-lbl">Desa</span><span>${a.desa||'—'}</span></div>
      <div class="mp-row"><span class="mp-lbl">CBR Worker</span><span>${a.cbr||'—'}</span></div>
      <div class="mp-scores">
        <div class="mp-score-item"><div class="sc-l">Skor Anak</div><div class="sc-v" style="color:${sc(sp)}">${a.sp!=null?a.sp:'—'}</div></div>
        <div class="mp-score-item"><div class="sc-l">Skor Pengasuh</div><div class="sc-v" style="color:${sc(sa)}">${a.sa!=null?a.sa:'—'}</div></div>
      </div>
    </div>`);
    m.on('click',()=>showDetail(a));
    m.addTo(MARKERS);
    lls.push([a.lat,a.lon]);
  });
  if(doFit&&lls.length){
    setTimeout(()=>{MAP.invalidateSize();MAP.fitBounds(L.latLngBounds(lls),{padding:[40,40]});},100);
  }
}

function resetView(){
  const hasGPS=a=>a.lat&&a.lon&&!isNaN(a.lat)&&!isNaN(a.lon)&&!(a.lat===0&&a.lon===0);
  const pts=ALL_ANAK.filter(hasGPS);
  if(pts.length){MAP.invalidateSize();MAP.fitBounds(L.latLngBounds(pts.map(a=>[a.lat,a.lon])),{padding:[40,40]});}
  else MAP.setView([-8.57,120.45],9);
}

function showDetail(a){
  document.getElementById('det-title').textContent=a.nama+' · '+a.desa;
  document.getElementById('det-grid').innerHTML=`
    <div class="det-field"><label>Nama Anak</label><p style="font-weight:700">${a.nama||'—'}</p></div>
    <div class="det-field"><label>Nama Pengasuh</label><p>${a.np||'—'}</p></div>
    <div class="det-field"><label>Ragam Disabilitas</label><p style="color:${RC[a.ragam]||'#888'};font-weight:700">${a.ragam||'—'}</p></div>
    <div class="det-field"><label>Level Disabilitas</label><p style="color:${LC[a.level]||'#9ca3af'}">${(a.level||'—')}</p></div>
    <div class="det-field"><label>Usia / JK</label><p>${a.usia||'?'} tahun · ${a.gender||'—'}</p></div>
    <div class="det-field"><label>Desa / Kampung</label><p>${a.desa||'—'}</p></div>
    <div class="det-field"><label>CBR Worker</label><p>${a.cbr||'—'}</p></div>
    <div class="det-field"><label>Epilepsi / Terapi</label><p style="color:${a.ep?'#dc2626':'#16a34a'}">${a.ep?'Ya':'Tidak'}</p></div>
    <div class="det-field"><label>Skor Anak</label><p style="color:${sc(a.sp||0)};font-size:1.4rem;font-weight:800">${a.sp!=null?a.sp:'—'}/10</p></div>
    <div class="det-field"><label>Skor Pengasuh</label><p style="color:${sc(a.sa||0)};font-size:1.4rem;font-weight:800">${a.sa!=null?a.sa:'—'}/10</p></div>`;
  document.getElementById('det-panel').classList.add('open');
  document.getElementById('det-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderPage(d,scnId){
  if(!d||!d.anak)return;
  ALL_ANAK=d.anak;
  const cbrs=[...new Set(ALL_ANAK.map(a=>a.cbr).filter(Boolean))].sort();
  const fC=document.getElementById('mp-cbr');
  fC.innerHTML='<option value="">Semua CBR Worker</option>';
  cbrs.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;fC.appendChild(o);});
  initMap();
  setTimeout(()=>{
    MAP.invalidateSize();
    updateMap(true);
  },200);
}

buildSidebar();
const SESSION=AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({onScnSwitch:async function(scnId){const d=await API.get(scnId);if(window.renderPage)renderPage(d,scnId);}});
  AUTH.initSidebar('peta','p-peta');
  API.get(AUTH.getScnFilter()).then(d=>renderPage(d,AUTH.getScnFilter()));
}
</script>
</body></html>
