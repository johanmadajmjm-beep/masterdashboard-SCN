<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<title>CBR Coordinator — Per CBR Worker | MEL NLR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
<style>
.worker-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.worker-card{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:14px;border-left:3px solid var(--wc,#d4500a)}
.wc-name{font-weight:700;font-size:.82rem;color:#111827;margin-bottom:8px}
.wc-stat{display:flex;justify-content:space-between;font-size:.72rem;color:#6b7280;margin-bottom:3px}
.wc-stat span:last-child{color:#111827;font-weight:700}
.ch{position:relative}.ch.h200{height:200px}.ch.h220{height:220px}
</style>
</head><body>
<div class="app"><div class="main">
<header class="topbar">
  <div class="topbar-left">
    <button class="topbar-menu-btn" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-breadcrumb">CBR Coordinator <span class="sep">›</span><span class="current">Per CBR Worker</span></div>
  </div>
  <div class="topbar-right">
    <span class="scn-badge" id="scn-badge">—</span>
    <span id="data-source-badge" style="font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:none"></span>
    <span class="topbar-date" id="topbar-date">—</span>
  </div>
</header>
<div class="page">
  <div class="page-header"><h1>Profil & Beban CBR Worker</h1><p>Analisis kinerja, caseload, dan kondisi anak per CBR Worker.</p></div>

  <!-- Worker cards -->
  <div class="section-divider">Profil per CBR Worker</div>
  <div class="worker-grid" id="worker-cards"></div>

  <div class="grid-2">
    <div class="card">
      <div class="card-head"><span class="card-title">Jumlah Anak per CBR Worker</span></div>
      <div class="card-body"><div class="ch h200"><canvas id="c-worker-bar"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Jumlah Anak per Desa (Top 15)</span></div>
      <div class="card-body"><div class="ch h200"><canvas id="c-desa-bar"></canvas></div></div>
    </div>
  </div>

  <!-- Tabel detail -->
  <div class="card">
    <div class="card-head"><span class="card-title">Tabel Detail per CBR Worker</span></div>
    <div class="card-body no-pad"><div class="tbl-wrap"><table id="worker-table"></table></div></div>
  </div>

  <!-- Drill-down per worker -->
  <div class="section-divider">Detail Anak per CBR Worker</div>
  <div class="card">
    <div class="card-head">
      <span class="card-title">Pilih CBR Worker</span>
      <select id="sel-worker" style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:.78rem;min-width:220px"></select>
      <span class="badge badge-nlr" id="badge-drill">—</span>
    </div>
    <div class="card-body no-pad"><div class="tbl-wrap"><table id="tbl-drill"></table></div></div>
  </div>

</div></div></div>
<script>
const RC={'Fisik':'#dc2626','Intelektual':'#2563eb','Sensorik (penglihatan)':'#16a34a','Sensorik (pendengaran dan bicara)':'#d97706','Ganda':'#7c3aed','Lainnya':'#6b7280'};
const LC={'Parah (dukungan penuh)':'#dc2626','Sedang (dukungan reguler)':'#d97706','Rendah (sedikit dukungan)':'#16a34a'};
const PAL=['#d4500a','#2563eb','#16a34a','#d97706','#7c3aed','#dc2626','#0891b2','#84cc16'];
let CHARTS={}, ALL_ANAK=[], ALL_OBS=[];
function sc(v){return v<=3?'#dc2626':v<=6?'#d97706':'#16a34a';}
function avg(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}

function mk(id,type,data,opts){
  if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];}
  const el=document.getElementById(id);if(!el)return;
  CHARTS[id]=new Chart(el,{type,data,options:opts});
}
function drawLabels(chart){
  const ctx=chart.ctx;
  chart.data.datasets.forEach((ds,i)=>{
    const meta=chart.getDatasetMeta(i);
    meta.data.forEach((bar,idx)=>{
      const v=ds.data[idx];if(!v&&v!==0)return;
      const isH=chart.config.options.indexAxis==='y';
      ctx.save();ctx.fillStyle='#374151';ctx.font='bold 10px system-ui';
      if(isH){ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(v,bar.x+4,bar.y);}
      else{ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(v,bar.x,bar.y-2);}
      ctx.restore();
    });
  });
}
const BASE={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1f2937',titleColor:'#f9fafb',bodyColor:'#9ca3af'}},scales:{x:{grid:{color:'#f3f4f6'},ticks:{color:'#9ca3af',font:{size:10}}},y:{grid:{color:'#f3f4f6'},ticks:{color:'#9ca3af',font:{size:10}},beginAtZero:true}},animation:{onComplete:function(){drawLabels(this);}}};

function renderPage(d,scnId){
  if(!d||!d.anak)return;
  ALL_ANAK=d.anak;
  ALL_OBS=d.obs||[];
  const workers=[...new Set(ALL_ANAK.map(a=>a.cbr).filter(Boolean))].sort();
  const wStats=d.workers||[];

  // Worker cards
  document.getElementById('worker-cards').innerHTML=workers.map((w,i)=>{
    const g=ALL_ANAK.filter(a=>a.cbr===w);
    const spArr=g.map(a=>a.sp).filter(v=>v!=null);
    const saArr=g.map(a=>a.sa).filter(v=>v!=null);
    const avSP=spArr.length?avg(spArr).toFixed(1):'—';
    const avSA=saArr.length?avg(saArr).toFixed(1):'—';
    const parah=g.filter(a=>(a.level||'').includes('Parah')).length;
    const kritis=g.filter(a=>a.sp!=null&&a.sp<=3).length;
    const ws=wStats.find(x=>x.nama===w)||{};
    return `<div class="worker-card" style="--wc:${PAL[i%PAL.length]}">
      <div class="wc-name" style="color:${PAL[i%PAL.length]}">${w}</div>
      <div class="wc-stat"><span>Total dampingan</span><span>${g.length}</span></div>
      <div class="wc-stat"><span>Skor anak avg</span><span style="color:${avSP!=='—'?sc(parseFloat(avSP)):'#9ca3af'}">${avSP}/10</span></div>
      <div class="wc-stat"><span>Skor pengasuh avg</span><span style="color:${avSA!=='—'?sc(parseFloat(avSA)):'#9ca3af'}">${avSA}/10</span></div>
      <div class="wc-stat"><span>Level parah</span><span style="color:#dc2626">${parah}</span></div>
      <div class="wc-stat"><span>Kritis ≤3</span><span style="color:${kritis>0?'#dc2626':'#16a34a'}">${kritis}</span></div>
      <div class="wc-stat"><span>Terlambat >30h</span><span style="color:${(ws.late||0)>0?'#dc2626':'#16a34a'}">${ws.late||0}</span></div>
    </div>`;
  }).join('');

  // Bar jumlah anak
  mk('c-worker-bar','bar',{labels:workers.map(w=>w.split(' ').pop()),datasets:[{data:workers.map(w=>ALL_ANAK.filter(a=>a.cbr===w).length),backgroundColor:PAL,borderRadius:5,borderSkipped:false}]},{...BASE,layout:{padding:{top:18}}});

  // Bar desa top 15
  const desaCnt={};
  ALL_ANAK.forEach(a=>{if(a.desa&&a.desa!=='—')desaCnt[a.desa]=(desaCnt[a.desa]||0)+1;});
  const top15=Object.entries(desaCnt).sort((a,b)=>b[1]-a[1]).slice(0,15);
  mk('c-desa-bar','bar',{labels:top15.map(x=>x[0]),datasets:[{data:top15.map(x=>x[1]),backgroundColor:PAL.concat(PAL),borderRadius:5,borderSkipped:false}]},{responsive:true,maintainAspectRatio:false,indexAxis:'y',layout:{padding:{right:28}},plugins:{legend:{display:false},tooltip:{backgroundColor:'#1f2937',titleColor:'#f9fafb',bodyColor:'#9ca3af'}},scales:{x:{grid:{color:'#f3f4f6'},ticks:{color:'#9ca3af',font:{size:9}},beginAtZero:true},y:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:9}}}},animation:{onComplete:function(){drawLabels(this);}}});

  // Tabel summary
  document.getElementById('worker-table').innerHTML=`
    <thead><tr><th>CBR Worker</th><th>Total</th><th>Skor Anak</th><th>Skor Pengasuh</th><th>Parah</th><th>Sedang</th><th>Rendah</th><th>Kritis ≤3</th><th>Epilepsi</th><th>Terapi</th></tr></thead>
    <tbody>${workers.map((w,i)=>{
      const g=ALL_ANAK.filter(a=>a.cbr===w);
      const spArr=g.map(a=>a.sp).filter(v=>v!=null);
      const saArr=g.map(a=>a.sa).filter(v=>v!=null);
      const avSP=spArr.length?avg(spArr).toFixed(1):'—';
      const avSA=saArr.length?avg(saArr).toFixed(1):'—';
      const kritis=g.filter(a=>a.sp!=null&&a.sp<=3).length;
      return `<tr>
        <td><strong style="color:${PAL[i%PAL.length]}">${w}</strong></td>
        <td class="mono">${g.length}</td>
        <td class="mono" style="color:${avSP!=='—'?sc(parseFloat(avSP)):'#9ca3af'};font-weight:700">${avSP}</td>
        <td class="mono" style="color:${avSA!=='—'?sc(parseFloat(avSA)):'#9ca3af'};font-weight:700">${avSA}</td>
        <td class="mono" style="color:#dc2626">${g.filter(a=>(a.level||'').includes('Parah')).length}</td>
        <td class="mono" style="color:#d97706">${g.filter(a=>(a.level||'').includes('Sedang')).length}</td>
        <td class="mono" style="color:#16a34a">${g.filter(a=>(a.level||'').includes('Rendah')).length}</td>
        <td class="mono" style="color:${kritis>0?'#dc2626':'#16a34a'};font-weight:700">${kritis}</td>
        <td class="mono">${g.filter(a=>a.ep).length}</td>
        <td class="mono">${g.filter(a=>a.tr).length}</td>
      </tr>`;
    }).join('')}</tbody>`;

  // Drill-down dropdown
  const sel=document.getElementById('sel-worker');
  sel.innerHTML=workers.map(w=>`<option value="${w}">${w}</option>`).join('');
  sel.addEventListener('change',()=>renderDrill(sel.value));
  renderDrill(workers[0]);
}

function renderDrill(wNama){
  if(!wNama||!ALL_ANAK.length)return;
  const g=ALL_ANAK.filter(a=>a.cbr===wNama);
  const obsMap={};
  ALL_OBS.forEach(o=>{if(o.na)obsMap[o.na.toLowerCase()]=o;});
  document.getElementById('badge-drill').textContent=g.length+' anak';
  document.getElementById('tbl-drill').innerHTML=`
    <thead><tr><th>#</th><th>Nama Anak</th><th>Ragam</th><th>Level</th><th>Desa</th><th>Usia</th><th style="text-align:center">Skor Anak</th><th style="text-align:center">Skor Pengasuh</th><th>Terakhir Obs</th></tr></thead>
    <tbody>${g.map((a,i)=>{
      const spCol=a.sp!=null?sc(a.sp):'#9ca3af';
      const saCol=a.sa!=null?sc(a.sa):'#9ca3af';
      const hStr=a.hari===999?'<span style="color:#dc2626;font-size:.7rem">Belum pernah</span>':a.hari>30?`<span style="color:#dc2626;font-weight:700;font-size:.7rem">${a.hari}h lalu</span>`:`<span style="color:#6b7280;font-size:.7rem">${a.hari}h lalu</span>`;
      return `<tr>
        <td style="color:#9ca3af">${i+1}</td>
        <td><strong>${a.nama||'—'}</strong></td>
        <td><span style="font-size:.7rem;font-weight:700;color:${RC[a.ragam]||'#888'}">${a.ragam||'—'}</span></td>
        <td><span style="font-size:.68rem;color:${LC[a.level]||'#9ca3af'}">${(a.level||'—').split('(')[0].trim()}</span></td>
        <td style="font-size:.72rem">${a.desa||'—'}</td>
        <td class="mono" style="font-size:.72rem">${a.usia||'?'} th</td>
        <td style="text-align:center"><span class="mono" style="font-weight:700;color:${spCol}">${a.sp!=null?a.sp:'—'}</span></td>
        <td style="text-align:center"><span class="mono" style="font-weight:700;color:${saCol}">${a.sa!=null?a.sa:'—'}</span></td>
        <td>${hStr}</td>
      </tr>`;
    }).join('')}</tbody>`;
}
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/api.js"></script>
<script>
buildSidebar();
const SESSION=AUTH.requireAuth('../index.html');
if(SESSION){
  AUTH.applySession({onScnSwitch:async function(scnId){const d=await API.get(scnId);if(window.renderPage)renderPage(d,scnId);}});
  AUTH.initSidebar('coord','c-worker');
  API.get(AUTH.getScnFilter()).then(d=>{if(window.renderPage)renderPage(d,AUTH.getScnFilter());});
}
</script></body></html>
