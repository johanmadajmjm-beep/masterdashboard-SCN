<script>
// ── KONSTANTA ──────────────────────────────────────────────────
const SCN_IDS   = ['manggarai','banyuwangi','jember','situbondo','kupang','tts','palu','sigi'];
const SCN_LBL   = {manggarai:'Manggarai',banyuwangi:'Banyuwangi',jember:'Jember',situbondo:'Situbondo',kupang:'Kupang',tts:'TTS',palu:'Palu',sigi:'Sigi'};
const PROV_MAP  = {manggarai:'NTT',kupang:'NTT',tts:'NTT',banyuwangi:'Jatim',jember:'Jatim',situbondo:'Jatim',palu:'Sulteng',sigi:'Sulteng'};
const OUTCOMES  = ['O1','O2','O3','O4','O5','O6','O7'];
const OUT_LBL   = {O1:'Inklusi',O2:'Pengasuh',O3:'Worker',O4:'Pihak',O5:'Kesehatan',O6:'Pendidikan',O7:'Penghidupan'};
const PAL       = ['#F97316','#2563eb','#16a34a','#d97706','#7c3aed','#dc2626','#0891b2','#84cc16'];
const RC        = {Fisik:'#F97316',Intelektual:'#2563eb','Sensorik (penglihatan)':'#16a34a','Sensorik (pendengaran dan bicara)':'#d97706',Ganda:'#7c3aed',Lainnya:'#94a3b8'};

// ── STATE ──────────────────────────────────────────────────────
let D = null;        // data dari API (sudah merge 6 form + filter SCN)
let BEN_STK = [];
let BEN_MON = [];
let ACTIVE_TAB = 'situasi';
let CHARTS = {};

// ── HELPERS ────────────────────────────────────────────────────
const avg = arr => { const v=arr.filter(x=>x!=null&&!isNaN(x)); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; };
const num = v => parseInt(v)||0;
const pctBg   = v => v>=80?'#dcfce7':v>=50?'#dbeafe':v>=25?'#fef3c7':'#fee2e2';
const pctColor= v => v>=80?'#15803d':v>=50?'#1d4ed8':v>=25?'#b45309':'#b91c1c';
const scColor = v => v>=7?'#16a34a':v>=5?'#F97316':v>=4?'#d97706':'#dc2626';

function mk(id, type, data, opts) {
  if (CHARTS[id]) { CHARTS[id].destroy(); delete CHARTS[id]; }
  const el = document.getElementById(id); if (!el) return;
  CHARTS[id] = new Chart(el, { type, data, options: opts });
}

const BASE = {
  responsive:true, maintainAspectRatio:false,
  plugins:{ legend:{display:false}, tooltip:{backgroundColor:'#1f2937',titleColor:'#f9fafb',bodyColor:'#9ca3af',padding:10,cornerRadius:8} },
  scales:{
    x:{grid:{color:'#f3f4f6'},ticks:{color:'#9ca3af',font:{size:10}}},
    y:{grid:{color:'#f3f4f6'},ticks:{color:'#9ca3af',font:{size:10}},beginAtZero:true}
  }
};

// Hitung union unik nama dari 6 form
function namaUnik(d) {
  const s = new Set();
  const addN = n => { const v=(n||'').toLowerCase().trim(); if(v&&v!=='—') s.add(v); };
  (d.anak||[]).forEach(r => addN(r.nama));
  (d.obs||[]).forEach(r => addN(r.na));
  (d.perencanaan||[]).forEach(r => addN(r.nama_anak||r.na||r.nama));
  (d.diary||[]).forEach(r => addN(r.nama_anak||r.na||r.nama));
  (d.evalMenengah||[]).forEach(r => addN(r.nama_anak||r.na||r.nama));
  (d.evalAkhir||[]).forEach(r => addN(r.nama_anak||r.na||r.nama));
  return s;
}

// Frekuensi kata dari array teks
function wordFreq(texts, stopwords) {
  const freq = {};
  const sw = new Set(stopwords||[
    'yang','dan','di','ke','dari','dengan','untuk','tidak','ada','ini','itu',
    'atau','jika','sudah','belum','saat','dalam','pada','oleh','agar','lebih',
    'juga','bisa','masih','serta','akan','telah','setelah','bahwa','namun',
    'karena','melalui','sebagai','kepada','antara','setiap','semua','sangat',
    'cukup','bagi','mereka','kami','kita','secara','tentang','mengenai','perlu',
    'harus','dapat','hingga','sejak','seperti','yaitu','yakni','tersebut',
    'sehingga','maka','walaupun','meskipun','supaya','ketika','dimana','kemudian',
    'kegiatan','peserta','orang','organisasi','materi','program','mulai',
    'dilakukan','dilaksanakan','disabilitas','terdapat','memiliki','melakukan',
    'mengikuti','memberikan','mendapatkan','meningkatkan','masyarakat',
    'diharapkan','disampaikan','dibahas','pelaksanaan','proses','hasil',
    'waktu','tempat','tanggal','anak','pengasuh','cbr','worker','scn',
    'ben','nlr','yayasan','indonesia',
  ]);
  texts.forEach(t => {
    if (!t) return;
    t.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).forEach(w => {
      if (w.length > 3 && !sw.has(w)) freq[w] = (freq[w]||0) + 1;
    });
  });
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,20);
}

// Kalkulasi % capaian per Outcome dari d.itt (calcITT di api.js)
// Rata-rata % capaian/target_y1 dari semua indikator per outcome
function calcITTpct(anakUnused, obsUnused, ittData) {
  if (!ittData) return {O1:0,O2:0,O3:0,O4:0,O5:0,O6:0,O7:0};
  const outMap = {O1:[],O2:[],O3:[],O4:[],O5:[],O6:[],O7:[]};
  Object.entries(ittData).forEach(([key, val]) => {
    const out = key.split('-')[0]; // 'O1-i1' → 'O1'
    if (!outMap[out]) return;
    const target = val.target_y1 || 0;
    if (target === 0) return; // skip indikator tanpa target
    const pct = Math.min(100, Math.round((val.cap || 0) / target * 100));
    outMap[out].push(pct);
  });
  const result = {};
  OUTCOMES.forEach(o => {
    const arr = outMap[o];
    result[o] = arr.length ? Math.round(arr.reduce((s,v)=>s+v,0)/arr.length) : 0;
  });
  return result;
}

// ── RENDER PAGE ────────────────────────────────────────────────
function renderPage(d, scnId) {
  if (!d) return;
  D = d;
  document.getElementById('tab-bar').style.display = 'flex';
  switchTab('situasi');
}

// ── TAB SWITCH ─────────────────────────────────────────────────
function switchTab(tab) {
  ACTIVE_TAB = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['situasi','capaian','siklus','kualitatif','ekosistem'];
    b.classList.toggle('active', tabs[i]===tab);
  });
  renderTab(tab);
}

function renderTab(tab) {
  const pc = document.getElementById('page-content');
  pc.className = 'an-page';
  // Destroy semua chart sebelum render ulang
  Object.keys(CHARTS).forEach(k => { try { CHARTS[k].destroy(); } catch(e){} });
  CHARTS = {};

  switch(tab) {
    case 'situasi':    renderSituasi();    break;
    case 'capaian':    renderCapaian();    break;
    case 'siklus':     renderSiklus();     break;
    case 'kualitatif': renderKualitatif(); break;
    case 'ekosistem':  renderEkosistem();  break;
  }
}

// ══════════════════════════════════════════════════════════════
// TAB 1: SITUASI & PERINGATAN
// ══════════════════════════════════════════════════════════════
function renderSituasi() {
  const d = D;
  const anak      = d.anak||[];
  const obs       = d.obs||[];
  const plan      = d.perencanaan||[];
  const diary     = d.diary||[];

  // Alert counts
  const kritis        = anak.filter(a=>a.sp!=null&&a.sp<=3);
  const belumObs      = anak.filter(a=>!namaObs.has((a.nama||'').toLowerCase().trim()));

function alertCard(type, icon, title, count, desc, detail) {
  const colors = {red:'#dc2626',yellow:'#b45309',blue:'#1d4ed8',green:'#15803d'};
  const c = colors[type]||'#64748b';
  return `<div class="alert-card ${type}">
    <div class="alert-icon">${icon}</div>
    <div style="flex:1;min-width:0">
      <div class="alert-title" style="color:${c}">${title}</div>
      <div class="alert-desc">${desc}</div>
      ${detail&&count>0?`<div style="font-size:.65rem;color:#64748b;margin-top:6px;line-height:1.6">${detail}${count>5?`<br><span style="color:#94a3b8">...dan ${count-5} lainnya</span>`:''}</div>`:''}
    </div>
    <div class="alert-count" style="color:${c}">${count}</div>
  </div>`;
}

function kpiTile(icon, bg, color, val, lbl, sub) {
  return `<div class="kpi-tile">
    <div class="kpi-ico" style="background:${bg};color:${color}">${icon}</div>
    <div>
      <div class="kpi-num" style="color:${color}">${val}</div>
      <div class="kpi-lbl">${lbl}</div>
      <div class="kpi-sub">${sub}</div>
    </div>
  </div>`;
}

function insightBox(tab, anak, kritis, belumObs, planTanpaEval, tanpaPlan, total) {
  const insights = [];
  if (kritis.length > 0)
    insights.push(`<b>${kritis.length} anak</b> dalam kondisi kritis (skor ≤ 3) perlu pendampingan intensif segera.`);
  if (belumObs.length > total * 0.3)
    insights.push(`Coverage observasi masih rendah — <b>${belumObs.length} anak</b> (${Math.round(belumObs.length/total*100)}%) belum pernah diobservasi.`);
  if (planTanpaEval.length > 0)
    insights.push(`<b>${planTanpaEval.length} anak</b> sudah punya perencanaan tapi belum ada evaluasi — siklus intervensi perlu ditutup.`);
  if (tanpaPlan.length > total * 0.4)
    insights.push(`<b>${tanpaPlan.length} anak</b> belum punya perencanaan — IRP perlu segera dibuat untuk memulai intervensi.`);
  if (insights.length === 0)
    insights.push('Semua indikator dalam kondisi baik. Pertahankan kualitas pendampingan.');
  return `<div class="insight-box">
    <div class="insight-title">💡 Rekomendasi Tindakan</div>
    <ul class="insight-list">${insights.map(i=>`<li>${i}</li>`).join('')}</ul>
  </div>`;
}

function renderHeatmapITT(anak, obs, scnList, d, ittData) {
  const tbl = document.getElementById('hm-itt');
  const rl  = document.getElementById('ranking-list');
  if (!tbl||!rl) return;

  let html = '<thead><tr><th class="left">SCN</th>';
  OUTCOMES.forEach(o => { html+=`<th>${OUT_LBL[o]}</th>`; });
  html += '<th>Avg</th></tr></thead><tbody>';

  const ranks = [];

  if (scnList.length === 1) {
    // 1 SCN: pakai ittData agregat dari api.js
    const id = scnList[0];
    const pcts = calcITTpct(null, null, ittData);
    const avgP = Math.round(Object.values(pcts).reduce((s,v)=>s+v,0)/OUTCOMES.length);
    ranks.push({ id, lbl:SCN_LBL[id]||id, prov:PROV_MAP[id]||'', avg:avgP, pcts });
    html += `<tr><td class="hm-scn">${SCN_LBL[id]||id}</td>`;
    OUTCOMES.forEach(o => {
      const v = pcts[o]||0;
      html += `<td style="background:${pctBg(v)};color:${pctColor(v)}">${v}%</td>`;
    });
    html += `<td style="background:${pctBg(avgP)};color:${pctColor(avgP)};font-weight:800">${avgP}%</td></tr>`;
  } else {
    // Multi SCN: build ittData per SCN dari anak/obs lokal
    // karena api.js hanya return 1 itt agregat, fallback ke calcITT per-SCN
    scnList.forEach(id => {
      const a = anak.filter(x=>(x.scn||'').toLowerCase()===id);
      const o = obs.filter(x=>(x.scn||'').toLowerCase()===id);
      // Buat itt per-SCN dengan fungsi yang sama persis seperti api.js calcITT
      const total    = a.length||1;
      const punyaObs = a.filter(x=>{ const k=x.nama.toLowerCase(); return o.some(y=>y.na&&y.na.toLowerCase()===k); }).length;
      const terapi   = a.filter(x=>x.tr).length;
      const skorBaik = a.filter(x=>x.sp!=null&&x.sp>=5).length;
      const namaPlanSet = new Set((d.perencanaan||[]).filter(r=>(r.scn||'').toLowerCase()===id).map(r=>(r.nama_anak||r.na||'').toLowerCase().trim()));
      const punyaPlan = a.filter(x=>namaPlanSet.has((x.nama||'').toLowerCase().trim())).length;
      const punyaWk   = a.filter(x=>x.wk).length;
      const punyaOb   = a.filter(x=>x.ob).length;
      const localItt = {
        'O1-i1':{cap:skorBaik,              target_y1:50},
        'O1-i2':{cap:punyaObs,              target_y1:30},
        'O1-i3':{cap:total,                 target_y1:200},
        'O1-i4':{cap:terapi,                target_y1:40},
        'O2-i1':{cap:Math.round(total*.65), target_y1:100},
        'O2-i2':{cap:Math.round(total*.35), target_y1:60},
        'O3-i1':{cap:3,                     target_y1:4},
        'O3-i2':{cap:punyaObs,              target_y1:40},
        'O4-i1':{cap:punyaPlan,             target_y1:5},
        'O4-i2':{cap:punyaPlan,             target_y1:8},
        'O5-i1':{cap:punyaOb,              target_y1:50},
        'O5-i2':{cap:Math.round(total*.22), target_y1:40},
        'O6-i1':{cap:5,                     target_y1:20},
        'O6-i2':{cap:8,                     target_y1:25},
        'O7-i1':{cap:punyaWk,              target_y1:3},
        'O7-i2':{cap:4,                     target_y1:10},
      };
      const pcts = calcITTpct(null, null, localItt);
      const avgP = Math.round(Object.values(pcts).reduce((s,v)=>s+v,0)/OUTCOMES.length);
      ranks.push({ id, lbl:SCN_LBL[id]||id, prov:PROV_MAP[id]||'', avg:avgP, pcts });
      html += `<tr><td class="hm-scn">${SCN_LBL[id]||id}</td>`;
      OUTCOMES.forEach(o => {
        const v = pcts[o]||0;
        html += `<td style="background:${pctBg(v)};color:${pctColor(v)}">${v}%</td>`;
      });
      html += `<td style="background:${pctBg(avgP)};color:${pctColor(avgP)};font-weight:800">${avgP}%</td></tr>`;
    });
  }
  tbl.innerHTML = html + '</tbody>';

  ranks.sort((a,b)=>b.avg-a.avg);
  const medals = ['🥇','🥈','🥉'];
  rl.innerHTML = ranks.map((s,i) => `
    <div class="rank-row">
      <div class="rank-medal" style="background:${i<3?'#fef3c7':'#f3f4f6'};color:${i<3?'#92400e':'#94a3b8'}">${medals[i]||i+1}</div>
      <div class="rank-info">
        <div class="rank-name">${s.lbl}</div>
        <div class="rank-prov">${s.prov}</div>
        <div class="prog-track"><div class="prog-fill" style="width:${s.avg}%;background:${pctColor(s.avg)}"></div></div>
      </div>
      <div class="rank-pct" style="color:${pctColor(s.avg)}">${s.avg}%</div>
    </div>`).join('');
}

function renderSiklus() {
  const d    = D;
  const anak = d.anak||[];
  const obs  = d.obs||[];
  const plan = d.perencanaan||[];
  const diary= d.diary||[];
  const evalM= d.evalMenengah||[];
  const evalA= d.evalAkhir||[];

  const namaObs   = new Set(obs.map(o=>(o.na||'').toLowerCase().trim()));
  const namaPlan  = new Set(plan.map(r=>(r.nama_anak||r.na||'').toLowerCase().trim()));
  const namaDiary = new Set(diary.map(r=>(r.nama_anak||r.na||'').toLowerCase().trim()));
  const namaEvalM = new Set(evalM.map(r=>(r.nama_anak||r.na||'').toLowerCase().trim()));
  const namaEvalA = new Set(evalA.map(r=>(r.nama_anak||r.na||'').toLowerCase().trim()));

  // Semua nama unik dari 6 form
  const allNama = namaUnik(d);

  // Hitung status siklus setiap anak
  const statusMap = { full:0, inProgress:0, early:0, none:0 };
  allNama.forEach(nama => {
    const hasObs   = namaObs.has(nama);
    const hasPlan  = namaPlan.has(nama);
    const hasDiary = namaDiary.has(nama);
    const hasEvalM = namaEvalM.has(nama);
    const hasEvalA = namaEvalA.has(nama);
    if (hasEvalA) statusMap.full++;
    else if (hasEvalM || hasDiary) statusMap.inProgress++;
    else if (hasObs || hasPlan) statusMap.early++;
    else statusMap.none++;
  });

  // Tabel siklus per anak (dari DataAwal yang ada info lengkap)
  // Sort: yang paling kritis dulu
  const anakSorted = [...anak].sort((a,b) => (a.sp??10)-(b.sp??10));

  // Ringkasan per CBR worker
  const workerMap = {};
  anak.forEach(a => {
    const w = a.cbr||'—';
    if (!workerMap[w]) workerMap[w] = {nama:w, anak:0, obsCount:0, planCount:0, diaryCount:0, evalMCount:0, evalACount:0};
    const k = (a.nama||'').toLowerCase().trim();
    workerMap[w].anak++;
    if (namaObs.has(k))   workerMap[w].obsCount++;
    if (namaPlan.has(k))  workerMap[w].planCount++;
    if (namaDiary.has(k)) workerMap[w].diaryCount++;
    if (namaEvalM.has(k)) workerMap[w].evalMCount++;
    if (namaEvalA.has(k)) workerMap[w].evalACount++;
  });
  const workers = Object.values(workerMap).sort((a,b)=>b.anak-a.anak);

  document.getElementById('page-content').innerHTML = `
    <!-- Status Siklus -->
    <div class="an-section">
      <div class="an-section-title">🔄 Status Siklus Intervensi <span class="badge badge-kobo">${allNama.size} anak total</span></div>
      <div class="g4" style="margin-bottom:16px">
        ${siklarCard('🏁','Siklus Lengkap',statusMap.full,allNama.size,'#16a34a','Sudah evaluasi akhir')}
        ${siklarCard('📊','Dalam Proses',statusMap.inProgress,allNama.size,'#F97316','Ada diary/eval menengah')}
        ${siklarCard('🌱','Tahap Awal',statusMap.early,allNama.size,'#2563eb','Ada obs/perencanaan')}
        ${siklarCard('⏳','Belum Mulai',statusMap.none,allNama.size,'#dc2626','Hanya di 1 form')}
      </div>
    </div>

    <!-- Tabel siklus per CBR Worker -->
    <div class="an-section">
      <div class="an-section-title">👷 Kelengkapan Siklus per CBR Worker</div>
      <div class="card">
        <div class="card-body np">
          <div style="overflow-x:auto">
            <table class="siklus-table">
              <thead><tr>
                <th>CBR Worker</th>
                <th>Anak</th>
                <th>Observasi</th>
                <th>Perencanaan</th>
                <th>Buku Harian</th>
                <th>Eval Menengah</th>
                <th>Eval Akhir</th>
                <th>Siklus Lengkap</th>
              </tr></thead>
              <tbody>
                ${workers.map(w => {
                  const pct = n => w.anak>0?Math.round(n/w.anak*100):0;
                  const cell = (n,tot) => `<td><div style="display:flex;flex-direction:column;align-items:center;gap:2px">
                    <span style="font-weight:700;color:${pctColor(pct(n))}">${n}</span>
                    <span style="font-size:.58rem;color:#94a3b8">${pct(n)}%</span>
                  </div></td>`;
                  return `<tr>
                    <td>${w.nama}</td>
                    <td style="text-align:center;font-weight:700">${w.anak}</td>
                    ${cell(w.obsCount,w.anak)}
                    ${cell(w.planCount,w.anak)}
                    ${cell(w.diaryCount,w.anak)}
                    ${cell(w.evalMCount,w.anak)}
                    ${cell(w.evalACount,w.anak)}
                    <td><div style="display:flex;flex-direction:column;align-items:center;gap:2px">
                      <span style="font-weight:700;color:${pctColor(pct(w.evalACount))}">${w.evalACount}</span>
                      <div class="pct-bar" style="width:44px"><div class="pct-fill" style="width:${pct(w.evalACount)}%;background:${pctColor(pct(w.evalACount))}"></div></div>
                    </div></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabel siklus per anak -->
    <div class="an-section">
      <div class="an-section-title">👶 Status Siklus per Anak <span class="badge badge-gray">dari DataAwal · diurutkan skor terendah</span></div>
      <div class="card">
        <div class="card-body np">
          <div style="overflow-x:auto;max-height:400px">
            <table class="siklus-table">
              <thead style="position:sticky;top:0;z-index:1"><tr>
                <th>Nama Anak</th>
                <th>Worker</th>
                <th>Skor</th>
                <th>Data Awal</th>
                <th>Obs</th>
                <th>Rencana</th>
                <th>Diary</th>
                <th>Eval M</th>
                <th>Eval A</th>
              </tr></thead>
              <tbody>
                ${anakSorted.map(a => {
                  const k = (a.nama||'').toLowerCase().trim();
                  const dot = (has) => has
                    ? '<span class="siklus-dot yes">✓</span>'
                    : '<span class="siklus-dot no">✗</span>';
                  const spCol = a.sp!=null?scColor(a.sp):'#94a3b8';
                  return `<tr>
                    <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.nama||'—'}</td>
                    <td style="font-size:.68rem;color:#64748b">${(a.cbr||'—').split(' ').slice(-1)[0]}</td>
                    <td style="font-weight:700;color:${spCol}">${a.sp!=null?a.sp:'—'}</td>
                    <td><span class="siklus-dot yes">✓</span></td>
                    <td>${dot(namaObs.has(k))}</td>
                    <td>${dot(namaPlan.has(k))}</td>
                    <td>${dot(namaDiary.has(k))}</td>
                    <td>${dot(namaEvalM.has(k))}</td>
                    <td>${dot(namaEvalA.has(k))}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;
}

function siklarCard(icon, label, n, total, color, desc) {
  const pct = total>0?Math.round(n/total*100):0;
  return `<div class="card">
    <div class="card-body" style="text-align:center">
      <div style="font-size:1.4rem;margin-bottom:6px">${icon}</div>
      <div style="font-size:1.6rem;font-weight:800;color:${color};line-height:1">${n}</div>
      <div style="font-size:.58rem;color:#94a3b8;margin:2px 0">${pct}% dari total</div>
      <div style="font-size:.72rem;font-weight:700;color:#334155;margin-top:4px">${label}</div>
      <div style="font-size:.65rem;color:#94a3b8;margin-top:2px">${desc}</div>
      <div class="pct-bar" style="width:100%;margin-top:8px"><div class="pct-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>
  </div>`;
}

function renderKualitatif() {
  const d    = D;
  const anak = d.anak||[];
  const obs  = d.obs||[];
  const plan = d.perencanaan||[];
  const evalM= d.evalMenengah||[];
  const evalA= d.evalAkhir||[];

  // Tema Gemini dari _tema field
  const temaStats = { nka:{}, tka:{}, nkp:{}, tkp:{} };
  anak.forEach(a => {
    if (!a._tema) return;
    ['nka','tka','nkp','tkp'].forEach(field => {
      (a._tema[field]||[]).forEach(t => {
        const k = t.kategori||'Lainnya';
        temaStats[field][k] = (temaStats[field][k]||0)+1;
      });
    });
  });
  const hasTema = Object.values(temaStats).some(v=>Object.keys(v).length>0);

  // ICF analysis — THEMES_ICF & analyzeThemes identik dengan worker-obs.html
  const THEMES_ICF_MEL = {
    struktur:[
      {label:'Fungsi Mental & Saraf',keywords_pos:['mental baik','daya ingat baik','kognitif baik','tidur baik','paham instruksi','perkembangan baik'],keywords_neg:['gangguan mental','cerebral palsy','down syndrome','autisme','keterlambatan','hambatan intelektual','tidak paham','kognitif terganggu','hiperaktif','kesulitan belajar']},
      {label:'Fungsi Indra (Penglihatan)',keywords_pos:['penglihatan baik','melihat normal','mata baik','bisa melihat'],keywords_neg:['gangguan penglihatan','tidak bisa melihat','buta','tunanetra','low vision','juling','rabun']},
      {label:'Fungsi Indra (Pendengaran)',keywords_pos:['pendengaran baik','mendengar baik','telinga baik'],keywords_neg:['gangguan pendengaran','tidak bisa mendengar','tuli','tunarungu','kurang dengar']},
      {label:'Fungsi Suara & Komunikasi',keywords_pos:['bicara lancar','bicara jelas','komunikasi baik','bisa berbicara'],keywords_neg:['tidak bisa bicara','bicara tidak jelas','bisu','cadel','pelo','wicara']},
      {label:'Fungsi Gerak & Motorik',keywords_pos:['bisa berjalan','gerak baik','motorik baik','bisa bergerak','berjalan normal'],keywords_neg:['tidak bisa berjalan','lumpuh','kaku','kursi roda','paraplegia','pincang','deformitas']},
      {label:'Fungsi Jantung & Pernafasan',keywords_pos:['jantung baik','pernafasan baik','napas normal'],keywords_neg:['gangguan jantung','epilepsi','kejang','sesak','asma','pernafasan terganggu']},
      {label:'Fungsi Pencernaan & Nutrisi',keywords_pos:['pencernaan baik','makan baik','gizi baik','nafsu makan baik'],keywords_neg:['gangguan pencernaan','stunting','gizi kurang','tidak bisa menelan','sulit makan']},
    ],
    kegiatan:[
      {label:'Pendidikan & Belajar',keywords_pos:['bersekolah','sekolah','belajar','sd','smp','slb','paud'],keywords_neg:['tidak sekolah','belum sekolah','putus sekolah','tidak bisa sekolah']},
      {label:'Mobilitas & Perpindahan',keywords_pos:['bisa berjalan','bergerak mandiri','mobilitas baik','bisa berdiri'],keywords_neg:['tidak bisa berjalan','kursi roda','merangkak','digendong','mobilitas terbatas']},
      {label:'Perawatan Diri',keywords_pos:['mandiri mandi','bisa mandi','bisa berpakaian','bisa makan sendiri','mengurus diri'],keywords_neg:['semua dibantu','bantuan total','disuapi','dimandikan','dipakaikan']},
      {label:'Komunikasi & Interaksi',keywords_pos:['komunikasi baik','mengerti perintah','bisa berkomunikasi','bersosialisasi'],keywords_neg:['komunikasi terbatas','tidak mengerti perintah','tidak bisa berkomunikasi','menarik diri']},
      {label:'Pekerjaan Rumah Tangga',keywords_pos:['membantu pekerjaan','menyapu','mencuci piring','membantu di rumah'],keywords_neg:['tidak bisa membantu','hanya berbaring','tidak bisa kerja rumah']},
      {label:'Interaksi Sosial & Bermain',keywords_pos:['bermain bersama','punya teman','bersosialisasi','aktif bermain'],keywords_neg:['tidak punya teman','jarang bermain','isolasi sosial','tidak mau bermain']},
      {label:'Partisipasi Komunitas',keywords_pos:['ikut kegiatan','aktif di komunitas','kegiatan gereja','kegiatan desa','posyandu'],keywords_neg:['tidak ikut kegiatan','tidak berpartisipasi','tidak keluar rumah','lebih banyak di rumah']},

      {label:'Kondisi Ekonomi',keywords_pos:['ekonomi baik','penghasilan cukup','ekonomi stabil'],keywords_neg:['ekonomi pas-pasan','ekonomi kurang','keluarga miskin','tidak mampu','penghasilan rendah']},
      {label:'Kondisi Rumah',keywords_pos:['rumah permanen','rumah layak','aksesibel','rumah baik'],keywords_neg:['rumah tidak layak','tidak aksesibel','rumah papan','lantai tanah','rumah rusak']},
      {label:'Akses Layanan Kesehatan',keywords_pos:['bpjs aktif','puskesmas dekat','akses mudah','punya bpjs','mendapat layanan'],keywords_neg:['tidak punya bpjs','jauh dari puskesmas','akses sulit','tidak ada layanan']},

      {label:'Bantuan Pemerintah',keywords_pos:['pkh','kip','bpjs','mendapat bantuan','bantuan sosial'],keywords_neg:['tidak menerima bantuan','tidak ada bantuan','belum dapat bantuan']},

    ],
  };

  // analyzeThemes — identik dengan worker-obs.html
  const fieldMap = {struktur:'st', kegiatan:'kg', lingkungan:'lg'};
  const icfResult = {};
  ['struktur','kegiatan','lingkungan'].forEach(dom => {
    icfResult[dom] = {};
    THEMES_ICF_MEL[dom].forEach(theme => {
      let pos = 0, neg = 0;
      obs.forEach(o => {
        const text = (o[fieldMap[dom]] || '').toLowerCase();
        const isPos = (theme.keywords_pos||[]).some(kw => text.includes(kw.toLowerCase()));
        const isNeg = (theme.keywords_neg||[]).some(kw => text.includes(kw.toLowerCase()));
        if (isPos) pos++;
        if (isNeg) neg++;
      });
      icfResult[dom][theme.label] = {pos, neg};
    });
  });

  // Word frequency dari berbagai field
  const kesulitanPengasuh = plan.map(r=>r.kesulitan_pengasuh||'').filter(Boolean);
  const perubahanEval     = evalM.map(r=>r.perubahan_1||'').filter(Boolean);
  const alasanTidak       = evalA.map(r=>r.alasan_tidak_1||'').filter(Boolean);
  const lessonMon         = BEN_MON.map(r=>r.lesson_learnt||'').filter(Boolean);

  const wfKesulitan = wordFreq(kesulitanPengasuh);

    AKTOR_FIELDS.forEach(ak => {
      const v = r['rencana_'+ak+'_t1']||r['rencana_'+ak+'_t2']||r['rencana_'+ak+'_t3'];
      if (v && v!=='0' && v!=='') aktorCount[ak]=(aktorCount[ak]||0)+1;
    });
  });
  const aktorEntries = Object.entries(aktorCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxAktor = aktorEntries[0]?.[1]||1;

  const AKTOR_LBL = {ayah:'Ayah',ibu:'Ibu',saudara_kandung:'Saudara Kandung',kakek_nenek_serumah:'Kakek/Nenek',guru_kelas:'Guru Kelas',bidan_desa:'Bidan Desa',kepala_desa:'Kepala Desa',scn:'SCN',cbr_worker_lain:'CBR Worker Lain',kader_posyandu:'Kader Posyandu'};

  document.getElementById('page-content').innerHTML = `
    <!-- TEMA GEMINI -->
    ${hasTema ? `
    <div class="an-section">
      <div class="an-section-title">🧠 Tema Narasi (Analisis Gemini AI) <span class="badge badge-kobo">DataAwal · field nka/tka/nkp/tkp</span></div>
      <div class="g2">
        ${temaCloud('💪 Faktor Membantu Anak', temaStats.nka, '#16a34a')}
        ${temaCloud('⚠️ Faktor Menyulitkan Anak', temaStats.tka, '#dc2626')}
        ${temaCloud('💚 Faktor Membantu Pengasuh', temaStats.nkp, '#2563eb')}
        ${temaCloud('💔 Faktor Menyulitkan Pengasuh', temaStats.tkp, '#d97706')}
      </div>
    </div>` : ''}

    <!-- ICF -->
    <div class="an-section">
      <div class="an-section-title">🔬 Temuan ICF dari Observasi Lapangan <span class="badge badge-kobo">${obs.length} observasi</span></div>
      <div class="g3">
        ${icfSection('Struktur & Fungsi Tubuh','st',icfResult.struktur,'#1a6fd4')}
        ${icfSection('Kegiatan & Partisipasi','kg',icfResult.kegiatan,'#10b8a6')}
        ${icfSection('Faktor Lingkungan','lg',icfResult.lingkungan,'#d97706')}
      </div>
    </div>

    <!-- WORD FREQ -->
    <div class="an-section">
      <div class="an-section-title">💬 Pola Kata dari Narasi Lapangan <span class="badge badge-kobo">Frekuensi kata · DataRencana + Evaluasi</span></div>
      <div class="g2">
        ${wordFreqCard('😔 Kesulitan Pengasuh', wfKesulitan, '#dc2626', kesulitanPengasuh.length+' perencanaan')}
        ${wordFreqCard('🔄 Perubahan Teridentifikasi', wfPerubahan, '#F97316', perubahanEval.length+' eval menengah')}
        ${wordFreqCard('❌ Alasan Tujuan Tidak Tercapai', wfAlasan, '#d97706', alasanTidak.length+' eval akhir')}
        ${wordFreqCard('💡 Lesson Learnt Kegiatan', wfLesson, '#16a34a', lessonMon.length+' monitoring')}
      </div>
    </div>

    <!-- AKTOR PERENCANAAN -->
    ${plan.length>0 ? `
    <div class="an-section">
      <div class="an-section-title">👥 Aktor yang Dilibatkan dalam Perencanaan <span class="badge badge-kobo">DataRencana · ${plan.length} record</span></div>
      <div class="card" style="max-width:500px">
        <div class="card-head"><span class="card-title">Top 10 Aktor</span><span class="card-sub">berdasarkan frekuensi keterlibatan</span></div>
        <div class="card-body">
          ${aktorEntries.map(([k,v])=>`
            <div class="aktor-row">

            </div>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- CERITA -->
    ${renderCerita(d)}
  `;
}

function temaCloud(title, data, color) {
  const entries = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  if (!entries.length) return `<div class="card"><div class="card-head"><span class="card-title">${title}</span></div><div class="card-body"><div class="empty"><div class="empty-icon">🔍</div>Belum ada data tema</div></div></div>`;
  const maxV = entries[0][1];
  return `<div class="card">
    <div class="card-head"><span class="card-title">${title}</span><span class="card-sub">${entries.length} kategori</span></div>
    <div class="card-body">
      <div class="tema-cloud">
        ${entries.map(([k,v])=>{
          const opacity = 0.3 + (v/maxV)*0.7;
          const size = 0.65 + (v/maxV)*0.2;
          return `<span class="tema-chip" style="background:${color}18;color:${color};font-size:${size}rem;opacity:${opacity+0.2}">${k} <strong>(${v})</strong></span>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function icfSection(title, key, data, color) {
  const entries = Object.entries(data);
  const total = entries.reduce((s,[,v])=>s+v.pos+v.neg,0)||1;
  return `<div class="card">
    <div class="card-head"><span class="card-title">${title}</span></div>
    <div class="card-body">
      ${entries.map(([lbl,v])=>{
        const tot = v.pos+v.neg||1;
        return `<div class="icf-row">
          <div class="icf-lbl">${lbl}</div>
          <div class="icf-bars">
            <div class="icf-bar-wrap">
              <div class="icf-bar-lbl" style="color:#16a34a">Positif</div>
              <div class="icf-bar-track"><div class="icf-bar-fill" style="width:${Math.round(v.pos/tot*100)}%;background:#16a34a"></div></div>
              <div class="icf-bar-num" style="color:#16a34a">${v.pos}</div>
            </div>
            <div class="icf-bar-wrap">
              <div class="icf-bar-lbl" style="color:#dc2626">Negatif</div>
              <div class="icf-bar-track"><div class="icf-bar-fill" style="width:${Math.round(v.neg/tot*100)}%;background:#dc2626"></div></div>
              <div class="icf-bar-num" style="color:#dc2626">${v.neg}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function wordFreqCard(title, entries, color, sub) {
  if (!entries.length) return `<div class="card"><div class="card-head"><span class="card-title">${title}</span></div><div class="card-body"><div class="empty"><div class="empty-icon">📭</div>Belum ada data</div></div></div>`;
  const max = entries[0][1];
  return `<div class="card">
    <div class="card-head"><span class="card-title">${title}</span><span class="card-sub">${sub}</span></div>
    <div class="card-body">
      ${entries.slice(0,10).map(([w,v])=>`
        <div class="aktor-row">
          <div class="aktor-name">${w}</div>
          <div class="aktor-bar-wrap" style="background:#f8fafc">
            <div class="aktor-bar-fill" style="width:${Math.round(v/max*100)}%;background:${color}88"></div>
          </div>
          <div class="aktor-count" style="color:${color}">${v}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderCerita(d) {
  const cerita = [...(d.cerita||[])];
  if (!cerita.length) return `
    <div class="an-section">
      <div class="an-section-title">📖 Cerita Perubahan & Sukses</div>
      <div class="empty"><div class="empty-icon">📭</div>Belum ada cerita perubahan atau cerita sukses</div>
    </div>`;
  return `
    <div class="an-section">
      <div class="an-section-title">📖 Cerita Perubahan & Sukses <span class="badge badge-kobo">${cerita.length} cerita</span></div>
      <div class="g2">
        ${cerita.slice(0,6).map(c=>`
          <div class="cerita-card">
            <div class="cerita-nama">${c.nama||c.judul||'—'}</div>
            <div class="cerita-meta">
              ${c.scn?`<span>📍 ${c.scn}</span>`:''}
              ${c.cbr?`<span>👤 ${c.cbr}</span>`:''}
              ${c.tgl?`<span>📅 ${c.tgl}</span>`:''}
            </div>
            <div class="cerita-isi">${c.isi||c.cerita||'—'}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// TAB 5: EKOSISTEM PROGRAM
// ══════════════════════════════════════════════════════════════
function renderEkosistem() {
  const d     = D;
  const anak  = d.anak||[];
  const workers = d.workers||[];

  document.getElementById('page-content').innerHTML = `
    <!-- KPI Ekosistem -->
    <div class="kpi-strip">
      ${kpiTile('👷','#fff7ed','#F97316',workers.length,'CBR Worker','aktif dalam program')}
      ${kpiTile('👥','#eff6ff','#2563eb',BEN_STK.length,'Total Stakeholder','dari BEN Uploader')}
      ${kpiTile('📋','#f0fdf4','#16a34a',new Set(BEN_MON.map(r=>r.nama_kegiatan).filter(Boolean)).size,'Total Kegiatan','monitoring aktif')}
      ${kpiTile('🎯','#f5f3ff','#7c3aed',BEN_MON.reduce((s,r)=>s+num(r.total),0),'Total Peserta','lintas kegiatan')}
      ${kpiTile('🏢','#fafafa','#475569',new Set(BEN_STK.map(r=>(r.instansi||'').trim()).filter(Boolean)).size,'Instansi Terlibat','stakeholder')}
    </div>

    <!-- STAKEHOLDER -->
    <div class="an-section">
      <div class="an-section-title">🤝 Jaringan Stakeholder <span class="badge badge-ben">BEN Uploader · DataStakeholder</span></div>
      ${BEN_STK.length > 0 ? `
      <div class="g2">
        <div class="card">
          <div class="card-head"><span class="card-title">Distribusi per Kategori</span></div>
          <div class="card-body"><div class="ch ch-md"><canvas id="ch-stk-kat"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Distribusi per SCN</span></div>
          <div class="card-body"><div class="ch ch-md"><canvas id="ch-stk-scn"></canvas></div></div>
        </div>
      </div>` : `<div class="empty"><div class="empty-icon">📭</div>Belum ada data stakeholder. Upload melalui MEL SCN Tools.</div>`}
    </div>

    <!-- CBR WORKER -->
    <div class="an-section">
      <div class="an-section-title">👷 Kinerja CBR Worker <span class="badge badge-kobo">KoboToolbox · DataAwal + Observasi</span></div>
      <div class="card">
        <div class="card-body np">
          <div style="overflow-x:auto">
            <table class="siklus-table">
              <thead><tr>
                <th>Nama Worker</th>
                <th>Anak</th>
                <th>Total Observasi</th>
                <th>Avg Skor Anak</th>
                <th>Kritis</th>
                <th>Epilepsi</th>
                <th>Pernah Terapi</th>
              </tr></thead>
              <tbody>
                ${workers.map(w => {
                  const myAnak = anak.filter(a=>a.cbr===w.nama);
                  const spArr  = myAnak.filter(a=>a.sp!=null).map(a=>a.sp);
                  const avSP   = spArr.length?avg(spArr).toFixed(1):'—';
                  const kritis = myAnak.filter(a=>a.sp!=null&&a.sp<=3).length;
                  const ep     = myAnak.filter(a=>a.ep).length;
                  const tr     = myAnak.filter(a=>a.tr).length;
                  const spCol  = avSP!=='—'?scColor(parseFloat(avSP)):'#94a3b8';
                  return `<tr>
                    <td>${w.nama}</td>
                    <td style="text-align:center;font-weight:700">${w.anak}</td>
                    <td style="text-align:center">${w.kunjungan_bulan}</td>
                    <td style="text-align:center;font-weight:700;color:${spCol}">${avSP}</td>
                    <td style="text-align:center;color:${kritis>0?'#dc2626':'#94a3b8'};font-weight:${kritis>0?700:400}">${kritis}</td>
                    <td style="text-align:center;color:#94a3b8">${ep}</td>
                    <td style="text-align:center;color:#16a34a">${tr}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- MONITORING KEGIATAN -->
    <div class="an-section">
      <div class="an-section-title">📋 Monitoring Kegiatan <span class="badge badge-ben">BEN Uploader · DataMonthly</span></div>
      ${BEN_MON.length > 0 ? `
      <div class="g2" style="margin-bottom:16px">
        <div class="card">
          <div class="card-head"><span class="card-title">Peserta per Kategori</span></div>
          <div class="card-body"><div class="ch ch-md"><canvas id="ch-mon-kat"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Distribusi Outcome Kegiatan</span></div>
          <div class="card-body"><div class="ch ch-md"><canvas id="ch-mon-out"></canvas></div></div>
        </div>
      </div>
      ${renderLessonLearnt()}
      ` : `<div class="empty"><div class="empty-icon">📭</div>Belum ada data monitoring. Upload melalui MEL SCN Tools.</div>`}
    </div>
  `;

  setTimeout(() => {
    if (BEN_STK.length > 0) {
      const katC={};
      BEN_STK.forEach(r=>{const k=r.kategori||'Lainnya';katC[k]=(katC[k]||0)+1;});
      const katE=Object.entries(katC).sort((a,b)=>b[1]-a[1]);
      mk('ch-stk-kat','bar',{
        labels:katE.map(([k])=>k),
        datasets:[{data:katE.map(([,v])=>v),backgroundColor:PAL,borderRadius:5,borderSkipped:false}]
      },{...BASE,indexAxis:'y'});

      const scnC={};
      BEN_STK.forEach(r=>{const s=r.scn||'?';scnC[s]=(scnC[s]||0)+1;});
      const scnE=Object.entries(scnC).sort((a,b)=>b[1]-a[1]);
      mk('ch-stk-scn','bar',{
        labels:scnE.map(([k])=>SCN_LBL[k]||k),
        datasets:[{data:scnE.map(([,v])=>v),backgroundColor:PAL,borderRadius:5,borderSkipped:false}]
      },{...BASE});
    }

    if (BEN_MON.length > 0) {
      const pesKat=[
        {l:'CBR Worker',v:BEN_MON.reduce((s,r)=>s+num(r.cbr),0)},
        {l:'Guru',v:BEN_MON.reduce((s,r)=>s+num(r.guru),0)},
        {l:'Pengasuh',v:BEN_MON.reduce((s,r)=>s+num(r.pengasuh),0)},
        {l:'Nakes',v:BEN_MON.reduce((s,r)=>s+num(r.nakes),0)},
        {l:'Pemerintah',v:BEN_MON.reduce((s,r)=>s+num(r.pemerintah),0)},
        {l:'Lainnya',v:BEN_MON.reduce((s,r)=>s+num(r.lainnya),0)},
      ].filter(k=>k.v>0).sort((a,b)=>b.v-a.v);
      mk('ch-mon-kat','bar',{
        labels:pesKat.map(k=>k.l),
        datasets:[{data:pesKat.map(k=>k.v),backgroundColor:PAL,borderRadius:5,borderSkipped:false}]
      },{...BASE,indexAxis:'y'});

      const outC={};
      BEN_MON.forEach(r=>{const o=r.outcome||'Lainnya';outC[o]=(outC[o]||0)+1;});
      const outE=Object.entries(outC).sort((a,b)=>b[1]-a[1]);
      const outTot=outE.reduce((s,[,v])=>s+v,0);
      mk('ch-mon-out','doughnut',{
        labels:outE.map(([k,v])=>`${k} (${Math.round(v/outTot*100)}%)`),
        datasets:[{data:outE.map(([,v])=>v),backgroundColor:PAL,borderColor:'#fff',borderWidth:3}]
      },{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{font:{size:10},padding:8}}}});
    }
  }, 100);
}

function renderLessonLearnt() {
  const lessons = [...BEN_MON].filter(r=>r.lesson_learnt).sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||'')).slice(0,6);
  if (!lessons.length) return '';
  return `<div class="card">
    <div class="card-head"><span class="card-title">💡 Lesson Learnt Terkini</span><span class="card-sub">${lessons.length} kegiatan</span></div>
    <div class="card-body">
      ${lessons.map(r=>`
        <div class="lesson-item">
          <div class="lesson-keg">${r.nama_kegiatan||'—'}</div>
          <div class="lesson-meta">${r.scn?'📍 '+r.scn:''} ${r.tanggal?'· 📅 '+r.tanggal:''}</div>
          <div class="lesson-txt">${r.lesson_learnt}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

// ── INIT ─────────────────────────────────────────────────────
buildSidebar();
const SESSION = AUTH.requireAuth('../index.html');
if (SESSION) {
  if (!AUTH.canAccessMel()) {
    window.location.href = 'mel-beranda.html';
  } else {
    AUTH.applySession({
      onScnSwitch: async function(scnId) {
        const d = await API.get(scnId);
        if (d) renderPage(d, scnId);
      }
    });
    AUTH.initSidebar('mel','m-analisis');

    // Fetch data paralel: API + BEN
    const scnId = AUTH.getScnFilter();
    Promise.all([
      API.get(scnId),
      API_BEN.get('stakeholder', scnId),
      API_BEN.get('monthly', scnId),
    ]).then(([koboData, stkData, monData]) => {
      BEN_STK = stkData||[];
      BEN_MON = monData||[];
      if (koboData) {
        renderPage(koboData, scnId);
      } else {
        document.getElementById('page-content').innerHTML =
          '<div class="an-loading">Tidak ada data tersedia</div>';
      }
    });
  }
}
</script>
